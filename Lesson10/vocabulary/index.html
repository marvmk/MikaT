<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>L10 Vocabulary: Trilingual Training</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .card-container { perspective: 1000px; }
        .card { transition: transform 0.6s; transform-style: preserve-3d; cursor: pointer; }
        .card.is-flipped { transform: rotateY(180deg); }
        .card-face {
            backface-visibility: hidden; position: absolute;
            width: 100%; height: 100%; display: flex;
            flex-direction: column; align-items: center;
            justify-content: center; border-radius: 1.5rem;
            box-shadow: 0 10px 25px -5px rgb(0 0 0 / 0.1);
        }
        .card-back { transform: rotateY(180deg); }
        .action-icon { font-size: 5rem; }
        
        .speaker-btn {
            background: #0ea5e9;
            color: white;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 6px 20px rgba(14, 165, 233, 0.4);
            transition: all 0.2s ease;
            margin-bottom: 1rem;
        }
        .speaker-btn:active { transform: scale(0.9); background: #0284c7; }
        .speaker-btn svg { width: 40px; height: 40px; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen font-sans flex flex-col">

    <header class="bg-sky-900 text-white p-4 shadow-lg text-center">
        <h1 class="text-xl font-bold">L10 Vocab: Trilingue 🔊</h1>
        <p class="text-xs opacity-80 uppercase tracking-widest">Hiragana • Romaji • Audio • IT • EN</p>
    </header>

    <main class="flex-grow flex flex-col items-center p-6 max-w-2xl mx-auto w-full">
        <!-- Selector -->
        <div class="flex space-x-1 mb-6 bg-slate-200 p-1 rounded-xl w-full overflow-x-auto shadow-inner">
            <button id="mode-people" class="flex-1 whitespace-nowrap px-4 py-3 rounded-lg font-bold transition bg-white shadow text-sky-800" onclick="switchMode('people')">LIVING</button>
            <button id="mode-object" class="flex-1 whitespace-nowrap px-4 py-3 rounded-lg font-bold transition text-slate-600" onclick="switchMode('object')">OBJECTS</button>
            <button id="mode-place" class="flex-1 whitespace-nowrap px-4 py-3 rounded-lg font-bold transition text-slate-600" onclick="switchMode('place')">PLACES</button>
            <button id="mode-loc" class="flex-1 whitespace-nowrap px-4 py-3 rounded-lg font-bold transition text-slate-600" onclick="switchMode('loc')">POSITION</button>
        </div>

        <!-- Card Area -->
        <div class="card-container w-full h-[500px] relative mb-8">
            <div id="practice-card" class="card w-full h-full relative">
                
                <!-- Front Side -->
                <div class="card-face card-front bg-white border-2 border-sky-50 p-8 text-center" onclick="flipCard()">
                    <div id="prompt-content" class="flex flex-col items-center space-y-6"></div>
                    <div class="mt-auto text-[10px] text-slate-300 font-bold uppercase tracking-widest">Tap for Japanese / Tocca per il giapponese</div>
                </div>

                <!-- Back Side -->
                <div class="card-face card-back bg-sky-50 border-4 border-sky-600 p-8 text-center">
                    <div id="type-label" class="text-[10px] text-sky-600 font-black uppercase tracking-[0.2em] mb-4">Risposta</div>
                    
                    <div id="answer-text" class="text-4xl font-black text-sky-950 mb-1 leading-tight"></div>
                    <div id="romaji-text" class="text-2xl font-bold text-sky-600 font-mono mb-8"></div>
                    
                    <button onclick="speakJapanese(event)" class="speaker-btn">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z" />
                        </svg>
                    </button>
                    
                    <div class="w-16 h-1 bg-sky-200 mb-6 mx-auto"></div>
                    
                    <div class="flex flex-col items-center space-y-1 px-4">
                        <div id="en-back" class="text-slate-500 italic"></div>
                        <div id="it-back" class="text-lg text-sky-800 font-bold"></div>
                    </div>

                    <div class="mt-auto text-[10px] text-sky-400 font-bold uppercase tracking-widest cursor-pointer" onclick="nextQuestion()">Next / Prossimo →</div>
                </div>
            </div>
        </div>

        <!-- Controls -->
        <div class="flex justify-between w-full items-center px-4">
            <button onclick="prevQuestion()" class="w-12 h-12 flex items-center justify-center rounded-full border-2 border-slate-300 text-slate-400 bg-white">←</button>
            <div class="text-slate-400 font-black text-lg"><span id="current-index" class="text-sky-700">1</span> / <span id="total-count">0</span></div>
            <button onclick="nextQuestion()" class="w-12 h-12 flex items-center justify-center rounded-full bg-sky-700 text-white shadow-lg">→</button>
        </div>
    </main>

    <script>
        const peopleList = [
            { icon: "🙋‍♂️", en: "exist (animate)", it: "esserci (esseri animati)", answer: "います", romaji: "imasu" },
            { icon: "👨", en: "man", it: "uomo", answer: "おとこのひと", romaji: "otoko no hito" },
            { icon: "👩", en: "woman", it: "donna", answer: "おんなのひと", romaji: "onna no hito" },
            { icon: "👦", en: "boy", it: "ragazzo / bambino", answer: "おとこのこ", romaji: "otoko no ko" },
            { icon: "👧", en: "girl", it: "ragazza / bambina", answer: "おんなのこ", romaji: "onna no ko" },
            { icon: "🐶", en: "dog", it: "cane", answer: "いぬ", romaji: "inu" },
            { icon: "🐱", en: "cat", it: "gatto", answer: "ねこ", romaji: "neko" }
        ];

        const objectList = [
            { icon: "📦", en: "exist (inanimate)", it: "esserci (cose inanimate)", answer: "あります", romaji: "arimasu" },
            { icon: "🌳", en: "tree / wood", it: "albero / legno", answer: "き", romaji: "ki" },
            { icon: "🔋", en: "battery", it: "batteria / pila", answer: "でんち", romaji: "denchi" },
            { icon: "📦", en: "box", it: "scatola", answer: "はこ", romaji: "hako" },
            { icon: "🔘", en: "switch", it: "interruttore", answer: "スイッチ", romaji: "suicchi" },
            { icon: "❄️🏢", en: "refrigerator", it: "frigorifero", answer: "れいぞうこ", romaji: "rēzōko" },
            { icon: "テーブル", en: "table", it: "tavolo", answer: "テーブル", romaji: "tēburu" },
            { icon: "🛏️", en: "bed", it: "letto", answer: "ベッド", romaji: "beddo" },
            { icon: "棚", en: "shelf", it: "scaffale / mensola", answer: "たな", romaji: "tana" },
            { icon: "🚪", en: "door", it: "porta", answer: "ドア", romaji: "doa" },
            { icon: "🪟", en: "window", it: "finestra", answer: "まど", romaji: "mado" }
        ];

        const placeList = [
            { icon: "📮", en: "post box", it: "cassetta delle lettere", answer: "ポスト", romaji: "posuto" },
            { icon: "🏢", en: "building", it: "edificio / palazzo", answer: "ビル", romaji: "biru" },
            { icon: "🏞️", en: "park", it: "parco", answer: "こうえん", romaji: "kōen" },
            { icon: "☕", en: "coffee shop", it: "bar / caffetteria", answer: "きっさてん", romaji: "kissaten" },
            { icon: "📚", en: "bookstore", it: "libreria", answer: "ほんや", romaji: "hon'ya" },
            { icon: "🚉", en: "boarding point (bus/taxi)", it: "fermata / punto di imbarco", answer: "のりば", romaji: "noriba" }
        ];

        const locationList = [
            { icon: "⬆️", en: "on / above", it: "sopra", answer: "うえ", romaji: "ue" },
            { icon: "⬇️", en: "under / below", it: "sotto", answer: "した", romaji: "shita" },
            { icon: "⬅️🔲", en: "front / before", it: "davanti", answer: "まえ", romaji: "mae" },
            { icon: "🔲⬅️", en: "back / behind", it: "dietro", answer: "うしろ", romaji: "ushiro" },
            { icon: "👉", en: "right", it: "destra", answer: "みぎ", romaji: "migi" },
            { icon: "👈", en: "left", it: "sinistra", answer: "ひだり", romaji: "hidari" },
            { icon: "📥", en: "in / inside", it: "dentro / in", answer: "なか", romaji: "naka" },
            { icon: "🚪⬅️", en: "outside", it: "fuori", answer: "そと", romaji: "soto" },
            { icon: "👫", en: "next to", it: "accanto", answer: "となり", romaji: "tonari" },
            { icon: "🏠📍", en: "near / vicinity", it: "vicino", answer: "ちかく", romaji: "chikaku" },
            { icon: "📦🍎📦", en: "between", it: "tra / in mezzo", answer: "あいだ", romaji: "aida" }
        ];

        let currentMode = 'people';
        let currentIndex = 0;
        let isFlipped = false;

        function switchMode(mode) {
            currentMode = mode; currentIndex = 0; isFlipped = false;
            document.getElementById('practice-card').classList.remove('is-flipped');
            updateView();
            const modes = ['people', 'object', 'place', 'loc'];
            modes.forEach(m => {
                const btn = document.getElementById(`mode-${m}`);
                if(m === mode) {
                    btn.className = "flex-1 whitespace-nowrap px-4 py-3 rounded-lg font-bold transition bg-white shadow text-sky-800";
                } else {
                    btn.className = "flex-1 whitespace-nowrap px-4 py-3 rounded-lg font-bold transition text-slate-600";
                }
            });
        }

        function updateView() {
            let list;
            let typeLabel;
            if(currentMode === 'people') { list = peopleList; typeLabel = "Living Beings"; }
            else if(currentMode === 'object') { list = objectList; typeLabel = "Objects"; }
            else if(currentMode === 'place') { list = placeList; typeLabel = "Places"; }
            else { list = locationList; typeLabel = "Positions"; }
            
            const item = list[currentIndex];
            const promptContent = document.getElementById('prompt-content');
            promptContent.innerHTML = `
                <div class="action-icon mb-2">${item.icon}</div>
                <div class="space-y-4">
                    <div>
                        <div class="text-[10px] text-slate-400 font-bold uppercase mb-1 tracking-widest">English</div>
                        <div class="text-xl text-slate-800 font-medium">${item.en}</div>
                    </div>
                    <div class="flex justify-center"><div class="h-px w-12 bg-slate-100"></div></div>
                    <div>
                        <div class="text-[10px] text-sky-500 font-bold uppercase mb-1 tracking-widest">Italiano</div>
                        <div class="text-xl text-sky-700 font-bold">${item.it}</div>
                    </div>
                </div>
            `;
            document.getElementById('current-index').innerText = currentIndex + 1;
            document.getElementById('total-count').innerText = list.length;
            document.getElementById('answer-text').innerText = item.answer;
            document.getElementById('romaji-text').innerText = item.romaji;
            document.getElementById('en-back').innerText = item.en;
            document.getElementById('it-back').innerText = item.it;
            document.getElementById('type-label').innerText = typeLabel;
        }

        function flipCard() {
            if (isFlipped) return;
            document.getElementById('practice-card').classList.add('is-flipped');
            isFlipped = true;
        }

        function speakJapanese(event) {
            if (event) event.stopPropagation();
            let list;
            if(currentMode === 'people') list = peopleList;
            else if(currentMode === 'object') list = objectList;
            else if(currentMode === 'place') list = placeList;
            else list = locationList;

            const word = list[currentIndex].answer;
            const ut = new SpeechSynthesisUtterance(word);
            ut.lang = 'ja-JP';
            ut.rate = 0.85;
            window.speechSynthesis.speak(ut);
        }

        function nextQuestion() {
            const list = currentMode === 'people' ? peopleList : (currentMode === 'object' ? objectList : (currentMode === 'place' ? placeList : locationList));
            isFlipped = false;
            document.getElementById('practice-card').classList.remove('is-flipped');
            setTimeout(() => {
                currentIndex = (currentIndex + 1) % list.length;
                updateView();
            }, 150);
        }

        function prevQuestion() {
            const list = currentMode === 'people' ? peopleList : (currentMode === 'object' ? objectList : (currentMode === 'place' ? placeList : locationList));
            isFlipped = false;
            document.getElementById('practice-card').classList.remove('is-flipped');
            setTimeout(() => {
                currentIndex = (currentIndex - 1 + list.length) % list.length;
                updateView();
            }, 150);
        }
        
        window.speechSynthesis.getVoices();
        updateView();
    </script>
</body>
</html>
