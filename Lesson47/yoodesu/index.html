<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Japanese Practice: Lesson 47 Master</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .card-container { perspective: 1000px; }
        .card { transition: transform 0.6s; transform-style: preserve-3d; cursor: pointer; }
        .card.is-flipped { transform: rotateY(180deg); }
        .card-face {
            backface-visibility: hidden; position: absolute;
            width: 100%; height: 100%; display: flex;
            flex-direction: column; align-items: center;
            justify-content: center; border-radius: 1.5rem;
            box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1);
            padding: 2rem;
        }
        .card-back { transform: rotateY(180deg); }
        .item-icon { font-size: 4.5rem; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen font-sans flex flex-col">

    <header class="bg-amber-500 text-white p-6 shadow-md text-center">
        <h1 class="text-2xl font-bold italic">L47: Hearsay & Appearance</h1>
        <p class="text-sm opacity-90 font-black tracking-widest uppercase">Result Prep System</p>
    </header>

    <main class="flex-grow flex flex-col items-center p-6 max-w-2xl mx-auto w-full">
        <!-- Mode Selector (English Tabs) -->
        <div class="flex space-x-1 mb-8 bg-gray-200 p-1 rounded-xl w-full overflow-x-auto shadow-inner border border-gray-300">
            <button id="mode-hearsay" class="flex-1 whitespace-nowrap px-2 py-3 rounded-lg font-bold transition bg-white shadow-sm text-amber-600 text-xs" onclick="switchMode('hearsay')">
                Hearsay (~sou)
            </button>
            <button id="mode-appear" class="flex-1 whitespace-nowrap px-2 py-3 rounded-lg font-bold transition text-gray-600 text-xs" onclick="switchMode('appear')">
                Appearance (~you)
            </button>
            <button id="mode-real" class="flex-1 whitespace-nowrap px-2 py-3 rounded-lg font-bold transition text-gray-600 text-xs" onclick="switchMode('real')">
                Real Life
            </button>
        </div>

        <!-- Question Area -->
        <div id="game-view" class="w-full flex flex-col items-center">
            <div id="instruction" class="text-gray-400 mb-6 text-center text-xs font-black uppercase tracking-[0.2em]">
                Report what you heard...
            </div>

            <!-- Card Container -->
            <div class="card-container w-full h-[480px] relative mb-10">
                <div id="practice-card" class="card w-full h-full relative" onclick="flipCard()">
                    <!-- Front -->
                    <div class="card-face card-front bg-white border-2 border-amber-100 text-center">
                        <div id="prompt-content" class="flex flex-col items-center space-y-6 w-full px-4">
                            <!-- Injected by JS -->
                        </div>
                        <div class="mt-auto text-[10px] text-gray-300 font-bold uppercase tracking-widest">Tap to reveal Japanese</div>
                    </div>
                    <!-- Back -->
                    <div class="card-face card-back bg-amber-50 border-4 border-amber-400 p-8 text-center">
                        <div id="answer-kanji" class="text-3xl font-black text-amber-900 leading-tight mb-4 px-2"></div>
                        <div id="answer-kana" class="text-xl font-bold text-amber-500 mb-8"></div>
                        
                        <!-- Manual Audio Button -->
                        <button onclick="event.stopPropagation(); speakJapanese();" class="w-16 h-16 bg-white border-2 border-amber-200 rounded-full flex items-center justify-center shadow-md active:scale-90 transition-transform mb-6 group">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-amber-500 group-hover:text-amber-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z" />
                            </svg>
                        </button>

                        <div id="answer-it" class="text-base text-amber-700 italic font-medium px-4"></div>
                        <div class="mt-auto text-[10px] text-amber-300 font-bold uppercase">Tap for next question</div>
                    </div>
                </div>
            </div>

            <!-- Navigation -->
            <div class="flex justify-between w-full items-center px-2">
                <button onclick="prevQuestion()" class="w-14 h-14 flex items-center justify-center border-2 border-gray-200 rounded-full text-gray-400 bg-white hover:bg-gray-50 transition shadow-sm text-xl font-bold">←</button>
                <div class="flex flex-col items-center">
                    <div class="text-gray-400 font-black text-lg">
                        <span id="current-index" class="text-amber-600 font-black">1</span> 
                        <span class="text-gray-200">/</span> 
                        <span id="total-count">17</span>
                    </div>
                </div>
                <button onclick="buttonNext()" class="px-10 py-4 bg-amber-500 rounded-full text-white font-black hover:bg-amber-600 transition shadow-lg tracking-widest uppercase text-sm">Next</button>
            </div>
        </div>

        <!-- Finished View -->
        <div id="finished-view" class="hidden w-full flex flex-col items-center justify-center p-12 bg-white rounded-[3rem] shadow-2xl border-4 border-amber-100 text-center">
            <div class="text-7xl mb-8">Finished‼️</div>
            <p class="text-gray-500 font-black uppercase tracking-[0.3em] mb-4 text-sm">Pratica completata!</p>
            <p class="text-lg text-amber-600 font-bold mb-10 italic text-center">Lesson 47 Mastery Complete.</p>
            <button onclick="location.reload()" class="w-full py-5 bg-amber-500 text-white rounded-2xl font-black shadow-xl active:scale-95 transition-all text-xl tracking-widest uppercase">
                Restart
            </button>
        </div>
    </main>

    <footer class="py-8 text-center text-gray-300 text-[10px] font-black tracking-widest uppercase">
        Result Prep System &bull; Mika Tomao
    </footer>

    <script>
        // Mode 1: Hearsay (~sou desu)
        const hearsayData = [
            { icon: "📅☀️", en: "According to the forecast, it will be sunny tomorrow.", it: "Secondo le previsioni, domani farà bel tempo.", kanji: "予報によると、明日は晴れるそうです。", kana: "よほうに よると、あしたは はれるそうです。" },
            { icon: "💍🤝", en: "I heard that Mr. Tanaka is getting married.", it: "Ho sentito che il signor Tanaka si sposa.", kanji: "田中さんは結婚するそうです。", kana: "たなかさんは けっこんするそうです。" },
            { icon: "🌍🏙️", en: "I heard there was a big earthquake in Tokyo.", it: "Ho sentito che c'è stato un grande terremoto a Tokyo.", kanji: "東京で大きな地震があったそうです。", kana: "とうきょうで おおきな じしんが あったそうです。" },
            { icon: "👔🤝", en: "According to the news, the president will come to Japan.", it: "Secondo le notizie, il presidente verrà in Giappone.", kanji: "ニュースによると、大統領が日本へ来るそうです。", kana: "にゅーすに よると、だいとうりょうが にほんへ くるそうです。" },
            { icon: "🍱😋", en: "I heard that restaurant is delicious.", it: "Ho sentito che quel ristorante è delizioso.", kanji: "あのレストランはおいしいそうです。", kana: "あの れすとらんは おいしいそうです。" },
            { icon: "🧩🤯", en: "I heard the exam was very difficult.", it: "Ho sentito che l'esame era molto difficile.", kanji: "試験はとても難しかったそうです。", kana: "しけんは とても むずかしかったそうです。" },
            { icon: "🗣️🎭", en: "I heard that movie is interesting.", it: "Ho sentito che quel film è interessante.", kanji: "あの映画は面白いそうです。", kana: "あの えいがは おもしろいそうです。" },
            { icon: "🧥🧼", en: "I heard it will be cold tomorrow.", it: "Ho sentito che domani farà freddo.", kanji: "明日は寒いそうです。", kana: "あしたは さむいそうです。" },
            { icon: "🌸✨", en: "I heard the cherry blossoms have bloomed.", it: "Ho sentito che i ciliegi sono fioriti.", kanji: "桜が咲いたそうです。", kana: "さくらが さいたそうです。" },
            { icon: "🤧❌", en: "I heard he is absent due to a cold.", it: "Ho sentito che lui è assente per un raffreddore.", kanji: "風邪で休みだそうです。", kana: "かぜで やすみだそうです。" },
            { icon: "🏙️✨", en: "I heard that town is very quiet.", it: "Ho sentito che quella città è molto tranquilla.", kanji: "あの町はとても静かだそうです。", kana: "あの まちは とても しずかだそうです。" },
            { icon: "💴📉", en: "I heard the prices will rise next month.", it: "Ho sentito che i prezzi aumenteranno il mese prossimo.", kanji: "来月物価が上がるそうです。", kana: "らいげつ ぶっかが あがるそうです。" },
            { icon: "🤝💬", en: "According to his story, it was a secret.", it: "Secondo la sua storia, era un segreto.", kanji: "彼の話によると、内緒だったそうです。", kana: "かれの はなしに よると、ないしょ だったそうです。" },
            { icon: "🌊🚤", en: "I heard he likes the sea.", it: "Ho sentito che a lui piace il mare.", kanji: "彼は海が好きだそうです。", kana: "かれは うみが すきだそうです。" },
            { icon: "👨‍🏫🎓", en: "I heard he was a teacher before.", it: "Ho sentito che lui era un insegnante prima.", kanji: "彼は前、先生だったそうです。", kana: "かれは まえ、せんせい だったそうです。" },
            { icon: "🏢🧱", en: "I heard the new building is sturdy.", it: "Ho sentito che il nuovo edificio è robusto.", kanji: "新しいビルは丈夫だそうです。", kana: "あたらしい びるは じょうぶだそうです。" },
            { icon: "🗣️💡", en: "I heard it's true.", it: "Ho sentito che è vero.", kanji: "本当だそうです。", kana: "ほんとうだそうです。" }
        ];

        // Mode 2: Appearance (~you desu)
        const appearData = [
            { icon: "🌧️🌂", en: "It seems to be raining outside.", it: "Sembra che fuori stia piovendo.", kanji: "外は雨が降っているようです。", kana: "そとは あめが ふっているようです。" },
            { icon: "👥🔊", en: "It seems someone is in the next room.", it: "Sembra che ci sia qualcuno nella stanza accanto.", kanji: "隣の部屋に誰かいるようです。", kana: "となりの へやに だれか いるようです。" },
            { icon: "👔⌚", en: "He seems to be busy now.", it: "Lui sembra essere occupato ora.", kanji: "彼は今忙しいようです。", kana: "かれは いま いそがしいようです。" },
            { icon: "🤧🤒", en: "It seems I have caught a cold.", it: "Sembra che io abbia preso il raffreddore.", kanji: "風邪をひいたようです。", kana: "かぜを ひいたようです。" },
            { icon: "🧩🤯", en: "This problem seems to be difficult.", it: "Questo problema sembra essere difficile.", kanji: "この問題は難しいようです。", kana: "この もんだいは むずかしいようです。" },
            { icon: "🍰😋", en: "Everyone is eating, so it seems delicious.", it: "Tutti mangiano, quindi sembra delizioso.", kanji: "みんな食べていますから、おいしいようです。", kana: "みんな たべて いますから、おいしいようです。" },
            { icon: "🎬😢", en: "She seems to be sad.", it: "Lei sembra essere triste.", kanji: "彼女は悲しいようです。", kana: "かのじょは かなしいようです。" },
            { icon: "🚪🔒", en: "The door is locked, so it seems they are out.", it: "La porta è chiusa, quindi sembra che siano usciti.", kanji: "出かけているようです。", kana: "でかけて いるようです。" },
            { icon: "🔊🏃", en: "It seems a lot of people have gathered.", it: "Sembra che si sia radunata molta gente.", kanji: "大勢の人が集まっているようです。", kana: "おおぜいの ひとが あつまって いるようです。" },
            { icon: "🚉🛤️", en: "It seems the train has arrived.", it: "Sembra che il treno sia arrivato.", kanji: "電車が着いたようです。", kana: "でんしゃが ついたようです。" },
            { icon: "👤🤝", en: "He seems to be a kind person.", it: "Lui sembra essere una persona gentile.", kanji: "彼は親切な人のようです。", kana: "かれは しんせつな ひとのようです。" },
            { icon: "🏢🧱", en: "This building seems to be old.", it: "Questo edificio sembra essere vecchio.", kanji: "このビルは古いようです。", kana: "この びるは ふるいようです。" },
            { icon: "🤫💬", en: "It seems it was a secret.", it: "Sembra che fosse un segreto.", kanji: "内緒だったようです。", kana: "ないしょ だったようです。" },
            { icon: "🥘🔥", en: "It seems to be ready.", it: "Sembra che sia pronto.", kanji: "準備ができたようです。", kana: "じゅんびが できたようです。" },
            { icon: "📱🧩", en: "It seems broken.", it: "Sembra rotto.", kanji: "故障したようです。", kana: "こしょうしたようです。" },
            { icon: "📅🛑", en: "It seems the meeting has ended.", it: "Sembra che la riunione sia finita.", kanji: "会議が終わったようです。", kana: "かいぎが おわったようです。" },
            { icon: "🗣️💡", en: "It seems true.", it: "Sembra vero.", kanji: "本当のようです。", kana: "ほんとうのようです。" }
        ];

        // Mode 3: Real Life (Textbook Scenarios)
        const realData = [
            { icon: "🔥🏘️", en: "I heard the house burned down in yesterday's fire.", it: "Ho sentito che la casa è bruciata nell'incendio di ieri.", kanji: "昨日の火事で家が焼けたそうです。", kana: "きのうの かじで うちが やけたそうです。" },
            { icon: "👨‍💼🤧", en: "I heard Mr. Watanabe is taking a day off today.", it: "Ho sentito che il signor Watanabe oggi riposa.", kanji: "渡辺さんは今日休むそうです。", kana: "わたなべさんは きょう やすむそうです。" },
            { icon: "🤧🌡️", en: "Since I have a cough, it seems I caught a cold.", it: "Siccome ho la tosse, sembra che abbia preso il raffreddore.", kanji: "咳が出るので、風邪をひいたようです。", kana: "せきが でるので、かぜを ひいたようです。" },
            { icon: "🚑🏃", en: "An ambulance came, so it seems there was an accident.", it: "È arrivata un'ambulanza, quindi sembra ci sia stato un incidente.", kanji: "救急車が来たので、事故があったようです。", kana: "きゅうきゅうしゃが きたので、じこが あったようです。" },
            { icon: "💍👫", en: "I heard they will get married next month.", it: "Ho sentito che si sposeranno il mese prossimo.", kanji: "来月結婚するそうです。", kana: "らいげつ けっこんするそうです。" },
            { icon: "🧥❄️", en: "It's cold, so it seems it will snow.", it: "Fa freddo, quindi sembra che nevicherà.", kanji: "寒いので、雪が降るようです。", kana: "さむいので、ゆきが ふるようです。" },
            { icon: "📢🔊", en: "It's noisy outside, so it seems a festival is being held.", it: "Fuori c'è rumore, quindi sembra che si tenga un festival.", kanji: "お祭りが行われているようです。", kana: "おまつりが おこなわれて いるようです。" },
            { icon: "🍜😋", en: "According to the magazine, that shop is popular.", it: "Secondo la rivista, quel negozio è popolare.", kanji: "雑誌によると、あの店は人気があるそうです。", kana: "ざっしに よると、あの みせは にんきが あるそうです。" },
            { icon: "👨‍🏫🎓", en: "He knows a lot, so he seems to be a teacher.", it: "Lui sa molto, quindi sembra essere un insegnante.", kanji: "彼は先生のようです。", kana: "かれは せんせいのようです。" },
            { icon: "🏢🧱", en: "I heard this building was built 100 years ago.", it: "Ho sentito che questo edificio è stato costruito 100 anni fa.", kanji: "このビルは１００年前に建ったそうです。", kana: "この びるは ひゃくねんまえに たったそうです。" },
            { icon: "📱❌", en: "I can't hear the voice, so it seems the battery is dead.", it: "Non sento la voce, quindi sembra che la batteria sia scarica.", kanji: "電池が切れたようです。", kana: "でんちが きれたようです。" },
            { icon: "🤝💬", en: "I heard he is a very kind person.", it: "Ho sentito che lui è una persona molto gentile.", kanji: "彼はとても親切な人だそうです。", kana: "かれは とても しんせつな ひとだそうです。" },
            { icon: "🍰🍓", en: "This looks like a cake, but it's actually soap.", it: "Questo sembra una torta, ma in realtà è sapone.", kanji: "ケーキのようですが、石鹸です。", kana: "けーきの ようですが、せっけんです。" },
            { icon: "📦🚚", en: "The light is on, so it seems the package has arrived.", it: "La luce è accesa, quindi sembra che il pacco sia arrivato.", kanji: "荷物が届いたようです。", kana: "にもつが とどいたようです。" },
            { icon: "🏢👔", en: "I heard the meeting starts at 10:00.", it: "Ho sentito che la riunione inizia alle 10:00.", kanji: "会議は１０時に始まるそうです。", kana: "かいぎは じゅうじに はじまるそうです。" },
            { icon: "🌃✨", en: "It's dark, so it seems everyone has slept.", it: "È buio, quindi sembra che tutti abbiano dormito.", kanji: "みんな寝たようです。", kana: "みんな ねたようです。" },
            { icon: "🗣️💡", en: "I heard it's true.", it: "Ho sentito che è vero.", kanji: "本当だそうです。", kana: "ほんとうだそうです。" }
        ];

        let currentMode = 'hearsay';
        let currentIndex = 0;
        let isFlipped = false;

        function switchMode(mode) {
            currentMode = mode;
            currentIndex = 0;
            isFlipped = false;
            document.getElementById('practice-card').classList.remove('is-flipped');
            document.getElementById('game-view').classList.remove('hidden');
            document.getElementById('finished-view').classList.add('hidden');
            
            const modes = ['hearsay', 'appear', 'real'];
            modes.forEach(m => {
                const btn = document.getElementById(`mode-${m}`);
                if(m === mode) {
                    btn.classList.add('bg-white', 'shadow-sm', 'text-amber-600');
                    btn.classList.remove('text-gray-600');
                } else {
                    btn.classList.remove('bg-white', 'shadow-sm', 'text-amber-600');
                    btn.classList.add('text-gray-600');
                }
            });

            const instr = document.getElementById('instruction');
            if(mode === 'hearsay') instr.innerText = "Hearsay (~sou): Reporting info from others/media";
            else if(mode === 'appear') instr.innerText = "Appearance (~you): Judgment based on senses/situation";
            else instr.innerText = "Real Life: Practical textbook scenarios";
            
            updateView();
        }

        function updateView() {
            const data = { hearsay: hearsayData, appear: appearData, real: realData };
            const questions = data[currentMode];
            const q = questions[currentIndex];
            const promptContent = document.getElementById('prompt-content');
            
            document.getElementById('current-index').innerText = currentIndex + 1;
            document.getElementById('total-count').innerText = questions.length;
            
            document.getElementById('answer-kanji').innerText = q.kanji;
            document.getElementById('answer-kana').innerText = q.kana;
            document.getElementById('answer-it').innerText = q.it;

            promptContent.innerHTML = `
                <div class="item-icon mb-4">${q.icon}</div>
                <div class="text-center px-6">
                    <div class="text-gray-400 text-[10px] font-black uppercase tracking-[0.2em] mb-4">Target Meaning / Source</div>
                    <div class="text-3xl font-black text-gray-800 leading-tight italic px-4">${q.en}</div>
                </div>
            `;
        }

        function flipCard() {
            const card = document.getElementById('practice-card');
            if (!isFlipped) {
                card.classList.add('is-flipped');
                isFlipped = true;
            } else {
                nextQuestion();
            }
        }

        function speakJapanese() {
            const data = { hearsay: hearsayData, appear: appearData, real: realData };
            const text = data[currentMode][currentIndex].kana;
            const ut = new SpeechSynthesisUtterance(text);
            ut.lang = 'ja-JP';
            ut.rate = 0.95;
            window.speechSynthesis.speak(ut);
        }

        function nextQuestion() {
            const data = { hearsay: hearsayData, appear: appearData, real: realData };
            const questions = data[currentMode];
            
            if (isFlipped && currentIndex === questions.length - 1) {
                document.getElementById('game-view').classList.add('hidden');
                document.getElementById('finished-view').classList.remove('hidden');
                return;
            }

            isFlipped = false;
            document.getElementById('practice-card').classList.remove('is-flipped');
            setTimeout(() => {
                currentIndex = (currentIndex + 1) % questions.length;
                updateView();
            }, 150);
        }

        function prevQuestion() {
            const data = { hearsay: hearsayData, appear: appearData, real: realData };
            const questions = data[currentMode];
            isFlipped = false;
            document.getElementById('practice-card').classList.remove('is-flipped');
            setTimeout(() => {
                currentIndex = (currentIndex - 1 + questions.length) % questions.length;
                updateView();
            }, 150);
        }

        function buttonNext() {
            if (!isFlipped) {
                flipCard();
            } else {
                nextQuestion();
            }
        }

        updateView();
    </script>
</body>
</html>
