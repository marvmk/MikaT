<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>L28: Simultaneous, Habits & Reasons</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .card-container { perspective: 1000px; }
        .card { transition: transform 0.6s; transform-style: preserve-3d; cursor: pointer; }
        .card.is-flipped { transform: rotateY(180deg); }
        .card-face {
            backface-visibility: hidden; position: absolute;
            width: 100%; height: 100%; display: flex;
            flex-direction: column; align-items: center;
            justify-content: center; border-radius: 1.5rem;
            box-shadow: 0 10px 25px -5px rgb(0 0 0 / 0.1);
            padding: 2rem;
        }
        .card-back { transform: rotateY(180deg); }
        .emoji-icon { font-size: 5rem; margin-bottom: 1rem; }
        
        .speaker-btn {
            background: #059669;
            color: white;
            width: 70px;
            height: 70px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 14px 0 rgba(5, 150, 105, 0.4);
            transition: all 0.2s ease;
            margin: 1.5rem 0;
        }
        .speaker-btn:active { transform: scale(0.9); background: #047857; }
        .speaker-btn svg { width: 35px; height: 35px; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen font-sans flex flex-col text-slate-800">

    <header class="bg-emerald-800 text-white p-4 shadow-lg text-center">
        <h1 class="text-xl font-bold">L28 Sentence Trainer 🔊</h1>
        <p class="text-xs opacity-80 uppercase tracking-widest">~nagara • ~te imasu (habit) • ~shi, ~shi</p>
    </header>

    <main class="flex-grow flex flex-col items-center p-6 max-w-2xl mx-auto w-full">
        <!-- モード選択 -->
        <div class="flex space-x-1 mb-6 bg-slate-200 p-1 rounded-xl w-full overflow-x-auto shadow-inner">
            <button id="mode-nagara" class="flex-1 whitespace-nowrap px-3 py-3 rounded-lg font-bold transition bg-white shadow text-emerald-800 text-[10px]" onclick="switchMode('nagara')">
                WHILE (~ながら)
            </button>
            <button id="mode-habit" class="flex-1 whitespace-nowrap px-3 py-3 rounded-lg font-bold transition text-slate-600 text-[10px]" onclick="switchMode('habit')">
                HABIT (~ています)
            </button>
            <button id="mode-shi" class="flex-1 whitespace-nowrap px-3 py-3 rounded-lg font-bold transition text-slate-600 text-[10px]" onclick="switchMode('shi')">
                REASONS (~し, ~し)
            </button>
        </div>

        <!-- 練習エリア -->
        <div id="game-view" class="w-full flex flex-col items-center">
            <div class="card-container w-full h-[540px] relative mb-8">
                <div id="practice-card" class="card w-full h-full relative">
                    
                    <!-- 表面 (問題) -->
                    <div class="card-face card-front bg-white border-2 border-emerald-50 text-center" onclick="flipCard()">
                        <div id="prompt-content" class="flex flex-col items-center w-full">
                            <!-- JSで注入 -->
                        </div>
                        <div class="mt-auto text-[10px] text-slate-300 font-bold uppercase tracking-widest">
                            Tap for Answer / Tocca per la risposta
                        </div>
                    </div>

                    <!-- 裏面 (解答) -->
                    <div class="card-face card-back bg-emerald-50 border-4 border-emerald-600 text-center">
                        <div id="grammar-label" class="text-[10px] text-emerald-600 font-black uppercase tracking-[0.2em] mb-4">Grammar Point</div>
                        
                        <div id="answer-text" class="text-2xl font-black text-slate-900 mb-2 leading-tight px-2"></div>
                        <div id="romaji-text" class="text-sm font-bold text-emerald-500 font-mono mb-4 italic"></div>
                        
                        <button onclick="speakJapanese(event)" class="speaker-btn">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z" />
                            </svg>
                        </button>
                        
                        <div class="w-16 h-px bg-emerald-200 mb-6 mx-auto"></div>
                        
                        <div class="space-y-1 px-4">
                            <div id="it-back" class="text-emerald-800 font-bold text-sm"></div>
                            <div id="en-back" class="text-slate-500 italic text-xs"></div>
                        </div>

                        <div class="mt-auto text-[10px] text-emerald-400 font-bold uppercase cursor-pointer" onclick="nextQuestion()">
                            Next / Prossimo →
                        </div>
                    </div>
                </div>
            </div>

            <!-- コントロール -->
            <div class="flex justify-between w-full items-center px-4">
                <button onclick="prevQuestion()" class="w-12 h-12 flex items-center justify-center rounded-full border-2 border-slate-300 text-slate-400 bg-white">←</button>
                <div class="text-slate-400 font-black text-lg">
                    <span id="current-index" class="text-emerald-700">1</span> / <span id="total-count">0</span>
                </div>
                <button onclick="nextQuestion()" class="w-12 h-12 flex items-center justify-center rounded-full bg-emerald-700 text-white shadow-lg">→</button>
            </div>
        </div>
    </main>

    <script>
        const nagaraData = [
            { 
                icon: "🎶🚶‍♂️", 
                prompt: "I walk while listening to music.", 
                answer: "音楽を 聞きながら 歩きます。", 
                romaji: "Ongaku o kikinagara arukimasu.", 
                en: "I walk while listening to music.", 
                it: "Cammino ascoltando la musica." 
            },
            { 
                icon: "📺🍱", 
                prompt: "I eat while watching TV.", 
                answer: "テレビを 見ながら ごはんを 食べます。", 
                romaji: "Terebi o minagara gohan o tabemasu.", 
                en: "I eat while watching TV.", 
                it: "Mangio guardando la TV." 
            },
            { 
                icon: "☕️📰", 
                prompt: "I read the newspaper while drinking coffee.", 
                answer: "コーヒーを 飲みながら 新聞を 読みます。", 
                romaji: "Kōhī o nominagara shinbun o yomimasu.", 
                en: "I read the newspaper while drinking coffee.", 
                it: "Leggo il giornale bevendo il caffè." 
            },
            { 
                icon: "👨‍💻🎓", 
                prompt: "I am studying while working.", 
                answer: "働きながら 勉強して います。", 
                romaji: "Hatarakinagara benkyō shite imasu.", 
                en: "I am studying while working.", 
                it: "Studio lavorando." 
            }
        ];

        const habitData = [
            { 
                icon: "🏃‍♂️☀️", 
                prompt: "I go jogging every morning.", 
                answer: "毎朝 ジョギングを して います。", 
                romaji: "Maiasa jogingu o shite imasu.", 
                en: "I do jogging every morning.", 
                it: "Faccio jogging ogni mattina." 
            },
            { 
                icon: "🚗🏢", 
                prompt: "I always go to the office by car.", 
                answer: "いつも 車で 会社へ 行って います。", 
                romaji: "Itsumo kuruma de kaisha e itte imasu.", 
                en: "I always go to the company by car.", 
                it: "Vado sempre in azienda in macchina." 
            },
            { 
                icon: "休❌🚬", 
                prompt: "I don't smoke on holidays.", 
                answer: "休みの日も たばこを 吸いません。", 
                romaji: "Yasumi no hi mo tabako o suimasen.", 
                en: "I don't smoke even on holidays.", 
                it: "Non fumo neanche nei giorni di riposo." 
            }
        ];

        const shiData = [
            { 
                icon: "🚉✨✅", 
                prompt: "The station is near, and also it's convenient.", 
                answer: "駅に近いし、便利です。", 
                romaji: "Eki ni chikaishi, benri desu.", 
                en: "It's near the station, and besides, it's convenient.", 
                it: "È vicino alla stazione e, inoltre, è comodo." 
            },
            { 
                icon: "🍔😋💰", 
                prompt: "It's delicious, and besides, it's cheap.", 
                answer: "おいしいし、安いです。", 
                romaji: "Oishishi, yasui desu.", 
                en: "It's delicious, and besides, it's cheap.", 
                it: "È buono e, inoltre, è economico." 
            },
            { 
                icon: "👨‍🏫🎨🎸", 
                prompt: "He is kind, and also smart.", 
                answer: "先生は 親切だし、頭も いいです。", 
                romaji: "Sensei wa shinsetsu dashi, atama mo ii desu.", 
                en: "The teacher is kind, and besides, he is smart.", 
                it: "Il maestro è gentile e, inoltre, è intelligente." 
            },
            { 
                icon: "⛈️🏠", 
                prompt: "It's raining, and I don't have money, so I'll stay home.", 
                answer: "雨も 降って いるし、お金も ないし、今日は どこも 出かけません。", 
                romaji: "Ame mo futte irushi, okane mo naishi, kyō wa dokomo dekakemasen.", 
                en: "It's raining and I have no money, so I won't go out today.", 
                it: "Piove e non ho soldi, quindi oggi non esco da nessuna parte." 
            }
        ];

        let currentMode = 'nagara';
        let currentIndex = 0;
        let isFlipped = false;

        function getQuestions() {
            if (currentMode === 'nagara') return nagaraData;
            if (currentMode === 'habit') return habitData;
            return shiData;
        }

        function getLabel() {
            if (currentMode === 'nagara') return "V1(ます) ながら V2 (Simultaneous)";
            if (currentMode === 'habit') return "習慣 / 繰り返しの動作 (~ています)";
            return "~し、~し (Listing Reasons/Features)";
        }

        function switchMode(mode) {
            currentMode = mode;
            currentIndex = 0;
            isFlipped = false;
            document.getElementById('practice-card').classList.remove('is-flipped');
            
            ['nagara', 'habit', 'shi'].forEach(m => {
                document.getElementById(`mode-${m}`).className = "flex-1 whitespace-nowrap px-3 py-3 rounded-lg font-bold transition text-slate-600 text-[10px]";
            });
            
            const activeBtn = document.getElementById(`mode-${mode}`);
            activeBtn.className = "flex-1 whitespace-nowrap px-3 py-3 rounded-lg font-bold transition bg-white shadow text-emerald-800 text-[10px]";

            updateView();
        }

        function updateView() {
            const questions = getQuestions();
            const label = getLabel();
            const q = questions[currentIndex];
            const promptContent = document.getElementById('prompt-content');
            
            promptContent.innerHTML = `
                <div class="emoji-icon">${q.icon}</div>
                <div class="text-slate-400 text-[10px] uppercase tracking-widest mb-2 font-bold">Concept / Hint</div>
                <div class="text-2xl font-black text-slate-800 mb-6 leading-tight px-4">${q.prompt}</div>
                <div class="flex flex-col items-center space-y-2 border-t border-slate-100 pt-6 w-full px-4">
                    <div class="text-sm text-emerald-600 font-bold uppercase tracking-wide">${q.it}</div>
                    <div class="text-sm text-slate-400 italic font-medium">${q.en}</div>
                </div>
            `;

            document.getElementById('current-index').innerText = currentIndex + 1;
            document.getElementById('total-count').innerText = questions.length;
            document.getElementById('answer-text').innerText = q.answer;
            document.getElementById('romaji-text').innerText = q.romaji;
            document.getElementById('it-back').innerText = q.it;
            document.getElementById('en-back').innerText = q.en;
            document.getElementById('grammar-label').innerText = label;
        }

        function flipCard() {
            if (isFlipped) return;
            document.getElementById('practice-card').classList.add('is-flipped');
            isFlipped = true;
        }

        function speakJapanese(event) {
            if (event) event.stopPropagation();
            const questions = getQuestions();
            const fullText = questions[currentIndex].answer;
            
            // 文頭の「A：」や「B：」を削除
            const speechText = fullText.replace(/^[AB][：:]/gm, '').replace(/\n/g, ' ');
            
            const ut = new SpeechSynthesisUtterance(speechText);
            ut.lang = 'ja-JP';
            ut.rate = 0.85;
            window.speechSynthesis.cancel();
            window.speechSynthesis.speak(ut);
        }

        function nextQuestion() {
            const questions = getQuestions();
            isFlipped = false;
            document.getElementById('practice-card').classList.remove('is-flipped');
            setTimeout(() => {
                currentIndex = (currentIndex + 1) % questions.length;
                updateView();
            }, 150);
        }

        function prevQuestion() {
            const questions = getQuestions();
            isFlipped = false;
            document.getElementById('practice-card').classList.remove('is-flipped');
            setTimeout(() => {
                currentIndex = (currentIndex - 1 + questions.length) % questions.length;
                updateView();
            }, 150);
        }

        updateView();
    </script>
</body>
</html>
