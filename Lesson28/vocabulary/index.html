<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>L28 Vocabulary: IT/EN/JP Audio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .card-container { perspective: 1000px; }
        .card { transition: transform 0.6s; transform-style: preserve-3d; cursor: pointer; }
        .card.is-flipped { transform: rotateY(180deg); }
        .card-face {
            backface-visibility: hidden; position: absolute;
            width: 100%; height: 100%; display: flex;
            flex-direction: column; align-items: center;
            justify-content: center; border-radius: 1.5rem;
            box-shadow: 0 10px 25px -5px rgb(0 0 0 / 0.1);
        }
        .card-back { transform: rotateY(180deg); }
        .action-icon { font-size: 5rem; }
        .speaker-btn {
            background: #f97316; color: white; width: 80px; height: 80px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 6px 20px rgba(249, 115, 22, 0.4); transition: all 0.2s ease; margin-bottom: 1rem;
        }
        .speaker-btn:active { transform: scale(0.9); background: #ea580c; }
        .speaker-btn svg { width: 40px; height: 40px; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen font-sans flex flex-col">

    <header class="bg-indigo-900 text-white p-4 shadow-lg text-center">
        <h1 class="text-xl font-bold">L28 Vocab: Trilingue 🔊</h1>
        <p class="text-xs opacity-80 uppercase tracking-widest">Hiragana • Romaji • Audio • IT • EN</p>
    </header>

    <main class="flex-grow flex flex-col items-center p-6 max-w-2xl mx-auto w-full">
        <div class="flex space-x-1 mb-6 bg-slate-200 p-1 rounded-xl w-full shadow-inner">
            <button id="mode-verb" class="flex-1 py-3 rounded-lg font-bold transition bg-white shadow text-indigo-800" onclick="switchMode('verb')">VERBS</button>
            <button id="mode-noun" class="flex-1 py-3 rounded-lg font-bold transition text-slate-600" onclick="switchMode('noun')">ADJ/NOUNS</button>
        </div>

        <div class="card-container w-full h-[500px] relative mb-8">
            <div id="practice-card" class="card w-full h-full relative">
                <div class="card-face card-front bg-white border-2 border-indigo-50 p-8 text-center" onclick="flipCard()">
                    <div id="prompt-content" class="flex flex-col items-center space-y-6"></div>
                    <div class="mt-auto text-[10px] text-slate-300 font-bold uppercase tracking-widest">Tocca per la risposta</div>
                </div>
                <div class="card-face card-back bg-indigo-50 border-4 border-indigo-600 p-8">
                    <div class="text-[10px] text-indigo-600 font-black uppercase tracking-[0.2em] mb-4">Risposta</div>
                    <div id="answer-text" class="text-4xl font-black text-indigo-950 text-center mb-1"></div>
                    <div id="romaji-text" class="text-2xl font-bold text-indigo-600 font-mono mb-8"></div>
                    
                    <button onclick="speakJapanese(event)" class="speaker-btn">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z" />
                        </svg>
                    </button>

                    <div class="w-16 h-1 bg-indigo-200 mb-6"></div>
                    <div class="flex flex-col items-center space-y-1">
                        <div id="en-back" class="text-slate-500 italic"></div>
                        <div id="it-back" class="text-lg text-indigo-800 font-bold"></div>
                    </div>
                    <div class="mt-auto text-[10px] text-indigo-400 font-bold uppercase cursor-pointer" onclick="nextQuestion()">Prossimo →</div>
                </div>
            </div>
        </div>

        <div class="flex justify-between w-full items-center px-4">
            <button onclick="prevQuestion()" class="w-12 h-12 flex items-center justify-center rounded-full border-2 border-slate-300 text-slate-400 bg-white">←</button>
            <div class="text-slate-400 font-black text-lg"><span id="current-index" class="text-indigo-700">1</span> / <span id="total-count">0</span></div>
            <button onclick="nextQuestion()" class="w-12 h-12 flex items-center justify-center rounded-full bg-indigo-700 text-white shadow-lg">→</button>
        </div>
    </main>

    <script>
        const verbList = [
            { icon: "🥖🛒", en: "sell [bread]", it: "vendersi [il pane]", answer: "(パンが)うれます", romaji: "(pan ga)uremasu" },
            { icon: "💃", en: "dance", it: "ballare", answer: "おどります", romaji: "odorimasu" },
            { icon: "🦷", en: "chew / bite", it: "masticare / mordere", answer: "かみます", romaji: "kamimasu" },
            { icon: "👈", en: "choose", it: "scegliere", answer: "えらびます", romaji: "erabimasu" },
            { icon: "🙅‍♂️", en: "be different", it: "essere diverso", answer: "ちがいます", romaji: "chigaimasu" },
            { icon: "🎓🚌", en: "go to and from [university]", it: "frequentare [l'università]", answer: "かよいます", romaji: "kayoimasu" },
            { icon: "📝", en: "take a memo", it: "prendere nota", answer: "メモします", romaji: "memoshimasu" }
        ];

        const nounList = [
            { icon: "🤓", en: "serious", it: "serio / diligente", answer: "まじめ", romaji: "majime" },
            { icon: "🔥", en: "earnest", it: "entusiasta / zelante", answer: "ねっしん", romaji: "nesshin" },
            { icon: "👼", en: "gentle / kind", it: "gentile", answer: "やさしい", romaji: "yasashii" },
            { icon: "👑", en: "great / admirable", it: "ammirevole / grande", answer: "えらい", romaji: "erai" },
            { icon: "👌", en: "proper / just right", it: "andare bene / perfetto", answer: "ちょうどいい", romaji: "chōdoii" },
            { icon: "🔄", en: "custom", it: "abitudine / usanza", answer: "しゅうかん", romaji: "shūkan" },
            { icon: "🔷", en: "form / shape", it: "forma", answer: "かたち", romaji: "katachi" },
            { icon: "🎨", en: "color", it: "colore", answer: "いろ", romaji: "iro" },
            { icon: "👅", en: "taste", it: "gusto / sapore", answer: "あじ", romaji: "aji" },
            { icon: "🍬", en: "chewing gum", it: "gomma da masticare", answer: "ガム", romaji: "gamu" },
            { icon: "🛍️", en: "goods", it: "articoli / merce", answer: "しなもの", romaji: "shinamono" },
            { icon: "🏷️", en: "price", it: "prezzo", answer: "ねだん", romaji: "nedan" },
            { icon: "💰", en: "salary", it: "stipendio", answer: "きゅうりょう", romaji: "kyūryō" },
            { icon: "🎁", en: "bonus", it: "bonus", answer: "ボーナス", romaji: "bōnasu" },
            { icon: "📺", en: "program", it: "programma (TV)", answer: "ばんぐみ", romaji: "bangumi" },
            { icon: "🎭", en: "drama", it: "serie TV / drama", answer: "ドラマ", romaji: "dorama" },
            { icon: "📖", en: "novel", it: "romanzo", answer: "しょうせつ", romaji: "shōsetsu" },
            { icon: "✍️", en: "novelist", it: "romanziere", answer: "しょうせつか", romaji: "shōsetsuka" },
            { icon: "🎤", en: "singer", it: "cantante", answer: "かしゅ", romaji: "kashu" }
        ];

        let currentMode = 'verb';
        let currentIndex = 0;
        let isFlipped = false;

        function switchMode(mode) {
            currentMode = mode; currentIndex = 0; isFlipped = false;
            document.getElementById('practice-card').classList.remove('is-flipped');
            updateView();
            const btnVerb = document.getElementById('mode-verb');
            const btnNoun = document.getElementById('mode-noun');
            if(mode === 'verb') {
                btnVerb.className = "flex-1 py-3 rounded-lg font-bold transition bg-white shadow text-indigo-800";
                btnNoun.className = "flex-1 py-3 rounded-lg font-bold transition text-slate-600";
            } else {
                btnNoun.className = "flex-1 py-3 rounded-lg font-bold transition bg-white shadow text-indigo-800";
                btnVerb.className = "flex-1 py-3 rounded-lg font-bold transition text-slate-600";
            }
        }

        function updateView() {
            const list = currentMode === 'verb' ? verbList : nounList;
            const item = list[currentIndex];
            document.getElementById('prompt-content').innerHTML = `
                <div class="action-icon mb-2">${item.icon}</div>
                <div class="space-y-4">
                    <div><div class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">English</div><div class="text-xl text-slate-800 font-medium">${item.en}</div></div>
                    <div class="flex justify-center"><div class="h-px w-12 bg-slate-100"></div></div>
                    <div><div class="text-[10px] text-indigo-500 font-bold uppercase tracking-widest">Italiano</div><div class="text-xl text-indigo-700 font-bold">${item.it}</div></div>
                </div>
            `;
            document.getElementById('current-index').innerText = currentIndex + 1;
            document.getElementById('total-count').innerText = list.length;
            document.getElementById('answer-text').innerText = item.answer;
            document.getElementById('romaji-text').innerText = item.romaji;
            document.getElementById('en-back').innerText = item.en;
            document.getElementById('it-back').innerText = item.it;
        }

        function flipCard() { if (isFlipped) return; document.getElementById('practice-card').classList.add('is-flipped'); isFlipped = true; }

        function speakJapanese(event) {
            if (event) event.stopPropagation();
            const list = currentMode === 'verb' ? verbList : nounList;
            const ut = new SpeechSynthesisUtterance(list[currentIndex].answer);
            ut.lang = 'ja-JP'; ut.rate = 0.85; window.speechSynthesis.speak(ut);
        }

        function nextQuestion() {
            const list = currentMode === 'verb' ? verbList : nounList;
            isFlipped = false; document.getElementById('practice-card').classList.remove('is-flipped');
            setTimeout(() => { currentIndex = (currentIndex + 1) % list.length; updateView(); }, 150);
        }

        function prevQuestion() {
            const list = currentMode === 'verb' ? verbList : nounList;
            isFlipped = false; document.getElementById('practice-card').classList.remove('is-flipped');
            setTimeout(() => { currentIndex = (currentIndex - 1 + list.length) % list.length; updateView(); }, 150);
        }

        updateView();
    </script>
</body>
</html>
