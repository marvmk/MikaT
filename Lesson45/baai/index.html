<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Japanese Practice: Lesson 45 Master</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .card-container { perspective: 1000px; }
        .card { transition: transform 0.6s; transform-style: preserve-3d; cursor: pointer; }
        .card.is-flipped { transform: rotateY(180deg); }
        .card-face {
            backface-visibility: hidden; position: absolute;
            width: 100%; height: 100%; display: flex;
            flex-direction: column; align-items: center;
            justify-content: center; border-radius: 1.5rem;
            box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1);
            padding: 2rem;
        }
        .card-back { transform: rotateY(180deg); }
        .item-icon { font-size: 4.5rem; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen font-sans flex flex-col">

    <header class="bg-amber-500 text-white p-6 shadow-md text-center">
        <h1 class="text-2xl font-bold italic">L45: In Case... & Even though...</h1>
        <p class="text-sm opacity-90 font-black tracking-widest uppercase">Result Prep System</p>
    </header>

    <main class="flex-grow flex flex-col items-center p-6 max-w-2xl mx-auto w-full">
        <!-- Mode Selector (English Tabs) -->
        <div class="flex space-x-1 mb-8 bg-gray-200 p-1 rounded-xl w-full overflow-x-auto shadow-inner border border-gray-300">
            <button id="mode-baai" class="flex-1 whitespace-nowrap px-2 py-3 rounded-lg font-bold transition bg-white shadow-sm text-amber-600 text-xs" onclick="switchMode('baai')">
                In Case of (~baai)
            </button>
            <button id="mode-noni" class="flex-1 whitespace-nowrap px-2 py-3 rounded-lg font-bold transition text-gray-600 text-xs" onclick="switchMode('noni')">
                Even though (~noni)
            </button>
            <button id="mode-real" class="flex-1 whitespace-nowrap px-2 py-3 rounded-lg font-bold transition text-gray-600 text-xs" onclick="switchMode('real')">
                Real Life
            </button>
        </div>

        <!-- Question Area -->
        <div id="game-view" class="w-full flex flex-col items-center">
            <div id="instruction" class="text-gray-400 mb-6 text-center text-xs font-black uppercase tracking-[0.2em]">
                Complete the scenario...
            </div>

            <!-- Card Container -->
            <div class="card-container w-full h-[480px] relative mb-10">
                <div id="practice-card" class="card w-full h-full relative" onclick="flipCard()">
                    <!-- Front -->
                    <div class="card-face card-front bg-white border-2 border-amber-100 text-center">
                        <div id="prompt-content" class="flex flex-col items-center space-y-6 w-full px-4">
                            <!-- Injected by JS -->
                        </div>
                        <div class="mt-auto text-[10px] text-gray-300 font-bold uppercase tracking-widest">Tap to reveal Japanese</div>
                    </div>
                    <!-- Back -->
                    <div class="card-face card-back bg-amber-50 border-4 border-amber-400 p-8 text-center">
                        <div id="answer-kanji" class="text-3xl font-black text-amber-900 leading-tight mb-4 px-2"></div>
                        <div id="answer-kana" class="text-xl font-bold text-amber-500 mb-8"></div>
                        
                        <!-- Manual Audio Button -->
                        <button onclick="event.stopPropagation(); speakJapanese();" class="w-16 h-16 bg-white border-2 border-amber-200 rounded-full flex items-center justify-center shadow-md active:scale-90 transition-transform mb-6 group">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-amber-500 group-hover:text-amber-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z" />
                            </svg>
                        </button>

                        <div id="answer-it" class="text-base text-amber-700 italic font-medium px-4"></div>
                        <div class="mt-auto text-[10px] text-amber-300 font-bold uppercase">Tap for next question</div>
                    </div>
                </div>
            </div>

            <!-- Navigation -->
            <div class="flex justify-between w-full items-center px-2">
                <button onclick="prevQuestion()" class="w-14 h-14 flex items-center justify-center border-2 border-gray-200 rounded-full text-gray-400 bg-white hover:bg-gray-50 transition shadow-sm text-xl font-bold">←</button>
                <div class="flex flex-col items-center">
                    <div class="text-gray-400 font-black text-lg">
                        <span id="current-index" class="text-amber-600 font-black">1</span> 
                        <span class="text-gray-200">/</span> 
                        <span id="total-count">17</span>
                    </div>
                </div>
                <button onclick="buttonNext()" class="px-10 py-4 bg-amber-500 rounded-full text-white font-black hover:bg-amber-600 transition shadow-lg tracking-widest uppercase text-sm">Next</button>
            </div>
        </div>

        <!-- Finished View -->
        <div id="finished-view" class="hidden w-full flex flex-col items-center justify-center p-12 bg-white rounded-[3rem] shadow-2xl border-4 border-amber-100 text-center">
            <div class="text-7xl mb-8">Finished‼️</div>
            <p class="text-gray-500 font-black uppercase tracking-[0.3em] mb-4 text-sm">Pratica completata!</p>
            <p class="text-lg text-amber-600 font-bold mb-10 italic text-center">Lesson 45 Mastery Complete.</p>
            <button onclick="location.reload()" class="w-full py-5 bg-amber-500 text-white rounded-2xl font-black shadow-xl active:scale-95 transition-all text-xl tracking-widest uppercase">
                Restart
            </button>
        </div>
    </main>

    <footer class="py-8 text-center text-gray-300 text-[10px] font-black tracking-widest uppercase">
        Result Prep System &bull; Mika Tomao
    </footer>

    <script>

            { icon: "🧾❌", en: "In case of a mistake on the receipt, tell me.", it: "In caso di errore sulla ricevuta, dimmelo.", kanji: "領収書が間違っている場合は、言ってください。", kana: "りょうしゅうしょが まちがって いる ばあいは、いって ください。" },
            { icon: "🤒🛌", en: "In case you feel unwell, take a rest.", it: "In caso tu non ti senta bene, riposati.", kanji: "気分が悪い場合は、休んでください。", kana: "きぶんが わるい ばあいは、やすんで ください。" },
            { icon: "⚙️🔴", en: "In case the machine doesn't work, press the red button.", it: "In caso la macchina non funzioni, premi il tasto rosso.", kanji: "動かない場合は、赤いボタンを押してください。", kana: "うごかない ばあいは、あかい ぼたんを おして ください。" },
            { icon: "📖🚫", en: "In case you forget your homework, tell the teacher.", it: "In caso tu dimentichi i compiti, dillo al professore.", kanji: "宿題を忘れた場合は、先生に言ってください。", kana: "しゅくだいを わすれた ばあいは、せんせいに いって ください。" },
            { icon: "🚗💥", en: "In case of a car accident, call the police.", it: "In caso di incidente stradale, chiama la polizia.", kanji: "交通事故の場合は、警察を呼んでください。", kana: "こうつうじこの ばあいは、けいさつを よんで ください。" },
            { icon: "🤔❓", en: "In case you don't understand, please ask.", it: "In caso tu non capisca, chiedi per favore.", kanji: "わからない場合は、聞いてください。", kana: "わからない ばあいは、きいて ください。" },
            { icon: "📦🚚", en: "In case the package doesn't arrive, contact the office.", it: "In caso il pacco non arrivi, contatta l'ufficio.", kanji: "荷物が届かない場合は、事務所に連絡してください。", kana: "にもつが とどかない ばあいは、じむしょに れんらくして ください。" },
            { icon: "🕯️💡", en: "In case of power outage, use a flashlight.", it: "In caso di blackout, usa una torcia.", kanji: "停電の場合は、懐中電灯を使ってください。", kana: "ていでんの ばあいは、かいちゅうでんとうを つかって ください。" },
            { icon: "🆘🤵", en: "In case you need help, call the attendant.", it: "In caso ti serva aiuto, chiama l'assistente.", kanji: "助けが必要な場合は、係員を呼んでください。", kana: "たすけが ひつような ばあいは、かかりいんを よんで ください。" },
            { icon: "❌📅", en: "In case you want to cancel, do it by tomorrow.", it: "In caso tu voglia annullare, fallo entro domani.", kanji: "キャンセルしたい場合は、明日までにして下さい。", kana: "きゃんせる したい ばあいは、あしたまでに して ください。" },
            { icon: "📄🚧", en: "In case of a paper jam, open the lid.", it: "In caso di inceppamento carta, apri il coperchio.", kanji: "紙が詰まった場合は、蓋を開けてください。", kana: "かみが つまった ばあいは、ふたを あけて ください。" },
            { icon: "🏆🏅", en: "In case you win, you'll get a prize.", it: "In caso tu vinca, riceverai un premio.", kanji: "優勝した場合は、お祝いをあげます。", kana: "ゆうしょうした ばあいは、おいわいを あげます。" }
        ];

        // Mode 2: Even though (~noni)
        const noniData = [
            { icon: "📅💼", en: "Even though it's Sunday, I work.", it: "Nonostante sia domenica, lavoro.", kanji: "日曜日なのに、仕事をします。", kana: "にちようび なのに、しごとを します。" },

            { icon: "💴🧥", en: "Even though it was expensive, I bought it.", it: "Malgrado fosse caro, l'ho comprato.", kanji: "高かったのに、買ってしまいました。", kana: "たかかった なのに、かって しまいました。" },

            { icon: "📅❌", en: "Even though I made an appointment, he didn't come.", it: "Malgrado l'appuntamento, lui non è venuto.", kanji: "約束したのに、彼は来ませんでした。", kana: "やくそくした なのに、かれは きませんでした。" },
            { icon: "🏃‍♂️⚖️", en: "Even though I exercised, I didn't lose weight.", it: "Sebbene abbia fatto esercizio, non sono dimagrito.", kanji: "運動したのに、やせませんでした。", kana: "うんどうした なのに、やせませんでした。" },
            { icon: "🍣🤢", en: "Even though it's delicious, he doesn't eat it.", it: "Anche se è buono, lui non lo mangia.", kanji: "おいしいのに、食べません。", kana: "おいしい なのに、たべません。" },
            { icon: "💰✈️", en: "Even though I have no money, I want to travel.", it: "Malgrado non abbia soldi, voglio viaggiare.", kanji: "お金がないのに、旅行したいです。", kana: "おかねが ない なのに、りょこう したいです。" },
            { icon: "📩❌", en: "Even though I sent an email, there is no reply.", it: "Sebbene abbia inviato una mail, non c'è risposta.", kanji: "メールを送ったのに、返事がありません。", kana: "めーるを おくった なのに、へんじが ありません。" },
            { icon: "🇯🇵🤐", en: "Even though I live in Japan, I can't speak Japanese.", it: "Nonostante viva in Giappone, non so parlare giapponese.", kanji: "日本に住んでいるのに、日本語が話せません。", kana: "にほんに すんで いる なのに、にほんごが はなせません。" },
            { icon: "💊🤒", en: "Even though I take medicine, my cold doesn't get better.", it: "Anche se prendo la medicina, il raffreddore non passa.", kanji: "薬を飲んだのに、風邪がなおりません。", kana: "くすりを のんだ なのに、かぜが なおりません。" },
            { icon: "🙇😡", en: "Even though I apologized, he is still angry.", it: "Sebbene mi sia scusato, lui è ancora arrabbiato.", kanji: "謝ったのに、彼は怒っています。", kana: "あやまった なのに、かれは おこって います。" },
            { icon: "🌃🔊", en: "Even though it's late at night, it's noisy.", it: "Malgrado sia notte fonda, c'è rumore.", kanji: "夜中なのに、うるさいです。", kana: "よなか なのに、うるさいです。" },
            { icon: "🔥❄️", en: "Even though I turned on the heater, it's cold.", it: "Anche se ho acceso il riscaldamento, fa freddo.", kanji: "暖房をつけたのに、寒いです。", kana: "だんぼうを つけた なのに、さむいです。" },
            { icon: "🏃🚄", en: "Even though I hurried, the train was late.", it: "Sebbene mi fossi affrettato, il treno era in ritardo.", kanji: "急いだのに、電車が遅れました。", kana: "いそいだ なのに、でんしゃが おくれました。" },
            { icon: "🧒💡", en: "Even though he is a child, he knows a lot.", it: "Malgrado sia un bambino, sa molte cose.", kanji: "子供なのに、よく知っていますね。", kana: "こども なのに、よく しって いますね。" }
        ];

        // Mode 3: Real Life (Textbook Scenarios)
        const realData = [
            { icon: "🏟️🌧️", en: "If it rains, the baseball match is cancelled.", it: "Se piove, la partita di baseball è annullata.", kanji: "雨の場合は、野球の試合は中止です。", kana: "あめの ばあいは、やきゅうの しあいは ちゅうしです。" },
            { icon: "💳👮", en: "If you lose your card, contact the police.", it: "Se perdi la carta, contatta la polizia.", kanji: "カードをなくした場合は、警察に連絡してください。", kana: "かーどを なくした ばあいは、けいさつに れんらくして ください。" },
            { icon: "💻🧩", en: "If the computer is broken, call the office.", it: "Se il PC è rotto, chiama l'ufficio.", kanji: "パソコンが故障した場合は、事務所に電話して下さい。", kana: "ぱそこんが こしょうした ばあいは、じむしょに でんわ して ください。" },
            { icon: "🧾✨", en: "If you need a receipt, please tell me.", it: "Se ti serve la ricevuta, dillo per favore.", kanji: "領収書が必要な場合は、言ってください。", kana: "りょうしゅうしょが ひつような ばあいは、いって ください。" },
            { icon: "📖🧩", en: "I studied hard, but I forgot it.", it: "Ho studiato sodo, ma l'ho dimenticato.", kanji: "一生懸命覚えたのに、忘れてしまいました。", kana: "いっしょうけんめい おぼえた なのに、わすれて しまいました。" },
            { icon: "❄️🧥", en: "It's so cold, but I don't have a coat.", it: "Fa così freddo, eppure non ho il cappotto.", kanji: "こんなに寒いのに、コートを持っていません。", kana: "こんなに さむい なのに、こーとを もって いません。" },
            { icon: "💴🛒", en: "It was expensive, but he bought it.", it: "Era caro, eppure lui l'ha comprato.", kanji: "高かったのに、彼はそれを買いました。", kana: "たかかった なのに、かれは それを かいました。" },
            { icon: "📅💼", en: "Today is a holiday, but I have to work.", it: "Oggi è festa, ma devo lavorare.", kanji: "休みの日なのに、働かなければなりません。", kana: "やすみの ひ なのに、はたらかなければ なりません。" },
            { icon: "📍🔍", en: "I checked the map, but I got lost.", it: "Ho guardato la mappa, ma mi sono perso.", kanji: "地図を見たのに、道に迷いました。", kana: "ちずを みた なのに、みちに まよいました。" },
            { icon: "🤝💬", en: "I invited him, but he didn't come.", it: "L'ho invitato, ma lui non è venuto.", kanji: "誘ったのに、彼は来ませんでした。", kana: "さそった なのに、かれは きませんでした。" },
            { icon: "💰🚫", en: "If you don't have enough money, ask him.", it: "Se non hai abbastanza soldi, chiedi a lui.", kanji: "お金が足りない場合は、彼に聞いてください。", kana: "おかねが たりない ばあいは、かれに きいて ください。" },
            { icon: "📞⚡", en: "In case of emergency, use this phone.", it: "In caso di emergenza, usa questo telefono.", kanji: "非常の場合は、この電話を使ってください。", kana: "ひじょうの ばあいは、この でんわを つかって ください。" },
            { icon: "🕰️❌", en: "It's already 11:00, but he hasn't come.", it: "Sono già le 11:00, ma lui non è venuto.", kanji: "１１時になったのに、まだ来ません。", kana: "じゅういちじに なった なのに、まだ きません。" },
            { icon: "🤝✍️", en: "I asked for it, but he didn't do it.", it: "L'ho chiesto, ma lui non l'ha fatto.", kanji: "頼んだのに、彼はしてくれませんでした。", kana: "たのんだ なのに、かれは して くれませんでした。" },
            { icon: "🎁😊", en: "I'm happy because I won the prize.", it: "Sono felice perché ho vinto il premio.", kanji: "優勝したので、うれしいです。(場合:優勝した場合は)", kana: "ゆうしょうしたので、うれしいです。" },
            { icon: "🚉🚶", en: "If you are late, please wait at the station.", it: "In caso di ritardo, aspetta in stazione.", kanji: "遅れた場合は、駅で待っていてください。", kana: "おくれた ばあいは、えきで まって いて ください。" },
            { icon: "🏃‍♂️🏅", en: "I practiced a lot, but I didn't win.", it: "Ho fatto molta pratica, ma non ho vinto.", kanji: "たくさん練習したのに、優勝できませんでした。", kana: "たくさん れんしゅうした なのに、ゆうしょう できませんでした。" }
        ];

        let currentMode = 'baai';
        let currentIndex = 0;
        let isFlipped = false;

        function switchMode(mode) {
            currentMode = mode;
            currentIndex = 0;
            isFlipped = false;
            document.getElementById('practice-card').classList.remove('is-flipped');
            document.getElementById('game-view').classList.remove('hidden');
            document.getElementById('finished-view').classList.add('hidden');
            
            const modes = ['baai', 'noni', 'real'];
            modes.forEach(m => {
                const btn = document.getElementById(`mode-${m}`);
                if(m === mode) {
                    btn.classList.add('bg-white', 'shadow-sm', 'text-amber-600');
                    btn.classList.remove('text-gray-600');
                } else {
                    btn.classList.remove('bg-white', 'shadow-sm', 'text-amber-600');
                    btn.classList.add('text-gray-600');
                }
            });

            const instr = document.getElementById('instruction');
            if(mode === 'baai') instr.innerText = "In Case of (~baai wa): Hypothetical situations";
            else if(mode === 'noni') instr.innerText = "Even though (~noni): Opposite results / Regret";
            else instr.innerText = "Real Life: Textbook scenarios and daily conversations";
            
            updateView();
        }

        function updateView() {
            const data = { baai: baaiData, noni: noniData, real: realData };
            const questions = data[currentMode];
            const q = questions[currentIndex];
            const promptContent = document.getElementById('prompt-content');
            
            document.getElementById('current-index').innerText = currentIndex + 1;
            document.getElementById('total-count').innerText = questions.length;
            
            document.getElementById('answer-kanji').innerText = q.kanji;
            document.getElementById('answer-kana').innerText = q.kana;
            document.getElementById('answer-it').innerText = q.it;

            promptContent.innerHTML = `
                <div class="item-icon mb-4">${q.icon}</div>
                <div class="text-center px-6">
                    <div class="text-gray-400 text-[10px] font-black uppercase tracking-[0.2em] mb-4">Target Meaning / Scenario</div>
                    <div class="text-3xl font-black text-gray-800 leading-tight italic px-4">${q.en}</div>
                </div>
            `;
        }

        function flipCard() {
            const card = document.getElementById('practice-card');
            if (!isFlipped) {
                card.classList.add('is-flipped');
                isFlipped = true;
            } else {
                nextQuestion();
            }
        }

        function speakJapanese() {
            const data = { baai: baaiData, noni: noniData, real: realData };
            const text = data[currentMode][currentIndex].kana;
            const ut = new SpeechSynthesisUtterance(text);
            ut.lang = 'ja-JP';
            ut.rate = 0.95;
            window.speechSynthesis.speak(ut);
        }

        function nextQuestion() {
            const data = { baai: baaiData, noni: noniData, real: realData };
            const questions = data[currentMode];
            
            if (isFlipped && currentIndex === questions.length - 1) {
                document.getElementById('game-view').classList.add('hidden');
                document.getElementById('finished-view').classList.remove('hidden');
                return;
            }

            isFlipped = false;
            document.getElementById('practice-card').classList.remove('is-flipped');
            setTimeout(() => {
                currentIndex = (currentIndex + 1) % questions.length;
                updateView();
            }, 150);
        }

        function prevQuestion() {
            const data = { baai: baaiData, noni: noniData, real: realData };
            const questions = data[currentMode];
            isFlipped = false;
            document.getElementById('practice-card').classList.remove('is-flipped');
            setTimeout(() => {
                currentIndex = (currentIndex - 1 + questions.length) % questions.length;
                updateView();
            }, 150);
        }

        function buttonNext() {
            if (!isFlipped) {
                flipCard();
            } else {
                nextQuestion();
            }
        }

        updateView();
    </script>
</body>
</html>
