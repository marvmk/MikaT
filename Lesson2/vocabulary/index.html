<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>L2 Vocabulary: Trilingual Trainer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .card-container { perspective: 1000px; }
        .card { transition: transform 0.6s; transform-style: preserve-3d; cursor: pointer; }
        .card.is-flipped { transform: rotateY(180deg); }
        .card-face {
            backface-visibility: hidden; position: absolute;
            width: 100%; height: 100%; display: flex;
            flex-direction: column; align-items: center;
            justify-content: center; border-radius: 1.5rem;
            box-shadow: 0 10px 25px -5px rgb(0 0 0 / 0.1);
            padding: 1.5rem;
        }
        .card-back { transform: rotateY(180deg); }
        .action-icon { font-size: 5rem; }
        
        .speaker-btn {
            background: #6366f1;
            color: white;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 6px 20px rgba(99, 102, 241, 0.4);
            transition: all 0.2s ease;
            margin-bottom: 1rem;
        }
        .speaker-btn:active { transform: scale(0.9); background: #4f46e5; }
        .speaker-btn svg { width: 40px; height: 40px; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen font-sans flex flex-col">

    <header class="bg-indigo-900 text-white p-4 shadow-lg text-center">
        <h1 class="text-xl font-bold">L2 Vocab: Trilingue 🔊</h1>
        <p class="text-xs opacity-80 uppercase tracking-widest">Hiragana • Romaji • Audio • IT • EN</p>
    </header>

    <main class="flex-grow flex flex-col items-center p-6 max-w-2xl mx-auto w-full">
        <!-- Selector -->
        <div class="flex space-x-1 mb-6 bg-slate-200 p-1 rounded-xl w-full overflow-x-auto shadow-inner">
            <button id="mode-reading" class="flex-1 whitespace-nowrap px-4 py-3 rounded-lg font-bold transition bg-white shadow text-indigo-800" onclick="switchMode('reading')">READING</button>
            <button id="mode-writing" class="flex-1 whitespace-nowrap px-4 py-3 rounded-lg font-bold transition text-slate-600" onclick="switchMode('writing')">STATIONERY</button>
            <button id="mode-daily" class="flex-1 whitespace-nowrap px-4 py-3 rounded-lg font-bold transition text-slate-600" onclick="switchMode('daily')">DAILY ITEMS</button>
        </div>

        <!-- Card Area -->
        <div class="card-container w-full h-[500px] relative mb-8">
            <div id="practice-card" class="card w-full h-full relative">
                
                <!-- Front Side -->
                <div class="card-face card-front bg-white border-2 border-indigo-50 p-8 text-center" onclick="flipCard()">
                    <div id="prompt-content" class="flex flex-col items-center space-y-6"></div>
                    <div class="mt-auto text-[10px] text-slate-300 font-bold uppercase tracking-widest">Tap for Japanese / Tocca per il giapponese</div>
                </div>

                <!-- Back Side -->
                <div class="card-face card-back bg-indigo-50 border-4 border-indigo-600 p-8 text-center">
                    <div id="type-label" class="text-[10px] text-indigo-600 font-black uppercase tracking-[0.2em] mb-4">Risposta</div>
                    
                    <div id="answer-text" class="text-4xl font-black text-indigo-950 mb-1 leading-tight"></div>
                    <div id="romaji-text" class="text-2xl font-bold text-indigo-500 font-mono mb-8"></div>
                    
                    <button onclick="speakJapanese(event)" class="speaker-btn">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z" />
                        </svg>
                    </button>
                    
                    <div class="w-16 h-1 bg-indigo-200 mb-6 mx-auto"></div>
                    
                    <div class="flex flex-col items-center space-y-1 px-4">
                        <div id="en-back" class="text-slate-500 italic"></div>
                        <div id="it-back" class="text-lg text-indigo-800 font-bold"></div>
                    </div>

                    <div class="mt-auto text-[10px] text-indigo-400 font-bold uppercase tracking-widest cursor-pointer" onclick="nextQuestion()">Next / Prossimo →</div>
                </div>
            </div>
        </div>

        <!-- Controls -->
        <div class="flex justify-between w-full items-center px-4">
            <button onclick="prevQuestion()" class="w-12 h-12 flex items-center justify-center rounded-full border-2 border-slate-300 text-slate-400 bg-white">←</button>
            <div class="text-slate-400 font-black text-lg"><span id="current-index" class="text-indigo-700">1</span> / <span id="total-count">0</span></div>
            <button onclick="nextQuestion()" class="w-12 h-12 flex items-center justify-center rounded-full bg-indigo-700 text-white shadow-lg">→</button>
        </div>
    </main>

    <script>
        const readingList = [
            { icon: "📖", en: "book", it: "libro", answer: "ほん", romaji: "hon" },
            { icon: "📕🔍", en: "dictionary", it: "dizionario", answer: "じしょ", romaji: "jisho" },
            { icon: "📚", en: "magazine", it: "rivista", answer: "ざっし", romaji: "zasshi" },
            { icon: "📰", en: "newspaper", it: "giornale", answer: "しんぶん", romaji: "shinbun" },
            { icon: "📔", en: "notebook", it: "quaderno", answer: "ノート", romaji: "nōto" },
            { icon: "🗒️", en: "pocket notebook", it: "agenda / taccuino", answer: "てちょう", romaji: "techō" },
            { icon: "🪪", en: "business card", it: "biglietto da visita", answer: "めいし", romaji: "meishi" },
            { icon: "💳", en: "card", it: "carta / tessera", answer: "カード", romaji: "kādo" }
        ];

        const writingList = [
            { icon: "✏️", en: "pencil", it: "matita", answer: "えんぴつ", romaji: "enpitsu" },
            { icon: "🖊️", en: "ballpoint pen", it: "penna a sfera", answer: "ボールペン", romaji: "bōrupen" },
            { icon: "🖋️", en: "mechanical pencil", it: "portamine", answer: "シャープペンシル", romaji: "shāpupenshiru" },
            { icon: "💻", en: "computer", it: "computer", answer: "コンピューター", romaji: "konpyūtā" },
            { icon: "⌨️", en: "desk", it: "scrivania", answer: "つくえ", romaji: "tsukue" },
            { icon: "🪑", en: "chair", it: "sedia", answer: "いす", romaji: "isu" }
        ];

        const dailyList = [
            { icon: "🔑", en: "key", it: "chiave", answer: "かぎ", romaji: "kagi" },
            { icon: "⌚", en: "watch / clock", it: "orologio", answer: "とけい", romaji: "tokei" },
            { icon: "☂️", en: "umbrella", it: "ombrello", answer: "かさ", romaji: "kasa" },
            { icon: "👜", en: "bag / briefcase", it: "borsa / valigetta", answer: "かばん", romaji: "kaban" },
            { icon: "📺", en: "television", it: "televisione", answer: "テレビ", romaji: "terebi" },
            { icon: "📻", en: "radio", it: "radio", answer: "ラジオ", romaji: "rajio" },
            { icon: "📷", en: "camera", it: "macchina fotografica", answer: "カメラ", romaji: "kamera" },
            { icon: "🚗", en: "car", it: "macchina / auto", answer: "くるま", romaji: "kuruma" },
            { icon: "🍫", en: "chocolate", it: "cioccolato", answer: "チョコレート", romaji: "chokorēto" },
            { icon: "☕", en: "coffee", it: "caffè", answer: "コーヒー", romaji: "kōhī" }
        ];

        let currentMode = 'reading';
        let currentIndex = 0;
        let isFlipped = false;

        function switchMode(mode) {
            currentMode = mode; currentIndex = 0; isFlipped = false;
            document.getElementById('practice-card').classList.remove('is-flipped');
            updateView();
            const modes = ['reading', 'writing', 'daily'];
            modes.forEach(m => {
                const btn = document.getElementById(`mode-${m}`);
                if(m === mode) {
                    btn.className = "flex-1 whitespace-nowrap px-4 py-3 rounded-lg font-bold transition bg-white shadow text-indigo-800";
                } else {
                    btn.className = "flex-1 whitespace-nowrap px-4 py-3 rounded-lg font-bold transition text-slate-600";
                }
            });
        }

        function updateView() {
            let list;
            let typeLabel;
            if(currentMode === 'reading') { list = readingList; typeLabel = "Reading & Cards"; }
            else if(currentMode === 'writing') { list = writingList; typeLabel = "Stationery & Desk"; }
            else { list = dailyList; typeLabel = "Daily Items"; }
            
            const item = list[currentIndex];
            const promptContent = document.getElementById('prompt-content');
            promptContent.innerHTML = `
                <div class="action-icon mb-2">${item.icon}</div>
                <div class="space-y-4">
                    <div>
                        <div class="text-[10px] text-slate-400 font-bold uppercase mb-1 tracking-widest">English</div>
                        <div class="text-xl text-slate-800 font-medium">${item.en}</div>
                    </div>
                    <div class="flex justify-center"><div class="h-px w-12 bg-slate-100"></div></div>
                    <div>
                        <div class="text-[10px] text-indigo-500 font-bold uppercase mb-1 tracking-widest">Italiano</div>
                        <div class="text-xl text-indigo-700 font-bold">${item.it}</div>
                    </div>
                </div>
            `;
            document.getElementById('current-index').innerText = currentIndex + 1;
            document.getElementById('total-count').innerText = list.length;
            document.getElementById('answer-text').innerText = item.answer;
            document.getElementById('romaji-text').innerText = item.romaji;
            document.getElementById('en-back').innerText = item.en;
            document.getElementById('it-back').innerText = item.it;
            document.getElementById('type-label').innerText = typeLabel;
        }

        function flipCard() {
            if (isFlipped) return;
            document.getElementById('practice-card').classList.add('is-flipped');
            isFlipped = true;
        }

        function speakJapanese(event) {
            if (event) event.stopPropagation();
            let list = (currentMode === 'reading') ? readingList : (currentMode === 'writing' ? writingList : dailyList);
            const word = list[currentIndex].answer;
            const ut = new SpeechSynthesisUtterance(word);
            ut.lang = 'ja-JP';
            ut.rate = 0.85;
            window.speechSynthesis.speak(ut);
        }

        function nextQuestion() {
            let list = (currentMode === 'reading') ? readingList : (currentMode === 'writing' ? writingList : dailyList);
            isFlipped = false;
            document.getElementById('practice-card').classList.remove('is-flipped');
            setTimeout(() => {
                currentIndex = (currentIndex + 1) % list.length;
                updateView();
            }, 150);
        }

        function prevQuestion() {
            let list = (currentMode === 'reading') ? readingList : (currentMode === 'writing' ? writingList : dailyList);
            isFlipped = false;
            document.getElementById('practice-card').classList.remove('is-flipped');
            setTimeout(() => {
                currentIndex = (currentIndex - 1 + list.length) % list.length;
                updateView();
            }, 150);
        }
        
        // Initial setup
        updateView();
    </script>
</body>
</html>
