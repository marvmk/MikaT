<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>L15: Permission & Status Trainer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .card-container { perspective: 1000px; }
        .card { transition: transform 0.6s; transform-style: preserve-3d; cursor: pointer; }
        .card.is-flipped { transform: rotateY(180deg); }
        .card-face {
            backface-visibility: hidden; position: absolute;
            width: 100%; height: 100%; display: flex;
            flex-direction: column; align-items: center;
            justify-content: center; border-radius: 1.5rem;
            box-shadow: 0 10px 25px -5px rgb(0 0 0 / 0.1);
            padding: 2rem;
        }
        .card-back { transform: rotateY(180deg); }
        .emoji-icon { font-size: 5rem; margin-bottom: 1rem; }
        
        .speaker-btn {
            background: #0ea5e9;
            color: white;
            width: 70px;
            height: 70px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 14px 0 rgba(14, 165, 233, 0.4);
            transition: all 0.2s ease;
            margin: 1.5rem 0;
        }
        .speaker-btn:active { transform: scale(0.9); background: #0284c7; }
        .speaker-btn svg { width: 35px; height: 35px; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen font-sans flex flex-col text-slate-800">

    <header class="bg-blue-800 text-white p-4 shadow-lg text-center">
        <h1 class="text-xl font-bold">L15 Sentence Trainer 🔊</h1>
        <p class="text-xs opacity-80 uppercase tracking-widest">Permission, Prohibition & States</p>
    </header>

    <main class="flex-grow flex flex-col items-center p-6 max-w-2xl mx-auto w-full">
        <!-- Mode Selector -->
        <div class="flex space-x-1 mb-6 bg-slate-200 p-1 rounded-xl w-full overflow-x-auto">
            <button id="mode-perm" class="flex-1 whitespace-nowrap px-3 py-3 rounded-lg font-bold transition bg-white shadow text-blue-800 text-xs" onclick="switchMode('perm')">
                Permission
            </button>
            <button id="mode-proh" class="flex-1 whitespace-nowrap px-3 py-3 rounded-lg font-bold transition text-slate-600 text-xs" onclick="switchMode('proh')">
                Prohibition
            </button>
            <button id="mode-status" class="flex-1 whitespace-nowrap px-3 py-3 rounded-lg font-bold transition text-slate-600 text-xs" onclick="switchMode('status')">
                Status
            </button>
        </div>

        <!-- Question Area -->
        <div id="game-view" class="w-full flex flex-col items-center">
            <!-- Card Container -->
            <div class="card-container w-full h-[540px] relative mb-8">
                <div id="practice-card" class="card w-full h-full relative">
                    
                    <!-- Front Side -->
                    <div class="card-face card-front bg-white border-2 border-blue-50 text-center" onclick="flipCard()">
                        <div id="prompt-content" class="flex flex-col items-center w-full">
                            <!-- Injected by JS -->
                        </div>
                        <div class="mt-auto text-[10px] text-slate-300 font-bold uppercase tracking-widest">
                            Tap for Answer / Tocca per la risposta
                        </div>
                    </div>

                    <!-- Back Side -->
                    <div class="card-face card-back bg-blue-50 border-4 border-blue-600 text-center">
                        <div id="grammar-label" class="text-[10px] text-blue-600 font-black uppercase tracking-[0.2em] mb-4">Grammar Point</div>
                        
                        <div id="answer-text" class="text-3xl font-black text-blue-950 mb-2 leading-tight px-2"></div>
                        <div id="romaji-text" class="text-lg font-bold text-blue-600 font-mono mb-4"></div>
                        
                        <button onclick="speakJapanese(event)" class="speaker-btn">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z" />
                            </svg>
                        </button>
                        
                        <div class="w-16 h-px bg-blue-200 mb-6 mx-auto"></div>
                        
                        <div class="space-y-1 px-4">
                            <div id="it-back" class="text-blue-800 font-bold"></div>
                            <div id="en-back" class="text-slate-500 italic text-sm"></div>
                        </div>

                        <div class="mt-auto text-[10px] text-blue-400 font-bold uppercase cursor-pointer" onclick="nextQuestion()">
                            Next / Prossimo →
                        </div>
                    </div>
                </div>
            </div>

            <!-- Navigation Controls -->
            <div class="flex justify-between w-full items-center px-4">
                <button onclick="prevQuestion()" class="w-12 h-12 flex items-center justify-center rounded-full border-2 border-slate-300 text-slate-400 bg-white shadow-sm">←</button>
                <div class="text-slate-400 font-black text-lg">
                    <span id="current-index" class="text-blue-700">1</span> / <span id="total-count">0</span>
                </div>
                <button onclick="nextQuestion()" class="w-12 h-12 flex items-center justify-center rounded-full bg-blue-800 text-white shadow-lg">→</button>
            </div>
        </div>
    </main>

    <script>
        const permQuestions = [
            { 
                icon: "📸❓", 
                prompt: "May I take a photo?", 
                answer: "A：しゃしんを とっても いいですか。 B：はい、いいですよ。", 
                romaji: "A: Shashin o tottemo ii desu ka. B: Hai, ii desu yo.", 
                en: "A: May I take a photo? B: Yes, you may.", 
                it: "A: Posso scattare una foto? B: Sì, certo." 
            },
            { 
                icon: "📖❓", 
                prompt: "May I borrow this book?", 
                answer: "A：このほんを かりても いいですか。 B：すみません、いま つかっています。", 
                romaji: "A: Kono hon o karitemo ii desu ka. B: Sumimasen, ima tsukatte imasu.", 
                en: "A: May I borrow this book? B: I'm sorry, I'm using it now.", 
                it: "A: Posso prendere in prestito questo libro? B: Scusa, lo sto usando ora." 
            },
            { 
                icon: "🪑❓", 
                prompt: "May I sit here?", 
                answer: "ここに すわっても いいですか。", 
                romaji: "Koko ni suwattemo ii desu ka.", 
                en: "May I sit here?", 
                it: "Posso sedermi qui?" 
            },
            { 
                icon: "🖊️❓", 
                prompt: "May I use this pen?", 
                answer: "このぺんを つかっても いいですか。", 
                romaji: "Kono pen o tsukattemo ii desu ka.", 
                en: "May I use this pen?", 
                it: "Posso usare questa penna?" 
            }
        ];

        const prohQuestions = [
            { 
                icon: "📸🚫", 
                prompt: "You must not take photos here.", 
                answer: "ここで しゃしんを とっては いけません。", 
                romaji: "Koko de shashin o totte wa ikemasen.", 
                en: "You must not take photos here.", 
                it: "Non si devono scattare foto qui." 
            },
            { 
                icon: "🚬🚫", 
                prompt: "You must not smoke here.", 
                answer: "ここで たばこを すっては いけません。", 
                romaji: "Koko de tabako o sutte wa ikemasen.", 
                en: "You must not smoke here.", 
                it: "Non si deve fumare qui." 
            },
            { 
                icon: "🚗🚫", 
                prompt: "You must not park the car here.", 
                answer: "ここに くるまを とめては いけません。", 
                romaji: "Koko ni kuruma o tomete wa ikemasen.", 
                en: "You must not park your car here.", 
                it: "Non si deve parcheggiare la macchina qui." 
            },
            { 
                icon: "🏊🚫", 
                prompt: "You must not swim here.", 
                answer: "ここで およいでは いけません。", 
                romaji: "Koko de oyoide wa ikemasen.", 
                en: "You must not swim here.", 
                it: "Non si deve nuotare qui." 
            }
        ];

        const statusQuestions = [
            { 
                icon: "🏠🇯🇵", 
                prompt: "I live in Osaka.", 
                answer: "わたしは おおさかに すんで います。", 
                romaji: "Watashi wa Ōsaka ni sunde imasu.", 
                en: "I live in Osaka.", 
                it: "Abito a Osaka." 
            },
            { 
                icon: "💍✨", 
                prompt: "I am married.", 
                answer: "けっこんして います。", 
                romaji: "Kekkon shite imasu.", 
                en: "I am married.", 
                it: "Sono sposato/a." 
            },
            { 
                icon: "📱✅", 
                prompt: "I have a computer.", 
                answer: "ぱそこんを もって います。", 
                romaji: "Pasokon o motte imasu.", 
                en: "I have (own) a computer.", 
                it: "Ho (possiedo) un computer." 
            },
            { 
                icon: "📞❓", 
                prompt: "Do you know the phone number?", 
                answer: "でんわばんごうを しって いますか。", 
                romaji: "Denwa bangō o shitte imasu ka.", 
                en: "Do you know the phone number?", 
                it: "Conosci il numero di telefono?" 
            },
            { 
                icon: "🏫👨‍🏫", 
                prompt: "I work at a school.", 
                answer: "がっこうで はたらいて います。", 
                romaji: "Gakkō de hataraite imasu.", 
                en: "I am working at a school.", 
                it: "Lavoro in una scuola." 
            }
        ];

        let currentMode = 'perm';
        let currentIndex = 0;
        let isFlipped = false;

        function switchMode(mode) {
            currentMode = mode;
            currentIndex = 0;
            isFlipped = false;
            document.getElementById('practice-card').classList.remove('is-flipped');
            
            ['perm', 'proh', 'status'].forEach(m => {
                document.getElementById(`mode-${m}`).className = "flex-1 whitespace-nowrap px-3 py-3 rounded-lg font-bold transition text-slate-600 text-xs";
            });
            
            const activeBtn = document.getElementById(`mode-${mode}`);
            activeBtn.className = "flex-1 whitespace-nowrap px-3 py-3 rounded-lg font-bold transition bg-white shadow text-blue-800 text-xs";

            updateView();
        }

        function updateView() {
            let questions;
            let label;
            if (currentMode === 'perm') { questions = permQuestions; label = "〜ても いいです (Permission)"; }
            else if (currentMode === 'proh') { questions = prohQuestions; label = "〜ては いけません (Prohibition)"; }
            else { questions = statusQuestions; label = "〜て います (Status/State)"; }

            const q = questions[currentIndex];
            const promptContent = document.getElementById('prompt-content');
            
            promptContent.innerHTML = `
                <div class="emoji-icon">${q.icon}</div>
                <div class="text-slate-400 text-[10px] uppercase tracking-widest mb-2 font-bold">Concept / Hint</div>
                <div class="text-2xl font-black text-slate-800 mb-6 leading-tight px-4">${q.prompt}</div>
                <div class="flex flex-col items-center space-y-2 border-t border-slate-100 pt-6 w-full px-4">
                    <div class="text-sm text-blue-600 font-bold uppercase tracking-wide">${q.it}</div>
                    <div class="text-sm text-slate-400 italic font-medium">${q.en}</div>
                </div>
            `;

            document.getElementById('current-index').innerText = currentIndex + 1;
            document.getElementById('total-count').innerText = questions.length;
            document.getElementById('answer-text').innerText = q.answer;
            document.getElementById('romaji-text').innerText = q.romaji;
            document.getElementById('it-back').innerText = q.it;
            document.getElementById('en-back').innerText = q.en;
            document.getElementById('grammar-label').innerText = label;
        }

        function flipCard() {
            if (isFlipped) return;
            document.getElementById('practice-card').classList.add('is-flipped');
            isFlipped = true;
        }

        function speakJapanese(event) {
            if (event) event.stopPropagation();
            const questions = currentMode === 'perm' ? permQuestions : (currentMode === 'proh' ? prohQuestions : statusQuestions);
            const fullText = questions[currentIndex].answer;
            
            // Clean A: or B: before speaking
            const speechText = fullText.replace(/^[A-Z][：:]\s*/g, '').replace(/[A-Z][：:]\s*/g, ' ');
            
            const ut = new SpeechSynthesisUtterance(speechText);
            ut.lang = 'ja-JP';
            ut.rate = 0.85;
            
            const voices = window.speechSynthesis.getVoices();
            const jaVoice = voices.find(v => v.lang.startsWith('ja'));
            if (jaVoice) ut.voice = jaVoice;

            window.speechSynthesis.speak(ut);
        }

        function nextQuestion() {
            const questions = currentMode === 'perm' ? permQuestions : (currentMode === 'proh' ? prohQuestions : statusQuestions);
            isFlipped = false;
            document.getElementById('practice-card').classList.remove('is-flipped');
            setTimeout(() => {
                currentIndex = (currentIndex + 1) % questions.length;
                updateView();
            }, 150);
        }

        function prevQuestion() {
            const questions = currentMode === 'perm' ? permQuestions : (currentMode === 'proh' ? prohQuestions : statusQuestions);
            isFlipped = false;
            document.getElementById('practice-card').classList.remove('is-flipped');
            setTimeout(() => {
                currentIndex = (currentIndex - 1 + questions.length) % questions.length;
                updateView();
            }, 150);
        }

        window.speechSynthesis.getVoices();
        updateView();
    </script>
</body>
</html>
