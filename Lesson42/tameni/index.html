<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Japanese Practice: Lesson 42 Master</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .card-container { perspective: 1000px; }
        .card { transition: transform 0.6s; transform-style: preserve-3d; cursor: pointer; }
        .card.is-flipped { transform: rotateY(180deg); }
        .card-face {
            backface-visibility: hidden; position: absolute;
            width: 100%; height: 100%; display: flex;
            flex-direction: column; align-items: center;
            justify-content: center; border-radius: 1.5rem;
            box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1);
            padding: 2rem;
        }
        .card-back { transform: rotateY(180deg); }
        .item-icon { font-size: 4.5rem; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen font-sans flex flex-col">

    <header class="bg-amber-500 text-white p-6 shadow-md text-center">
        <h1 class="text-2xl font-bold italic">L42: Purpose & Usage</h1>
        <p class="text-sm opacity-90 font-black tracking-widest uppercase">Result Prep System</p>
    </header>

    <main class="flex-grow flex flex-col items-center p-6 max-w-2xl mx-auto w-full">
        <!-- Mode Selector (English Tabs) -->
        <div class="flex space-x-1 mb-8 bg-gray-200 p-1 rounded-xl w-full overflow-x-auto shadow-inner border border-gray-300">
            <button id="mode-purpose" class="flex-1 whitespace-nowrap px-2 py-3 rounded-lg font-bold transition bg-white shadow-sm text-amber-600 text-xs" onclick="switchMode('purpose')">
                Purpose (~tame ni)
            </button>
            <button id="mode-usage" class="flex-1 whitespace-nowrap px-2 py-3 rounded-lg font-bold transition text-gray-600 text-xs" onclick="switchMode('usage')">
                Usage (~no ni)
            </button>
            <button id="mode-mix" class="flex-1 whitespace-nowrap px-2 py-3 rounded-lg font-bold transition text-gray-600 text-xs" onclick="switchMode('mix')">
                Practical (Mixed)
            </button>
        </div>

        <!-- Question Area -->
        <div id="game-view" class="w-full flex flex-col items-center">
            <div id="instruction" class="text-gray-400 mb-6 text-center text-xs font-black uppercase tracking-[0.2em]">
                Complete the sentence to show purpose...
            </div>

            <!-- Card Container -->
            <div class="card-container w-full h-[480px] relative mb-10">
                <div id="practice-card" class="card w-full h-full relative" onclick="flipCard()">
                    <!-- Front -->
                    <div class="card-face card-front bg-white border-2 border-amber-100 text-center">
                        <div id="prompt-content" class="flex flex-col items-center space-y-6 w-full px-4">
                            <!-- Injected by JS -->
                        </div>
                        <div class="mt-auto text-[10px] text-gray-300 font-bold uppercase tracking-widest">Tap to reveal Japanese</div>
                    </div>
                    <!-- Back -->
                    <div class="card-face card-back bg-amber-50 border-4 border-amber-400 p-8 text-center">
                        <div id="answer-kanji" class="text-3xl font-black text-amber-900 leading-tight mb-4 px-2"></div>
                        <div id="answer-kana" class="text-xl font-bold text-amber-500 mb-8"></div>
                        
                        <!-- Manual Audio Button -->
                        <button onclick="event.stopPropagation(); speakJapanese();" class="w-16 h-16 bg-white border-2 border-amber-200 rounded-full flex items-center justify-center shadow-md active:scale-90 transition-transform mb-6 group">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-amber-500 group-hover:text-amber-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z" />
                            </svg>
                        </button>

                        <div id="answer-it" class="text-base text-amber-700 italic font-medium px-4"></div>
                        <div class="mt-auto text-[10px] text-amber-300 font-bold uppercase">Tap for next question</div>
                    </div>
                </div>
            </div>

            <!-- Navigation -->
            <div class="flex justify-between w-full items-center px-2">
                <button onclick="prevQuestion()" class="w-14 h-14 flex items-center justify-center border-2 border-gray-200 rounded-full text-gray-400 bg-white hover:bg-gray-50 transition shadow-sm text-xl font-bold">←</button>
                <div class="flex flex-col items-center">
                    <div class="text-gray-400 font-black text-lg">
                        <span id="current-index" class="text-amber-600 font-black">1</span> 
                        <span class="text-gray-200">/</span> 
                        <span id="total-count">17</span>
                    </div>
                </div>
                <button onclick="buttonNext()" class="px-10 py-4 bg-amber-500 rounded-full text-white font-black hover:bg-amber-600 transition shadow-lg tracking-widest uppercase text-sm">Next</button>
            </div>
        </div>

        <!-- Finished View -->
        <div id="finished-view" class="hidden w-full flex flex-col items-center justify-center p-12 bg-white rounded-[3rem] shadow-2xl border-4 border-amber-100 text-center">
            <div class="text-7xl mb-8">Finished‼️</div>
            <p class="text-gray-500 font-black uppercase tracking-[0.3em] mb-4 text-sm">Pratica completata!</p>
            <p class="text-lg text-amber-600 font-bold mb-10 italic text-center">Lesson 42 Mastery Complete.</p>
            <button onclick="location.reload()" class="w-full py-5 bg-amber-500 text-white rounded-2xl font-black shadow-xl active:scale-95 transition-all text-xl tracking-widest uppercase">
                Restart
            </button>
        </div>
    </main>

    <footer class="py-8 text-center text-gray-300 text-[10px] font-black tracking-widest uppercase">
        Result Prep System &bull; Mika Tomao
    </footer>

    <script>
        // Mode 1: Purpose (~tame ni)
        const purposeData = [
            { icon: "🇯🇵💼", en: "I study Japanese in order to work in Japan.", it: "Studio il giapponese per lavorare in Giappone.", kanji: "日本で働くために、日本語を勉強しています。", kana: "にほんで はたらくために、にほんごを べんきょうして います。" },
            { icon: "🏠💴", en: "I am saving money for a house.", it: "Sto risparmiando soldi per la casa.", kanji: "家のために、貯金しています。", kana: "いえの ために、ちょきんして います。" },
            { icon: "✈️🌍", en: "I exercise to travel around the world.", it: "Faccio esercizio per viaggiare in tutto il mondo.", kanji: "世界旅行をするために、運動しています。", kana: "せかいりょこうを するために、うんどうして います。" },
            { icon: "🎓✅", en: "I study hard for the exam.", it: "Studio sodo per l'esame.", kanji: "試験のために、一生懸命勉強しています。", kana: "しけんの ために、いっしょうけんめい べんきょうして います。" },
            { icon: "🏎️💨", en: "He is working to buy a car.", it: "Lui lavora per comprare un'auto.", kanji: "車を買うために、働いています。", kana: "くるまを かうために、はたらいて います。" },
            { icon: "👪✨", en: "I work for my family.", it: "Lavoro per la mia famiglia.", kanji: "家族のために、働いています。", kana: "かぞくの ために、はたらいて います。" },
            { icon: "🏢🤝", en: "I went to Tokyo for the meeting.", it: "Sono andato a Tokyo per la riunione.", kanji: "会議のために、東京へ行きました。", kana: "かいぎの ために、とうきょうへ いきました。" },
            { icon: "健康🥗", en: "I eat vegetables for my health.", it: "Mangio verdure per la mia salute.", kanji: "健康のために、野菜を食べています。", kana: "けんこうの ために、やさいを たべて います。" },
            { icon: "🏃‍♂️🏅", en: "I practice to win the marathon.", it: "Faccio pratica per vincere la maratona.", kanji: "マラソンで優勝するために、練習しています。", kana: "まらそんで ゆうしょうするために、れんしゅうして います。" },
            { icon: "📖🧠", en: "I read books to gain knowledge.", it: "Leggo libri per acquisire conoscenza.", kanji: "知識を得るために、本を読みます。", kana: "ちしきを えるために、ほんを よみます。" },
            { icon: "🎁💝", en: "I bought a present for her.", it: "Ho comprato un regalo per lei.", kanji: "彼女のために、プレゼントを買いました。", kana: "かのじょの ために、ぷれぜんとを かいました。" },
            { icon: "⛩️🏯", en: "I'll go to Kyoto for sightseeing.", it: "Andrò a Kyoto per fare turismo.", kanji: "観光のために、京都へ行きます。", kana: "かんこうの ために、きょうとへ いきます。" },
            { icon: "🖋️📄", en: "I use this pen to write Kanji.", it: "Uso questa penna per scrivere i Kanji.", kanji: "漢字を書くために、このペンを使います。", kana: "かんじを かくために、このぺんを つかいます。" },
            { icon: "🚲🌳", en: "I ride a bike for the environment.", it: "Vado in bici per l'ambiente.", kanji: "環境のために、自転車に乗っています。", kana: "かんきょうの ために、じてんしゃに のって います。" },
            { icon: "💻✨", en: "I bought a PC to do design.", it: "Ho comprato un PC per fare design.", kanji: "デザインをするために、パソコンを買いました。", kana: "でざいんを するために、ぱそこんを かいました。" },
            { icon: "🎤🎶", en: "I practice singing for the concert.", it: "Faccio pratica di canto per il concerto.", kanji: "コンサートのために、歌を練習しています。", kana: "こんさーとの ために、うたを れんしゅうして います。" },
            { icon: "🍱🗾", en: "I study cooking to open a restaurant.", it: "Studio cucina per aprire un ristorante.", kanji: "店を開くために、料理を勉強しています。", kana: "みせを ひらくために、りょうりを べんきょうして います。" }
        ];

        // Mode 2: Usage (~no ni)
        const usageData = [
            { icon: "✂️📄", en: "This scissors is used for cutting paper.", it: "Queste forbici si usano per tagliare la carta.", kanji: "このはさみは紙を切るのに使います。", kana: "このはさみは かみを きるのに つかいます。" },
            { icon: "📱✨", en: "A smartphone is convenient for searching.", it: "Lo smartphone è comodo per fare ricerche.", kanji: "スマホは調べるのに便利です。", kana: "すまほは しらべるのに べんりです。" },
            { icon: "🚗📦", en: "A car is necessary for moving house.", it: "L'auto è necessaria per fare il trasloco.", kanji: "引っ越しに車が必要です。", kana: "ひっこしに くるまが ひつようです。" },
            { icon: "🎒🏔️", en: "This bag is good for climbing mountains.", it: "Questa borsa è buona per scalare montagne.", kanji: "このバッグは山に登るのにいいです。", kana: "このばっぐは やまに のぼるのに いいです。" },
            { icon: "⏳🍣", en: "It takes time to make sushi.", it: "Ci vuole tempo per preparare il sushi.", kanji: "寿司を作るのに時間がかかります。", kana: "すしを つくるのに じかんが かかります。" },
            { icon: "💴🏢", en: "How much money do you need for building?", it: "Quanti soldi servono per costruire?", kanji: "建てるのにいくら必要ですか。", kana: "たてるのに いくら ひつようですか。" },
            { icon: "🧥❄️", en: "This coat is for the cold winter.", it: "Questo cappotto è per il freddo inverno.", kanji: "このコートは寒い冬にいいです。", kana: "このこーとは さむいふゆに いいです。" },
            { icon: "🍱🥢", en: "Chopsticks are used for eating.", it: "Le bacchette si usano per mangiare.", kanji: "箸は食べるのに使います。", kana: "はしは たべるのに つかいます。" },
            { icon: "🥣🍳", en: "This bowl is convenient for mixing.", it: "Questa ciotola è comoda per mescolare.", kanji: "このボウルは混ぜるのに便利です。", kana: "このぼうるは まぜるのに べんりです。" },
            { icon: "🏙️🚶", en: "It takes 10 mins to go to the station.", it: "Ci vogliono 10 minuti per andare in stazione.", kanji: "駅へ行くのに１０分かかります。", kana: "えきへ いくのに じゅっぷん かかります。" },
            { icon: "🖥️🎨", en: "This software is used for drawing.", it: "Questo software si usa per disegnare.", kanji: "このソフトは絵をかくのに使います。", kana: "このそふとは えを かくのに つかいます。" },
            { icon: "🧤❄️", en: "Gloves are necessary for skiing.", it: "I guanti sono necessari per sciare.", kanji: "スキーをするのに手袋が必要です。", kana: "すきーを するのに てぶくろが ひつようです。" },
            { icon: "🧂🍱", en: "This salt is for cooking fish.", it: "Questo sale è per cucinare il pesce.", kanji: "この塩は魚を料理するのにいいです。", kana: "このしおは さかなを りょうりするのに いいです。" },
            { icon: "📏📐", en: "A ruler is used for measuring length.", it: "Il righello si usa per misurare la lunghezza.", kanji: "物差しは長さを測るのに使います。", kana: "ものさしは ながさを はかるのに つかいます。" },
            { icon: "🧺🧼", en: "This soap is good for washing.", it: "Questo sapone è buono per lavare.", kanji: "この石鹸は洗うのにいいです。", kana: "このせっけんは あらうのに いいです。" },
            { icon: "🛌✨", en: "This pillow is good for sleeping well.", it: "Questo cuscino è buono per dormir bene.", kanji: "この枕はよく寝るのにいいです。", kana: "このまくらは よくねるのに いいです。" },
            { icon: "🧴🛁", en: "This is for cleaning the bathroom.", it: "Questo è per pulire il bagno.", kanji: "これはお風呂を掃除するのに使います。", kana: "これは おふろを そうじするのに つかいます。" }
        ];

        // Mode 3: Practical (Mixed)
        const mixData = [
            { icon: "🎁🎀", en: "This paper is for wrapping presents.", it: "Questa carta è per avvolgere i regali.", kanji: "この紙はプレゼントを包むのに使います。", kana: "このかみは ぷれぜんとを つつむのに つかいます。" },
            { icon: "🌡️💊", en: "A thermometer is for measuring temperature.", it: "Il termometro serve per misurare la febbre.", kanji: "体温計は熱を測るのに使います。", kana: "たいおんけいは ねつを はかるのに つかいます。" },
            { icon: "👜✈️", en: "This bag is for traveling.", it: "Questa borsa è per viaggiare.", kanji: "このバッグは旅行に行くのに使います。", kana: "このばっぐは りょこうに いくのに つかいます。" },
            { icon: "🥫🧴", en: "A can opener is for opening cans.", it: "L'apriscatole serve per aprire le lattine.", kanji: "缶切りは缶を開けるのに使います。", kana: "かんきりは かんを あけるのに つかいます。" },
            { icon: "🍶🌾", en: "Rice is needed to make Sake.", it: "Il riso serve per fare il sake.", kanji: "お酒を造るのに米が必要です。", kana: "おさけを つくるのに こめが ひつようです。" },
            { icon: "⚖️📜", en: "I'll study law to become a lawyer.", it: "Studierò legge per diventare avvocato.", kanji: "弁護士になるために、法律を勉強します。", kana: "べんごしに なるために、ほうりつを べんきょうします。" },
            { icon: "🏗️📐", en: "Many people were needed to build pyramids.", it: "Servivano molte persone per costruire le piramidi.", kanji: "ピラミッドを造るのに多くの人が必要でした。", kana: "ぴらみっどを つくるのに おおぜいのひとが ひつようでした。" },
            { icon: "🎻🎶", en: "I practice every day to be a musician.", it: "Faccio pratica ogni giorno per essere musicista.", kanji: "音楽家になるために、毎日練習しています。", kana: "おんがくかに なるために、まいにち れんしゅうして います。" },
            { icon: "🏢🧱", en: "Concrete is used for building houses.", it: "Il cemento si usa per costruire case.", kanji: "コンクリートは家を建てるのに使われます。", kana: "こんくりーとは いえを たてるのに つかわれます。" },
            { icon: "🧺🧼", en: "Is this detergent for washing silk?", it: "Questo detersivo è per lavare la seta?", kanji: "この洗剤は絹を洗うのにいいですか。", kana: "このせんざいは きぬを あらうのに いいですか。" },
            { icon: "👟🏃", en: "These shoes are for running.", it: "Queste scarpe sono per correre.", kanji: "この靴は走るのにいいです。", kana: "このくつは はしるのに いいです。" },
            { icon: "🚶💨", en: "I'll run to be in time for the train.", it: "Correrò per fare in tempo per il treno.", kanji: "電車に間に合うために、走ります。", kana: "でんしゃに まにあうために、はしります。" },
            { icon: "🍱🧤", en: "Oven mitts are for holding hot things.", it: "I guanti da forno servono per prendere cose calde.", kanji: "鍋つかみは熱い物を持つのに便利です。", kana: "なべつかみは あついものを もつのに べんりです。" },
            { icon: "💴🏎️", en: "I saved 3 million yen to buy a car.", it: "Ho risparmiato 3 milioni di yen per comprare un'auto.", kanji: "車を買うために、３００万円貯めました。", kana: "くるまを かうために、さんびゃくまんえん ためました。" },
            { icon: "📜🏛️", en: "I'll go to the library for research.", it: "Andrò in biblioteca per fare ricerca.", kanji: "調べるために、図書館へ行きます。", kana: "しらべるために、としょかんへ いきます。" },
            { icon: "🧴🛀", en: "This sponge is for washing the tub.", it: "Questa spugna è per lavare la vasca.", kanji: "このスポンジはお風呂を洗うのに使います。", kana: "このすぽんじは おふろを あらうのに つかいます。" },
            { icon: "📞⚡", en: "A cell phone is necessary for work.", it: "Il cellulare è necessario per il lavoro.", kanji: "仕事に携帯電話が必要です。", kana: "しごとに けいたいでんわが ひつようです。" }
        ];

        let currentMode = 'purpose';
        let currentIndex = 0;
        let isFlipped = false;

        function switchMode(mode) {
            currentMode = mode;
            currentIndex = 0;
            isFlipped = false;
            document.getElementById('practice-card').classList.remove('is-flipped');
            document.getElementById('game-view').classList.remove('hidden');
            document.getElementById('finished-view').classList.add('hidden');
            
            const modes = ['purpose', 'usage', 'mix'];
            modes.forEach(m => {
                const btn = document.getElementById(`mode-${m}`);
                if(m === mode) {
                    btn.classList.add('bg-white', 'shadow-sm', 'text-amber-600');
                    btn.classList.remove('text-gray-600');
                } else {
                    btn.classList.remove('bg-white', 'shadow-sm', 'text-amber-600');
                    btn.classList.add('text-gray-600');
                }
            });

            const instr = document.getElementById('instruction');
            if(mode === 'purpose') instr.innerText = "Purpose (~tame ni): V-dic tame ni / N no tame ni";
            else if(mode === 'usage') instr.innerText = "Usage (~no ni): For specific uses or evaluations";
            else instr.innerText = "Practical (Mixed): Contextual sentences";
            
            updateView();
        }

        function updateView() {
            const data = { purpose: purposeData, usage: usageData, mix: mixData };
            const questions = data[currentMode];
            const q = questions[currentIndex];
            const promptContent = document.getElementById('prompt-content');
            
            document.getElementById('current-index').innerText = currentIndex + 1;
            document.getElementById('total-count').innerText = questions.length;
            
            document.getElementById('answer-kanji').innerText = q.kanji;
            document.getElementById('answer-kana').innerText = q.kana;
            document.getElementById('answer-it').innerText = q.it;

            promptContent.innerHTML = `
                <div class="item-icon mb-4">${q.icon}</div>
                <div class="text-center px-6">
                    <div class="text-gray-400 text-[10px] font-black uppercase tracking-[0.2em] mb-4">Target Meaning / Scenario</div>
                    <div class="text-3xl font-black text-gray-800 leading-tight italic px-4">${q.en}</div>
                </div>
            `;
        }

        function flipCard() {
            const card = document.getElementById('practice-card');
            if (!isFlipped) {
                card.classList.add('is-flipped');
                isFlipped = true;
            } else {
                nextQuestion();
            }
        }

        function speakJapanese() {
            const data = { purpose: purposeData, usage: usageData, mix: mixData };
            const text = data[currentMode][currentIndex].kana;
            const ut = new SpeechSynthesisUtterance(text);
            ut.lang = 'ja-JP';
            ut.rate = 0.95;
            window.speechSynthesis.speak(ut);
        }

        function nextQuestion() {
            const data = { purpose: purposeData, usage: usageData, mix: mixData };
            const questions = data[currentMode];
            
            if (isFlipped && currentIndex === questions.length - 1) {
                document.getElementById('game-view').classList.add('hidden');
                document.getElementById('finished-view').classList.remove('hidden');
                return;
            }

            isFlipped = false;
            document.getElementById('practice-card').classList.remove('is-flipped');
            setTimeout(() => {
                currentIndex = (currentIndex + 1) % questions.length;
                updateView();
            }, 150);
        }

        function prevQuestion() {
            const data = { purpose: purposeData, usage: usageData, mix: mixData };
            const questions = data[currentMode];
            isFlipped = false;
            document.getElementById('practice-card').classList.remove('is-flipped');
            setTimeout(() => {
                currentIndex = (currentIndex - 1 + questions.length) % questions.length;
                updateView();
            }, 150);
        }

        function buttonNext() {
            if (!isFlipped) {
                flipCard();
            } else {
                nextQuestion();
            }
        }

        updateView();
    </script>
</body>
</html>
