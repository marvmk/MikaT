<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Japanese Practice: Lesson 44 Master</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .card-container { perspective: 1000px; }
        .card { transition: transform 0.6s; transform-style: preserve-3d; cursor: pointer; }
        .card.is-flipped { transform: rotateY(180deg); }
        .card-face {
            backface-visibility: hidden; position: absolute;
            width: 100%; height: 100%; display: flex;
            flex-direction: column; align-items: center;
            justify-content: center; border-radius: 1.5rem;
            box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1);
            padding: 2rem;
        }
        .card-back { transform: rotateY(180deg); }
        .item-icon { font-size: 4.5rem; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen font-sans flex flex-col">

    <header class="bg-amber-500 text-white p-6 shadow-md text-center">
        <h1 class="text-2xl font-bold italic">L44: Degrees & Adjustments</h1>
        <p class="text-sm opacity-90 font-black tracking-widest uppercase">Result Prep System</p>
    </header>

    <main class="flex-grow flex flex-col items-center p-6 max-w-2xl mx-auto w-full">
        <!-- Mode Selector (English Tabs) -->
        <div class="flex space-x-1 mb-8 bg-gray-200 p-1 rounded-xl w-full overflow-x-auto shadow-inner border border-gray-300">
            <button id="mode-over" class="flex-1 whitespace-nowrap px-2 py-3 rounded-lg font-bold transition bg-white shadow-sm text-amber-600 text-xs" onclick="switchMode('over')">
                Overdoing
            </button>
            <button id="mode-ease" class="flex-1 whitespace-nowrap px-2 py-3 rounded-lg font-bold transition text-gray-600 text-xs" onclick="switchMode('ease')">
                Easy & Hard
            </button>
            <button id="mode-adj" class="flex-1 whitespace-nowrap px-2 py-3 rounded-lg font-bold transition text-gray-600 text-xs" onclick="switchMode('adj')">
                Adjustments
            </button>
        </div>

        <!-- Question Area -->
        <div id="game-view" class="w-full flex flex-col items-center">
            <div id="instruction" class="text-gray-400 mb-6 text-center text-xs font-black uppercase tracking-[0.2em]">
                Translate the sentence...
            </div>

            <!-- Card Container -->
            <div class="card-container w-full h-[480px] relative mb-10">
                <div id="practice-card" class="card w-full h-full relative" onclick="flipCard()">
                    <!-- Front -->
                    <div class="card-face card-front bg-white border-2 border-amber-100 text-center">
                        <div id="prompt-content" class="flex flex-col items-center space-y-6 w-full px-4">
                            <!-- Injected by JS -->
                        </div>
                        <div class="mt-auto text-[10px] text-gray-300 font-bold uppercase tracking-widest">Tap to reveal Japanese</div>
                    </div>
                    <!-- Back -->
                    <div class="card-face card-back bg-amber-50 border-4 border-amber-400 p-8 text-center">
                        <div id="answer-kanji" class="text-3xl font-black text-amber-900 leading-tight mb-4 px-2"></div>
                        <div id="answer-kana" class="text-xl font-bold text-amber-500 mb-8"></div>
                        
                        <!-- Manual Audio Button -->
                        <button onclick="event.stopPropagation(); speakJapanese();" class="w-16 h-16 bg-white border-2 border-amber-200 rounded-full flex items-center justify-center shadow-md active:scale-90 transition-transform mb-6 group">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-amber-500 group-hover:text-amber-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z" />
                            </svg>
                        </button>

                        <div id="answer-it" class="text-base text-amber-700 italic font-medium px-4"></div>
                        <div class="mt-auto text-[10px] text-amber-300 font-bold uppercase">Tap for next question</div>
                    </div>
                </div>
            </div>

            <!-- Navigation -->
            <div class="flex justify-between w-full items-center px-2">
                <button onclick="prevQuestion()" class="w-14 h-14 flex items-center justify-center border-2 border-gray-200 rounded-full text-gray-400 bg-white hover:bg-gray-50 transition shadow-sm text-xl font-bold">←</button>
                <div class="flex flex-col items-center">
                    <div class="text-gray-400 font-black text-lg">
                        <span id="current-index" class="text-amber-600 font-black">1</span> 
                        <span class="text-gray-200">/</span> 
                        <span id="total-count">17</span>
                    </div>
                </div>
                <button onclick="buttonNext()" class="px-10 py-4 bg-amber-500 rounded-full text-white font-black hover:bg-amber-600 transition shadow-lg tracking-widest uppercase text-sm">Next</button>
            </div>
        </div>

        <!-- Finished View -->
        <div id="finished-view" class="hidden w-full flex flex-col items-center justify-center p-12 bg-white rounded-[3rem] shadow-2xl border-4 border-amber-100 text-center">
            <div class="text-7xl mb-8">Finished‼️</div>
            <p class="text-gray-500 font-black uppercase tracking-[0.3em] mb-4 text-sm">Pratica completata!</p>
            <p class="text-lg text-amber-600 font-bold mb-10 italic text-center">Lesson 44 Mastery Complete.</p>
            <button onclick="location.reload()" class="w-full py-5 bg-amber-500 text-white rounded-2xl font-black shadow-xl active:scale-95 transition-all text-xl tracking-widest uppercase">
                Restart
            </button>
        </div>
    </main>

    <footer class="py-8 text-center text-gray-300 text-[10px] font-black tracking-widest uppercase">
        Result Prep System &bull; Mika Tomao
    </footer>

    <script>
        // Mode 1: Overdoing (~sugimasu)
        const overData = [
            { icon: "🍰🤢", en: "I ate too much cake.", it: "Ho mangiato troppa torta.", kanji: "ケーキを食べすぎました。", kana: "けーきを たべすぎました。" },
            { icon: "🍷🥴", en: "I drank too much wine.", it: "Ho bevuto troppo vino.", kanji: "ワインを飲みすぎました。", kana: "わいんを のみすぎました。" },
            { icon: "🛌💤", en: "I slept too much.", it: "Ho dormito troppo.", kanji: "寝すぎました。", kana: "ねすぎました。" },
            { icon: "🚶‍♂️💦", en: "I walked too much.", it: "Ho camminato troppo.", kanji: "歩きすぎました。", kana: "あるきすぎました。" },
            { icon: "👗🛒", en: "I bought too many clothes.", it: "Ho comprato troppi vestiti.", kanji: "服を買いすぎました。", kana: "ふくを かいすぎました。" },
            { icon: "☕🔥", en: "This tea is too hot.", it: "Questo tè è troppo caldo.", kanji: "このお茶は熱すぎます。", kana: "この おちゃは あつすぎます。" },
            { icon: "🧩🤯", en: "This problem is too difficult.", it: "Questo problema è troppo difficile.", kanji: "この問題は難しすぎます。", kana: "この もんだいは むずかしすぎます。" },
            { icon: "💼😫", en: "Working too much is bad for the body.", it: "Lavorare troppo fa male al corpo.", kanji: "働きすぎるのは体に悪いです。", kana: "はたらきすぎるのは からだに わるいです。" },
            { icon: "😂💥", en: "I laughed too much.", it: "Ho riso troppo.", kanji: "笑いすぎました。", kana: "わらいすぎました。" },
            { icon: "😢🌊", en: "I cried too much.", it: "Ho pianto troppo.", kanji: "泣きすぎました。", kana: "なきすぎました。" },
            { icon: "🏗️🏢", en: "This building is too high.", it: "Questo edificio è troppo alto.", kanji: "このビルは高すぎます。", kana: "この びるは たかすぎます。" },
            { icon: "💻👀", en: "I used the computer too much.", it: "Ho usato troppo il computer.", kanji: "パソコンを使いすぎました。", kana: "ぱそこんを つかいすぎました。" },
            { icon: "📢🎧", en: "The music is too loud.", it: "La musica è troppo forte.", kanji: "音楽が大きすぎます。", kana: "おんがくが おおきすぎます。" },
            { icon: "🗣️🕰️", en: "I talked too much.", it: "Ho parlato troppo.", kanji: "話しすぎました。", kana: "はなしすぎました。" },
            { icon: "🏃‍♂️🔥", en: "I ran too much.", it: "Ho corso troppo.", kanji: "走りすぎました。", kana: "はしりすぎました。" },
            { icon: "🍬🦷", en: "I put in too much sugar.", it: "Ho messo troppo zucchero.", kanji: "砂糖を入れすぎました。", kana: "さとうを いれすぎました。" },
            { icon: "📱😵", en: "I looked at the phone too much.", it: "Ho guardato troppo il telefono.", kanji: "スマホを見すぎました。", kana: "すまほを みすぎました。" }
        ];

        // Mode 2: Easy & Hard (~yasui / ~nikui)
        const easeData = [
            { icon: "🖋️✨", en: "This pen is easy to write with.", it: "Questa penna è facile da scrivere.", kanji: "このペンは書きやすいです。", kana: "この ぺんは かきやすいです。" },
            { icon: "💊🥤", en: "This medicine is easy to drink.", it: "Questa medicina è facile da bere.", kanji: "この薬は飲みやすいです。", kana: "この くすりは のみやすいです。" },
            { icon: "🚶‍♂️🚧", en: "This road is hard to walk on.", it: "Questa strada è difficile da camminare.", kanji: "この道は歩きにくいです。", kana: "この みちは あるきにくいです。" },
            { icon: "📱🧩", en: "This smartphone is hard to use.", it: "Questo smartphone è difficile da usare.", kanji: "このスマホは使いにくいです。", kana: "この すまほは つかいにくいです。" },
            { icon: "👗🧼", en: "White clothes get dirty easily.", it: "I vestiti bianchi si sporcano facilmente.", kanji: "白い服は汚れやすいです。", kana: "しろい ふくは よごれやすいです。" },
            { icon: "🥛💪", en: "This glass is hard to break.", it: "Questo bicchiere è difficile da rompere.", kanji: "このコップは壊れにくいです。", kana: "この こっぷは こわれにくいです。" },
            { icon: "🚉🔍", en: "The station is easy to find.", it: "La stazione è facile da trovare.", kanji: "駅は見つかりやすいです。", kana: "えきは みつかりやすいです。" },
            { icon: "🏠✨", en: "This town is easy to live in.", it: "Questa città è facile da vivere.", kanji: "この町は住みやすいです。", kana: "この まちは すみやすいです。" },
            { icon: "📖🧩", en: "This book is hard to read.", it: "Questo libro è difficile da leggere.", kanji: "この本は読みにくいです。", kana: "この ほんは よみにくいです。" },
            { icon: "🥩🦷", en: "This meat is hard to eat.", it: "Questa carne è difficile da mangiare.", kanji: "この肉は食べにくいです。", kana: "この にくは たべにくいです。" },
            { icon: "👜✨", en: "This bag is easy to carry.", it: "Questa borsa è facile da trasportare.", kanji: "このバッグは運びやすいです。", kana: "この ばっぐは はこびやすいです。" },
            { icon: "🚪🔒", en: "This window is hard to open.", it: "Questa finestra è difficile da aprire.", kanji: "この窓は開きにくいです。", kana: "この まどは あきにくいです。" },
            { icon: "👤💭", en: "This name is easy to remember.", it: "Questo nome è facile da ricordare.", kanji: "この名前は覚えやすいです。", kana: "この なまえは おぼえやすいです。" },
            { icon: "✍️😵", en: "This letter is hard to read.", it: "Questa lettera è difficile da leggere.", kanji: "この字は読みにくいです。", kana: "この じは よみにくいです。" },
            { icon: "💻🎒", en: "This computer is easy to carry.", it: "Questo computer è facile da trasportare.", kanji: "このパソコンは運びやすいです。", kana: "この ぱそこんは はこびやすいです。" },
            { icon: "🌧️👗", en: "Rainy days get wet easily.", it: "Nei giorni di pioggia ci si bagna facilmente.", kanji: "雨の日は濡れやすいです。", kana: "あめの ひは ぬれやすいです。" },
            { icon: "👟😖", en: "New shoes are hard to walk in.", it: "Le scarpe nuove sono difficili da camminare.", kanji: "新しい靴は歩きにくいです。", kana: "あたらしい くつは あるきにくいです。" }
        ];

        // Mode 3: Adjustments (~shimasu)
        const adjData = [
            { icon: "☕🍬", en: "I'll make the tea sweet.", it: "Farò il tè dolce.", kanji: "お茶を甘くします。", kana: "おちゃを あまく します。" },
            { icon: "🏠✨", en: "I'll make the room clean.", it: "Farò pulita la stanza.", kanji: "部屋をきれいにします。", kana: "へやを きれいに します。" },
            { icon: "📢🆙", en: "Please make your voice louder.", it: "Per favore alza la voce.", kanji: "声を大きくしてください。", kana: "こえを おおきく して ください。" },
            { icon: "📺⬇️", en: "Please make the TV quieter.", it: "Per favore abbassa la TV.", kanji: "テレビを静かにしてください。", kana: "てれびを しずかに して ください。" },
            { icon: "✂️💇", en: "Please make my hair short.", it: "Per favore fammi i capelli corti.", kanji: "髪を短くしてください。", kana: "かみを みじかく して ください。" },
            { icon: "🧂📉", en: "I'll make the salt less.", it: "Metterò meno sale.", kanji: "塩を少なくします。", kana: "しおを すくなく します。" },
            { icon: "📖1/2", en: "Please make the homework half.", it: "Per favore fammi metà dei compiti.", kanji: "宿題を半分にしてください。", kana: "しゅくだいを はんぶんに して ください。" },
            { icon: "🕙🤝", en: "I'll make the meeting time 10:00.", it: "Sceglierò le 10:00 per la riunione.", kanji: "会議の時間を１０時にします。", kana: "かいぎの じかんを じゅうじに します。" },
            { icon: "🏨🛌", en: "I'll make the hotel a single room.", it: "Sceglierò una camera singola in hotel.", kanji: "ホテルをシングルにします。", kana: "ほてるを しんぐるに します。" },
            { icon: "🍱🇯🇵", en: "I'll make the dinner a Japanese dish.", it: "Sceglierò un piatto giapponese per cena.", kanji: "晩ご飯を和食にします。", kana: "ばんごはんを わしょくに します。" },
            { icon: "💡🆙", en: "Please make the light bright.", it: "Per favore fai la luce luminosa.", kanji: "電気を明るくしてください。", kana: "でんきを あかるく して ください。" },
            { icon: "💴📉", en: "Please make the price cheaper.", it: "Per favore fammi il prezzo più basso.", kanji: "値段を安くしてください。", kana: "ねだんを やすく して ください。" },
            { icon: "👜📉", en: "I'll make the bag lighter.", it: "Renderò la borsa più leggera.", kanji: "バッグを軽くします。", kana: "ばっぐを かるく します。" },
            { icon: "🚰❄️", en: "I'll make the water cold.", it: "Farò l'acqua fredda.", kanji: "水を冷たくします。", kana: "みずを つめたく します。" },
            { icon: "✅✨", en: "Please make the answer correct.", it: "Per favore rendi corretta la risposta.", kanji: "答えを正しくしてください。", kana: "こたえを ただしく して ください。" },
            { icon: "📸✨", en: "Please make the photo beautiful.", it: "Per favore fai bella la foto.", kanji: "写真をきれいにしてください。", kana: "しゃしんを きれいに して ください。" },
            { icon: "🤝📉", en: "I'll make the meeting shorter.", it: "Renderò la riunione più corta.", kanji: "会議を短くします。", kana: "かいぎを みじかく します。" }
        ];

        let currentMode = 'over';
        let currentIndex = 0;
        let isFlipped = false;

        function switchMode(mode) {
            currentMode = mode;
            currentIndex = 0;
            isFlipped = false;
            document.getElementById('practice-card').classList.remove('is-flipped');
            document.getElementById('game-view').classList.remove('hidden');
            document.getElementById('finished-view').classList.add('hidden');
            
            const modes = ['over', 'ease', 'adj'];
            modes.forEach(m => {
                const btn = document.getElementById(`mode-${m}`);
                if(m === mode) {
                    btn.classList.add('bg-white', 'shadow-sm', 'text-amber-600');
                    btn.classList.remove('text-gray-600');
                } else {
                    btn.classList.remove('bg-white', 'shadow-sm', 'text-amber-600');
                    btn.classList.add('text-gray-600');
                }
            });

            const instr = document.getElementById('instruction');
            if(mode === 'over') instr.innerText = "Overdoing (~sugimasu): Too much / Excessive";
            else if(mode === 'ease') instr.innerText = "Easy & Hard (~yasui / ~nikui): Degree of difficulty";
            else instr.innerText = "Adjustments (~shimasu): Making a change or decision";
            
            updateView();
        }

        function updateView() {
            const data = { over: overData, ease: easeData, adj: adjData };
            const questions = data[currentMode];
            const q = questions[currentIndex];
            const promptContent = document.getElementById('prompt-content');
            
            document.getElementById('current-index').innerText = currentIndex + 1;
            document.getElementById('total-count').innerText = questions.length;
            
            document.getElementById('answer-kanji').innerText = q.kanji;
            document.getElementById('answer-kana').innerText = q.kana;
            document.getElementById('answer-it').innerText = q.it;

            promptContent.innerHTML = `
                <div class="item-icon mb-4">${q.icon}</div>
                <div class="text-center px-6">
                    <div class="text-gray-400 text-[10px] font-black uppercase tracking-[0.2em] mb-4">Target Meaning / Situation</div>
                    <div class="text-3xl font-black text-gray-800 leading-tight italic px-4">${q.en}</div>
                </div>
            `;
        }

        function flipCard() {
            const card = document.getElementById('practice-card');
            if (!isFlipped) {
                card.classList.add('is-flipped');
                isFlipped = true;
            } else {
                nextQuestion();
            }
        }

        function speakJapanese() {
            const data = { over: overData, ease: easeData, adj: adjData };
            const text = data[currentMode][currentIndex].kana;
            const ut = new SpeechSynthesisUtterance(text);
            ut.lang = 'ja-JP';
            ut.rate = 0.95;
            window.speechSynthesis.speak(ut);
        }

        function nextQuestion() {
            const data = { over: overData, ease: easeData, adj: adjData };
            const questions = data[currentMode];
            
            if (isFlipped && currentIndex === questions.length - 1) {
                document.getElementById('game-view').classList.add('hidden');
                document.getElementById('finished-view').classList.remove('hidden');
                return;
            }

            isFlipped = false;
            document.getElementById('practice-card').classList.remove('is-flipped');
            setTimeout(() => {
                currentIndex = (currentIndex + 1) % questions.length;
                updateView();
            }, 150);
        }

        function prevQuestion() {
            const data = { over: overData, ease: easeData, adj: adjData };
            const questions = data[currentMode];
            isFlipped = false;
            document.getElementById('practice-card').classList.remove('is-flipped');
            setTimeout(() => {
                currentIndex = (currentIndex - 1 + questions.length) % questions.length;
                updateView();
            }, 150);
        }

        function buttonNext() {
            if (!isFlipped) {
                flipCard();
            } else {
                nextQuestion();
            }
        }

        updateView();
    </script>
</body>
</html>
