<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>L12 Vocabulary: Trilingual Training</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .card-container { perspective: 1000px; }
        .card { transition: transform 0.6s; transform-style: preserve-3d; cursor: pointer; }
        .card.is-flipped { transform: rotateY(180deg); }
        .card-face {
            backface-visibility: hidden; position: absolute;
            width: 100%; height: 100%; display: flex;
            flex-direction: column; align-items: center;
            justify-content: center; border-radius: 1.5rem;
            box-shadow: 0 10px 25px -5px rgb(0 0 0 / 0.1);
            padding: 1.5rem;
        }
        .card-back { transform: rotateY(180deg); }
        .action-icon { font-size: 5rem; }
        
        .speaker-btn {
            background: #0d9488;
            color: white;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 6px 20px rgba(13, 148, 136, 0.4);
            transition: all 0.2s ease;
            margin-bottom: 1rem;
        }
        .speaker-btn:active { transform: scale(0.9); background: #0f766e; }
        .speaker-btn svg { width: 40px; height: 40px; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen font-sans flex flex-col">

    <header class="bg-teal-900 text-white p-4 shadow-lg text-center">
        <h1 class="text-xl font-bold">L12 Vocab: Trilingue 🔊</h1>
        <p class="text-xs opacity-80 uppercase tracking-widest">Hiragana • Romaji • Audio • IT • EN</p>
    </header>

    <main class="flex-grow flex flex-col items-center p-6 max-w-2xl mx-auto w-full">
        <!-- Selector -->
        <div class="flex space-x-1 mb-6 bg-slate-200 p-1 rounded-xl w-full overflow-x-auto shadow-inner">
            <button id="mode-adj" class="flex-1 whitespace-nowrap px-4 py-3 rounded-lg font-bold transition bg-white shadow text-teal-800" onclick="switchMode('adj')">ADJECTIVES</button>
            <button id="mode-season" class="flex-1 whitespace-nowrap px-4 py-3 rounded-lg font-bold transition text-slate-600" onclick="switchMode('season')">SEASONS/WEATHER</button>
            <button id="mode-food" class="flex-1 whitespace-nowrap px-4 py-3 rounded-lg font-bold transition text-slate-600" onclick="switchMode('food')">FOOD/PLACES</button>
        </div>

        <!-- Card Area -->
        <div class="card-container w-full h-[500px] relative mb-8">
            <div id="practice-card" class="card w-full h-full relative">
                
                <!-- Front Side -->
                <div class="card-face card-front bg-white border-2 border-teal-50 text-center" onclick="flipCard()">
                    <div id="prompt-content" class="flex flex-col items-center space-y-6"></div>
                    <div class="mt-auto text-[10px] text-slate-300 font-bold uppercase tracking-widest">Tap for Japanese / Tocca per la risposta</div>
                </div>

                <!-- Back Side -->
                <div class="card-face card-back bg-teal-50 border-4 border-teal-600 text-center">
                    <div id="type-label" class="text-[10px] text-teal-600 font-black uppercase tracking-[0.2em] mb-4">Risposta</div>
                    
                    <div id="answer-text" class="text-4xl font-black text-teal-950 mb-1 leading-tight"></div>
                    <div id="romaji-text" class="text-2xl font-bold text-teal-600 font-mono mb-8"></div>
                    
                    <button onclick="speakJapanese(event)" class="speaker-btn">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z" />
                        </svg>
                    </button>
                    
                    <div class="w-16 h-1 bg-teal-200 mb-6 mx-auto"></div>
                    
                    <div class="flex flex-col items-center space-y-1 px-4">
                        <div id="en-back" class="text-slate-500 italic"></div>
                        <div id="it-back" class="text-lg text-teal-800 font-bold"></div>
                    </div>

                    <div class="mt-auto text-[10px] text-teal-400 font-bold uppercase tracking-widest cursor-pointer" onclick="nextQuestion()">Next / Prossimo →</div>
                </div>
            </div>
        </div>

        <!-- Controls -->
        <div class="flex justify-between w-full items-center px-4">
            <button onclick="prevQuestion()" class="w-12 h-12 flex items-center justify-center rounded-full border-2 border-slate-300 text-slate-400 bg-white">←</button>
            <div class="text-slate-400 font-black text-lg"><span id="current-index" class="text-teal-700">1</span> / <span id="total-count">0</span></div>
            <button onclick="nextQuestion()" class="w-12 h-12 flex items-center justify-center rounded-full bg-teal-600 text-white shadow-lg">→</button>
        </div>
    </main>

    <script>
        const adjList = [
            { icon: "🖍️✨", en: "easy", it: "facile", answer: "かんたん[な]", audio: "かんたん", romaji: "kantan" },
            { icon: "🏠🚶", en: "near", it: "vicino", answer: "ちかい", audio: "ちかい", romaji: "chikai" },
            { icon: "🏠✈️", en: "far", it: "lontano", answer: "とおい", audio: "とおい", romaji: "tooi" },
            { icon: "🏎️💨", en: "fast / early", it: "veloce / presto", answer: "はやい", audio: "はやい", romaji: "hayai" },
            { icon: "🐢🚶", en: "slow / late", it: "lento / tardi", answer: "おそい", audio: "おそい", romaji: "osoi" },
            { icon: "👨‍👩‍👧‍👦📈", en: "many / much", it: "molto / molti", answer: "おおい", audio: "おおい", romaji: "ooi" },
            { icon: "👤📉", en: "few / a little", it: "poco / pochi", answer: "すくない", audio: "すくない", romaji: "sukunai" },
            { icon: "☀️🌸", en: "warm", it: "tiepido / mite", answer: "あたたかい", audio: "あたたかい", romaji: "atatakai" },
            { icon: "🍃✨", en: "cool", it: "fresco", answer: "すずしい", audio: "すずしい", romaji: "suzushii" },
            { icon: "🍰😋", en: "sweet", it: "dolce", answer: "あまい", audio: "あまい", romaji: "amai" },
            { icon: "🌶️🔥", en: "spicy", it: "piccante", answer: "karai", answer: "からい", audio: "からい", romaji: "karai" },
            { icon: "🏋️‍♂️📦", en: "heavy", it: "pesante", answer: "おもい", audio: "おもい", romaji: "omoi" },
            { icon: "🎈✨", en: "light (weight)", it: "leggero", answer: "かるい", audio: "かるい", romaji: "karui" }
        ];

        const seasonWeatherList = [
            { icon: "📅🌸❄️", en: "season", it: "stagione", answer: "きせつ", romaji: "kisetsu" },
            { icon: "🌸", en: "spring", it: "primavera", answer: "はる", romaji: "haru" },
            { icon: "☀️⛱️", en: "summer", it: "estate", answer: "なつ", romaji: "natsu" },
            { icon: "🍁🍂", en: "autumn / fall", it: "autunno", answer: "あき", romaji: "aki" },
            { icon: "❄️☃️", en: "winter", it: "inverno", answer: "ふゆ", romaji: "fuyu" },
            { icon: "☀️☁️", en: "weather", it: "tempo (atmosferico)", answer: "てんき", romaji: "tenki" },
            { icon: "🌧️", en: "rain", it: "pioggia", answer: "あめ", romaji: "ame" },
            { icon: "🌨️", en: "snow", it: "neve", answer: "ゆき", romaji: "yuki" },
            { icon: "☁️", en: "cloudy", it: "nuvoloso", answer: "くもり", romaji: "kumori" }
        ];

        const foodPlaceList = [
            { icon: "🏨", en: "hotel", it: "hotel", answer: "ホテル", romaji: "hoteru" },
            { icon: "✈️🏢", en: "airport", it: "aeroporto", answer: "くうこう", romaji: "kūkō" },
            { icon: "🌊", en: "sea / ocean", it: "mare", answer: "うみ", romaji: "umi" },
            { icon: "🥳🎈", en: "party", it: "festa", answer: "パーティー", romaji: "pātī" },
            { icon: "🏮✨", en: "festival", it: "festival", answer: "(お)まつり", audio: "まつり", romaji: "matsuri" },
            { icon: "📝📄", en: "examination", it: "esame", answer: "しけん", romaji: "shiken" },
            { icon: "🍲", en: "sukiyaki", it: "sukiyaki", answer: "すきやき", romaji: "sukiyaki" },
            { icon: "🐟🥢", en: "sashimi", it: "sashimi", answer: "さしみ", romaji: "sashimi" },
            { icon: "🍣", en: "sushi", it: "sushi", answer: "(お)すし", audio: "すし", romaji: "sushi" },
            { icon: "🍤", en: "tempura", it: "tempura", answer: "てんぷら", romaji: "tenpura" },
            { icon: "🐷🥩", en: "pork", it: "carne di maiale", answer: "ぶたにく", romaji: "butaniku" },
            { icon: "🐔🥩", en: "chicken", it: "carne di pollo", answer: "とりにく", romaji: "toriniku" },
            { icon: "🐮🥩", en: "beef", it: "carne di manzo", answer: "ぎゅうにく", romaji: "gyūniku" },
            { icon: "🍋", en: "lemon", it: "limone", answer: "レモン", romaji: "remon" },
            { icon: "💐✨", en: "flower arrangement", it: "composizione floreale", answer: "いけばな", romaji: "ikebana" },
            { icon: "🍁", en: "autumn leaves", it: "foglie autunnali", answer: "もみじ", romaji: "momiji" }
        ];

        let currentMode = 'adj';
        let currentIndex = 0;
        let isFlipped = false;

        function switchMode(mode) {
            currentMode = mode; currentIndex = 0; isFlipped = false;
            document.getElementById('practice-card').classList.remove('is-flipped');
            updateView();
            const modes = ['adj', 'season', 'food'];
            modes.forEach(m => {
                const btn = document.getElementById(`mode-${m}`);
                if(m === mode) {
                    btn.className = "flex-1 whitespace-nowrap px-4 py-3 rounded-lg font-bold transition bg-white shadow text-teal-800";
                } else {
                    btn.className = "flex-1 whitespace-nowrap px-4 py-3 rounded-lg font-bold transition text-slate-600";
                }
            });
        }

        function updateView() {
            let list;
            let typeLabel;
            if(currentMode === 'adj') { list = adjList; typeLabel = "Adjectives"; }
            else if(currentMode === 'season') { list = seasonWeatherList; typeLabel = "Seasons & Weather"; }
            else { list = foodPlaceList; typeLabel = "Food & Places"; }
            
            const item = list[currentIndex];
            const promptContent = document.getElementById('prompt-content');
            promptContent.innerHTML = `
                <div class="action-icon mb-2">${item.icon}</div>
                <div class="space-y-4">
                    <div>
                        <div class="text-[10px] text-slate-400 font-bold uppercase mb-1 tracking-widest">English</div>
                        <div class="text-xl text-slate-800 font-medium">${item.en}</div>
                    </div>
                    <div class="flex justify-center"><div class="h-px w-12 bg-slate-100"></div></div>
                    <div>
                        <div class="text-[10px] text-teal-500 font-bold uppercase mb-1 tracking-widest">Italiano</div>
                        <div class="text-xl text-teal-700 font-bold">${item.it}</div>
                    </div>
                </div>
            `;
            document.getElementById('current-index').innerText = currentIndex + 1;
            document.getElementById('total-count').innerText = list.length;
            document.getElementById('answer-text').innerText = item.answer;
            document.getElementById('romaji-text').innerText = item.romaji;
            document.getElementById('en-back').innerText = item.en;
            document.getElementById('it-back').innerText = item.it;
            document.getElementById('type-label').innerText = typeLabel;
        }

        function flipCard() {
            if (isFlipped) return;
            document.getElementById('practice-card').classList.add('is-flipped');
            isFlipped = true;
        }

        function speakJapanese(event) {
            if (event) event.stopPropagation();
            let list;
            if(currentMode === 'adj') list = adjList;
            else if(currentMode === 'season') list = seasonWeatherList;
            else list = foodPlaceList;

            const word = list[currentIndex].audio || list[currentIndex].answer;
            const ut = new SpeechSynthesisUtterance(word);
            ut.lang = 'ja-JP';
            ut.rate = 0.85;
            window.speechSynthesis.speak(ut);
        }

        function nextQuestion() {
            const list = currentMode === 'adj' ? adjList : (currentMode === 'season' ? seasonWeatherList : foodPlaceList);
            isFlipped = false;
            document.getElementById('practice-card').classList.remove('is-flipped');
            setTimeout(() => {
                currentIndex = (currentIndex + 1) % list.length;
                updateView();
            }, 150);
        }

        function prevQuestion() {
            const list = currentMode === 'adj' ? adjList : (currentMode === 'season' ? seasonWeatherList : foodPlaceList);
            isFlipped = false;
            document.getElementById('practice-card').classList.remove('is-flipped');
            setTimeout(() => {
                currentIndex = (currentIndex - 1 + list.length) % list.length;
                updateView();
            }, 150);
        }
        
        window.speechSynthesis.getVoices();
        updateView();
    </script>
</body>
</html>
