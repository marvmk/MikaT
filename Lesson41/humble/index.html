<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Japanese Practice: Lesson 41 Master</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .card-container { perspective: 1000px; }
        .card { transition: transform 0.6s; transform-style: preserve-3d; cursor: pointer; }
        .card.is-flipped { transform: rotateY(180deg); }
        .card-face {
            backface-visibility: hidden; position: absolute;
            width: 100%; height: 100%; display: flex;
            flex-direction: column; align-items: center;
            justify-content: center; border-radius: 1.5rem;
            box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1);
            padding: 2rem;
        }
        .card-back { transform: rotateY(180deg); }
        .item-icon { font-size: 4.5rem; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen font-sans flex flex-col">

    <header class="bg-amber-500 text-white p-6 shadow-md text-center">
        <h1 class="text-2xl font-bold italic">L41: Giving & Receiving</h1>
        <p class="text-sm opacity-90 font-black tracking-widest uppercase">Result Prep System</p>
    </header>

    <main class="flex-grow flex flex-col items-center p-6 max-w-2xl mx-auto w-full">
        <!-- Mode Selector (English Tabs) -->
        <div class="flex space-x-1 mb-8 bg-gray-200 p-1 rounded-xl w-full overflow-x-auto shadow-inner border border-gray-300">
            <button id="mode-give" class="flex-1 whitespace-nowrap px-2 py-3 rounded-lg font-bold transition bg-white shadow-sm text-amber-600 text-xs" onclick="switchMode('give')">
                Giving Actions
            </button>
            <button id="mode-receive" class="flex-1 whitespace-nowrap px-2 py-3 rounded-lg font-bold transition text-gray-600 text-xs" onclick="switchMode('receive')">
                Receiving Actions
            </button>
            <button id="mode-superior" class="flex-1 whitespace-nowrap px-2 py-3 rounded-lg font-bold transition text-gray-600 text-xs" onclick="switchMode('superior')">
                From Superiors
            </button>
        </div>

        <!-- Question Area -->
        <div id="game-view" class="w-full flex flex-col items-center">
            <div id="instruction" class="text-gray-400 mb-6 text-center text-xs font-black uppercase tracking-[0.2em]">
                Translate into Japanese (Focus on the relation)
            </div>

            <!-- Card Container -->
            <div class="card-container w-full h-[480px] relative mb-10">
                <div id="practice-card" class="card w-full h-full relative" onclick="flipCard()">
                    <!-- Front -->
                    <div class="card-face card-front bg-white border-2 border-amber-100 text-center">
                        <div id="prompt-content" class="flex flex-col items-center space-y-6 w-full px-4">
                            <!-- Injected by JS -->
                        </div>
                        <div class="mt-auto text-[10px] text-gray-300 font-bold uppercase tracking-widest">Tap to reveal Japanese</div>
                    </div>
                    <!-- Back -->
                    <div class="card-face card-back bg-amber-50 border-4 border-amber-400 p-8 text-center">
                        <div id="answer-kanji" class="text-3xl font-black text-amber-900 leading-tight mb-4 px-2"></div>
                        <div id="answer-kana" class="text-xl font-bold text-amber-500 mb-8"></div>
                        
                        <!-- Manual Audio Button -->
                        <button onclick="event.stopPropagation(); speakJapanese();" class="w-16 h-16 bg-white border-2 border-amber-200 rounded-full flex items-center justify-center shadow-md active:scale-90 transition-transform mb-6 group">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-amber-500 group-hover:text-amber-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z" />
                            </svg>
                        </button>

                        <div id="answer-it" class="text-base text-amber-700 italic font-medium px-4"></div>
                        <div class="mt-auto text-[10px] text-amber-300 font-bold uppercase">Tap for next question</div>
                    </div>
                </div>
            </div>

            <!-- Navigation -->
            <div class="flex justify-between w-full items-center px-2">
                <button onclick="prevQuestion()" class="w-14 h-14 flex items-center justify-center border-2 border-gray-200 rounded-full text-gray-400 bg-white hover:bg-gray-50 transition shadow-sm text-xl font-bold">←</button>
                <div class="flex flex-col items-center">
                    <div class="text-gray-400 font-black text-lg">
                        <span id="current-index" class="text-amber-600 font-black">1</span> 
                        <span class="text-gray-200">/</span> 
                        <span id="total-count">17</span>
                    </div>
                </div>
                <button onclick="nextQuestion()" class="px-10 py-4 bg-amber-500 rounded-full text-white font-black hover:bg-amber-600 transition shadow-lg tracking-widest uppercase text-sm">Next</button>
            </div>
        </div>

        <!-- Finished View -->
        <div id="finished-view" class="hidden w-full flex flex-col items-center justify-center p-12 bg-white rounded-[3rem] shadow-2xl border-4 border-amber-100 text-center">
            <div class="text-7xl mb-8">Finished‼️</div>
            <p class="text-gray-500 font-black uppercase tracking-[0.3em] mb-4 text-sm">Pratica completata!</p>
            <p class="text-lg text-amber-600 font-bold mb-10 italic text-center">Lesson 41 Mastery Complete.</p>
            <button onclick="location.reload()" class="w-full py-5 bg-amber-500 text-white rounded-2xl font-black shadow-xl active:scale-95 transition-all text-xl tracking-widest uppercase">
                Restart
            </button>
        </div>
    </main>

    <footer class="py-8 text-center text-gray-300 text-[10px] font-black tracking-widest uppercase">
        Result Prep System &bull; Mika Tomao
    </footer>

    <script>
        // Mode 1: Giving Actions (~te agemasu/yarimasu/sashiagemasu)
        const giveData = [
            { icon: "🧒🤝", en: "I played with the neighbor's children.", it: "Ho giocato con i bambini del vicino.", kanji: "隣の子どもと遊んであげました。", kana: "となりのこどもと あそんで あげました。" },
            { icon: "🧒🚲", en: "I repaired my younger brother's bike.", it: "Ho riparato la bici a mio fratello minore.", kanji: "弟の自転車を直してやりました。", kana: "おとうとのじてんしゃを なおして やりました。" },
            { icon: "🌻💧", en: "I watered the flowers.", it: "Ho dato l'acqua ai fiori.", kanji: "花に水をやってやりました。", kana: "はなにみずを やって やりました。" },
            { icon: "🐕🚶", en: "I took the dog for a walk.", it: "Ho portato il cane a passeggio.", kanji: "犬を散歩に連れていってやりました。", kana: "いぬを さんぽに つれていって やりました。" },
            { icon: "👨‍🏫行李", en: "I carried the teacher's luggage.", it: "Ho portato i bagagli al professore (polite).", kanji: "先生の荷物を持って差し上げました。", kana: "せんせいのにもつを もって さしあげました。" },
            { icon: "🤝🗺️", en: "I drew a map for my friend.", it: "Ho disegnato una mappa per il mio amico.", kanji: "友達に地図を書いてあげました。", kana: "ともだちにちずを かいて あげました。" },
            { icon: "🧒🍦", en: "I bought ice cream for the child.", it: "Ho comprato un gelato al bambino.", kanji: "子どもにアイスクリームを買ってやりました。", kana: "こどもに あいすくりーむを かって やりました。" },
            { icon: "👵🛒", en: "I helped my grandmother with shopping.", it: "Ho aiutato mia nonna con la spesa.", kanji: "祖母の買い物を手伝ってあげました。", kana: "そぼのかいものを てつだって あげました。" },
            { icon: "🧒📖", en: "I read a book to the child.", it: "Ho letto un libro al bambino.", kanji: "子どもに本を読んでやりました。", kana: "こどもにほんを よんで やりました。" },
            { icon: "🤝🚗", en: "I drove my friend to the station.", it: "Ho portato il mio amico in stazione.", kanji: "友達を駅まで送ってあげました。", kana: "ともだちをえきまで おくって あげました。" },
            { icon: "🤝🇯🇵", en: "I taught Japanese to my friend.", it: "Ho insegnato il giapponese al mio amico.", kanji: "友達に日本語を教えてあげました。", kana: "ともだちににほんごを おしえて あげました。" },
            { icon: "🐈💤", en: "I made a bed for the cat.", it: "Ho preparato un letto per il gatto.", kanji: "猫にベッドを作ってやりました。", kana: "ねこにべっどを つくって やりました。" },
            { icon: "👨‍💼☕", en: "I made coffee for the boss.", it: "Ho preparato il caffè per il capo (polite).", kanji: "部長にコーヒーをいれて差し上げました。", kana: "ぶちょうにこーひーを いれて さしあげました。" },
            { icon: "🧒🪁", en: "I made a kite for the child.", it: "Ho costruito un aquilone per il bambino.", kanji: "子どもにたこを作ってやりました。", kana: "こどもにたこを つくって やりました。" },
            { icon: "🤝🛠️", en: "I repaired the computer for my friend.", it: "Ho riparato il computer al mio amico.", kanji: "友達にパソコンを直してあげました。", kana: "ともだちにぱそこんを なおして あげました。" },
            { icon: "🤝🏙️", en: "I showed my friend around the city.", it: "Ho fatto vedere la città al mio amico.", kanji: "友達に町を案内してあげました。", kana: "ともだちにまちを あんないして あげました。" },
            { icon: "🐕🚿", en: "I washed the dog.", it: "Ho lavato il cane.", kanji: "犬を洗ってやりました。", kana: "いぬを あらって やりました。" }
        ];

        // Mode 2: Receiving Actions (~te moraimasu/itadakimasu)
        const receiveData = [
            { icon: "👨‍🏫📖", en: "I had the teacher lend me a book.", it: "Mi sono fatto prestare un libro dal professore (polite).", kanji: "先生に本を貸していただきました。", kana: "せんせいにほんを かして いただきました。" },
            { icon: "👨‍💼📄", en: "I had the boss check my report.", it: "Mi sono fatto controllare il rapporto dal capo (polite).", kanji: "課長にレポートを見ていただきました。", kana: "かちょうにれぽーとを みて いただきました。" },
            { icon: "🤝🗺️", en: "I had my friend draw a map.", it: "Mi sono fatto disegnare una mappa dal mio amico.", kanji: "友達に地図を書いてもらいました。", kana: "ともだちにちずを かいて もらいました。" },
            { icon: "👩‍🍳🍱", en: "I had my wife make lunch.", it: "Mi sono fatto preparare il pranzo da mia moglie.", kanji: "妻に昼ご飯を作ってもらいました。", kana: "つまにひるごはんを つくってもらいました。" },
            { icon: "👨‍💼📸", en: "I had the boss take a photo.", it: "Mi sono fatto scattare una foto dal capo (polite).", kanji: "部長に写真を撮っていただきました。", kana: "ぶちょうにしゃしんを とって いただきました。" },
            { icon: "🤝🛠️", en: "I had my friend repair my bike.", it: "Mi sono fatto riparare la bici dal mio amico.", kanji: "友達に自転車を直してもらいました。", kana: "ともだちにじてんしゃを なおして もらいました。" },
            { icon: "👨‍⚕️💊", en: "I had the doctor examine me.", it: "Mi sono fatto visitare dal dottore (polite).", kanji: "先生に診ていただきました。", kana: "せんせいにみて いただきました。" },
            { icon: "🤝🚗", en: "I had my friend drive me home.", it: "Mi sono fatto accompagnare a casa dal mio amico.", kanji: "友達に送ってもらいました。", kana: "ともだちに おくってもらいました。" },
            { icon: "👨‍🏫🇯🇵", en: "I had the teacher teach me Kanji.", it: "Mi sono fatto insegnare i Kanji dal professore (polite).", kanji: "先生に漢字を教えていただきました。", kana: "せんせいにかんじを おしえて いただきました。" },
            { icon: "🤝🛒", en: "I had my friend help with shopping.", it: "Mi sono fatto aiutare con la spesa dal mio amico.", kanji: "友達に買い物を手伝ってもらいました。", kana: "ともだちにかいものを てつだってもらいました。" },
            { icon: "👨‍💼💼", en: "I had the boss carry my luggage.", it: "Mi sono fatto portare i bagagli dal capo (polite).", kanji: "課長に荷物を持っていただきました。", kana: "かちょうににもつを もって いただきました。" },
            { icon: "🤝🍜", en: "I had my friend cook ramen.", it: "Mi sono fatto cucinare il ramen dal mio amico.", kanji: "友達にラーメンを作ってもらいました。", kana: "ともだちにらーめんを つくってもらいました。" },
            { icon: "👨‍🏫💬", en: "I had the teacher explain it again.", it: "Mi sono fatto spiegare di nuovo dal professore (polite).", kanji: "先生に説明していただきました。", kana: "せんせいにせつめいして いただきました。" },
            { icon: "🤝🔍", en: "I had my friend look for the key.", it: "Mi sono fatto cercare la chiave dal mio amico.", kanji: "友達に鍵を探してもらいました。", kana: "ともだちにかぎを さがしてもらいました。" },
            { icon: "👨‍💼📧", en: "I had the boss write an email.", it: "Mi sono fatto scrivere una mail dal capo (polite).", kanji: "部長にメールを書いていただきました。", kana: "ぶちょうにめーるを かいて いただきました。" },
            { icon: "🤝☕", en: "I had my friend make coffee.", it: "Mi sono fatto preparare il caffè dal mio amico.", kanji: "友達にコーヒーをいれてもらいました。", kana: "ともだちにこーひーを いれて もらいました。" },
            { icon: "👨‍🏫🗺️", en: "I had the teacher explain the way.", it: "Mi sono fatto spiegare la strada dal professore (polite).", kanji: "先生に道を教えていただきました。", kana: "せんせいにみちを おしえて いただきました。" }
        ];

        // Mode 3: From Superior (~te kudasaimasu)
        const superiorData = [
            { icon: "👨‍💼🌂", en: "The section manager lent me an umbrella.", it: "Il capo mi ha prestato un ombrello (gentile).", kanji: "課長が傘を貸してくださいました。", kana: "かちょうが かさを かして くださいました。" },
            { icon: "🍵✨", en: "The manager's wife taught me tea ceremony.", it: "La moglie del capo mi ha insegnato la cerimonia del tè.", kanji: "課長の奥様がお茶を教えてくださいました。", kana: "かちょうのおくさまが おちゃを おしえて くださいました。" },
            { icon: "👨‍💼🏥", en: "The manager took me to the hospital.", it: "Il manager mi ha portato in ospedale (gentile).", kanji: "部長が病院へ連れていってくださいました。", kana: "ぶちょうが びょういんへ つれていって くださいました。" },
            { icon: "👔🎁", en: "The president gave me a tie.", it: "Il presidente mi ha regalato una cravatta (gentile).", kanji: "社長がネクタイをくださいました。", kana: "しゃちょうが ねくたいを くださいました。" },
            { icon: "👨‍🏫📖", en: "The teacher read my essay.", it: "Il professore ha letto il mio tema (gentile).", kanji: "先生が私の作文を読んでくださいました。", kana: "せんせいが わたしの さくぶんを よんで くださいました。" },
            { icon: "👨‍💼🚗", en: "The boss drove me to the station.", it: "Il capo mi ha accompagnato in stazione (gentile).", kanji: "部長が駅まで送ってくださいました。", kana: "ぶちょうが えきまで おくって くださいました。" },
            { icon: "👨‍🏫📸", en: "The teacher took a photo for me.", it: "Il professore mi ha scattato una foto (gentile).", kanji: "先生が写真を撮ってくださいました。", kana: "せんせいが しゃしんを とって くださいました。" },
            { icon: "👨‍💼🍱", en: "The manager treated me to lunch.", it: "Il manager mi ha offerto il pranzo (gentile).", kanji: "部長が昼ご飯をごちそうしてくださいました。", kana: "ぶちょうが ひるごはんを ごちそうして くださいました。" },
            { icon: "👵🍰", en: "Grandmother made a cake for me.", it: "La nonna ha preparato una torta per me (gentile).", kanji: "祖母がケーキを作ってくださいました。", kana: "そぼが けーきを つくって くださいました。" },
            { icon: "👨‍💼💬", en: "The boss explained the plan.", it: "Il capo mi ha spiegato il piano (gentile).", kanji: "部長が計画を説明してくださいました。", kana: "ぶちょうが けいかくを せつめいして くださいました。" },
            { icon: "👨‍🏫🔍", en: "The teacher found my lost item.", it: "Il professore ha trovato il mio oggetto smarrito.", kanji: "先生が忘れ物を見つけてくださいました。", kana: "せんせいが わすれものを みつけて くださいました。" },
            { icon: "👨‍💼☕", en: "The manager made coffee for me.", it: "Il manager mi ha preparato il caffè (gentile).", kanji: "課長がコーヒーをいれてくださいました。", kana: "かちょうが こーひーを いれて くださいました。" },
            { icon: "👨‍🏫🗾", en: "The teacher guided me through Kyoto.", it: "Il professore mi ha fatto da guida a Kyoto.", kanji: "先生が京都を案内してくださいました。", kana: "せんせいが きょうとを あんないして くださいました。" },
            { icon: "👨‍💼📩", en: "The boss sent me an email.", it: "Il capo mi ha mandato una mail (gentile).", kanji: "部長がメールを送ってくださいました。", kana: "ぶちょうが めーるを おくって くださいました。" },
            { icon: "👨‍🏫🛠️", en: "The teacher repaired my computer.", it: "Il professore mi ha riparato il computer.", kanji: "先生がパソコンを直してくださいました。", kana: "せんせいが ぱそこんを なおして くださいました。" },
            { icon: "👨‍💼🤝", en: "The manager introduced me to the client.", it: "Il manager mi ha presentato al cliente.", kanji: "部長がお客さんを紹介してくださいました。", kana: "ぶちょうが おきゃくさんを しょうかいして くださいました。" },
            { icon: "👨‍🏫🎁", en: "The teacher gave me a gift.", it: "Il professore mi ha fatto un regalo (gentile).", kanji: "先生がお祝いをくださいました。", kana: "せんせいが おいわいを くださいました。" }
        ];

        let currentMode = 'give';
        let currentIndex = 0;
        let isFlipped = false;

        function switchMode(mode) {
            currentMode = mode;
            currentIndex = 0;
            isFlipped = false;
            document.getElementById('practice-card').classList.remove('is-flipped');
            document.getElementById('game-view').classList.remove('hidden');
            document.getElementById('finished-view').classList.add('hidden');
            
            const modes = ['give', 'receive', 'superior'];
            modes.forEach(m => {
                const btn = document.getElementById(`mode-${m}`);
                if(m === mode) {
                    btn.classList.add('bg-white', 'shadow-sm', 'text-amber-600');
                    btn.classList.remove('text-gray-600');
                } else {
                    btn.classList.remove('bg-white', 'shadow-sm', 'text-amber-600');
                    btn.classList.add('text-gray-600');
                }
            });

            const instr = document.getElementById('instruction');
            if(mode === 'give') instr.innerText = "Giving Actions: ~te agemasu / yarimasu";
            else if(mode === 'receive') instr.innerText = "Receiving Actions: ~te moraimasu / itadakimasu";
            else instr.innerText = "From Superior: ~te kudasaimasu (Superior to me)";
            
            updateView();
        }

        function updateView() {
            const data = { give: giveData, receive: receiveData, superior: superiorData };
            const questions = data[currentMode];
            const q = questions[currentIndex];
            const promptContent = document.getElementById('prompt-content');
            
            document.getElementById('current-index').innerText = currentIndex + 1;
            document.getElementById('total-count').innerText = questions.length;
            
            document.getElementById('answer-kanji').innerText = q.kanji;
            document.getElementById('answer-kana').innerText = q.kana;
            document.getElementById('answer-it').innerText = q.it;

            promptContent.innerHTML = `
                <div class="item-icon mb-4">${q.icon}</div>
                <div class="text-center px-6">
                    <div class="text-gray-400 text-[10px] font-black uppercase tracking-[0.2em] mb-4">Target Meaning / Situation</div>
                    <div class="text-3xl font-black text-gray-800 leading-tight italic px-4">${q.en}</div>
                </div>
            `;
        }

        function flipCard() {
            const card = document.getElementById('practice-card');
            if (!isFlipped) {
                card.classList.add('is-flipped');
                isFlipped = true;
            } else {
                nextQuestion();
            }
        }

        function speakJapanese() {
            const data = { give: giveData, receive: receiveData, superior: superiorData };
            const text = data[currentMode][currentIndex].kana;
            const ut = new SpeechSynthesisUtterance(text);
            ut.lang = 'ja-JP';
            ut.rate = 0.95;
            window.speechSynthesis.speak(ut);
        }

        function nextQuestion() {
            const data = { give: giveData, receive: receiveData, superior: superiorData };
            const questions = data[currentMode];
            
            if (isFlipped && currentIndex === questions.length - 1) {
                document.getElementById('game-view').classList.add('hidden');
                document.getElementById('finished-view').classList.remove('hidden');
                return;
            }

            isFlipped = false;
            document.getElementById('practice-card').classList.remove('is-flipped');
            setTimeout(() => {
                currentIndex = (currentIndex + 1) % questions.length;
                updateView();
            }, 150);
        }

        function prevQuestion() {
            const data = { give: giveData, receive: receiveData, superior: superiorData };
            const questions = data[currentMode];
            isFlipped = false;
            document.getElementById('practice-card').classList.remove('is-flipped');
            setTimeout(() => {
                currentIndex = (currentIndex - 1 + questions.length) % questions.length;
                updateView();
            }, 150);
        }

        updateView();
    </script>
</body>
</html>
