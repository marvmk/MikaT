<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>L25: ~tara & ~temo Sentence Trainer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .card-container { perspective: 1000px; }
        .card { transition: transform 0.6s; transform-style: preserve-3d; cursor: pointer; }
        .card.is-flipped { transform: rotateY(180deg); }
        .card-face {
            backface-visibility: hidden; position: absolute;
            width: 100%; height: 100%; display: flex;
            flex-direction: column; align-items: center;
            justify-content: center; border-radius: 1.5rem;
            box-shadow: 0 10px 25px -5px rgb(0 0 0 / 0.1);
            padding: 2rem;
        }
        .card-back { transform: rotateY(180deg); }
        .emoji-icon { font-size: 5rem; margin-bottom: 1rem; }
        
        .speaker-btn {
            background: #10b981;
            color: white;
            width: 70px;
            height: 70px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 14px 0 rgba(16, 185, 129, 0.4);
            transition: all 0.2s ease;
            margin: 1.5rem 0;
        }
        .speaker-btn:active { transform: scale(0.9); background: #059669; }
        .speaker-btn svg { width: 35px; height: 35px; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen font-sans flex flex-col text-slate-800">

    <header class="bg-emerald-800 text-white p-4 shadow-lg text-center">
        <h1 class="text-xl font-bold">L25 Sentence Trainer 🔊</h1>
        <p class="text-xs opacity-80 uppercase tracking-widest">Conditional (~tara) & Concessive (~temo)</p>
    </header>

    <main class="flex-grow flex flex-col items-center p-6 max-w-2xl mx-auto w-full">
        <!-- Mode Selector -->
        <div class="flex space-x-1 mb-6 bg-slate-200 p-1 rounded-xl w-full">
            <button id="mode-tara" class="flex-1 py-3 rounded-lg font-bold transition bg-white shadow text-emerald-800" onclick="switchMode('tara')">
                ~tara (If)
            </button>
            <button id="mode-temo" class="flex-1 py-3 rounded-lg font-bold transition text-slate-600" onclick="switchMode('temo')">
                ~temo (Even if)
            </button>
        </div>

        <!-- Question Area -->
        <div id="game-view" class="w-full flex flex-col items-center">
            <!-- Card Container -->
            <div class="card-container w-full h-[520px] relative mb-8">
                <div id="practice-card" class="card w-full h-full relative">
                    
                    <!-- Front Side -->
                    <div class="card-face card-front bg-white border-2 border-emerald-50 text-center" onclick="flipCard()">
                        <div id="prompt-content" class="flex flex-col items-center w-full">
                            <!-- Injected by JS -->
                        </div>
                        <div class="mt-auto text-[10px] text-slate-300 font-bold uppercase tracking-widest">
                            Tap for Answer / Tocca per la risposta
                        </div>
                    </div>

                    <!-- Back Side -->
                    <div class="card-face card-back bg-emerald-50 border-4 border-emerald-600 text-center">
                        <div id="grammar-label" class="text-[10px] text-emerald-600 font-black uppercase tracking-[0.2em] mb-4">Grammar Point</div>
                        
                        <div id="answer-text" class="text-3xl font-black text-emerald-950 mb-2 leading-tight px-2"></div>
                        <div id="romaji-text" class="text-lg font-bold text-emerald-600 font-mono mb-4"></div>
                        
                        <button onclick="speakJapanese(event)" class="speaker-btn">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z" />
                            </svg>
                        </button>
                        
                        <div class="w-16 h-px bg-emerald-200 mb-6"></div>
                        
                        <div class="space-y-1 px-4">
                            <div id="it-back" class="text-emerald-800 font-bold"></div>
                            <div id="en-back" class="text-slate-500 italic text-sm"></div>
                        </div>

                        <div class="mt-auto text-[10px] text-emerald-400 font-bold uppercase cursor-pointer" onclick="nextQuestion()">
                            Next / Prossimo →
                        </div>
                    </div>
                </div>
            </div>

            <!-- Navigation Controls -->
            <div class="flex justify-between w-full items-center px-4">
                <button onclick="prevQuestion()" class="w-12 h-12 flex items-center justify-center rounded-full border-2 border-slate-300 text-slate-400 bg-white shadow-sm">←</button>
                <div class="text-slate-400 font-black text-lg">
                    <span id="current-index" class="text-emerald-700">1</span> / <span id="total-count">0</span>
                </div>
                <button onclick="nextQuestion()" class="w-12 h-12 flex items-center justify-center rounded-full bg-emerald-600 text-white shadow-lg">→</button>
            </div>
        </div>
    </main>

    <script>
        const taraQuestions = [
            { 
                icon: "☔🚫", 
                prompt: "If it rains, I won't go out.", 
                answer: "あめが ふったら、でかけません。", 
                romaji: "Ame ga futtara, dekakemasen.", 
                en: "If it rains, I won't go out.", 
                it: "Se piove, non esco." 
            },
            { 
                icon: "💰 ryokō", 
                prompt: "If I have money, I want to travel.", 
                answer: "おかねが あったら、りょこうしたいです。", 
                romaji: "Okane ga attara, ryokō shitai desu.", 
                en: "If I have money, I want to travel.", 
                it: "Se avessi i soldi, vorrei viaggiare." 
            },
            { 
                icon: "🏠🛀", 
                prompt: "When I get home, I'll take a bath.", 
                answer: "うちに かえったら、おふろに はいります。", 
                romaji: "Uchi e kaettara, ofuro ni hairimasu.", 
                en: "When I get home, I'll take a bath.", 
                it: "Quando torno a casa, faccio il bagno." 
            },
            { 
                icon: "🏷️🛒", 
                prompt: "If it's cheap, I'll buy it.", 
                answer: "やすかったら、かいます。", 
                romaji: "Yasukattara, kaimasu.", 
                en: "If it's cheap, I will buy it.", 
                it: "Se è economico, lo compro." 
            },
            { 
                icon: "👨‍💻🤝", 
                prompt: "If you are free, please help me.", 
                answer: "ひまだったら、てつだって ください。", 
                romaji: "Hima dattara, tetsudatte kudasai.", 
                en: "If you are free, please help me.", 
                it: "Se sei libero, aiutami per favore." 
            },
            { 
                icon: "☀️🏙️", 
                prompt: "If the weather is good, let's go for a walk.", 
                answer: "いいてんきだったら、さんぽに いきましょう。", 
                romaji: "Ii tenki dattara, sanpo ni ikimashō.", 
                en: "If the weather is good, let's go for a walk.", 
                it: "Se fa bel tempo, andiamo a fare una passeggiata." 
            }
        ];

        const temoQuestions = [
            { 
                icon: "☔🏃", 
                prompt: "Even if it rains, I'll go out.", 
                answer: "あめが ふっても、でかけます。", 
                romaji: "Ame ga futtemo, dekakemasu.", 
                en: "Even if it rains, I'll go out.", 
                it: "Anche se piove, esco." 
            },
            { 
                icon: "💰🚫 ryokō", 
                prompt: "Even if I have money, I won't travel.", 
                answer: "おかねが あっても、りょこうしません。", 
                romaji: "Okane ga attemo, ryokō shimasen.", 
                en: "Even if I have money, I won't travel.", 
                it: "Anche se avessi i soldi, non viaggerei." 
            },
            { 
                icon: "🏷️💰❌", 
                prompt: "Even if it's expensive, I'll buy it.", 
                answer: "たかくても、かいます。", 
                romaji: "Takakutemo, kaimasu.", 
                en: "Even if it's expensive, I'll buy it.", 
                it: "Anche se è costoso, lo compro." 
            },
            { 
                icon: "👨‍💻📖", 
                prompt: "Even if I'm busy, I study Japanese.", 
                answer: "いそがしくても、にほんごを べんきょうします。", 
                romaji: "Isogashikutemo, nihongo o benkyō shimasu.", 
                en: "Even if I'm busy, I study Japanese.", 
                it: "Anche se sono occupato, studio giapponese." 
            },
            { 
                icon: "🏢🚫", 
                prompt: "Even if I'm not well, I go to work.", 
                answer: "げんきじゃなくても、しごとに いきます。", 
                romaji: "Genki janakutemo, shigoto ni ikimasu.", 
                en: "Even if I'm not well, I go to work.", 
                it: "Anche se non sto bene, vado al lavoro." 
            },
            { 
                icon: "🗓️🏢", 
                prompt: "Even if it's a holiday, I work.", 
                answer: "やすみでも、はたらきます。", 
                romaji: "Yasumi demo, hatarakimasu.", 
                en: "Even if it's a holiday, I work.", 
                it: "Anche se è festa, lavoro." 
            }
        ];

        let currentMode = 'tara';
        let currentIndex = 0;
        let isFlipped = false;

        function switchMode(mode) {
            currentMode = mode;
            currentIndex = 0;
            isFlipped = false;
            document.getElementById('practice-card').classList.remove('is-flipped');
            
            document.getElementById('mode-tara').className = "flex-1 py-3 rounded-lg font-bold transition text-slate-600";
            document.getElementById('mode-temo').className = "flex-1 py-3 rounded-lg font-bold transition text-slate-600";
            
            const activeBtn = document.getElementById(`mode-${mode}`);
            activeBtn.className = "flex-1 py-3 rounded-lg font-bold transition bg-white shadow text-emerald-800";

            updateView();
        }

        function updateView() {
            const questions = currentMode === 'tara' ? taraQuestions : temoQuestions;
            const label = currentMode === 'tara' ? "〜たら (Conditional)" : "〜ても (Concessive)";
            const q = questions[currentIndex];
            const promptContent = document.getElementById('prompt-content');
            
            promptContent.innerHTML = `
                <div class="emoji-icon">${q.icon}</div>
                <div class="text-slate-400 text-[10px] uppercase tracking-widest mb-2 font-bold">Context / Hint</div>
                <div class="text-2xl font-black text-slate-800 mb-6 leading-tight px-4">${q.prompt}</div>
                <div class="flex flex-col items-center space-y-2 border-t border-slate-100 pt-6 w-full px-4">
                    <div class="text-sm text-emerald-600 font-bold uppercase tracking-wide">${q.it}</div>
                    <div class="text-sm text-slate-400 italic font-medium">${q.en}</div>
                </div>
            `;

            document.getElementById('current-index').innerText = currentIndex + 1;
            document.getElementById('total-count').innerText = questions.length;
            document.getElementById('answer-text').innerText = q.answer;
            document.getElementById('romaji-text').innerText = q.romaji;
            document.getElementById('it-back').innerText = q.it;
            document.getElementById('en-back').innerText = q.en;
            document.getElementById('grammar-label').innerText = label;
        }

        function flipCard() {
            if (isFlipped) return;
            document.getElementById('practice-card').classList.add('is-flipped');
            isFlipped = true;
        }

        function speakJapanese(event) {
            if (event) event.stopPropagation();
            const questions = currentMode === 'tara' ? taraQuestions : temoQuestions;
            const fullText = questions[currentIndex].answer;
            
            // Clean prefix A/B if present
            const speechText = fullText.replace(/^[A-Z][：:]\s*/, '');
            
            const ut = new SpeechSynthesisUtterance(speechText);
            ut.lang = 'ja-JP';
            ut.rate = 0.85;
            
            const voices = window.speechSynthesis.getVoices();
            const jaVoice = voices.find(v => v.lang.startsWith('ja'));
            if (jaVoice) ut.voice = jaVoice;

            window.speechSynthesis.speak(ut);
        }

        function nextQuestion() {
            const questions = currentMode === 'tara' ? taraQuestions : temoQuestions;
            isFlipped = false;
            document.getElementById('practice-card').classList.remove('is-flipped');
            setTimeout(() => {
                currentIndex = (currentIndex + 1) % questions.length;
                updateView();
            }, 150);
        }

        function prevQuestion() {
            const questions = currentMode === 'tara' ? taraQuestions : temoQuestions;
            isFlipped = false;
            document.getElementById('practice-card').classList.remove('is-flipped');
            setTimeout(() => {
                currentIndex = (currentIndex - 1 + questions.length) % questions.length;
                updateView();
            }, 150);
        }

        window.speechSynthesis.getVoices();
        updateView();
    </script>
</body>
</html>
