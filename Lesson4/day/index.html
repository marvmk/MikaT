<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>L4: Time & Daily Routine Trainer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .card-container { perspective: 1000px; }
        .card { transition: transform 0.6s; transform-style: preserve-3d; cursor: pointer; }
        .card.is-flipped { transform: rotateY(180deg); }
        .card-face {
            backface-visibility: hidden; position: absolute;
            width: 100%; height: 100%; display: flex;
            flex-direction: column; align-items: center;
            justify-content: center; border-radius: 1.5rem;
            box-shadow: 0 10px 25px -5px rgb(0 0 0 / 0.1);
            padding: 2rem;
        }
        .card-back { transform: rotateY(180deg); }
        .emoji-icon { font-size: 5rem; margin-bottom: 1rem; }
        
        .speaker-btn {
            background: #f59e0b;
            color: white;
            width: 70px;
            height: 70px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 14px 0 rgba(245, 158, 11, 0.4);
            transition: all 0.2s ease;
            margin: 1.5rem 0;
        }
        .speaker-btn:active { transform: scale(0.9); background: #d97706; }
        .speaker-btn svg { width: 35px; height: 35px; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen font-sans flex flex-col text-slate-800">

    <header class="bg-amber-700 text-white p-4 shadow-lg text-center">
        <h1 class="text-xl font-bold">L4 Sentence Trainer 🔊</h1>
        <p class="text-xs opacity-80 uppercase tracking-widest">Time • Days • Routine • Past Tense</p>
    </header>

    <main class="flex-grow flex flex-col items-center p-6 max-w-2xl mx-auto w-full">
        <!-- モード選択 -->
        <div class="flex space-x-1 mb-6 bg-slate-200 p-1 rounded-xl w-full overflow-x-auto shadow-inner">
            <button id="mode-time" class="flex-1 whitespace-nowrap px-3 py-3 rounded-lg font-bold transition bg-white shadow text-amber-800 text-[10px]" onclick="switchMode('time')">
                TIME & DAYS
            </button>
            <button id="mode-habit" class="flex-1 whitespace-nowrap px-3 py-3 rounded-lg font-bold transition text-slate-600 text-[10px]" onclick="switchMode('habit')">
                ROUTINE (~MASU)
            </button>
            <button id="mode-past" class="flex-1 whitespace-nowrap px-3 py-3 rounded-lg font-bold transition text-slate-600 text-[10px]" onclick="switchMode('past')">
                PAST (~MASHITA)
            </button>
            <button id="mode-duration" class="flex-1 whitespace-nowrap px-3 py-3 rounded-lg font-bold transition text-slate-600 text-[10px]" onclick="switchMode('duration')">
                KARA / MADE
            </button>
        </div>

        <!-- 練習エリア -->
        <div id="game-view" class="w-full flex flex-col items-center">
            <div class="card-container w-full h-[540px] relative mb-8">
                <div id="practice-card" class="card w-full h-full relative">
                    
                    <!-- 表面 (問題) -->
                    <div class="card-face card-front bg-white border-2 border-amber-50 text-center" onclick="flipCard()">
                        <div id="prompt-content" class="flex flex-col items-center w-full">
                            <!-- JSで注入 -->
                        </div>
                        <div class="mt-auto text-[10px] text-slate-300 font-bold uppercase tracking-widest">
                            Tap for Answer / Tocca per la risposta
                        </div>
                    </div>

                    <!-- 裏面 (解答) -->
                    <div class="card-face card-back bg-amber-50 border-4 border-amber-600 text-center">
                        <div id="grammar-label" class="text-[10px] text-amber-600 font-black uppercase tracking-[0.2em] mb-4">Grammar Point</div>
                        
                        <div id="answer-text" class="text-2xl font-black text-amber-950 mb-2 leading-tight px-2"></div>
                        <div id="romaji-text" class="text-sm font-bold text-amber-500 font-mono mb-4 italic"></div>
                        
                        <button onclick="speakJapanese(event)" class="speaker-btn">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z" />
                            </svg>
                        </button>
                        
                        <div class="w-16 h-px bg-amber-200 mb-6 mx-auto"></div>
                        
                        <div class="space-y-1 px-4">
                            <div id="it-back" class="text-amber-800 font-bold text-sm"></div>
                            <div id="en-back" class="text-slate-500 italic text-xs"></div>
                        </div>

                        <div class="mt-auto text-[10px] text-amber-400 font-bold uppercase cursor-pointer" onclick="nextQuestion()">
                            Next / Prossimo →
                        </div>
                    </div>
                </div>
            </div>

            <!-- コントロール -->
            <div class="flex justify-between w-full items-center px-4">
                <button onclick="prevQuestion()" class="w-12 h-12 flex items-center justify-center rounded-full border-2 border-slate-300 text-slate-400 bg-white shadow-sm">←</button>
                <div class="text-slate-400 font-black text-lg">
                    <span id="current-index" class="text-amber-700">1</span> / <span id="total-count">0</span>
                </div>
                <button onclick="nextQuestion()" class="w-12 h-12 flex items-center justify-center rounded-full bg-amber-700 text-white shadow-lg">→</button>
            </div>
        </div>
    </main>

    <script>
        // 時刻と曜日の練習データ
        const timeData = [
            { 
                icon: "⏰ 9:15", 
                prompt: "What time is it now? - It's 9:15.", 
                answer: "いま なんじですか。 9じ 15ふんです。", 
                romaji: "Ima nan-ji desu ka. Ku-ji jūgo-fun desu.", 
                en: "What time is it now? It's 9:15.", 
                it: "Che ore sono adesso? Sono le 9:15." 
            },
            { 
                icon: "📅 FRIDAY", 
                prompt: "What day is it today? - It's Friday.", 
                answer: "きょうは なんようびですか。 きんようびです。", 
                romaji: "Kyō wa nan-yōbi desu ka. Kin-yōbi desu.", 
                en: "What day is today? It's Friday.", 
                it: "Che giorno è oggi? È venerdì." 
            },
            { 
                icon: "⏰ 🇮🇹 4:00 AM", 
                prompt: "In Italy, it is 4:00 AM.", 
                answer: "イタリアは ごぜん 4じです。", 
                romaji: "Itaria wa gozen yo-ji desu.", 
                en: "In Italy, it is 4:00 AM.", 
                it: "In Italia sono le 4 del mattino." 
            },
            { 
                icon: "⏰ 7:30", 
                prompt: "It is 7:30.", 
                answer: "7じ はんです。", 
                romaji: "Shichi-ji han desu.", 
                en: "It is 7:30 (half past seven).", 
                it: "Sono le sette e mezza." 
            }
        ];

        // 毎日の習慣 (~ます)
        const habitData = [
            { 
                icon: "☀️🛌 6:00", 
                prompt: "I get up at 6:00 every morning.", 
                answer: "まいにち 6じに おきます。", 
                romaji: "Mainichi roku-ji ni okimasu.", 
                en: "I wake up at 6 o'clock every day.", 
                it: "Mi alzo alle sei ogni giorno." 
            },
            { 
                icon: "🌙🛌 11:00", 
                prompt: "I go to bed at 11:00.", 
                answer: "11じに ねます。", 
                romaji: "Jūichi-ji ni nemasu.", 
                en: "I go to sleep at 11 o'clock.", 
                it: "Vado a dormire alle undici." 
            },
            { 
                icon: "📝🏫 Night", 
                prompt: "I study at night.", 
                answer: "ばんに べんきょうします。", 
                romaji: "Ban ni benkyō-shimasu.", 
                en: "I study in the evening.", 
                it: "Studio di sera." 
            },
            { 
                icon: "☕️🛌 Sunday", 
                prompt: "I rest on Sundays.", 
                answer: "にちようびに やすみます。", 
                romaji: "Nichiyōbi ni yasumimasu.", 
                en: "I rest on Sundays.", 
                it: "Riposo la domenica." 
            }
        ];

        // 過去の動作 (~ました)
        const pastData = [
            { 
                icon: "🏢✅ Yesterday", 
                prompt: "I worked yesterday.", 
                answer: "きのう はたらきました。", 
                romaji: "Kinō hatarakimashita.", 
                en: "I worked yesterday.", 
                it: "Ieri ho lavorato." 
            },
            { 
                icon: "📝❌ Yesterday", 
                prompt: "I didn't study yesterday.", 
                answer: "きのう べんきょうしませんでした。", 
                romaji: "Kinō benkyō-shimasen deshita.", 
                en: "I didn't study yesterday.", 
                it: "Ieri non ho studiato." 
            },
            { 
                icon: "❓🛌 Yesterday night", 
                prompt: "What time did you sleep last night?", 
                answer: "きのうの ばん なんじに ねましたか。", 
                romaji: "Kinō no ban nan-ji ni nemashita ka.", 
                en: "What time did you sleep last night?", 
                it: "A che ora hai dormito ieri sera?" 
            }
        ];

        // 期間 (〜から 〜まで)
        const durationData = [
            { 
                icon: "🏢💻 9:00-5:00", 
                prompt: "I work from 9:00 to 5:00.", 
                answer: "9じから 5じまで はたらきます。", 
                romaji: "Ku-ji kara go-ji made hatarakimasu.", 
                en: "I work from 9 to 5.", 
                it: "Lavoro dalle 9 alle 5." 
            },
            { 
                icon: "🏦 9:00-3:00", 
                prompt: "The bank is open from 9:00 to 3:00.", 
                answer: "ぎんこうは 9じから 3じまでです。", 
                romaji: "Ginkō wa ku-ji kara san-ji made desu.", 
                en: "The bank is from 9 to 3.", 
                it: "La banca è aperta dalle 9 alle 3." 
            },
            { 
                icon: "🛌☕️ Sat-Sun", 
                prompt: "I take a rest from Saturday to Sunday.", 
                answer: "どようびから にちようびまで やすみます。", 
                romaji: "Doyōbi kara nichiyōbi made yasumimasu.", 
                en: "I rest from Saturday to Sunday.", 
                it: "Riposo dal sabato alla domenica." 
            }
        ];

        let currentMode = 'time';
        let currentIndex = 0;
        let isFlipped = false;

        function switchMode(mode) {
            currentMode = mode;
            currentIndex = 0;
            isFlipped = false;
            document.getElementById('practice-card').classList.remove('is-flipped');
            
            ['time', 'habit', 'past', 'duration'].forEach(m => {
                document.getElementById(`mode-${m}`).className = "flex-1 whitespace-nowrap px-3 py-3 rounded-lg font-bold transition text-slate-600 text-[10px]";
            });
            
            const activeBtn = document.getElementById(`mode-${mode}`);
            activeBtn.className = "flex-1 whitespace-nowrap px-3 py-3 rounded-lg font-bold transition bg-white shadow text-amber-800 text-[10px]";

            updateView();
        }

        function updateView() {
            let questions;
            let label;
            if (currentMode === 'time') { questions = timeData; label = "いま なんじですか / なんようびですか"; }
            else if (currentMode === 'habit') { questions = habitData; label = "〜ます / 〜に (Routine & Time Particle)"; }
            else if (currentMode === 'past') { questions = pastData; label = "〜ました / 〜ませんでした (Past Tense)"; }
            else { questions = durationData; label = "〜から 〜まで (From... To...)"; }

            const q = questions[currentIndex];
            const promptContent = document.getElementById('prompt-content');
            
            promptContent.innerHTML = `
                <div class="emoji-icon">${q.icon}</div>
                <div class="text-slate-400 text-[10px] uppercase tracking-widest mb-2 font-bold">Concept / Hint</div>
                <div class="text-2xl font-black text-slate-800 mb-6 leading-tight px-4">${q.prompt}</div>
                <div class="flex flex-col items-center space-y-2 border-t border-slate-100 pt-6 w-full px-4">
                    <div class="text-sm text-amber-600 font-bold uppercase tracking-wide">${q.it}</div>
                    <div class="text-sm text-slate-400 italic font-medium">${q.en}</div>
                </div>
            `;

            document.getElementById('current-index').innerText = currentIndex + 1;
            document.getElementById('total-count').innerText = questions.length;
            document.getElementById('answer-text').innerText = q.answer;
            document.getElementById('romaji-text').innerText = q.romaji;
            document.getElementById('it-back').innerText = q.it;
            document.getElementById('en-back').innerText = q.en;
            document.getElementById('grammar-label').innerText = label;
        }

        function flipCard() {
            if (isFlipped) return;
            document.getElementById('practice-card').classList.add('is-flipped');
            isFlipped = true;
        }

        function speakJapanese(event) {
            if (event) event.stopPropagation();
            let questions;
            if (currentMode === 'time') questions = timeData;
            else if (currentMode === 'habit') questions = habitData;
            else if (currentMode === 'past') questions = pastData;
            else questions = durationData;

            const fullText = questions[currentIndex].answer;
            // A: や B: を削除し、カッコ内の読みヒントも削除してから再生
            const speechText = fullText.replace(/^[A-Z][：:]\s*/g, '').replace(/[A-Z][：:]\s*/g, ' ').split('（')[0];
            
            const ut = new SpeechSynthesisUtterance(speechText);
            ut.lang = 'ja-JP';
            ut.rate = 0.85;
            window.speechSynthesis.speak(ut);
        }

        function nextQuestion() {
            let questions;
            if (currentMode === 'time') questions = timeData;
            else if (currentMode === 'habit') questions = habitData;
            else if (currentMode === 'past') questions = pastData;
            else questions = durationData;

            isFlipped = false;
            document.getElementById('practice-card').classList.remove('is-flipped');
            setTimeout(() => {
                currentIndex = (currentIndex + 1) % questions.length;
                updateView();
            }, 150);
        }

        function prevQuestion() {
            let questions;
            if (currentMode === 'time') questions = timeData;
            else if (currentMode === 'habit') questions = habitData;
            else if (currentMode === 'past') questions = pastData;
            else questions = durationData;

            isFlipped = false;
            document.getElementById('practice-card').classList.remove('is-flipped');
            setTimeout(() => {
                currentIndex = (currentIndex - 1 + questions.length) % questions.length;
                updateView();
            }, 150);
        }

        updateView();
    </script>
</body>
</html>
