<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>L1: Self-Introduction Trainer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .card-container { perspective: 1000px; }
        .card { transition: transform 0.6s; transform-style: preserve-3d; cursor: pointer; }
        .card.is-flipped { transform: rotateY(180deg); }
        .card-face {
            backface-visibility: hidden; position: absolute;
            width: 100%; height: 100%; display: flex;
            flex-direction: column; align-items: center;
            justify-content: center; border-radius: 1.5rem;
            box-shadow: 0 10px 25px -5px rgb(0 0 0 / 0.1);
            padding: 2rem;
        }
        .card-back { transform: rotateY(180deg); }
        .emoji-icon { font-size: 5rem; margin-bottom: 1rem; }
        
        .speaker-btn {
            background: #4f46e5;
            color: white;
            width: 70px;
            height: 70px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 14px 0 rgba(79, 70, 229, 0.4);
            transition: all 0.2s ease;
            margin: 1.5rem 0;
        }
        .speaker-btn:active { transform: scale(0.9); background: #4338ca; }
        .speaker-btn svg { width: 35px; height: 35px; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen font-sans flex flex-col text-slate-800">

    <header class="bg-indigo-800 text-white p-4 shadow-lg text-center">
        <h1 class="text-xl font-bold">L1 Sentence Trainer 🔊</h1>
        <p class="text-xs opacity-80 uppercase tracking-widest">Introductions & Basic Particles</p>
    </header>

    <main class="flex-grow flex flex-col items-center p-6 max-w-2xl mx-auto w-full">
        <!-- Mode Selector -->
        <div class="flex space-x-1 mb-6 bg-slate-200 p-1 rounded-xl w-full overflow-x-auto shadow-inner">
            <button id="mode-aff" class="flex-1 whitespace-nowrap px-3 py-3 rounded-lg font-bold transition bg-white shadow text-indigo-800 text-[10px]" onclick="switchMode('aff')">
                AFFIRMATIVE (DESU)
            </button>
            <button id="mode-neg" class="flex-1 whitespace-nowrap px-3 py-3 rounded-lg font-bold transition text-slate-600 text-[10px]" onclick="switchMode('neg')">
                NEGATIVE (JA ARIMASEN)
            </button>
            <button id="mode-particle" class="flex-1 whitespace-nowrap px-3 py-3 rounded-lg font-bold transition text-slate-600 text-[10px]" onclick="switchMode('particle')">
                MO / NO / KA
            </button>
        </div>

        <!-- Practice Area -->
        <div id="game-view" class="w-full flex flex-col items-center">
            <div class="card-container w-full h-[520px] relative mb-8">
                <div id="practice-card" class="card w-full h-full relative">
                    
                    <!-- Front Side -->
                    <div class="card-face card-front bg-white border-2 border-indigo-50 text-center" onclick="flipCard()">
                        <div id="prompt-content" class="flex flex-col items-center w-full">
                            <!-- Injected by JS -->
                        </div>
                        <div class="mt-auto text-[10px] text-slate-300 font-bold uppercase tracking-widest">
                            Tap for Answer / Tocca per la risposta
                        </div>
                    </div>

                    <!-- Back Side -->
                    <div class="card-face card-back bg-indigo-50 border-4 border-indigo-600 text-center">
                        <div id="grammar-label" class="text-[10px] text-indigo-600 font-black uppercase tracking-[0.2em] mb-4">Grammar Point</div>
                        
                        <div id="answer-text" class="text-2xl font-black text-indigo-950 mb-2 leading-tight px-2"></div>
                        <div id="romaji-text" class="text-sm font-bold text-indigo-400 font-mono mb-4 italic"></div>
                        
                        <button onclick="speakJapanese(event)" class="speaker-btn">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z" />
                            </svg>
                        </button>
                        
                        <div class="w-16 h-px bg-indigo-200 mb-6 mx-auto"></div>
                        
                        <div class="space-y-1 px-4">
                            <div id="it-back" class="text-indigo-800 font-bold text-sm"></div>
                            <div id="en-back" class="text-slate-500 italic text-xs"></div>
                        </div>

                        <div class="mt-auto text-[10px] text-indigo-400 font-bold uppercase cursor-pointer" onclick="nextQuestion()">
                            Next / Prossimo →
                        </div>
                    </div>
                </div>
            </div>

            <!-- Controls -->
            <div class="flex justify-between w-full items-center px-4">
                <button onclick="prevQuestion()" class="w-12 h-12 flex items-center justify-center rounded-full border-2 border-slate-300 text-slate-400 bg-white shadow-sm">←</button>
                <div class="text-slate-400 font-black text-lg">
                    <span id="current-index" class="text-indigo-700">1</span> / <span id="total-count">0</span>
                </div>
                <button onclick="nextQuestion()" class="w-12 h-12 flex items-center justify-center rounded-full bg-indigo-700 text-white shadow-lg">→</button>
            </div>
        </div>
    </main>

    <script>
        const affQuestions = [
            { 
                icon: "🙋‍♂️🇺🇸", 
                prompt: "I am Mike Miller.", 
                answer: "わたしは マイク・ミラーです。", 
                romaji: "Watashi wa Maiku Mirā desu.", 
                en: "I am Mike Miller.", 
                it: "Io sono Mike Miller." 
            },
            { 
                icon: "💼🏢", 
                prompt: "I am a company employee.", 
                answer: "わたしは かいしゃいんです。", 
                romaji: "Watashi wa kaishain desu.", 
                en: "I am a company employee.", 
                it: "Io sono un impiegato." 
            },
            { 
                icon: "👨‍🏫🏫", 
                prompt: "That person is a teacher.", 
                answer: "あのひとは せんせいです。", 
                romaji: "Ano hito wa sensei desu.", 
                en: "That person is a teacher.", 
                it: "Quella persona è un insegnante." 
            },
            { 
                icon: "🤝✨", 
                prompt: "Nice to meet you. (Initial greeting)", 
                answer: "はじめまして。", 
                romaji: "Hajimemashite.", 
                en: "How do you do? / Nice to meet you.", 
                it: "Piacere di conoscerti." 
            }
        ];

        const negQuestions = [
            { 
                icon: "🙋‍♂️🎓❌", 
                prompt: "I am not a student.", 
                answer: "わたしは がくせいじゃありません。", 
                romaji: "Watashi wa gakusei ja arimasen.", 
                en: "I am not a student.", 
                it: "Non sono uno studente." 
            },
            { 
                icon: "👨‍⚕️💊❌", 
                prompt: "Mr. Santos is not a doctor.", 
                answer: "サントスさんは いしゃじゃありません。", 
                romaji: "Santosu-san wa isha ja arimasen.", 
                en: "Mr. Santos is not a doctor.", 
                it: "Il signor Santos non è un medico." 
            },
            { 
                icon: "👱‍♀️🇩Ｅ❌", 
                prompt: "Schmidt-san is not an engineer.", 
                answer: "シュミットさんは エンジニアじゃありません。", 
                romaji: "Shumitto-san wa enjinia ja arimasen.", 
                en: "Mr. Schmidt is not an engineer.", 
                it: "Il signor Schmidt non è un ingegnere." 
            }
        ];

        const particleQuestions = [
            { 
                icon: "💼💼", 
                prompt: "I am an employee. Mr. Gupta is also an employee.", 
                answer: "わたしは かいしゃいんです。グプタさんも かいしゃいんです。", 
                romaji: "Watashi wa kaishain desu. Guputa-san mo kaishain desu.", 
                en: "I am an employee. Mr. Gupta is also an employee.", 
                it: "Io sono un impiegato. Anche il signor Gupta è un impiegato." 
            },
            { 
                icon: "❓👨‍🏫", 
                prompt: "A: Is he a teacher? B: No, he's a student.", 
                answer: "A：あのひとは せんせいですか。 B：いいえ、がくせいです。", 
                romaji: "A: Ano hito wa sensei desu ka. B: Iie, gakusei desu.", 
                en: "A: Is that person a teacher? B: No, they are a student.", 
                it: "A: Quella persona è un insegnante? B: No, è uno studente." 
            },
            { 
                icon: "🏢🆔", 
                prompt: "Mr. Miller is an employee of IMC.", 
                answer: "ミラーさんは IMCの しゃいんです。", 
                romaji: "Mirā-san wa IMC no shain desu.", 
                en: "Mr. Miller is an employee of IMC.", 
                it: "Il signor Miller è un dipendente della IMC." 
            },
            { 
                icon: "❓🌎", 
                prompt: "A: How old is Teresa-chan? B: She is 9 years old.", 
                answer: "A：テレザちゃんは なんさいですか。 B：9さいです。", 
                romaji: "A: Tereza-chan wa nansai desu ka. B: Kyūsai desu.", 
                en: "A: How old is Teresa? B: She's nine.", 
                it: "A: Quanti anni ha Teresa? B: Ha 9 anni." 
            }
        ];

        let currentMode = 'aff';
        let currentIndex = 0;
        let isFlipped = false;

        function switchMode(mode) {
            currentMode = mode;
            currentIndex = 0;
            isFlipped = false;
            document.getElementById('practice-card').classList.remove('is-flipped');
            
            ['aff', 'neg', 'particle'].forEach(m => {
                document.getElementById(`mode-${m}`).className = "flex-1 whitespace-nowrap px-3 py-3 rounded-lg font-bold transition text-slate-600 text-[10px]";
            });
            
            const activeBtn = document.getElementById(`mode-${mode}`);
            activeBtn.className = "flex-1 whitespace-nowrap px-3 py-3 rounded-lg font-bold transition bg-white shadow text-indigo-800 text-[10px]";

            updateView();
        }

        function updateView() {
            let questions;
            let label;
            if (currentMode === 'aff') { questions = affQuestions; label = "N1 は N2 です (Affirmative)"; }
            else if (currentMode === 'neg') { questions = negQuestions; label = "N1 は N2 じゃありません (Negative)"; }
            else { questions = particleQuestions; label = "Particles: も / の / か"; }

            const q = questions[currentIndex];
            const promptContent = document.getElementById('prompt-content');
            
            promptContent.innerHTML = `
                <div class="emoji-icon">${q.icon}</div>
                <div class="text-slate-400 text-[10px] uppercase tracking-widest mb-2 font-bold">Concept / Hint</div>
                <div class="text-2xl font-black text-slate-800 mb-6 leading-tight px-4">${q.prompt}</div>
                <div class="flex flex-col items-center space-y-2 border-t border-slate-100 pt-6 w-full px-4">
                    <div class="text-sm text-indigo-600 font-bold uppercase tracking-wide">${q.it}</div>
                    <div class="text-sm text-slate-400 italic font-medium">${q.en}</div>
                </div>
            `;

            document.getElementById('current-index').innerText = currentIndex + 1;
            document.getElementById('total-count').innerText = questions.length;
            document.getElementById('answer-text').innerText = q.answer;
            document.getElementById('romaji-text').innerText = q.romaji;
            document.getElementById('it-back').innerText = q.it;
            document.getElementById('en-back').innerText = q.en;
            document.getElementById('grammar-label').innerText = label;
        }

        function flipCard() {
            if (isFlipped) return;
            document.getElementById('practice-card').classList.add('is-flipped');
            isFlipped = true;
        }

        function speakJapanese(event) {
            if (event) event.stopPropagation();
            let questions = currentMode === 'aff' ? affQuestions : (currentMode === 'neg' ? negQuestions : particleQuestions);
            const fullText = questions[currentIndex].answer;
            const speechText = fullText.replace(/^[A-Z][：:]\s*/g, '').replace(/[A-Z][：:]\s*/g, ' ');
            
            const ut = new SpeechSynthesisUtterance(speechText);
            ut.lang = 'ja-JP';
            ut.rate = 0.85;
            window.speechSynthesis.speak(ut);
        }

        function nextQuestion() {
            let questions = currentMode === 'aff' ? affQuestions : (currentMode === 'neg' ? negQuestions : particleQuestions);
            isFlipped = false;
            document.getElementById('practice-card').classList.remove('is-flipped');
            setTimeout(() => {
                currentIndex = (currentIndex + 1) % questions.length;
                updateView();
            }, 150);
        }

        function prevQuestion() {
            let questions = currentMode === 'aff' ? affQuestions : (currentMode === 'neg' ? negQuestions : particleQuestions);
            isFlipped = false;
            document.getElementById('practice-card').classList.remove('is-flipped');
            setTimeout(() => {
                currentIndex = (currentIndex - 1 + questions.length) % questions.length;
                updateView();
            }, 150);
        }

        updateView();
    </script>
</body>
</html>
