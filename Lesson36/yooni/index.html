<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Japanese Practice: Lesson 36 Master</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .card-container { perspective: 1000px; }
        .card { transition: transform 0.6s; transform-style: preserve-3d; cursor: pointer; }
        .card.is-flipped { transform: rotateY(180deg); }
        .card-face {
            backface-visibility: hidden; position: absolute;
            width: 100%; height: 100%; display: flex;
            flex-direction: column; align-items: center;
            justify-content: center; border-radius: 1.5rem;
            box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1);
            padding: 2rem;
        }
        .card-back { transform: rotateY(180deg); }
        .item-icon { font-size: 4.5rem; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen font-sans flex flex-col">

    <header class="bg-amber-500 text-white p-6 shadow-md text-center">
        <h1 class="text-2xl font-bold italic">L36: Goals & Habits</h1>
        <p class="text-sm opacity-90 font-medium font-black tracking-widest uppercase">Result Prep System</p>
    </header>

    <main class="flex-grow flex flex-col items-center p-6 max-w-2xl mx-auto w-full">
        <!-- Mode Selector (English Tabs) -->
        <div class="flex space-x-1 mb-8 bg-gray-200 p-1 rounded-xl w-full overflow-x-auto shadow-inner border border-gray-300">
            <button id="mode-purpose" class="flex-1 whitespace-nowrap px-2 py-3 rounded-lg font-bold transition bg-white shadow-sm text-amber-600 text-xs" onclick="switchMode('purpose')">
                Purpose
            </button>
            <button id="mode-change" class="flex-1 whitespace-nowrap px-2 py-3 rounded-lg font-bold transition text-gray-600 text-xs" onclick="switchMode('change')">
                Changes
            </button>
            <button id="mode-habit" class="flex-1 whitespace-nowrap px-2 py-3 rounded-lg font-bold transition text-gray-600 text-xs" onclick="switchMode('habit')">
                Habits
            </button>
        </div>

        <!-- Question Area -->
        <div id="game-view" class="w-full flex flex-col items-center">
            <div id="instruction" class="text-gray-400 mb-6 text-center text-xs font-black uppercase tracking-[0.2em]">
                Do ... so that ...
            </div>

            <!-- Card Container -->
            <div class="card-container w-full h-[480px] relative mb-10">
                <div id="practice-card" class="card w-full h-full relative" onclick="flipCard()">
                    <!-- Front -->
                    <div class="card-face card-front bg-white border-2 border-amber-100 text-center">
                        <div id="prompt-content" class="flex flex-col items-center space-y-6 w-full px-4">
                            <!-- Injected by JS -->
                        </div>
                        <div class="mt-auto text-[10px] text-gray-300 font-bold uppercase tracking-widest">Tap to reveal Japanese</div>
                    </div>
                    <!-- Back -->
                    <div class="card-face card-back bg-amber-50 border-4 border-amber-400 p-8 text-center">
                        <div id="answer-kanji" class="text-3xl font-black text-amber-900 leading-tight mb-4 px-2"></div>
                        <div id="answer-kana" class="text-xl font-bold text-amber-500 mb-8"></div>
                        
                        <!-- Manual Audio Button -->
                        <button onclick="event.stopPropagation(); speakJapanese();" class="w-16 h-16 bg-white border-2 border-amber-200 rounded-full flex items-center justify-center shadow-md active:scale-90 transition-transform mb-6 group">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-amber-500 group-hover:text-amber-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z" />
                            </svg>
                        </button>

                        <div id="answer-it" class="text-base text-amber-700 italic font-medium px-4"></div>
                        <div class="mt-auto text-[10px] text-amber-300 font-bold uppercase">Tap for next question</div>
                    </div>
                </div>
            </div>

            <!-- Navigation -->
            <div class="flex justify-between w-full items-center px-2">
                <button onclick="prevQuestion()" class="w-14 h-14 flex items-center justify-center border-2 border-gray-200 rounded-full text-gray-400 bg-white hover:bg-gray-50 transition shadow-sm text-xl font-bold">←</button>
                <div class="flex flex-col items-center">
                    <div class="text-gray-400 font-black text-lg">
                        <span id="current-index" class="text-amber-600 font-black">1</span> 
                        <span class="text-gray-200">/</span> 
                        <span id="total-count">17</span>
                    </div>
                </div>
                <button onclick="nextQuestion()" class="px-10 py-4 bg-amber-500 rounded-full text-white font-black hover:bg-amber-600 transition shadow-lg tracking-widest uppercase text-sm">Next</button>
            </div>
        </div>

        <!-- Finished View -->
        <div id="finished-view" class="hidden w-full flex flex-col items-center justify-center p-12 bg-white rounded-[3rem] shadow-2xl border-4 border-amber-100 text-center">
            <div class="text-7xl mb-8">Finished‼️</div>
            <p class="text-gray-500 font-black uppercase tracking-[0.3em] mb-4 text-sm">Pratica completata!</p>
            <p class="text-lg text-amber-600 font-bold mb-10 italic text-center">Lesson 36 Complete Mastery.</p>
            <button onclick="location.reload()" class="w-full py-5 bg-amber-500 text-white rounded-2xl font-black shadow-xl active:scale-95 transition-all text-xl tracking-widest uppercase">
                Restart
            </button>
        </div>
    </main>

    <footer class="py-8 text-center text-gray-300 text-[10px] font-black tracking-widest uppercase">
        Result Prep System &bull; Mika Tomao
    </footer>

    <script>
        // Mode 1: Purpose (~you ni)
        const purposeData = [
            { icon: "🗒️", en: "I take notes so I don't forget.", it: "Prendo appunti affinché non dimentichi.", kanji: "忘れないように、メモを取ります。", kana: "わすれないように、めもを とります。" },
            { icon: "👓", en: "I use glasses so I can see well.", it: "Uso gli occhiali per poter vedere bene.", kanji: "よく見えるように、眼鏡をかけます。", kana: "よく みえるように、めがねを かけます。" },
            { icon: "⏰", en: "I set an alarm so I don't oversleep.", it: "Metto la sveglia per non dormire troppo.", kanji: "寝坊しないように、目覚ましをかけます。", kana: "ねぼうしないように、めざましを かけます。" },
            { icon: "📢", en: "Please speak loudly so all can hear.", it: "Per favore parli forte così tutti sentono.", kanji: "みんなに聞こえるように、大きく言ってください。", kana: "みんなに きこえるように、おおきく いってください。" },
            { icon: "🇯🇵", en: "I study so I can pass the exam.", it: "Studio affinché possa superare l'esame.", kanji: "試験に合格できるように、勉強します。", kana: "しけんに ごうかくできるように、べんきょうします。" },
            { icon: "💴", en: "I save money so I can buy a car.", it: "Risparmio soldi per poter comprare un'auto.", kanji: "車が買えるように、貯金しています。", kana: "くるまが かえるように、ちょきんしています。" },
            { icon: "🍱🩹", en: "Wash hands so you don't get sick.", it: "Lava le mani per non ammalarti.", kanji: "病気にならないように、手を洗います。", kana: "びょうきに ならないように、てを あらいます。" },
            { icon: "📧", en: "I sent a mail so he knows the time.", it: "Ho mandato una mail così lui sa l'orario.", kanji: "時間がわかるように、メールを送りました。", kana: "じかんが わかるように、めーるを おくりました。" },
            { icon: "🧥", en: "Wear a coat so you don't catch a cold.", it: "Metti il cappotto per non prendere freddo.", kanji: "風邪をひかないように、コートを着てください。", kana: "かぜを ひかないように、こーとを きてください。" },
            { icon: "🥢", en: "I practice so I can use chopsticks well.", it: "Faccio pratica per poter usare bene le bacchette.", kanji: "箸が上手に使えるように、練習しています。", kana: "はしが じょうずに つかえるように、れんしゅうしています。" },
            { icon: "🚶❌", en: "Walk carefully so you don't fall.", it: "Cammina con cura per non cadere.", kanji: "転ばないように、気をつけて歩いてください。", kana: "ころばないように、きをつけて あるいてください。" },
            { icon: "🚲🅿️", en: "Park so it doesn't get in the way.", it: "Parcheggia così non intralcia.", kanji: "邪魔にならないように、止めてください。", kana: "じゃまに ならないように、とめてください。" },
            { icon: "🤫👶", en: "Please be quiet so the baby can sleep.", it: "Silenzio così il bambino può dormire.", kanji: "赤ちゃんが寝られるように、静かにしてください。", kana: "あかちゃんが ねられるように、しずかに してください。" },
            { icon: "🚰❌", en: "Turn off water so we don't waste it.", it: "Chiudi l'acqua per non sprecarla.", kanji: "無駄にしないように、水を止めてください。", kana: "むだに しないように、みずを とめてください。" },
            { icon: "🚶🕰️", en: "I'll run so I'm not late.", it: "Correrò per non arrivare in ritardo.", kanji: "遅れないように、走ります。", kana: "おくれるないように、はしります。" },
            { icon: "⚖️", en: "I exercise to lose weight.", it: "Faccio esercizio per dimagrire.", kanji: "痩せられるように、運動しています。", kana: "やせられるように、うんどうしています。" },
            { icon: "📦", en: "I write the address clearly so it arrives.", it: "Scrivo l'indirizzo chiaramente affinché arrivi.", kanji: "荷物が届くように、住所をはっきり書きます。", kana: "にもつが とどくように、じゅうしょを はっきり かきます。" }
        ];

        // Mode 2: Changes (~you ni narimasu)
        const changeData = [
            { icon: "🗣️🇯🇵", en: "I became able to speak Japanese.", it: "Sono diventato capace di parlare giapponese.", kanji: "日本語が話せるようになりました。", kana: "にほんごが はなせるように なりました。" },
            { icon: "🏊‍♂️", en: "I became able to swim 50 meters.", it: "Sono diventato capace di nuotare per 50 metri.", kanji: "５０メートル泳げるようになりました。", kana: "ごじゅうめーとる およげるように なりました。" },
            { icon: "🍣", en: "I can now eat raw fish.", it: "Adesso posso mangiare pesce crudo.", kanji: "刺身が食べられるようになりました。", kana: "さしみが たべられるように なりました。" },
            { icon: "🚗", en: "I became able to drive a car.", it: "Sono diventato capace di guidare l'auto.", kanji: "車を運転できるようになりました。", kana: "くるまを うんてんできるように なりました。" },
            { icon: "📖🏮", en: "I can now read Kanji.", it: "Adesso posso leggere i Kanji.", kanji: "漢字が読めるようになりました。", kana: "かんじが よめるように なりました。" },
            { icon: "🎹", en: "I became able to play the piano.", it: "Sono diventato capace di suonare il piano.", kanji: "ピアノが弾けるようになりました。", kana: "ぴあのが ひけるように なりました。" },
            { icon: "🚲", en: "I became able to ride a bike.", it: "Sono diventato capace di andare in bici.", kanji: "自転車に乗れるようになりました。", kana: "じてんしゃに のれるように なりました。" },
            { icon: "🥢", en: "I can now use chopsticks.", it: "Adesso so usare le bacchette.", kanji: "箸が使えるようになりました。", kana: "はしが つかえるように なりました。" },
            { icon: "🌶️", en: "I can now eat spicy food.", it: "Adesso posso mangiare cibo piccante.", kanji: "辛い物が食べられるようになりました。", kana: "からいものが たべられるように なりました。" },
            { icon: "👂🎶", en: "I can now understand the lyrics.", it: "Adesso posso capire i testi delle canzoni.", kanji: "歌詞がわかるようになりました。", kana: "かしが わかるように なりました。" },
            { icon: "🌅⏰", en: "I became able to wake up early.", it: "Sono diventato capace di svegliarmi presto.", kanji: "早く起きられるようになりました。", kana: "はやく おきられるように なりました。" },
            { icon: "💻", en: "I can now use this software.", it: "Adesso so usare questo software.", kanji: "このソフトが使えるようになりました。", kana: "このそふとが つかえるように なりました。" },
            { icon: "👔", en: "I can now tie a tie.", it: "Adesso so annodare la cravatta.", kanji: "ネクタイが締められるようになりました。", kana: "ねくたいが しめられるように なりました。" },
            { icon: "🏃‍♂️", en: "I can now run a marathon.", it: "Adesso posso correre una maratona.", kanji: "マラソンが走れるようになりました。", kana: "まらそんが はしれるように なりました。" },
            { icon: "👨‍🍳", en: "I can now cook Japanese food.", it: "Adesso so cucinare cibo giapponese.", kanji: "日本料理が作れるようになりました。", kana: "にほんりょうりが つくれるように なりました。" },
            { icon: "📺", en: "I can now understand Japanese TV.", it: "Adesso capisco la TV giapponese.", kanji: "日本のテレビがわかるようになりました。", kana: "にほんの てれびが わかるように なりました。" },
            { icon: "👶🚶", en: "The baby can now walk.", it: "Il bambino adesso sa camminare.", kanji: "赤ちゃんが歩けるようになりました。", kana: "あかちゃんが あるけるように なりました。" }
        ];

        // Mode 3: Habits (~you ni shite imasu)
        const habitData = [
            { icon: "🥗", en: "I try to eat vegetables every day.", it: "Cerco di mangiare verdura ogni giorno.", kanji: "毎日、野菜を食べるようにしています。", kana: "まいにち、やさいを たべるように しています。" },
            { icon: "🍬❌", en: "I try not to eat sweets too much.", it: "Cerco di non mangiare troppi dolci.", kanji: "甘い物を食べすぎないようにしています。", kana: "あまいものを たべすぎないように しています。" },
            { icon: "⏰🛌", en: "I make an effort to sleep early.", it: "Faccio lo sforzo di dormire presto.", kanji: "早く寝るようにしています。", kana: "はやく ねるように しています。" },
            { icon: "🏃‍♂️", en: "I try to exercise every week.", it: "Cerco di fare esercizio ogni settimana.", kanji: "毎週、運動するようにしています。", kana: "まいしゅう、うんどうするように しています。" },
            { icon: "🥤❌", en: "I try not to drink sweet juice.", it: "Cerco di non bere succhi dolci.", kanji: "甘いジュースを飲まないようにしています。", kana: "あまい じゅーすを のまないように しています。" },
            { icon: "🚶", en: "I try to walk as much as possible.", it: "Cerco di camminare il più possibile.", kanji: "できるだけ歩くようにしています。", kana: "できるだけ あるくように しています。" },
            { icon: "🦷", en: "I try to brush my teeth after eating.", it: "Cerco di lavarmi i denti dopo mangiato.", kanji: "食べたあとで、歯を磨くようにしています。", kana: "たべたあとで、はを みがくように しています。" },
            { icon: "💧", en: "I try to drink a lot of water.", it: "Cerco di bere molta acqua.", kanji: "水をたくさん飲むようにしています。", kana: "みずを たくさん のむように しています。" },
            { icon: "🚬❌", en: "I am trying not to smoke.", it: "Sto cercando di non fumare.", kanji: "たばこを吸わないようにしています。", kana: "たばこを すわないように しています。" },
            { icon: "🍳", en: "I try to cook at home.", it: "Cerco di cucinare a casa.", kanji: "うちで料理を作るようにしています。", kana: "うちで りょうりを つくるように しています。" },
            { icon: "📖", en: "I try to study Japanese every night.", it: "Cerco di studiare giapponese ogni sera.", kanji: "毎晩、日本語を勉強するようにしています。", kana: "まいばん、にほんごを べんきょうするように しています。" },
            { icon: "🚗❌", en: "I try not to drive a car.", it: "Cerco di non guidare l'auto.", kanji: "車を運転しないようにしています。", kana: "くるまを うんてんしないように しています。" },
            { icon: "🚲", en: "I try to use a bike for work.", it: "Cerco di usare la bici per andare al lavoro.", kanji: "自転車で仕事に行くようにしています。", kana: "じてんしゃで しごとに いくように しています。" },
            { icon: "🔑", en: "I try not to forget my keys.", it: "Cerco di non dimenticare le chiavi.", kanji: "鍵を忘れないようにしています。", kana: "かぎを わすれないように しています。" },
            { icon: "🧼", en: "I try to wash my hands correctly.", it: "Cerco di lavarmi le mani correttamente.", kanji: "手を正しく洗うようにしています。", kana: "てを ただしく あらうように しています。" },
            { icon: "☕❌", en: "I try not to drink coffee at night.", it: "Cerco di non bere caffè la sera.", kanji: "夜はコーヒーを飲まないようにしています。", kana: "よるは こーひーを のまないように しています。" },
            { icon: "💴", en: "I try to save money every month.", it: "Cerco di risparmiare soldi ogni mese.", kanji: "毎月、貯金するようにしています。", kana: "まいつき、ちょきんするように しています。" }
        ];

        let currentMode = 'purpose';
        let currentIndex = 0;
        let isFlipped = false;

        function switchMode(mode) {
            currentMode = mode;
            currentIndex = 0;
            isFlipped = false;
            document.getElementById('practice-card').classList.remove('is-flipped');
            document.getElementById('game-view').classList.remove('hidden');
            document.getElementById('finished-view').classList.add('hidden');
            
            const modes = ['purpose', 'change', 'habit'];
            modes.forEach(m => {
                const btn = document.getElementById(`mode-${m}`);
                if(m === mode) {
                    btn.classList.add('bg-white', 'shadow-sm', 'text-amber-600');
                    btn.classList.remove('text-gray-600');
                } else {
                    btn.classList.remove('bg-white', 'shadow-sm', 'text-amber-600');
                    btn.classList.add('text-gray-600');
                }
            });

            const instr = document.getElementById('instruction');
            if(mode === 'purpose') instr.innerText = "Purpose: ~you ni (So that...)";
            else if(mode === 'change') instr.innerText = "Change: ~you ni narimasu (Ability)";
            else instr.innerText = "Habit: ~you ni shite imasu (Effort)";
            
            updateView();
        }

        function updateView() {
            const data = { purpose: purposeData, change: changeData, habit: habitData };
            const questions = data[currentMode];
            const q = questions[currentIndex];
            const promptContent = document.getElementById('prompt-content');
            
            document.getElementById('current-index').innerText = currentIndex + 1;
            document.getElementById('total-count').innerText = questions.length;
            
            document.getElementById('answer-kanji').innerText = q.kanji;
            document.getElementById('answer-kana').innerText = q.kana;
            document.getElementById('answer-it').innerText = q.it;

            promptContent.innerHTML = `
                <div class="item-icon mb-4">${q.icon}</div>
                <div class="text-center px-6">
                    <div class="text-gray-400 text-[10px] font-black uppercase tracking-[0.2em] mb-4">Target Meaning / Scenario</div>
                    <div class="text-3xl font-black text-gray-800 leading-tight italic px-4">${q.en}</div>
                </div>
            `;
        }

        function flipCard() {
            const card = document.getElementById('practice-card');
            if (!isFlipped) {
                card.classList.add('is-flipped');
                isFlipped = true;
            } else {
                nextQuestion();
            }
        }

        function speakJapanese() {
            const data = { purpose: purposeData, change: changeData, habit: habitData };
            const text = data[currentMode][currentIndex].kana;
            const ut = new SpeechSynthesisUtterance(text);
            ut.lang = 'ja-JP';
            ut.rate = 0.95;
            window.speechSynthesis.speak(ut);
        }

        function nextQuestion() {
            const data = { purpose: purposeData, change: changeData, habit: habitData };
            const questions = data[currentMode];
            
            if (isFlipped && currentIndex === questions.length - 1) {
                document.getElementById('game-view').classList.add('hidden');
                document.getElementById('finished-view').classList.remove('hidden');
                return;
            }

            isFlipped = false;
            document.getElementById('practice-card').classList.remove('is-flipped');
            setTimeout(() => {
                currentIndex = (currentIndex + 1) % questions.length;
                updateView();
            }, 150);
        }

        function prevQuestion() {
            const data = { purpose: purposeData, change: changeData, habit: habitData };
            const questions = data[currentMode];
            isFlipped = false;
            document.getElementById('practice-card').classList.remove('is-flipped');
            setTimeout(() => {
                currentIndex = (currentIndex - 1 + questions.length) % questions.length;
                updateView();
            }, 150);
        }

        updateView();
    </script>
</body>
</html>
