<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lesson 31 Sentence Master</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .card-container { perspective: 1000px; }
        .card { transition: transform 0.6s; transform-style: preserve-3d; cursor: pointer; }
        .card.is-flipped { transform: rotateY(180deg); }
        .card-face {
            backface-visibility: hidden; position: absolute;
            width: 100%; height: 100%; display: flex;
            flex-direction: column; align-items: center;
            justify-content: center; border-radius: 1.5rem;
            box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1);
            padding: 2rem;
        }
        .card-back { transform: rotateY(180deg); }
        .item-icon { font-size: 5rem; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen font-sans flex flex-col">

    <header class="bg-amber-500 text-white p-6 shadow-md text-center">
        <h1 class="text-2xl font-bold italic">L31: Intentions & Plans</h1>
        <p class="text-sm opacity-90 font-black tracking-widest uppercase text-center">Result Prep System</p>
    </header>

    <main class="flex-grow flex flex-col items-center p-6 max-w-2xl mx-auto w-full">
        <!-- Mode Selector -->
        <div class="flex space-x-1 mb-8 bg-gray-200 p-1 rounded-xl w-full overflow-x-auto shadow-inner border border-gray-300">
            <button id="mode-vol" class="flex-1 whitespace-nowrap px-2 py-3 rounded-lg font-bold transition bg-white shadow-sm text-amber-600 text-xs" onclick="switchMode('vol')">
                Volitional (~ou)
            </button>
            <button id="mode-think" class="flex-1 whitespace-nowrap px-2 py-3 rounded-lg font-bold transition text-gray-600 text-xs" onclick="switchMode('think')">
                Thinking of...
            </button>
            <button id="mode-plan" class="flex-1 whitespace-nowrap px-2 py-3 rounded-lg font-bold transition text-gray-600 text-xs" onclick="switchMode('plan')">
                Plans (~tsumori)
            </button>
        </div>

        <!-- Question Area -->
        <div id="game-view" class="w-full flex flex-col items-center">
            <div id="instruction" class="text-gray-400 mb-6 text-center text-xs font-black uppercase tracking-[0.2em]">
                Translate into the Target form...
            </div>

            <!-- Card -->
            <div class="card-container w-full h-[480px] relative mb-10">
                <div id="practice-card" class="card w-full h-full relative" onclick="flipCard()">
                    <!-- Front -->
                    <div class="card-face card-front bg-white border-2 border-amber-100 text-center">
                        <div id="prompt-content" class="flex flex-col items-center space-y-6 w-full px-4">
                            <!-- Injected by JS -->
                        </div>
                        <div class="mt-auto text-[10px] text-gray-300 font-bold uppercase tracking-widest">Tap to reveal Japanese</div>
                    </div>
                    <!-- Back -->
                    <div class="card-face card-back bg-amber-50 border-4 border-amber-400 p-8 text-center">
                        <div id="answer-kanji" class="text-3xl font-black text-amber-900 leading-tight mb-4 px-2"></div>
                        <div id="answer-kana" class="text-xl font-bold text-amber-500 mb-8"></div>
                        
                        <!-- Manual Audio Button -->
                        <button onclick="event.stopPropagation(); speakJapanese();" class="w-20 h-20 bg-white border-2 border-amber-200 rounded-full flex items-center justify-center shadow-md active:scale-90 transition-transform mb-6 group">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 text-amber-500 group-hover:text-amber-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z" />
                            </svg>
                        </button>

                        <div id="answer-it" class="text-base text-amber-700 italic font-medium px-4"></div>
                        <div class="mt-auto text-[10px] text-amber-300 font-bold uppercase">Tap for next question</div>
                    </div>
                </div>
            </div>

            <!-- Navigation -->
            <div class="flex justify-between w-full items-center px-2">
                <button onclick="prevQuestion()" class="w-14 h-14 flex items-center justify-center border-2 border-gray-200 rounded-full text-gray-400 bg-white hover:bg-gray-50 transition shadow-sm text-xl font-bold">←</button>
                <div class="flex flex-col items-center">
                    <div class="text-gray-400 font-black text-lg">
                        <span id="current-index" class="text-amber-600 font-black">1</span> 
                        <span class="text-gray-200">/</span> 
                        <span id="total-count">17</span>
                    </div>
                </div>
                <button onclick="buttonNext()" class="px-10 py-4 bg-amber-500 rounded-full text-white font-black hover:bg-amber-600 transition shadow-lg tracking-widest uppercase text-sm">Next</button>
            </div>
        </div>

        <!-- Finished View -->
        <div id="finished-view" class="hidden w-full flex flex-col items-center justify-center p-12 bg-white rounded-[3rem] shadow-2xl border-4 border-amber-100 text-center">
            <div class="text-7xl mb-8">Ottimo!</div>
            <p class="text-gray-500 font-black uppercase tracking-[0.3em] mb-4 text-sm">Lezione 31 completata!</p>
            <p class="text-lg text-amber-600 font-bold mb-10 italic text-center">Hai imparato a esprimere intenzioni e piani.</p>
            <button onclick="location.reload()" class="w-full py-5 bg-amber-500 text-white rounded-2xl font-black shadow-xl active:scale-95 transition-all text-xl tracking-widest uppercase">
                Restart
            </button>
        </div>
    </main>

    <footer class="py-8 text-center text-gray-300 text-[10px] font-black tracking-widest uppercase">
        Result Prep System &bull; Mika Tomao
    </footer>

    <script>
        const volData = [
            { icon: "🚶‍♂️", en: "Let's go. (Plain)", it: "Andiamo. (Piano)", kanji: "行こう。", kana: "いこう。" },
            { icon: "🍱", en: "Let's eat. (Plain)", it: "Mangiamo. (Piano)", kanji: "食べよう。", kana: "たべよう。" },
            { icon: "☕", en: "Let's take a rest. (Plain)", it: "Riposiamoci. (Piano)", kanji: "休もう。", kana: "やすもう。" },
            { icon: "🍳", en: "Let's make it. (Plain)", it: "Prepariamo. (Piano)", kanji: "作ろう。", kana: "つくろう。" },
            { icon: "🤝", en: "Let's meet. (Plain)", it: "Incontriamoci. (Piano)", kanji: "会おう。", kana: "あおう。" },
            { icon: "🛒", en: "Let's buy it. (Plain)", it: "Compriamolo. (Piano)", kanji: "買おう。", kana: "かおう。" },
            { icon: "🍷", en: "Let's drink. (Plain)", it: "Beviamo. (Piano)", kanji: "Nomiamo. (Piano)", kanji: "飲もう。", kana: "のもう。" },
            { icon: "🎤", en: "Let's sing. (Plain)", it: "Cantiamo. (Piano)", kanji: "歌おう。", kana: "うたおう。" },
            { icon: "🏊", en: "Let's swim. (Plain)", it: "Nuotiamo. (Piano)", kanji: "泳ごう。", kana: "およごう。" },
            { icon: "👂", en: "Let's listen. (Plain)", it: "Ascoltiamo. (Piano)", kanji: "聞こう。", kana: "きこう。" },
            { icon: "💬", en: "Let's talk. (Plain)", it: "Parliamo. (Piano)", kanji: "話そう。", kana: "はなそう。" },
            { icon: "📺", en: "Let's watch. (Plain)", it: "Guardiamo. (Piano)", kanji: "見よう。", kana: "みよう。" },
            { icon: "🧹", en: "Let's clean. (Plain)", it: "Puliamo. (Piano)", kanji: "掃除しよう。", kana: "そうじしよう。" },
            { icon: "🚶", en: "Let's come. (Plain)", it: "Veniamo. (Piano)", kanji: "来よう。", kana: "こよう。" },
            { icon: "⚽", en: "Let's play. (Plain)", it: "Giochiamo. (Piano)", kanji: "遊ぼう。", kana: "あそぼう。" },
            { icon: "📩", en: "Let's send it. (Plain)", it: "Spediamolo. (Piano)", kanji: "送ろう。", kana: "おくろう。" },
            { icon: "🏠", en: "Let's go home. (Plain)", it: "Torniamo a casa. (Piano)", kanji: "帰ろう。", kana: "かえろう。" }
        ];

        const thinkData = [
            { icon: "🚗", en: "I'm thinking of buying a car.", it: "Sto pensando di comprare un'auto.", kanji: "車を買おうと思っています。", kana: "くるまを かおうと おもって います。" },
            { icon: "🇯🇵", en: "I'm thinking of studying Japanese.", it: "Sto pensando di studiare il giapponese.", kanji: "日本語を勉強しようと思っています。", kana: "にほんごを べんきょう しようと おもって います。" },
            { icon: "💍", en: "I'm thinking of getting married.", it: "Sto pensando di sposarmi.", kanji: "結婚しようと思っています。", kana: "けっこん しようと おもって います。" },
            { icon: "💼", en: "I'm thinking of changing jobs.", it: "Sto pensando di cambiare lavoro.", kanji: "転職しようと思っています。", kana: "てんしょく しようと おもって います。" },
            { icon: "🏔️", en: "I'm thinking of climbing Mt. Fuji.", it: "Sto pensando di scalare il Fuji.", kanji: "富士山に登ろうと思っています。", kana: "ふじさんに のぼろうと おもって います。" },
            { icon: "💰", en: "I'm thinking of saving money.", it: "Sto pensando di risparmiare.", kanji: "貯金しようと思っています。", kana: "ちょきん しようと おもって います。" },
            { icon: "🏊", en: "I'm thinking of learning to swim.", it: "Sto pensando di imparare a nuotare.", kanji: "泳ぎを習おうと思っています。", kana: "およぎを ならおうと おもって います。" },
            { icon: "⛩️", en: "I'm thinking of visiting Kyoto.", it: "Sto pensando di visitare Kyoto.", kanji: "京都へ行こうと思っています。", kana: "きょうとへ いこうと おもって います。" },
            { icon: "✍️", en: "I'm thinking of writing a book.", it: "Sto pensando di scrivere un libro.", kanji: "本を書こうと思っています。", kana: "ほんを かこうと おもって います。" },
            { icon: "🚭", en: "I'm thinking of quitting smoking.", it: "Sto pensando di smettere di fumare.", kanji: "タバコをやめようと思っています。", kana: "たばこを やめようと おもって います。" },
            { icon: "🏢", en: "I'm thinking of starting a business.", it: "Sto pensando di avviare un'attività.", kanji: "会社を作ろうと思っています。", kana: "かいしゃを つくろうと おもって います。" },
            { icon: "✈️", en: "I'm thinking of traveling abroad.", it: "Sto pensando di viaggiare all'estero.", kanji: "外国を旅行しようと思っています。", kana: "がいこくを りょこう しようと おもって います。" },
            { icon: "🏃", en: "I'm thinking of exercising every day.", it: "Sto pensando di fare esercizio ogni giorno.", kanji: "毎日運動しようと思っています。", kana: "まいにち うんどう しようと おもって います。" },
            { icon: "🏠", en: "I'm thinking of buying a house.", it: "Sto pensando di comprare casa.", kanji: "家を買おうと思っています。", kana: "いえを かおうと おもって います。" },
            { icon: "🎹", en: "I'm thinking of studying music.", it: "Sto pensando di studiare musica.", kanji: "音楽を勉強しようと思っています。", kana: "おんがくを べんきょう しようと おもって います。" },
            { icon: "👨‍👩‍👦", en: "I'm thinking of meeting my parents.", it: "Sto pensando di incontrare i miei genitori.", kanji: "両親に会おうと思っています。", kana: "りょうしんに あおうと おもって います。" },
            { icon: "🍳", en: "I'm thinking of learning cooking.", it: "Sto pensando di imparare a cucinare.", kanji: "料理を習おうと思っています。", kana: "りょうりを ならおうと おもって います。" }
        ];

        const planData = [
            { icon: "🎓", en: "I intend to go to university.", it: "Ho intenzione di andare all'università.", kanji: "大学へ行くつもりです。", kana: "だいがくへ いく つもりです。" },
            { icon: "🎉", en: "I intend not to go to the party.", it: "Ho intenzione di non andare alla festa.", kanji: "パーティーには行かないつもりです。", kana: "ぱーてぃーには いかない つもりです。" },
            { icon: "🕙", en: "The bus is scheduled to arrive at 10.", it: "L'autobus dovrebbe arrivare alle 10.", kanji: "バスは１０時に着く予定です。", kana: "ばすは じゅうじに つく よていです。" },
            { icon: "💼", en: "I am scheduled to have a meeting.", it: "Ho in programma una riunione.", kanji: "会議がある予定です。", kana: "かいぎが ある よていです。" },
            { icon: "🚪", en: "I intend to quit the company.", it: "Ho intenzione di lasciare l'azienda.", kanji: "会社を辞めるつもりです。", kana: "かいしゃを やめる つもりです。" },
            { icon: "🏖️", en: "I am scheduled to travel in summer.", it: "Ho in programma di viaggiare in estate.", kanji: "夏に旅行する予定です。", kana: "なつに りょこう する よていです。" },
            { icon: "📦", en: "I intend to move house.", it: "Ho intenzione di traslocare.", kanji: "引っ越しするつもりです。", kana: "ひっこし する つもりです。" },
            { icon: "🕔", en: "I am scheduled to finish at 5.", it: "Ho in programma di finire alle 5.", kanji: "５時に終わる予定です。", kana: "ごじに おわる よていです。" },
            { icon: "🎹", en: "I intend to start learning piano.", it: "Ho intenzione di iniziare a imparare il piano.", kanji: "ピアノを習い始めるつもりです。", kana: "ぴあのを ならい はじめる つもりです。" },
            { icon: "🗣️", en: "I am scheduled to give a speech.", it: "Ho in programma di fare un discorso.", kanji: "スピーチをする予定です。", kana: "すぴーちを する よていです。" },
            { icon: "🍺", en: "I intend not to drink tonight.", it: "Ho intenzione di non bere stasera.", kanji: "今夜は飲まないつもりです。", kana: "こんやは のまない つもりです。" },
            { icon: "🚅", en: "I am scheduled to go on a business trip.", it: "Ho in programma un viaggio di lavoro.", kanji: "出張する予定です。", kana: "しゅっちょう する よていです。" },
            { icon: "🧼", en: "I intend to wash the car.", it: "Ho intenzione di lavare l'auto.", kanji: "車を洗うつもりです。", kana: "くるまを あらう つもりです。" },
            { icon: "🎾", en: "I am scheduled to play tennis.", it: "Ho in programma di giocare a tennis.", kanji: "テニスをする予定です。", kana: "てにすを する よていです。" },
            { icon: "🤝", en: "I intend to visit a friend.", it: "Ho intenzione di visitare un amico.", kanji: "友達を訪ねるつもりです。", kana: "ともだちを たずねる つもりです。" },
            { icon: "📅", en: "The shop is scheduled to be closed on Monday.", it: "Il negozio dovrebbe essere chiuso lunedì.", kanji: "月曜日は休みである予定です。", kana: "げつようびは やすみで ある よていです。" },
            { icon: "🪪", en: "I intend to get a license.", it: "Ho intenzione di prendere la licenza.", kanji: "免許を取るつもりです。", kana: "めんきょを とる つもりです。" }
        ];

        let currentMode = 'vol';
        let currentIndex = 0;
        let isFlipped = false;

        function switchMode(mode) {
            currentMode = mode;
            currentIndex = 0;
            isFlipped = false;
            document.getElementById('practice-card').classList.remove('is-flipped');
            document.getElementById('game-view').classList.remove('hidden');
            document.getElementById('finished-view').classList.add('hidden');
            
            const modes = ['vol', 'think', 'plan'];
            modes.forEach(m => {
                const btn = document.getElementById(`mode-${m}`);
                if(m === mode) {
                    btn.classList.add('bg-white', 'shadow-sm', 'text-amber-600');
                    btn.classList.remove('text-gray-600');
                } else {
                    btn.classList.remove('bg-white', 'shadow-sm', 'text-amber-600');
                    btn.classList.add('text-gray-600');
                }
            });

            const instr = document.getElementById('instruction');
            if(mode === 'vol') instr.innerText = "Target: Let's do... (Volitional Form)";
            else if(mode === 'think') instr.innerText = "Target: Thinking of doing... (~omotte imasu)";
            else instr.innerText = "Target: Plans & Schedule (~tsumori / ~yotei)";
            
            updateView();
        }

        function updateView() {
            const data = { vol: volData, think: thinkData, plan: planData };
            const questions = data[currentMode];
            const q = questions[currentIndex];
            const promptContent = document.getElementById('prompt-content');
            
            document.getElementById('current-index').innerText = currentIndex + 1;
            document.getElementById('total-count').innerText = questions.length;
            
            document.getElementById('answer-kanji').innerText = q.kanji;
            document.getElementById('answer-kana').innerText = q.kana;
            document.getElementById('answer-it').innerText = q.it;

            promptContent.innerHTML = `
                <div class="item-icon mb-4">${q.icon}</div>
                <div class="text-center px-6">
                    <div class="text-gray-400 text-[10px] font-black uppercase tracking-[0.2em] mb-4">Target Meaning</div>
                    <div class="text-3xl font-black text-gray-800 leading-tight italic px-4">${q.en}</div>
                </div>
            `;
        }

        function flipCard() {
            const card = document.getElementById('practice-card');
            if (!isFlipped) {
                card.classList.add('is-flipped');
                isFlipped = true;
            } else {
                nextQuestion();
            }
        }

        function speakJapanese() {
            const data = { vol: volData, think: thinkData, plan: planData };
            const text = data[currentMode][currentIndex].kana;
            const ut = new SpeechSynthesisUtterance(text);
            ut.lang = 'ja-JP';
            ut.rate = 0.95;
            window.speechSynthesis.speak(ut);
        }

        function nextQuestion() {
            const data = { vol: volData, think: thinkData, plan: planData };
            const questions = data[currentMode];
            
            if (isFlipped && currentIndex === questions.length - 1) {
                document.getElementById('game-view').classList.add('hidden');
                document.getElementById('finished-view').classList.remove('hidden');
                return;
            }

            isFlipped = false;
            document.getElementById('practice-card').classList.remove('is-flipped');
            setTimeout(() => {
                currentIndex = (currentIndex + 1) % questions.length;
                updateView();
            }, 150);
        }

        function prevQuestion() {
            const data = { vol: volData, think: thinkData, plan: planData };
            const questions = data[currentMode];
            isFlipped = false;
            document.getElementById('practice-card').classList.remove('is-flipped');
            setTimeout(() => {
                currentIndex = (currentIndex - 1 + questions.length) % questions.length;
                updateView();
            }, 150);
        }

        function buttonNext() {
            if (!isFlipped) flipCard();
            else nextQuestion();
        }

        updateView();
    </script>
</body>
</html>
