<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Te-form Specialist</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .shake { animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both; }
        @keyframes shake {
            10%, 90% { transform: translate3d(-1px, 0, 0); }
            20%, 80% { transform: translate3d(2px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
            40%, 60% { transform: translate3d(4px, 0, 0); }
        }
        .correct-pop { animation: pop 0.4s ease-out; }
        @keyframes pop {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }
        .mic-active { 
            animation: pulse 1.5s infinite; 
            background-color: #ef4444 !important; 
            box-shadow: 0 0 20px rgba(239, 68, 68, 0.6);
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen font-sans flex flex-col items-center p-4">

    <!-- Browser Check Warning -->
    <div id="browser-warning" class="w-full max-w-md bg-amber-50 border-2 border-amber-400 p-4 rounded-2xl mb-4 text-xs font-bold text-amber-900 shadow-sm">
        <div class="flex items-center mb-2">
            <span class="text-xl mr-2">⚠️</span>
            <span>Koderのプレビューでは音が出ません！</span>
        </div>
        <p class="font-normal">iPadの「ファイル」アプリからこのファイルを探して、<b>Safari</b>で開き直してください。マイクと音声が有効になります。</p>
        <button onclick="testSound()" class="mt-3 w-full bg-amber-500 text-white py-2 rounded-lg font-black uppercase text-[10px] tracking-widest shadow-sm active:bg-amber-600">
            Sound Test (音が出るか確認)
        </button>
    </div>

    <header class="w-full max-w-md bg-teal-700 text-white p-6 rounded-3xl shadow-xl mb-6 text-center">
        <h1 class="text-2xl font-bold italic underline decoration-teal-300">Te-form Specialist 🎙️</h1>
        <p class="text-xs opacity-80 mt-1 uppercase tracking-widest">Mastering verb connections</p>
        <div class="mt-4 flex justify-around text-sm font-bold bg-teal-800/50 py-2 rounded-xl">
            <div>Score: <span id="score-val">0</span></div>
            <div>Streak: <span id="streak-val">0</span></div>
        </div>
    </header>

    <main id="game-card" class="w-full max-w-md bg-white rounded-3xl shadow-2xl p-6 flex flex-col items-center transition-all border-b-8 border-teal-600">
        <div id="target-group" class="bg-teal-100 text-teal-700 px-4 py-1 rounded-full text-[10px] font-black mb-3 uppercase tracking-tighter">Group 1</div>
        <div class="text-slate-400 text-[10px] font-bold uppercase mb-1 tracking-widest italic">Conjugate this verb:</div>
        <div id="base-verb-en" class="text-5xl font-black text-slate-800 mb-8 tracking-tight italic text-center">Wait</div>
        
        <div class="w-full flex items-center justify-center space-x-4 mb-6">
            <div class="h-px flex-grow bg-slate-100"></div>
            <div class="bg-teal-50 text-teal-700 px-3 py-1 rounded-lg text-[10px] font-black uppercase">To Te-form (〜て)</div>
            <div class="h-px flex-grow bg-slate-100"></div>
        </div>

        <div id="input-container" class="w-full space-y-4">
            <div class="flex items-center space-x-2">
                <input type="text" id="user-input" autocomplete="off" autofocus
                       class="flex-grow p-4 text-2xl font-bold border-4 border-slate-100 rounded-2xl text-center focus:border-teal-500 focus:outline-none transition-all" 
                       placeholder="...">
                <button id="mic-btn" onclick="toggleVoiceInput()" 
                        class="w-16 h-16 flex items-center justify-center bg-teal-600 text-white rounded-2xl shadow-lg transition-all active:scale-90">
                    <svg id="mic-icon" xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z" />
                    </svg>
                </button>
            </div>
            <div id="listening-status" class="hidden text-center text-red-500 font-bold text-xs animate-pulse italic">Listening... / 聞き取り中...</div>
            <button id="submit-btn" onclick="checkAnswer()" class="w-full py-5 bg-teal-600 text-white rounded-2xl font-black text-xl shadow-lg active:scale-95 transition-all">CHECK / 確認</button>
        </div>

        <div id="feedback" class="hidden mt-4 w-full text-center space-y-4">
            <div id="result-icon" class="text-5xl"></div>
            <div id="result-msg" class="font-black text-xl uppercase tracking-tighter"></div>
            <div class="bg-slate-50 p-5 rounded-2xl border-2 border-slate-100">
                <div id="display-kanji" class="text-3xl font-black text-slate-700 mb-1"></div>
                <div id="display-kana" class="text-xl font-bold text-teal-500 mb-3"></div>
                <div id="meanings-it" class="text-[10px] text-slate-400 border-t border-slate-200 pt-3 font-bold uppercase italic"></div>
            </div>
            <button id="next-btn" onclick="nextQuestion()" class="w-full py-4 bg-slate-800 text-white rounded-2xl font-black text-lg shadow-md transition-all">NEXT / 次へ →</button>
        </div>
    </main>

    <footer class="mt-8 text-slate-400 text-[10px] font-bold uppercase tracking-widest text-center">
        Te-form Specialist v4.1<br>Designed for Safari & Chrome
    </footer>

    <script>
        const verbs = [
            { group: 1, en: "Go", it: "Andare", te: { kanji: "行って", kana: "いって" } },
            { group: 1, en: "Drink", it: "Bere", te: { kanji: "飲んで", kana: "のんで" } },
            { group: 1, en: "Return", it: "Tornare", te: { kanji: "帰って", kana: "かえって" } },
            { group: 1, en: "Read", it: "Leggere", te: { kanji: "読んで", kana: "よんで" } },
            { group: 1, en: "Write", it: "Scrivere", te: { kanji: "書いて", kana: "かいて" } },
            { group: 1, en: "Listen", it: "Ascoltare", te: { kanji: "聞いて", kana: "きいて" } },
            { group: 1, en: "Buy", it: "Comprare", te: { kanji: "買って", kana: "かって" } },
            { group: 1, en: "Meet", it: "Incontrare", te: { kanji: "会って", kana: "あって" } },
            { group: 1, en: "Wait", it: "Aspettare", te: { kanji: "待って", kana: "まって" } },
            { group: 1, en: "Speak", it: "Parlare", te: { kanji: "話して", kana: "はなして" } },
            { group: 1, en: "Swim", it: "Nuotare", te: { kanji: "泳いで", kana: "およいで" } },
            { group: 2, en: "Eat", it: "Mangiare", te: { kanji: "食べて", kana: "たべて" } },
            { group: 2, en: "See", it: "Vedere", te: { kanji: "見て", kana: "みて" } },
            { group: 2, en: "Sleep", it: "Dormire", te: { kanji: "寝て", kana: "ねて" } },
            { group: 2, en: "Get up", it: "Alzarsi", te: { kanji: "起きて", kana: "おきて" } },
            { group: 3, en: "Do", it: "Fare", te: { kanji: "して", kana: "して" } },
            { group: 3, en: "Come", it: "Venire", te: { kanji: "来て", kana: "きて" } }
        ];

        let currentVerb, score = 0, streak = 0;
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        let recognition = null, isListening = false;

        if (SpeechRecognition) {
            recognition = new SpeechRecognition();
            recognition.lang = 'ja-JP';
            recognition.onstart = () => { isListening = true; document.getElementById('mic-btn').classList.add('mic-active'); document.getElementById('listening-status').classList.remove('hidden'); };
            recognition.onend = () => { isListening = false; document.getElementById('mic-btn').classList.remove('mic-active'); document.getElementById('listening-status').classList.add('hidden'); };
            recognition.onresult = (event) => { document.getElementById('user-input').value = event.results[0][0].transcript.replace(/[。、？！.?!]/g, ""); setTimeout(checkAnswer, 400); };
        }

        function toggleVoiceInput() { if (!recognition) { alert("ブラウザで開き直してください。"); return; } if (isListening) recognition.stop(); else recognition.start(); }

        function nextQuestion() {
            document.getElementById('feedback').classList.add('hidden');
            document.getElementById('input-container').classList.remove('hidden');
            document.getElementById('user-input').value = "";
            document.getElementById('user-input').focus();
            currentVerb = verbs[Math.floor(Math.random() * verbs.length)];
            document.getElementById('target-group').innerText = `Group ${currentVerb.group}`;
            document.getElementById('base-verb-en').innerText = currentVerb.en;
        }

        function checkAnswer() {
            const userInput = document.getElementById('user-input').value.trim();
            if (!userInput && !isListening) return;
            const correctData = currentVerb.te;
            const isCorrect = (userInput === correctData.kanji || userInput === correctData.kana);

            if (isCorrect) {
                score += 10; streak++;
                document.getElementById('result-icon').innerText = "✅";
                document.getElementById('result-msg').innerText = "Excellent!";
                document.getElementById('result-msg').className = "font-black text-xl text-green-600 uppercase tracking-tighter";
                document.getElementById('game-card').classList.add('correct-pop');
                setTimeout(() => document.getElementById('game-card').classList.remove('correct-pop'), 400);
                speak(correctData.kana);
            } else {
                streak = 0;
                document.getElementById('result-icon').innerText = "❌";
                document.getElementById('result-msg').innerText = "Try Again";
                document.getElementById('result-msg').className = "font-black text-xl text-red-600 uppercase tracking-tighter";
                document.getElementById('game-card').classList.add('shake');
                setTimeout(() => document.getElementById('game-card').classList.remove('shake'), 500);
            }
            document.getElementById('score-val').innerText = score;
            document.getElementById('streak-val').innerText = streak;
            document.getElementById('display-kanji').innerText = correctData.kanji;
            document.getElementById('display-kana').innerText = correctData.kana;
            document.getElementById('meanings-it').innerText = `Italian: ${currentVerb.it}`;
            document.getElementById('feedback').classList.remove('hidden');
            document.getElementById('input-container').classList.add('hidden');
        }

        function speak(text) {
            if (!window.speechSynthesis) return;
            window.speechSynthesis.cancel();
            const ut = new SpeechSynthesisUtterance(text);
            ut.lang = 'ja-JP'; ut.rate = 0.8; window.speechSynthesis.speak(ut);
        }

        function testSound() { speak("準備ができました。て形の練習をしましょう。"); alert("音声テストを開始しました。聞こえますか？"); }

        document.getElementById('user-input').addEventListener('keypress', (e) => { if (e.key === 'Enter') document.getElementById('feedback').classList.contains('hidden') ? checkAnswer() : nextQuestion(); });
        window.onload = nextQuestion;
    </script>
</body>
</html>
