<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>L26: Reasons, Requests & Advice</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .card-container { perspective: 1000px; }
        .card { transition: transform 0.6s; transform-style: preserve-3d; cursor: pointer; }
        .card.is-flipped { transform: rotateY(180deg); }
        .card-face {
            backface-visibility: hidden; position: absolute;
            width: 100%; height: 100%; display: flex;
            flex-direction: column; align-items: center;
            justify-content: center; border-radius: 1.5rem;
            box-shadow: 0 10px 25px -5px rgb(0 0 0 / 0.1);
            padding: 2rem;
        }
        .card-back { transform: rotateY(180deg); }
        .emoji-icon { font-size: 5rem; margin-bottom: 1rem; }
        
        .speaker-btn {
            background: #4f46e5;
            color: white;
            width: 70px;
            height: 70px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 14px 0 rgba(79, 70, 229, 0.4);
            transition: all 0.2s ease;
            margin: 1.5rem 0;
        }
        .speaker-btn:active { transform: scale(0.9); background: #4338ca; }
        .speaker-btn svg { width: 35px; height: 35px; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen font-sans flex flex-col text-slate-800">

    <header class="bg-indigo-800 text-white p-4 shadow-lg text-center">
        <h1 class="text-xl font-bold">L26 Sentence Trainer 🔊</h1>
        <p class="text-xs opacity-80 uppercase tracking-widest">~んです • ~ていただけませんか • ~たらいいですか</p>
    </header>

    <main class="flex-grow flex flex-col items-center p-6 max-w-2xl mx-auto w-full">
        <!-- モード選択 -->
        <div class="flex space-x-1 mb-6 bg-slate-200 p-1 rounded-xl w-full overflow-x-auto shadow-inner">
            <button id="mode-ndesu" class="flex-1 whitespace-nowrap px-3 py-3 rounded-lg font-bold transition bg-white shadow text-indigo-800 text-[10px]" onclick="switchMode('ndesu')">
                ~んです (EXPLAIN)
            </button>
            <button id="mode-onegai" class="flex-1 whitespace-nowrap px-3 py-3 rounded-lg font-bold transition text-slate-600 text-[10px]" onclick="switchMode('onegai')">
                ~ていただけませんか (REQUEST)
            </button>
            <button id="mode-advice" class="flex-1 whitespace-nowrap px-3 py-3 rounded-lg font-bold transition text-slate-600 text-[10px]" onclick="switchMode('advice')">
                ~たらいいですか (ADVICE)
            </button>
        </div>

        <!-- 練習エリア -->
        <div id="game-view" class="w-full flex flex-col items-center">
            <div class="card-container w-full h-[540px] relative mb-8">
                <div id="practice-card" class="card w-full h-full relative">
                    
                    <!-- 表面 (問題) -->
                    <div class="card-face card-front bg-white border-2 border-indigo-50 text-center" onclick="flipCard()">
                        <div id="prompt-content" class="flex flex-col items-center w-full">
                            <!-- JSで注入 -->
                        </div>
                        <div class="mt-auto text-[10px] text-slate-300 font-bold uppercase tracking-widest">
                            Tap for Answer / Tocca per la risposta
                        </div>
                    </div>

                    <!-- 裏面 (解答) -->
                    <div class="card-face card-back bg-indigo-50 border-4 border-indigo-600 text-center">
                        <div id="grammar-label" class="text-[10px] text-indigo-600 font-black uppercase tracking-[0.2em] mb-4">Grammar Point</div>
                        
                        <div id="answer-text" class="text-2xl font-black text-slate-900 mb-2 leading-tight px-2"></div>
                        <div id="romaji-text" class="text-sm font-bold text-indigo-500 font-mono mb-4 italic"></div>
                        
                        <button onclick="speakJapanese(event)" class="speaker-btn">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z" />
                            </svg>
                        </button>
                        
                        <div class="w-16 h-px bg-indigo-200 mb-6 mx-auto"></div>
                        
                        <div class="space-y-1 px-4">
                            <div id="it-back" class="text-indigo-800 font-bold text-sm"></div>
                            <div id="en-back" class="text-slate-500 italic text-xs"></div>
                        </div>

                        <div class="mt-auto text-[10px] text-indigo-400 font-bold uppercase cursor-pointer" onclick="nextQuestion()">
                            Next / Prossimo →
                        </div>
                    </div>
                </div>
            </div>

            <!-- コントロール -->
            <div class="flex justify-between w-full items-center px-4">
                <button onclick="prevQuestion()" class="w-12 h-12 flex items-center justify-center rounded-full border-2 border-slate-300 text-slate-400 bg-white">←</button>
                <div class="text-slate-400 font-black text-lg">
                    <span id="current-index" class="text-indigo-700">1</span> / <span id="total-count">0</span>
                </div>
                <button onclick="nextQuestion()" class="w-12 h-12 flex items-center justify-center rounded-full bg-indigo-700 text-white shadow-lg">→</button>
            </div>
        </div>
    </main>

    <script>
        const ndesuData = [
            { 
                icon: "🤒", 
                prompt: "Why are you late? - The bus didn't come.", 
                answer: "A：どうして 遅れたんですか。\nB：バスが 来なかったんです。", 
                romaji: "Doushite okuretan desu ka. Basu ga konakattan desu.", 
                en: "Because the bus didn't come.", 
                it: "Perché l'autobus non è arrivato." 
            },
            { 
                icon: "📸", 
                prompt: "Where did you buy that camera?", 
                answer: "どこで その カメラを 買ったんですか。", 
                romaji: "Doko de sono kamera o kattan desu ka.", 
                en: "Where did you buy that camera?", 
                it: "Dove hai comprato quella macchina fotografica?" 
            },
            { 
                icon: "☔", 
                prompt: "Is it raining? (Curiosity/Seeking info)", 
                answer: "雨が 降って いるんですか。", 
                romaji: "Ame ga futte irun desu ka.", 
                en: "Is it raining? (observation)", 
                it: "Sta piovendo? (osservando la situazione)" 
            },
            { 
                icon: "🍫❌", 
                prompt: "Why don't you eat chocolate? - I'm on a diet.", 
                answer: "A：どうして 食べないんですか。\nB：ダイエットを して いるんです。", 
                romaji: "Doushite tabenain desu ka. Daietto o shite irun desu.", 
                en: "Why don't you eat? Because I'm on a diet.", 
                it: "Perché non mangi? Perché sono a dieta." 
            }
        ];

        const onegaiData = [
            { 
                icon: "📝", 
                prompt: "I wrote a report. Could you check it?", 
                answer: "レポートを 書いたんですが、ちょっと 見て いただけませんか。", 
                romaji: "Repo-to o kaitan desu ga, chotto mite itadakemasen ka.", 
                en: "Could you please take a look at it?", 
                it: "Potrebbe darci un'occhiata, per favore?" 
            },
            { 
                icon: "🗺️", 
                prompt: "I don't know the way. Could you tell me?", 
                answer: "道が わからないんですが、教えて いただけませんか。", 
                romaji: "Michi ga wakaranain desu ga, oshiete itadakemasen ka.", 
                en: "Could you please tell me the way?", 
                it: "Potrebbe indicarmi la strada, per favore?" 
            },
            { 
                icon: "🖋️", 
                prompt: "I forgot my pen. Could you lend me one?", 
                answer: "ペンを 忘れたんですが、貸して いただけませんか。", 
                romaji: "Pen o wasuretan desu ga, kashite itadakemasen ka.", 
                en: "Could you please lend me a pen?", 
                it: "Potrebbe prestarmi una penna, per favore?" 
            }
        ];

        const adviceData = [
            { 
                icon: "🗑️", 
                prompt: "I want to throw away trash. Where should I put it?", 
                answer: "ごみを 捨てたいんですが、どこに 出したら いいですか。", 
                romaji: "Gomi o sutetain desu ga, doko ni dashitara ii desu ka.", 
                en: "Where is it best to put the trash?", 
                it: "Dove dovrei mettere la spazzatura?" 
            },
            { 
                icon: "📱", 
                prompt: "I lost my phone. What should I do?", 
                answer: "スマホを なくしたんですが、どうしたら いいですか。", 
                romaji: "sumaho o nakushitan desu ga, doushitara ii desu ka.", 
                en: "I lost my phone. What should I do?", 
                it: "Ho perso il cellulare. Cosa dovrei fare?" 
            },
            { 
                icon: "🎁", 
                prompt: "I want to buy a wedding gift. What should I buy?", 
                answer: "結婚の お祝いを 買いたいんですが、何を 買ったら いいですか。", 
                romaji: "Kekkon no oiwai o kaitain desu ga, nani o kattara ii desu ka.", 
                en: "What should I buy for a wedding gift?", 
                it: "Cosa dovrei comprare come regalo di nozze?" 
            }
        ];

        let currentMode = 'ndesu';
        let currentIndex = 0;
        let isFlipped = false;

        function getQuestions() {
            if (currentMode === 'ndesu') return ndesuData;
            if (currentMode === 'onegai') return onegaiData;
            return adviceData;
        }

        function getLabel() {
            if (currentMode === 'ndesu') return "ふつうけい + んです (Explanation)";
            if (currentMode === 'onegai') return "~て いただけませんか (Polite Request)";
            return "~たら いいですか (Asking for Advice)";
        }

        function switchMode(mode) {
            currentMode = mode;
            currentIndex = 0;
            isFlipped = false;
            document.getElementById('practice-card').classList.remove('is-flipped');
            
            ['ndesu', 'onegai', 'advice'].forEach(m => {
                document.getElementById(`mode-${m}`).className = "flex-1 whitespace-nowrap px-3 py-3 rounded-lg font-bold transition text-slate-600 text-[10px]";
            });
            
            const activeBtn = document.getElementById(`mode-${mode}`);
            activeBtn.className = "flex-1 whitespace-nowrap px-3 py-3 rounded-lg font-bold transition bg-white shadow text-indigo-800 text-[10px]";

            updateView();
        }

        function updateView() {
            const questions = getQuestions();
            const label = getLabel();
            const q = questions[currentIndex];
            const promptContent = document.getElementById('prompt-content');
            
            promptContent.innerHTML = `
                <div class="emoji-icon">${q.icon}</div>
                <div class="text-slate-400 text-[10px] uppercase tracking-widest mb-2 font-bold">Concept / Hint</div>
                <div class="text-2xl font-black text-slate-800 mb-6 leading-tight px-4">${q.prompt}</div>
                <div class="flex flex-col items-center space-y-2 border-t border-slate-100 pt-6 w-full px-4">
                    <div class="text-sm text-indigo-600 font-bold uppercase tracking-wide">${q.it}</div>
                    <div class="text-sm text-slate-400 italic font-medium">${q.en}</div>
                </div>
            `;

            document.getElementById('current-index').innerText = currentIndex + 1;
            document.getElementById('total-count').innerText = questions.length;
            document.getElementById('answer-text').innerText = q.answer;
            document.getElementById('romaji-text').innerText = q.romaji;
            document.getElementById('it-back').innerText = q.it;
            document.getElementById('en-back').innerText = q.en;
            document.getElementById('grammar-label').innerText = label;
        }

        function flipCard() {
            if (isFlipped) return;
            document.getElementById('practice-card').classList.add('is-flipped');
            isFlipped = true;
        }

        function speakJapanese(event) {
            if (event) event.stopPropagation();
            const questions = getQuestions();
            const fullText = questions[currentIndex].answer;
            
            // 文頭の「A：」や「B：」を正規表現で削除
            const speechText = fullText.replace(/^[AB][：:]/gm, '').replace(/\n/g, ' ');
            
            const ut = new SpeechSynthesisUtterance(speechText);
            ut.lang = 'ja-JP';
            ut.rate = 0.85;
            window.speechSynthesis.cancel(); // 連続再生防止
            window.speechSynthesis.speak(ut);
        }

        function nextQuestion() {
            const questions = getQuestions();
            isFlipped = false;
            document.getElementById('practice-card').classList.remove('is-flipped');
            setTimeout(() => {
                currentIndex = (currentIndex + 1) % questions.length;
                updateView();
            }, 150);
        }

        function prevQuestion() {
            const questions = getQuestions();
            isFlipped = false;
            document.getElementById('practice-card').classList.remove('is-flipped');
            setTimeout(() => {
                currentIndex = (currentIndex - 1 + questions.length) % questions.length;
                updateView();
            }, 150);
        }

        updateView();
    </script>
</body>
</html>
