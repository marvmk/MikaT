<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Japanese Practice: Lesson 35 Master</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .card-container { perspective: 1000px; }
        .card { transition: transform 0.6s; transform-style: preserve-3d; cursor: pointer; }
        .card.is-flipped { transform: rotateY(180deg); }
        .card-face {
            backface-visibility: hidden; position: absolute;
            width: 100%; height: 100%; display: flex;
            flex-direction: column; align-items: center;
            justify-content: center; border-radius: 1.5rem;
            box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1);
            padding: 2rem;
        }
        .card-back { transform: rotateY(180deg); }
        .item-icon { font-size: 4.5rem; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen font-sans flex flex-col">

    <header class="bg-amber-500 text-white p-6 shadow-md text-center">
        <h1 class="text-2xl font-bold italic">L35: Conditionals</h1>
        <p class="text-sm opacity-90 font-medium font-black tracking-widest uppercase">Result Prep System</p>
    </header>

    <main class="flex-grow flex flex-col items-center p-6 max-w-2xl mx-auto w-full">
        <!-- Mode Selector (English Tabs) -->
        <div class="flex space-x-1 mb-8 bg-gray-200 p-1 rounded-xl w-full overflow-x-auto shadow-inner border border-gray-300">
            <button id="mode-conjugation" class="flex-1 whitespace-nowrap px-2 py-3 rounded-lg font-bold transition bg-white shadow-sm text-amber-600 text-xs" onclick="switchMode('conjugation')">
                Ba-Form
            </button>
            <button id="mode-sentences" class="flex-1 whitespace-nowrap px-2 py-3 rounded-lg font-bold transition text-gray-600 text-xs" onclick="switchMode('sentences')">
                Conditionals
            </button>
            <button id="mode-advice" class="flex-1 whitespace-nowrap px-2 py-3 rounded-lg font-bold transition text-gray-600 text-xs" onclick="switchMode('advice')">
                Advice / Nara
            </button>
        </div>

        <!-- Question Area -->
        <div id="game-view" class="w-full flex flex-col items-center">
            <div id="instruction" class="text-gray-400 mb-6 text-center text-xs font-black uppercase tracking-[0.2em]">
                Change to Conditional (Ba-form)
            </div>

            <!-- Card Container -->
            <div class="card-container w-full h-[480px] relative mb-10">
                <div id="practice-card" class="card w-full h-full relative" onclick="flipCard()">
                    <!-- Front -->
                    <div class="card-face card-front bg-white border-2 border-amber-100 text-center">
                        <div id="prompt-content" class="flex flex-col items-center space-y-6 w-full px-4">
                            <!-- Injected by JS -->
                        </div>
                        <div class="mt-auto text-[10px] text-gray-300 font-bold uppercase tracking-widest">Tap to reveal answer</div>
                    </div>
                    <!-- Back -->
                    <div class="card-face card-back bg-amber-50 border-4 border-amber-400 p-8 text-center">
                        <div id="answer-kanji" class="text-3xl font-black text-amber-900 leading-tight mb-4 px-2"></div>
                        <div id="answer-kana" class="text-xl font-bold text-amber-500 mb-8"></div>
                        <div class="h-px w-16 bg-amber-200 mx-auto mb-8"></div>
                        <div id="answer-it" class="text-base text-amber-700 italic font-medium px-4"></div>
                        <div class="mt-auto text-[10px] text-amber-300 font-bold uppercase">Tap for next question</div>
                    </div>
                </div>
            </div>

            <!-- Navigation -->
            <div class="flex justify-between w-full items-center px-2">
                <button onclick="prevQuestion()" class="w-14 h-14 flex items-center justify-center border-2 border-gray-200 rounded-full text-gray-400 bg-white hover:bg-gray-50 transition shadow-sm text-xl font-bold">←</button>
                <div class="flex flex-col items-center">
                    <div class="text-gray-400 font-black text-lg">
                        <span id="current-index" class="text-amber-600 font-black">1</span> 
                        <span class="text-gray-200">/</span> 
                        <span id="total-count">17</span>
                    </div>
                </div>
                <button onclick="nextQuestion()" class="px-10 py-4 bg-amber-500 rounded-full text-white font-black hover:bg-amber-600 transition shadow-lg tracking-widest uppercase text-sm">Next</button>
            </div>
        </div>

        <!-- Finished View -->
        <div id="finished-view" class="hidden w-full flex flex-col items-center justify-center p-12 bg-white rounded-[3rem] shadow-2xl border-4 border-amber-100 text-center">
            <div class="text-7xl mb-8">Finished‼️</div>
            <p class="text-gray-500 font-black uppercase tracking-[0.3em] mb-4 text-sm">Pratica completata!</p>
            <p class="text-lg text-amber-600 font-bold mb-10 italic text-center">Lesson 35 Mastered.</p>
            <button onclick="location.reload()" class="w-full py-5 bg-amber-500 text-white rounded-2xl font-black shadow-xl active:scale-95 transition-all text-xl tracking-widest uppercase">
                Restart
            </button>
        </div>
    </main>

    <footer class="py-8 text-center text-gray-300 text-[10px] font-black tracking-widest uppercase">
        Result Prep System &bull; Mika Tomao
    </footer>

    <script>
        // Mode 1: Conjugation (17 Qs)
        const conjugationData = [
            { icon: "🚶", en: "Go", it: "Se vai", kanji: "行けば", kana: "いけば" },
            { icon: "🥤", en: "Drink", it: "Se bevi", kanji: "飲めば", kana: "のめば" },
            { icon: "🍱", en: "Eat", it: "Se mangi", kanji: "食べれば", kana: "たべれば" },
            { icon: "🎬", en: "See", it: "Se vedi", kanji: "見れば", kana: "みれば" },
            { icon: "⚡", en: "Do", it: "Se fai", kanji: "すれば", kana: "すれば" },
            { icon: "🏃‍♂️⬅️", en: "Come", it: "Se vieni", kanji: "来れば", kana: "くれば" },
            { icon: "🛒", en: "Buy", it: "Se compri", kanji: "買えば", kana: "かえば" },
            { icon: "⌛", en: "Wait", it: "Se aspetti", kanji: "待てば", kana: "まてば" },
            { icon: "📖", en: "Read", it: "Se leggi", kanji: "読めば", kana: "よめば" },
            { icon: "✍️", en: "Write", it: "Se scrivi", kanji: "書けば", kana: "かけば" },
            { icon: "🗣️", en: "Speak", it: "Se parli", kanji: "話せば", kana: "はなせば" },
            { icon: "👂", en: "Listen", it: "Se ascolti", kanji: "聞けば", kana: "きけば" },
            { icon: "🏊‍♂️", en: "Swim", it: "Se nuoti", kanji: "泳げば", kana: "およげば" },
            { icon: "🤝", en: "Meet", it: "Se incontri", kanji: "会えば", kana: "あえば" },
            { icon: "🛌", en: "Sleep", it: "Se dormi", kanji: "寝れば", kana: "ねれば" },
            { icon: "🌅", en: "Wake up", it: "Se ti svegli", kanji: "起きれば", kana: "おきれば" },
            { icon: "📘", en: "Borrow", it: "Se prendi in prestito", kanji: "借りれば", kana: "かりれば" }
        ];

        // Mode 2: Sentences (17 Qs)
        const sentencesData = [
            { icon: "💰", en: "If I have money, I'll buy a car.", it: "Se ho i soldi, compro una macchina.", kanji: "お金があれば、車を買います。", kana: "おかねが あれば、くるまを かいます。" },
            { icon: "🏥", en: "If you go to the hospital, you'll get better.", it: "Se vai in ospedale, ti sentirai meglio.", kanji: "病院へ行けば、よくなります。", kana: "びょういんへ いけば、よくなります。" },
            { icon: "🏷️", en: "If it's cheap, I'll buy it.", it: "Se è economico, lo compro.", kanji: "安ければ、買います。", kana: "やすければ、かいます。" },
            { icon: "☀️", en: "If it's good weather, let's walk.", it: "Se c'è bel tempo, facciamo una passeggiata.", kanji: "天気がよければ、散歩しましょう。", kana: "てんきが よければ、さんぽしましょう。" },
            { icon: "🍱❌", en: "If you don't eat, you'll be hungry.", it: "Se non mangi, avrai fame.", kanji: "食べなければ、おなかがすきます。", kana: "たべなければ、おなかが すきます。" },
            { icon: "📝❌", en: "If it's difficult, you don't have to do it.", it: "Se è difficile, non devi farlo.", kanji: "難しければ、しなくてもいいです。", kana: "むずかしくれば、しなくても いいです。" },
            { icon: "📖✅", en: "If you study, you'll pass.", it: "Se studi, passerai l'esame.", kanji: "勉強すれば、合格します。", kana: "べんきょうすれば、ごうかくします。" },
            { icon: "🔘🚪", en: "If you press this, the door opens.", it: "Se premi questo, la porta si apre.", kanji: "これを押せば、ドアが開きます。", kana: "これを おせば、どあが あきます。" },
            { icon: "👨‍🏫", en: "If you ask the teacher, you'll understand.", it: "Se chiedi al professore, capirai.", kanji: "先生に聞けば、わかります。", kana: "せんせいに きけば、わかります。" },
            { icon: "🆓", en: "If you are free, let's go.", it: "Se sei libero, andiamo.", kanji: "暇なら、行きましょう。", kana: "ひまなら、いきましょう。" },
            { icon: "🏃‍♂️💨", en: "If you run, you'll make it.", it: "Se corri, farai in tempo.", kanji: "走れば、間に合います。", kana: "はしれば、まにあいます。" },
            { icon: "🌧️❌", en: "If it rains, the party is cancelled.", it: "Se piove, la festa è annullata.", kanji: "雨が降れば、パーティーは中止です。", kana: "あめが ふれば、ぱーてぃーは ちゅうしです。" },
            { icon: "🗺️", en: "If you look at the map, you'll know.", it: "Se guardi la mappa, lo saprai.", kanji: "地図を見れば、わかります。", kana: "ちずを みれば、わかります。" },
            { icon: "🎾", en: "If you practice, you'll be good.", it: "Se fai pratica, diventerai bravo.", kanji: "練習すれば、上手になります。", kana: "れんしゅうすれば、じょうずになります。" },
            { icon: "🤫", en: "If it's quiet, I can sleep.", it: "Se è silenzioso, posso dormire.", kanji: "静かなら、寝られます。", kana: "しずかなら、ねられます。" },
            { icon: "☕💡", en: "If I drink coffee, I wake up.", it: "Se bevo caffè, mi sveglio.", kanji: "コーヒーを飲めば、目が覚めます。", kana: "こーひーを のめば、めが さめます。" },
            { icon: "🛠️✨", en: "If you use this, it's easy.", it: "Se usi questo, è facile.", kanji: "これを使えば、簡単です。", kana: "これを つかえば、かんたんです。" }
        ];

        // Mode 3: Advice/Nara (17 Qs)
        const adviceData = [
            { icon: "🎫", en: "Where should I buy a ticket?", it: "Dove dovrei comprare il biglietto?", kanji: "どこで切符を買えばいいですか。", kana: "どこで きっぷを かえばいいですか。" },
            { icon: "📷", en: "If it's about cameras, Akihabara is good.", it: "Se si tratta di fotocamere, Akihabara va bene.", kanji: "カメラなら、秋葉原がいいですよ。", kana: "かめらなら、あきはばらが いいですよ。" },
            { icon: "💬", en: "What should I say?", it: "Cosa dovrei dire?", kanji: "何と言えばいいですか。", kana: "なんと いえば いいですか。" },
            { icon: "🚉", en: "How should I go to the station?", it: "Come dovrei andare alla stazione?", kanji: "駅へはどう行けばいいですか。", kana: "えきへは どう いけば いいですか。" },
            { icon: "🍣", en: "If it's about sushi, that shop is famous.", it: "Se si tratta di sushi, quel negozio è famoso.", kanji: "寿司なら、あの店が有名ですよ。", kana: "すしなら、あの みせが ゆうめいですよ。" },
            { icon: "❓", en: "Who should I ask?", it: "A chi dovrei chiedere?", kanji: "だれに聞けばいいですか。", kana: "だれに きけば いいですか。" },
            { icon: "🎁", en: "When should I bring it?", it: "Quando dovrei portarlo?", kanji: "いつ持ってくればいいですか。", kana: "いつ もってくれば いいですか。" },
            { icon: "🎒", en: "If it's about a trip, talk to Tanaka.", it: "Se si tratta di un viaggio, parla con Tanaka.", kanji: "旅行なら、田中さんに相談してください。", kana: "りょこうなら、たなかさんに そうだんしてください。" },
            { icon: "🛠️", en: "How should I use this?", it: "Come dovrei usare questo?", kanji: "どうやって使えばいいですか。", kana: "どうやって つかえば いいですか。" },
            { icon: "🍽️", en: "What should I eat?", it: "Cosa dovrei mangiare?", kanji: "何を食べればいいですか。", kana: "なにを たべれば いいですか。" },
            { icon: "⚽", en: "If it's about sports, I like soccer.", it: "Se si tratta di sport, mi piace il calcio.", kanji: "スポーツなら、サッカーが好きです。", kana: "すぽーつなら、さっかーが すきです。" },
            { icon: "🅿️", en: "Where should I park the car?", it: "Dove dovrei parcheggiare l'auto?", kanji: "どこに車を止めればいいですか。", kana: "どこに くるまを とめれば いいですか。" },
            { icon: "🏨", en: "If it's about a hotel, I recommend this one.", it: "Se si tratta di un hotel, consiglio questo.", kanji: "ホテルなら、ここがおすすめです。", kana: "ほてるなら、ここが おすすめです。" },
            { icon: "✍️", en: "How should I write it?", it: "Come dovrei scriverlo?", kanji: "どう書けばいいですか。", kana: "どう かけば いいですか。" },
            { icon: "🌹", en: "If it's about a present, flowers are good.", it: "Se si tratta di un regalo, i fiori vanno bene.", kanji: "プレゼントなら、花がいいですよ。", kana: "ぷれぜんとなら、はなが いいですよ。" },
            { icon: "📞", en: "Who should I call?", it: "Chi dovrei chiamare?", kanji: "だれに電話すればいいですか。", kana: "だれに でんわすれば いいですか。" },
            { icon: "⏰", en: "If it's about the time, 10:00 is convenient.", it: "Se si tratta dell'orario, le 10:00 sono comode.", kanji: "時間なら、１０時が都合がいいです。", kana: "じかんなら、じゅうじが つごうが いいです。" }
        ];

        let currentMode = 'conjugation';
        let currentIndex = 0;
        let isFlipped = false;

        function switchMode(mode) {
            currentMode = mode;
            currentIndex = 0;
            isFlipped = false;
            document.getElementById('practice-card').classList.remove('is-flipped');
            document.getElementById('game-view').classList.remove('hidden');
            document.getElementById('finished-view').classList.add('hidden');
            
            const modes = ['conjugation', 'sentences', 'advice'];
            modes.forEach(m => {
                const btn = document.getElementById(`mode-${m}`);
                if(m === mode) {
                    btn.classList.add('bg-white', 'shadow-sm', 'text-amber-600');
                    btn.classList.remove('text-gray-600');
                } else {
                    btn.classList.remove('bg-white', 'shadow-sm', 'text-amber-600');
                    btn.classList.add('text-gray-600');
                }
            });

            const instr = document.getElementById('instruction');
            if(mode === 'conjugation') instr.innerText = "Change to Conditional (Ba-form)";
            else if(mode === 'sentences') instr.innerText = "Conditionals: If A, then B";
            else instr.innerText = "Advice & Nara: What should I do?";
            
            updateView();
        }

        function updateView() {
            const data = { conjugation: conjugationData, sentences: sentencesData, advice: adviceData };
            const questions = data[currentMode];
            const q = questions[currentIndex];
            const promptContent = document.getElementById('prompt-content');
            
            document.getElementById('current-index').innerText = currentIndex + 1;
            document.getElementById('total-count').innerText = questions.length;
            
            document.getElementById('answer-kanji').innerText = q.kanji;
            document.getElementById('answer-kana').innerText = q.kana;
            document.getElementById('answer-it').innerText = q.it;

            promptContent.innerHTML = `
                <div class="item-icon mb-4">${q.icon}</div>
                <div class="text-center px-6">
                    <div class="text-gray-400 text-[10px] font-black uppercase tracking-[0.2em] mb-4">Target Meaning / Scenario</div>
                    <div class="text-3xl font-black text-gray-800 leading-tight italic px-4">${q.en}</div>
                </div>
            `;
        }

        function flipCard() {
            const card = document.getElementById('practice-card');
            if (!isFlipped) {
                card.classList.add('is-flipped');
                isFlipped = true;
                speakJapanese();
            } else {
                nextQuestion();
            }
        }

        function speakJapanese() {
            const data = { conjugation: conjugationData, sentences: sentencesData, advice: adviceData };
            const text = data[currentMode][currentIndex].kana;
            const ut = new SpeechSynthesisUtterance(text);
            ut.lang = 'ja-JP';
            ut.rate = 0.95;
            window.speechSynthesis.speak(ut);
        }

        function nextQuestion() {
            const data = { conjugation: conjugationData, sentences: sentencesData, advice: adviceData };
            const questions = data[currentMode];
            
            if (isFlipped && currentIndex === questions.length - 1) {
                document.getElementById('game-view').classList.add('hidden');
                document.getElementById('finished-view').classList.remove('hidden');
                speakFinish();
                return;
            }

            isFlipped = false;
            document.getElementById('practice-card').classList.remove('is-flipped');
            setTimeout(() => {
                currentIndex = (currentIndex + 1) % questions.length;
                updateView();
            }, 150);
        }

        function prevQuestion() {
            const data = { conjugation: conjugationData, sentences: sentencesData, advice: adviceData };
            const questions = questions = data[currentMode];
            isFlipped = false;
            document.getElementById('practice-card').classList.remove('is-flipped');
            setTimeout(() => {
                currentIndex = (currentIndex - 1 + questions.length) % questions.length;
                updateView();
            }, 150);
        }

        function speakFinish() {
            const ut = new SpeechSynthesisUtterance("お疲れ様でした！練習が終わりました。");
            ut.lang = 'ja-JP';
            window.speechSynthesis.speak(ut);
        }

        updateView();
    </script>
</body>
</html>
