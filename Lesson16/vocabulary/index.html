<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>L16 Vocabulary: Trilingual Training</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .card-container { perspective: 1000px; }
        .card { transition: transform 0.6s; transform-style: preserve-3d; cursor: pointer; }
        .card.is-flipped { transform: rotateY(180deg); }
        .card-face {
            backface-visibility: hidden; position: absolute;
            width: 100%; height: 100%; display: flex;
            flex-direction: column; align-items: center;
            justify-content: center; border-radius: 1.5rem;
            box-shadow: 0 10px 25px -5px rgb(0 0 0 / 0.1);
            padding: 1.5rem;
        }
        .card-back { transform: rotateY(180deg); }
        .action-icon { font-size: 5rem; }
        
        .speaker-btn {
            background: #8b5cf6;
            color: white;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 6px 20px rgba(139, 92, 246, 0.4);
            transition: all 0.2s ease;
            margin-bottom: 1rem;
        }
        .speaker-btn:active { transform: scale(0.9); background: #7c3aed; }
        .speaker-btn svg { width: 40px; height: 40px; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen font-sans flex flex-col">

    <header class="bg-violet-900 text-white p-4 shadow-lg text-center">
        <h1 class="text-xl font-bold">L16 Vocab: Trilingue 🔊</h1>
        <p class="text-xs opacity-80 uppercase tracking-widest">Hiragana • Romaji • Audio • IT • EN</p>
    </header>

    <main class="flex-grow flex flex-col items-center p-6 max-w-2xl mx-auto w-full">
        <!-- Selector -->
        <div class="flex space-x-1 mb-6 bg-slate-200 p-1 rounded-xl w-full overflow-x-auto shadow-inner">
            <button id="mode-verb" class="flex-1 whitespace-nowrap px-4 py-3 rounded-lg font-bold transition bg-white shadow text-violet-800" onclick="switchMode('verb')">VERBS</button>
            <button id="mode-adj" class="flex-1 whitespace-nowrap px-4 py-3 rounded-lg font-bold transition text-slate-600" onclick="switchMode('adj')">ADJECTIVES</button>
            <button id="mode-body" class="flex-1 whitespace-nowrap px-4 py-3 rounded-lg font-bold transition text-slate-600" onclick="switchMode('body')">BODY/OTHER</button>
        </div>

        <!-- Card Area -->
        <div class="card-container w-full h-[500px] relative mb-8">
            <div id="practice-card" class="card w-full h-full relative">
                
                <!-- Front Side -->
                <div class="card-face card-front bg-white border-2 border-violet-50 text-center" onclick="flipCard()">
                    <div id="prompt-content" class="flex flex-col items-center space-y-6"></div>
                    <div class="mt-auto text-[10px] text-slate-300 font-bold uppercase tracking-widest">Tap for Japanese / Tocca per il giapponese</div>
                </div>

                <!-- Back Side -->
                <div class="card-face card-back bg-violet-50 border-4 border-violet-600 text-center">
                    <div id="type-label" class="text-[10px] text-violet-600 font-black uppercase tracking-[0.2em] mb-4">Risposta</div>
                    
                    <div id="answer-text" class="text-4xl font-black text-violet-950 mb-1 leading-tight"></div>
                    <div id="romaji-text" class="text-2xl font-bold text-violet-600 font-mono mb-8"></div>
                    
                    <!-- Manual Audio Trigger -->
                    <button id="audio-btn" onclick="speakJapanese(event)" class="speaker-btn">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z" />
                        </svg>
                    </button>
                    
                    <div class="w-16 h-1 bg-violet-200 mb-6 mx-auto"></div>
                    
                    <div class="flex flex-col items-center space-y-1 px-4">
                        <div id="en-back" class="text-slate-500 italic"></div>
                        <div id="it-back" class="text-lg text-violet-800 font-bold"></div>
                    </div>

                    <div class="mt-auto text-[10px] text-violet-400 font-bold uppercase tracking-widest cursor-pointer" onclick="nextQuestion()">Next / Prossimo →</div>
                </div>
            </div>
        </div>

        <!-- Controls -->
        <div class="flex justify-between w-full items-center px-4">
            <button onclick="prevQuestion()" class="w-12 h-12 flex items-center justify-center rounded-full border-2 border-slate-300 text-slate-400 bg-white">←</button>
            <div class="text-slate-400 font-black text-lg"><span id="current-index" class="text-violet-700">1</span> / <span id="total-count">0</span></div>
            <button onclick="nextQuestion()" class="w-12 h-12 flex items-center justify-center rounded-full bg-violet-700 text-white shadow-lg">→</button>
        </div>
    </main>

    <script>
        const verbList = [
            { icon: "🚃⬆️", en: "ride / get on [a train]", it: "salire su [il treno]", answer: "のります", romaji: "norimasu" },
            { icon: "🚃⬇️", en: "get off [a train]", it: "scendere da [il treno]", answer: "おります", romaji: "orimasu" },
            { icon: "🚃↔️🚃", en: "change trains", it: "cambiare treno", answer: "のりかえます", romaji: "norikaemasu" },
            { icon: "🚿", en: "take [a shower]", it: "fare [una doccia]", answer: "あびます", romaji: "abimasu" },
            { icon: "📥💰", en: "put in / insert", it: "inserire / mettere dentro", answer: "いれます", romaji: "iremasu" },
            { icon: "📤💰", en: "take out / withdraw", it: "prelevare / estrarre", answer: "だします", romaji: "dashimasu" },
            { icon: "🎓🏢", en: "enter [university]", it: "entrare [all'università]", answer: "はいります", romaji: "hairimasu" },
            { icon: "🎓🌸", en: "graduate from [university]", it: "laurearsi / uscire", answer: "でます", romaji: "demasu" },
            { icon: "🏢👋", en: "quit [a company]", it: "dimettersi / lasciare", answer: "やめます", romaji: "yamemasu" },
            { icon: "🔘👈", en: "push / press", it: "premere / spingere", answer: "おします", romaji: "oshimasu" }
        ];

        const adjList = [
            { icon: "👦✨", en: "young", it: "giovane", answer: "わかい", romaji: "wakai" },
            { icon: "📏➖", en: "long", it: "lungo", answer: "ながい", romaji: "nagai" },
            { icon: "📏. ", en: "short", it: "corto", answer: "みじかい", romaji: "mijikai" },
            { icon: "💡✨", en: "bright", it: "luminoso / chiaro", answer: "あかるい", romaji: "akarui" },
            { icon: "🌑", en: "dark", it: "buio / scuro", answer: "くらい", romaji: "kurai" },
            { icon: "🦒", en: "tall (person)", it: "alto (persona)", answer: "せがたかい", romaji: "se ga takai" }
        ];

        const bodyOtherList = [
            { icon: "🧍", en: "body", it: "corpo", answer: "からだ", romaji: "karada" },
            { icon: "🧠", en: "head", it: "testa", answer: "あたま", romaji: "atama" },
            { icon: "💇", en: "hair", it: "capelli", answer: "かみ", romaji: "kami" },
            { icon: "👤", en: "face", it: "viso / faccia", answer: "かお", romaji: "kao" },
            { icon: "👀", en: "eye", it: "occhio", answer: "め", romaji: "me" },
            { icon: "👂", en: "ear", it: "orecchio", answer: "みみ", romaji: "mimi" },
            { icon: "👄", en: "mouth", it: "bocca", answer: "くち", romaji: "kuchi" },
            { icon: "🦷", en: "tooth", it: "dente", answer: "は", romaji: "ha" },
            { icon: "肚", en: "stomach / belly", it: "pancia / stomaco", answer: "おなか", romaji: "onaka" },
            { icon: "🦶", en: "foot / leg", it: "piede / gamba", answer: "あし", romaji: "ashi" },
            { icon: "🏃‍♂️", en: "jogging", it: "jogging", answer: "ジョギング", romaji: "jogingu" },
            { icon: "⛩️", en: "shrine", it: "santuario shintoista", answer: "じんじゃ", romaji: "jinja" },
            { icon: "🏮", en: "temple", it: "tempio buddista", answer: "おてら", romaji: "otera" },
            { icon: "🔢", en: "number", it: "numero", answer: "ばんごう", romaji: "bangō" }
        ];

        let currentMode = 'verb';
        let currentIndex = 0;
        let isFlipped = false;

        function switchMode(mode) {
            currentMode = mode; currentIndex = 0; isFlipped = false;
            document.getElementById('practice-card').classList.remove('is-flipped');
            updateView();
            const modes = ['verb', 'adj', 'body'];
            modes.forEach(m => {
                const btn = document.getElementById(`mode-${m}`);
                if(m === mode) {
                    btn.className = "flex-1 whitespace-nowrap px-4 py-3 rounded-lg font-bold transition bg-white shadow text-violet-800";
                } else {
                    btn.className = "flex-1 whitespace-nowrap px-4 py-3 rounded-lg font-bold transition text-slate-600";
                }
            });
        }

        function updateView() {
            let list;
            let typeLabel;
            if(currentMode === 'verb') { list = verbList; typeLabel = "Verbs"; }
            else if(currentMode === 'adj') { list = adjList; typeLabel = "Adjectives"; }
            else { list = bodyOtherList; typeLabel = "Body / Other"; }
            
            const item = list[currentIndex];
            const promptContent = document.getElementById('prompt-content');
            promptContent.innerHTML = `
                <div class="action-icon mb-2">${item.icon}</div>
                <div class="space-y-4">
                    <div>
                        <div class="text-[10px] text-slate-400 font-bold uppercase mb-1 tracking-widest">English</div>
                        <div class="text-xl text-slate-800 font-medium">${item.en}</div>
                    </div>
                    <div class="flex justify-center"><div class="h-px w-12 bg-slate-100"></div></div>
                    <div>
                        <div class="text-[10px] text-violet-500 font-bold uppercase mb-1 tracking-widest">Italiano</div>
                        <div class="text-xl text-violet-700 font-bold">${item.it}</div>
                    </div>
                </div>
            `;
            document.getElementById('current-index').innerText = currentIndex + 1;
            document.getElementById('total-count').innerText = list.length;
            document.getElementById('answer-text').innerText = item.answer;
            document.getElementById('romaji-text').innerText = item.romaji;
            document.getElementById('en-back').innerText = item.en;
            document.getElementById('it-back').innerText = item.it;
            document.getElementById('type-label').innerText = typeLabel;
        }

        function flipCard() {
            if (isFlipped) return;
            document.getElementById('practice-card').classList.add('is-flipped');
            isFlipped = true;
        }

        function speakJapanese(event) {
            if (event) event.stopPropagation();
            let list;
            if(currentMode === 'verb') list = verbList;
            else if(currentMode === 'adj') list = adjList;
            else list = bodyOtherList;

            const word = list[currentIndex].answer;
            const ut = new SpeechSynthesisUtterance(word);
            ut.lang = 'ja-JP';
            ut.rate = 0.85;
            window.speechSynthesis.speak(ut);
        }

        function nextQuestion() {
            const list = currentMode === 'verb' ? verbList : (currentMode === 'adj' ? adjList : bodyOtherList);
            isFlipped = false;
            document.getElementById('practice-card').classList.remove('is-flipped');
            setTimeout(() => {
                currentIndex = (currentIndex + 1) % list.length;
                updateView();
            }, 150);
        }

        function prevQuestion() {
            const list = currentMode === 'verb' ? verbList : (currentMode === 'adj' ? adjList : bodyOtherList);
            isFlipped = false;
            document.getElementById('practice-card').classList.remove('is-flipped');
            setTimeout(() => {
                currentIndex = (currentIndex - 1 + list.length) % list.length;
                updateView();
            }, 150);
        }
        
        window.speechSynthesis.getVoices();
        updateView();
    </script>
</body>
</html>
