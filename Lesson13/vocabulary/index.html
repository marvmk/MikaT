<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>L13 Vocabulary: Trilingual Training</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .card-container { perspective: 1000px; }
        .card { transition: transform 0.6s; transform-style: preserve-3d; cursor: pointer; }
        .card.is-flipped { transform: rotateY(180deg); }
        .card-face {
            backface-visibility: hidden; position: absolute;
            width: 100%; height: 100%; display: flex;
            flex-direction: column; align-items: center;
            justify-content: center; border-radius: 1.5rem;
            box-shadow: 0 10px 25px -5px rgb(0 0 0 / 0.1);
            padding: 1.5rem;
        }
        .card-back { transform: rotateY(180deg); }
        .action-icon { font-size: 5rem; }
        
        .speaker-btn {
            background: #ef4444;
            color: white;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 6px 20px rgba(239, 68, 68, 0.4);
            transition: all 0.2s ease;
            margin-bottom: 1rem;
        }
        .speaker-btn:active { transform: scale(0.9); background: #dc2626; }
        .speaker-btn svg { width: 40px; height: 40px; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen font-sans flex flex-col">

    <header class="bg-red-800 text-white p-4 shadow-lg text-center">
        <h1 class="text-xl font-bold">L13 Vocab: Trilingue 🔊</h1>
        <p class="text-xs opacity-80 uppercase tracking-widest">Hiragana • Romaji • Audio • IT • EN</p>
    </header>

    <main class="flex-grow flex flex-col items-center p-6 max-w-2xl mx-auto w-full">
        <!-- Selector -->
        <div class="flex space-x-1 mb-6 bg-slate-200 p-1 rounded-xl w-full overflow-x-auto shadow-inner">
            <button id="mode-verb" class="flex-1 whitespace-nowrap px-4 py-3 rounded-lg font-bold transition bg-white shadow text-red-800" onclick="switchMode('verb')">VERBS</button>
            <button id="mode-adj" class="flex-1 whitespace-nowrap px-4 py-3 rounded-lg font-bold transition text-slate-600" onclick="switchMode('adj')">ADJECTIVES</button>
            <button id="mode-noun" class="flex-1 whitespace-nowrap px-4 py-3 rounded-lg font-bold transition text-slate-600" onclick="switchMode('noun')">NOUNS/PHRASES</button>
        </div>

        <!-- Card Area -->
        <div class="card-container w-full h-[500px] relative mb-8">
            <div id="practice-card" class="card w-full h-full relative">
                
                <!-- Front Side -->
                <div class="card-face card-front bg-white border-2 border-red-50 p-8 text-center" onclick="flipCard()">
                    <div id="prompt-content" class="flex flex-col items-center space-y-6"></div>
                    <div class="mt-auto text-[10px] text-slate-300 font-bold uppercase tracking-widest">Tap for Japanese / Tocca per la risposta</div>
                </div>

                <!-- Back Side -->
                <div class="card-face card-back bg-red-50 border-4 border-red-600 p-8 text-center">
                    <div id="type-label" class="text-[10px] text-red-600 font-black uppercase tracking-[0.2em] mb-4">Risposta</div>
                    
                    <div id="answer-text" class="text-4xl font-black text-red-950 mb-1 leading-tight"></div>
                    <div id="romaji-text" class="text-2xl font-bold text-red-600 font-mono mb-8"></div>
                    
                    <!-- Manual Audio Trigger -->
                    <button onclick="speakJapanese(event)" class="speaker-btn">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z" />
                        </svg>
                    </button>
                    
                    <div class="w-16 h-1 bg-red-200 mb-6 mx-auto"></div>
                    
                    <div class="flex flex-col items-center space-y-1 px-4">
                        <div id="en-back" class="text-slate-500 italic"></div>
                        <div id="it-back" class="text-lg text-red-800 font-bold"></div>
                    </div>

                    <div class="mt-auto text-[10px] text-red-400 font-bold uppercase tracking-widest cursor-pointer" onclick="nextQuestion()">Next / Prossimo →</div>
                </div>
            </div>
        </div>

        <!-- Controls -->
        <div class="flex justify-between w-full items-center px-4">
            <button onclick="prevQuestion()" class="w-12 h-12 flex items-center justify-center rounded-full border-2 border-slate-300 text-slate-400 bg-white">←</button>
            <div class="text-slate-400 font-black text-lg"><span id="current-index" class="text-red-700">1</span> / <span id="total-count">0</span></div>
            <button onclick="nextQuestion()" class="w-12 h-12 flex items-center justify-center rounded-full bg-red-600 text-white shadow-lg">→</button>
        </div>
    </main>

    <script>
        const verbList = [
            { icon: "🎮", en: "play / hang out", it: "giocare / uscire", answer: "あそびます", romaji: "asobimasu" },
            { icon: "🏊", en: "swim", it: "nuotare", answer: "およぎます", romaji: "oyogimasu" },
            { icon: "🤝", en: "go to meet / welcome", it: "accogliere / andare a prendere", answer: "むかえます", romaji: "mukaemasu" },
            { icon: "😫", en: "get tired", it: "stancarsi", answer: "つかれます", romaji: "tsukaremasu" },
            { icon: "✉️📤", en: "send [a letter]", it: "spedire [una lettera]", answer: "だします", romaji: "dashimasu" },
            { icon: "🚪📥", en: "enter", it: "entrare", answer: "はいります", romaji: "hairimasu" },
            { icon: "🚪📤", en: "go out", it: "uscire", answer: "でます", romaji: "demasu" },
            { icon: "💍", en: "marry", it: "sposarsi", answer: "けっこんします", romaji: "kekkonshimasu" },
            { icon: "🛍️", en: "do shopping", it: "fare la spesa / shopping", answer: "かいものします", romaji: "kaimonoshimasu" },
            { icon: "🍱", en: "have a meal", it: "mangiare / consumare un pasto", answer: "しょくじします", romaji: "shokujishimasu" },
            { icon: "🌳🚶", en: "take a walk [in a park]", it: "passeggiare [nel parco]", answer: "さんぽします", romaji: "sanposhimasu" }
        ];

        const adjList = [
            { icon: "🏋️‍♂️", en: "hard / tough", it: "faticoso / duro", answer: "たいへん[な]", audio: "たいへん", romaji: "taihen" },
            { icon: "🎁✨", en: "want", it: "volere", answer: "ほしい", romaji: "hoshii" },
            { icon: "😢", en: "lonely", it: "solitario / triste", answer: "さびしい", romaji: "sabishii" },
            { icon: "🏟️", en: "wide / spacious", it: "largo / spazioso", answer: "ひろい", romaji: "hiroi" },
            { icon: "🚪🤏", en: "narrow", it: "stretto / piccolo", answer: "せまい", romaji: "semai" }
        ];

        const nounList = [
            { icon: "🏊‍♂️🏢", en: "swimming pool", it: "piscina", answer: "プール", romaji: "pūru" },
            { icon: "🏞️", en: "river", it: "fiume", answer: "かわ", romaji: "kawa" },
            { icon: "🎨🏛️", en: "arts", it: "arte", answer: "びじゅつ", romaji: "bijutsu" },
            { icon: "🎣", en: "fishing", it: "pesca", answer: "つり", romaji: "tsuri" },
            { icon: "⛷️", en: "skiing", it: "sci", answer: "スキー", romaji: "sukī" },
            { icon: "👨‍💻💬", en: "meeting", it: "riunione / meeting", answer: "かいぎ", romaji: "kaigi" },
            { icon: "🍱❓", en: "I'm hungry.", it: "Ho fame.", answer: "おなかが すきました。", romaji: "Onaka ga sukimashita." },
            { icon: "🍱✅", en: "I'm full.", it: "Sono pieno.", answer: "おなかが いっぱいです。", romaji: "Onaka ga ippai desu." },
            { icon: "🥤❓", en: "I'm thirsty.", it: "Ho sete.", answer: "のどが かわきました。", romaji: "Nodo ga kawakimashita." }
        ];

        let currentMode = 'verb';
        let currentIndex = 0;
        let isFlipped = false;

        function switchMode(mode) {
            currentMode = mode; currentIndex = 0; isFlipped = false;
            document.getElementById('practice-card').classList.remove('is-flipped');
            updateView();
            const modes = ['verb', 'adj', 'noun'];
            modes.forEach(m => {
                const btn = document.getElementById(`mode-${m}`);
                if(m === mode) {
                    btn.className = "flex-1 whitespace-nowrap px-4 py-3 rounded-lg font-bold transition bg-white shadow text-red-800";
                } else {
                    btn.className = "flex-1 whitespace-nowrap px-4 py-3 rounded-lg font-bold transition text-slate-600";
                }
            });
        }

        function updateView() {
            let list;
            let typeLabel;
            if(currentMode === 'verb') { list = verbList; typeLabel = "Verbs"; }
            else if(currentMode === 'adj') { list = adjList; typeLabel = "Adjectives"; }
            else { list = nounList; typeLabel = "Nouns / Phrases"; }
            
            const item = list[currentIndex];
            const promptContent = document.getElementById('prompt-content');
            promptContent.innerHTML = `
                <div class="action-icon mb-2">${item.icon}</div>
                <div class="space-y-4">
                    <div>
                        <div class="text-[10px] text-slate-400 font-bold uppercase mb-1 tracking-widest">English</div>
                        <div class="text-xl text-slate-800 font-medium">${item.en}</div>
                    </div>
                    <div class="flex justify-center"><div class="h-px w-12 bg-slate-100"></div></div>
                    <div>
                        <div class="text-[10px] text-red-500 font-bold uppercase mb-1 tracking-widest">Italiano</div>
                        <div class="text-xl text-red-700 font-bold">${item.it}</div>
                    </div>
                </div>
            `;
            document.getElementById('current-index').innerText = currentIndex + 1;
            document.getElementById('total-count').innerText = list.length;
            document.getElementById('answer-text').innerText = item.answer;
            document.getElementById('romaji-text').innerText = item.romaji;
            document.getElementById('en-back').innerText = item.en;
            document.getElementById('it-back').innerText = item.it;
            document.getElementById('type-label').innerText = typeLabel;
        }

        function flipCard() {
            if (isFlipped) return;
            document.getElementById('practice-card').classList.add('is-flipped');
            isFlipped = true;
        }

        function speakJapanese(event) {
            if (event) event.stopPropagation();
            let list;
            if(currentMode === 'verb') list = verbList;
            else if(currentMode === 'adj') list = adjList;
            else list = nounList;

            const word = list[currentIndex].audio || list[currentIndex].answer;
            const ut = new SpeechSynthesisUtterance(word);
            ut.lang = 'ja-JP';
            ut.rate = 0.85;
            window.speechSynthesis.speak(ut);
        }

        function nextQuestion() {
            const list = currentMode === 'verb' ? verbList : (currentMode === 'adj' ? adjList : nounList);
            isFlipped = false;
            document.getElementById('practice-card').classList.remove('is-flipped');
            setTimeout(() => {
                currentIndex = (currentIndex + 1) % list.length;
                updateView();
            }, 150);
        }

        function prevQuestion() {
            const list = currentMode === 'verb' ? verbList : (currentMode === 'adj' ? adjList : nounList);
            isFlipped = false;
            document.getElementById('practice-card').classList.remove('is-flipped');
            setTimeout(() => {
                currentIndex = (currentIndex - 1 + list.length) % list.length;
                updateView();
            }, 150);
        }
        
        window.speechSynthesis.getVoices();
        updateView();
    </script>
</body>
</html>
