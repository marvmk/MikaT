<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>L43 Vocabulary Trainer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .card-container { perspective: 1000px; }
        .card { transition: transform 0.6s; transform-style: preserve-3d; cursor: pointer; }
        .card.is-flipped { transform: rotateY(180deg); }
        .card-face {
            backface-visibility: hidden; position: absolute;
            width: 100%; height: 100%; display: flex;
            flex-direction: column; align-items: center;
            justify-content: center; border-radius: 2rem;
            box-shadow: 0 10px 25px -5px rgb(0 0 0 / 0.1);
            padding: 2rem;
        }
        .card-back { transform: rotateY(180deg); }
        .item-icon { font-size: 6rem; line-height: 1; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen font-sans flex flex-col">

    <header class="bg-amber-500 text-white p-6 shadow-md text-center">
        <h1 class="text-2xl font-bold italic">L43: Vocabulary Trainer</h1>
        <p class="text-sm opacity-90 font-black tracking-widest uppercase">Result Prep System</p>
    </header>

    <main class="flex-grow flex flex-col items-center p-6 max-w-2xl mx-auto w-full">
        <div class="flex space-x-1 mb-8 bg-gray-200 p-1 rounded-xl w-full overflow-x-auto shadow-inner border border-gray-300">
            <button id="mode-all" class="flex-1 whitespace-nowrap px-2 py-3 rounded-lg font-bold transition bg-white shadow-sm text-amber-600 text-xs" onclick="switchMode('all')">All</button>
            <button id="mode-verb" class="flex-1 whitespace-nowrap px-2 py-3 rounded-lg font-bold transition text-gray-600 text-xs" onclick="switchMode('verb')">Verbs</button>
            <button id="mode-adj" class="flex-1 whitespace-nowrap px-2 py-3 rounded-lg font-bold transition text-gray-600 text-xs" onclick="switchMode('adj')">Others</button>
        </div>

        <div id="game-view" class="w-full flex flex-col items-center">
            <div id="instruction" class="text-gray-400 mb-6 text-center text-xs font-black uppercase tracking-[0.2em]">Tap the card to see the Japanese</div>

            <div class="card-container w-full h-[500px] relative mb-10">
                <div id="practice-card" class="card w-full h-full relative" onclick="handleCardClick()">
                    <div class="card-face card-front bg-white border-2 border-amber-100 text-center">
                        <div id="display-emoji" class="item-icon mb-8"></div>
                        <div class="space-y-2">
                            <div id="display-en" class="text-3xl font-black text-gray-800 italic leading-tight px-4"></div>
                            <div id="display-it" class="text-xl font-bold text-amber-500 italic"></div>
                        </div>
                        <div class="mt-auto text-[10px] text-gray-300 font-bold uppercase tracking-widest">Tap to reveal Japanese</div>
                    </div>
                    <div class="card-face card-back bg-amber-50 border-4 border-amber-400 p-8 text-center">
                        <div id="display-kana" class="text-5xl font-black text-amber-900 leading-tight mb-4"></div>
                        <div id="display-roma" class="text-2xl font-bold text-amber-600 mb-10"></div>
                        <button onclick="event.stopPropagation(); speakJapanese();" class="w-20 h-20 bg-white border-4 border-amber-200 rounded-full flex items-center justify-center shadow-lg active:scale-90 transition-transform mb-6 group">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 text-amber-500 group-hover:text-amber-600" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z" /></svg>
                        </button>
                        <div class="mt-auto text-[10px] text-amber-300 font-bold uppercase">Tap card for next word</div>
                    </div>
                </div>
            </div>

            <div class="flex justify-between w-full items-center px-4">
                <button onclick="prevQuestion()" class="w-14 h-14 flex items-center justify-center border-2 border-gray-200 rounded-full text-gray-400 bg-white hover:bg-gray-50 transition shadow-sm text-xl font-bold">←</button>
                <div class="flex items-center space-x-2 text-gray-400 font-black text-lg"><span id="current-index" class="text-amber-600 font-black">1</span><span class="text-gray-200">/</span><span id="total-count">0</span></div>
                <button onclick="nextQuestion()" class="px-10 py-4 bg-amber-500 rounded-full text-white font-black hover:bg-amber-600 transition shadow-lg tracking-widest uppercase">Next</button>
            </div>
        </div>

        <div id="finished-view" class="hidden w-full flex flex-col items-center justify-center p-12 bg-white rounded-[3rem] shadow-2xl border-4 border-amber-100 text-center">
            <div class="text-7xl mb-8">Finished‼️</div>
            <p class="text-gray-500 font-black uppercase tracking-[0.3em] mb-4 text-sm">Pratica completata!</p>
            <p class="text-lg text-amber-600 font-bold mb-10 italic">Lesson 43 Vocabulary Mastered.</p>
            <button onclick="location.reload()" class="w-full py-5 bg-amber-500 text-white rounded-2xl font-black shadow-xl active:scale-95 transition-all text-xl tracking-widest uppercase">Restart</button>
        </div>
    </main>

    <footer class="py-8 text-center text-gray-300 text-[10px] font-black tracking-widest uppercase">Result Prep System &bull; Mika Tomao</footer>

    <script>
        const vocabulary = [
            { type: "verb", emoji: "📈", en: "increase", it: "aumentare", kana: "ふえます", roma: "fuemasu" },
            { type: "verb", emoji: "📉", en: "decrease", it: "diminuire", kana: "へります", roma: "herimasu" },
            { type: "verb", emoji: "🆙", en: "rise", it: "alzarsi / salire", kana: "あがります", roma: "agarimasu" },
            { type: "verb", emoji: "🔽", en: "fall", it: "scendere / cadere", kana: "さがります", roma: "sagarimasu" },
            { type: "verb", emoji: "✂️", en: "break, snap", it: "rompersi / spezzarsi", kana: "きれます", roma: "kiremasu" },
            { type: "verb", emoji: "🔘❌", en: "come off", it: "staccarsi", kana: "とれます", roma: "toremasu" },
            { type: "verb", emoji: "📦📉", en: "fall down", it: "cadere (bagaglio)", kana: "おちます", roma: "ochimasu" },
            { type: "verb", emoji: "⛽❌", en: "run out", it: "esaurirsi / finire", kana: "なくなります", roma: "nakunarimasu" },
            { type: "adj", emoji: "💪", en: "strong", it: "forte / resistente", kana: "じょうぶ", roma: "jōbu" },
            { type: "adj", emoji: "👽", en: "strange", it: "strano", kana: "へん", roma: "hen" },
            { type: "adj", emoji: "🍀", en: "happy", it: "felice / fortunato", kana: "しあわせ", roma: "shiawase" }
        ];

        let filteredList = [...vocabulary];
        let currentIndex = 0; let isFlipped = false;

        function switchMode(mode) {
            if (mode === 'all') filteredList = [...vocabulary];
            else if (mode === 'adj') filteredList = vocabulary.filter(item => item.type === 'adj' || item.type === 'other');
            else filteredList = vocabulary.filter(item => item.type === mode);
            currentIndex = 0; isFlipped = false;
            document.getElementById('practice-card').classList.remove('is-flipped');
            document.getElementById('game-view').classList.remove('hidden');
            document.getElementById('finished-view').classList.add('hidden');
            ['all', 'verb', 'adj'].forEach(m => {
                const btn = document.getElementById(`mode-${m}`);
                btn?.classList.toggle('bg-white', m === mode);
                btn?.classList.toggle('shadow-sm', m === mode);
                btn?.classList.toggle('text-amber-600', m === mode);
                btn?.classList.toggle('text-gray-600', m !== mode);
            });
            updateView();
        }

        function updateView() {
            const q = filteredList[currentIndex];
            document.getElementById('current-index').innerText = currentIndex + 1;
            document.getElementById('total-count').innerText = filteredList.length;
            document.getElementById('display-emoji').innerText = q.emoji;
            document.getElementById('display-en').innerText = q.en;
            document.getElementById('display-it').innerText = q.it;
            document.getElementById('display-kana').innerText = q.kana;
            document.getElementById('display-roma').innerText = q.roma;
        }

        function handleCardClick() {
            if (!isFlipped) { document.getElementById('practice-card').classList.add('is-flipped'); isFlipped = true; }
            else { nextQuestion(); }
        }

        function speakJapanese() {
            const ut = new SpeechSynthesisUtterance(filteredList[currentIndex].kana);
            ut.lang = 'ja-JP'; ut.rate = 0.9; window.speechSynthesis.speak(ut);
        }

        function nextQuestion() {
            if (isFlipped && currentIndex === filteredList.length - 1) {
                document.getElementById('game-view').classList.add('hidden');
                document.getElementById('finished-view').classList.remove('hidden');
                return;
            }
            isFlipped = false; document.getElementById('practice-card').classList.remove('is-flipped');
            setTimeout(() => { currentIndex = (currentIndex + 1) % filteredList.length; updateView(); }, 150);
        }

        function prevQuestion() {
            isFlipped = false; document.getElementById('practice-card').classList.remove('is-flipped');
            setTimeout(() => { currentIndex = (currentIndex - 1 + filteredList.length) % filteredList.length; updateView(); }, 150);
        }
        window.onload = () => switchMode('all');
    </script>
</body>
</html>
