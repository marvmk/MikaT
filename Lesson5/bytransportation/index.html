<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>L5: Movements & Dates Trainer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .card-container { perspective: 1000px; }
        .card { transition: transform 0.6s; transform-style: preserve-3d; cursor: pointer; }
        .card.is-flipped { transform: rotateY(180deg); }
        .card-face {
            backface-visibility: hidden; position: absolute;
            width: 100%; height: 100%; display: flex;
            flex-direction: column; align-items: center;
            justify-content: center; border-radius: 1.5rem;
            box-shadow: 0 10px 25px -5px rgb(0 0 0 / 0.1);
            padding: 2rem;
        }
        .card-back { transform: rotateY(180deg); }
        .emoji-icon { font-size: 5rem; margin-bottom: 1rem; }
        
        .speaker-btn {
            background: #3b82f6;
            color: white;
            width: 70px;
            height: 70px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 14px 0 rgba(59, 130, 246, 0.4);
            transition: all 0.2s ease;
            margin: 1.5rem 0;
        }
        .speaker-btn:active { transform: scale(0.9); background: #2563eb; }
        .speaker-btn svg { width: 35px; height: 35px; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen font-sans flex flex-col text-slate-800">

    <header class="bg-blue-800 text-white p-4 shadow-lg text-center">
        <h1 class="text-xl font-bold">L5 Sentence Trainer 🔊</h1>
        <p class="text-xs opacity-80 uppercase tracking-widest">Going • Coming • Returning • Dates</p>
    </header>

    <main class="flex-grow flex flex-col items-center p-6 max-w-2xl mx-auto w-full">
        <!-- Mode Selector -->
        <div class="flex space-x-1 mb-6 bg-slate-200 p-1 rounded-xl w-full overflow-x-auto shadow-inner">
            <button id="mode-dest" class="flex-1 whitespace-nowrap px-3 py-3 rounded-lg font-bold transition bg-white shadow text-blue-800 text-[10px]" onclick="switchMode('dest')">
                WHERE / HOW
            </button>
            <button id="mode-who" class="flex-1 whitespace-nowrap px-3 py-3 rounded-lg font-bold transition text-slate-600 text-[10px]" onclick="switchMode('who')">
                WITH WHOM
            </button>
            <button id="mode-date" class="flex-1 whitespace-nowrap px-3 py-3 rounded-lg font-bold transition text-slate-600 text-[10px]" onclick="switchMode('date')">
                DATES (CALENDAR)
            </button>
        </div>

        <!-- Practice Area -->
        <div id="game-view" class="w-full flex flex-col items-center">
            <div class="card-container w-full h-[540px] relative mb-8">
                <div id="practice-card" class="card w-full h-full relative">
                    
                    <!-- Front Side -->
                    <div class="card-face card-front bg-white border-2 border-blue-50 text-center" onclick="flipCard()">
                        <div id="prompt-content" class="flex flex-col items-center w-full">
                            <!-- Injected by JS -->
                        </div>
                        <div class="mt-auto text-[10px] text-slate-300 font-bold uppercase tracking-widest">
                            Tap for Answer / Tocca per la risposta
                        </div>
                    </div>

                    <!-- Back Side -->
                    <div class="card-face card-back bg-blue-50 border-4 border-blue-600 text-center">
                        <div id="grammar-label" class="text-[10px] text-blue-600 font-black uppercase tracking-[0.2em] mb-4">Grammar Point</div>
                        
                        <div id="answer-text" class="text-2xl font-black text-blue-950 mb-2 leading-tight px-2"></div>
                        <div id="romaji-text" class="text-sm font-bold text-blue-400 font-mono mb-4 italic"></div>
                        
                        <button onclick="speakJapanese(event)" class="speaker-btn">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z" />
                            </svg>
                        </button>
                        
                        <div class="w-16 h-px bg-blue-200 mb-6 mx-auto"></div>
                        
                        <div class="space-y-1 px-4">
                            <div id="it-back" class="text-blue-800 font-bold text-sm"></div>
                            <div id="en-back" class="text-slate-500 italic text-xs"></div>
                        </div>

                        <div class="mt-auto text-[10px] text-blue-400 font-bold uppercase cursor-pointer" onclick="nextQuestion()">
                            Next / Prossimo →
                        </div>
                    </div>
                </div>
            </div>

            <!-- Controls -->
            <div class="flex justify-between w-full items-center px-4">
                <button onclick="prevQuestion()" class="w-12 h-12 flex items-center justify-center rounded-full border-2 border-slate-300 text-slate-400 bg-white">←</button>
                <div class="text-slate-400 font-black text-lg">
                    <span id="current-index" class="text-blue-700">1</span> / <span id="total-count">0</span>
                </div>
                <button onclick="nextQuestion()" class="w-12 h-12 flex items-center justify-center rounded-full bg-blue-700 text-white shadow-lg">→</button>
            </div>
        </div>
    </main>

    <script>
        const destQuestions = [
            { 
                icon: "🏢🏃‍♂️", 
                prompt: "I go to the supermarket.", 
                answer: "スーパーへ いきます。", 
                romaji: "Sūpā e ikimasu.", 
                en: "I go to the supermarket.", 
                it: "Vado al supermercato." 
            },
            { 
                icon: "🏠🔙", 
                prompt: "I return home.", 
                answer: "うちに かえります。", 
                romaji: "Uchi e kaerimasu.", 
                en: "I go home.", 
                it: "Torno a casa." 
            },
            { 
                icon: "🇯🇵✈️", 
                prompt: "I went to Japan by plane.", 
                answer: "ひこうきで にほんへ いきました。", 
                romaji: "Hikōki de Nihon e ikimashita.", 
                en: "I went to Japan by airplane.", 
                it: "Sono andato in Giappone in aereo." 
            },
            { 
                icon: "🚉👟", 
                prompt: "I go to the station on foot.", 
                answer: "あるいて えきへ いきます。", 
                romaji: "Aruite eki e ikimasu.", 
                en: "I go to the station on foot.", 
                it: "Vado in stazione a piedi." 
            },
            { 
                icon: "🚉🚆❓", 
                prompt: "A: How do you go to Tokyo? B: By Shinkansen.", 
                answer: "A：なんで とうきょうへ いきますか。 B：しんかんせんで いきます。", 
                romaji: "A: Nan de Tōkyō e ikimasu ka. B: Shinkansen de ikimasu.", 
                en: "A: How do you go to Tokyo? B: I go by Shinkansen.", 
                it: "A: Come vai a Tokyo? B: Vado con lo Shinkansen." 
            }
        ];

        const whoQuestions = [
            { 
                icon: "🤝👨‍💼", 
                prompt: "I went to the department store with a friend.", 
                answer: "ともだちと デパートへ いきました。", 
                romaji: "Tomodachi to depāto e ikimashita.", 
                en: "I went to the department store with a friend.", 
                it: "Sono andato ai grandi magazzini con un amico." 
            },
            { 
                icon: "👨‍👩‍👧‍👦✈️", 
                prompt: "I came to Japan with my family.", 
                answer: "かぞくと にほんへ きました。", 
                romaji: "Kazoku to Nihon e kimashita.", 
                en: "I came to Japan with my family.", 
                it: "Sono venuto in Giappone con la mia famiglia." 
            },
            { 
                icon: "👤🚶‍♂️", 
                prompt: "I went to the hospital alone.", 
                answer: "ひとりで びょういんへ いきました。", 
                romaji: "Hitori de byōin e ikimashita.", 
                en: "I went to the hospital alone.", 
                it: "Sono andato in ospedale da solo." 
            },
            { 
                icon: "❓🤝", 
                prompt: "Who did you go to Kyoto with?", 
                answer: "だれと きょうとへ いきましたか。", 
                romaji: "Dare to Kyōto e ikimashita ka.", 
                en: "Who did you go to Kyoto with?", 
                it: "Con chi sei andato a Kyoto?" 
            }
        ];

        const dateQuestions = [
            { 
                icon: "📅 1st", 
                prompt: "When is your birthday? - October 1st.", 
                answer: "たんじょうびは いつですか。 10がつ ついたちです。", 
                romaji: "Tanjōbi wa itsu desu ka. Jū-gatsu tsuitachi desu.", 
                en: "When is your birthday? October 1st.", 
                it: "Quando è il tuo compleanno? Il primo ottobre." 
            },
            { 
                icon: "📅 20th", 
                prompt: "I go to Japan on the 20th.", 
                answer: "はつかに にほんへ いきます。", 
                romaji: "Hatsuka ni Nihon e ikimasu.", 
                en: "I go to Japan on the 20th.", 
                it: "Vado in Giappone il venti (del mese)." 
            },
            { 
                icon: "📅 14th", 
                prompt: "Tomorrow is the 14th.", 
                answer: "あしたは じゅうよっかです。", 
                romaji: "Ashita wa jūyokka desu.", 
                en: "Tomorrow is the 14th.", 
                it: "Domani è il quattordici." 
            },
            { 
                icon: "❓📅", 
                prompt: "When did you come to Japan? - I came in July.", 
                answer: "いつ にほんへ きましたか。 7がつに きました。", 
                romaji: "Itsu Nihon e kimashita ka. Shichi-gatsu ni kimashita.", 
                en: "When did you come to Japan? I came in July.", 
                it: "Quando sei venuto in Giappone? Sono venuto a luglio." 
            }
        ];

        let currentMode = 'dest';
        let currentIndex = 0;
        let isFlipped = false;

        function switchMode(mode) {
            currentMode = mode;
            currentIndex = 0;
            isFlipped = false;
            document.getElementById('practice-card').classList.remove('is-flipped');
            
            ['dest', 'who', 'date'].forEach(m => {
                document.getElementById(`mode-${m}`).className = "flex-1 whitespace-nowrap px-3 py-3 rounded-lg font-bold transition text-slate-600 text-[10px]";
            });
            
            const activeBtn = document.getElementById(`mode-${mode}`);
            activeBtn.className = "flex-1 whitespace-nowrap px-3 py-3 rounded-lg font-bold transition bg-white shadow text-blue-800 text-[10px]";

            updateView();
        }

        function updateView() {
            let questions;
            let label;
            if (currentMode === 'dest') { questions = destQuestions; label = "場所 へ 行きます / 手段 で 行きます"; }
            else if (currentMode === 'who') { questions = whoQuestions; label = "人 と 行きます / ひとり で 行きます"; }
            else { questions = dateQuestions; label = "日付 (tsuitachi, futsuka...) / いつ"; }

            const q = questions[currentIndex];
            const promptContent = document.getElementById('prompt-content');
            
            promptContent.innerHTML = `
                <div class="emoji-icon">${q.icon}</div>
                <div class="text-slate-400 text-[10px] uppercase tracking-widest mb-2 font-bold">Concept / Hint</div>
                <div class="text-2xl font-black text-slate-800 mb-6 leading-tight px-4">${q.prompt}</div>
                <div class="flex flex-col items-center space-y-2 border-t border-slate-100 pt-6 w-full px-4">
                    <div class="text-sm text-blue-600 font-bold uppercase tracking-wide">${q.it}</div>
                    <div class="text-sm text-slate-400 italic font-medium">${q.en}</div>
                </div>
            `;

            document.getElementById('current-index').innerText = currentIndex + 1;
            document.getElementById('total-count').innerText = questions.length;
            document.getElementById('answer-text').innerText = q.answer;
            document.getElementById('romaji-text').innerText = q.romaji;
            document.getElementById('it-back').innerText = q.it;
            document.getElementById('en-back').innerText = q.en;
            document.getElementById('grammar-label').innerText = label;
        }

        function flipCard() {
            if (isFlipped) return;
            document.getElementById('practice-card').classList.add('is-flipped');
            isFlipped = true;
        }

        function speakJapanese(event) {
            if (event) event.stopPropagation();
            let questions = currentMode === 'dest' ? destQuestions : (currentMode === 'who' ? whoQuestions : dateQuestions);
            const fullText = questions[currentIndex].answer;
            const speechText = fullText.replace(/^[A-Z][：:]\s*/g, '').replace(/[A-Z][：:]\s*/g, ' ').split('（')[0];
            
            const ut = new SpeechSynthesisUtterance(speechText);
            ut.lang = 'ja-JP';
            ut.rate = 0.85;
            window.speechSynthesis.speak(ut);
        }

        function nextQuestion() {
            let questions = currentMode === 'dest' ? destQuestions : (currentMode === 'who' ? whoQuestions : dateQuestions);
            isFlipped = false;
            document.getElementById('practice-card').classList.remove('is-flipped');
            setTimeout(() => {
                currentIndex = (currentIndex + 1) % questions.length;
                updateView();
            }, 150);
        }

        function prevQuestion() {
            let questions = currentMode === 'dest' ? destQuestions : (currentMode === 'who' ? whoQuestions : dateQuestions);
            isFlipped = false;
            document.getElementById('practice-card').classList.remove('is-flipped');
            setTimeout(() => {
                currentIndex = (currentIndex - 1 + questions.length) % questions.length;
                updateView();
            }, 150);
        }

        updateView();
    </script>
</body>
</html>
