<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>L5 Vocabulary Master</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .card-container { perspective: 1000px; }
        .card { transition: transform 0.6s; transform-style: preserve-3d; cursor: pointer; }
        .card.is-flipped { transform: rotateY(180deg); }
        .card-face {
            backface-visibility: hidden; position: absolute;
            width: 100%; height: 100%; display: flex;
            flex-direction: column; align-items: center;
            justify-content: center; border-radius: 1.5rem;
            box-shadow: 0 10px 25px -5px rgb(0 0 0 / 0.1);
            padding: 1.5rem;
        }
        .card-back { transform: rotateY(180deg); }
        .action-icon { font-size: 5rem; }
        
        .speaker-btn {
            background: #3b82f6;
            color: white;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 6px 20px rgba(59, 130, 246, 0.4);
            transition: all 0.2s ease;
            margin-bottom: 1rem;
        }
        .speaker-btn:active { transform: scale(0.9); background: #2563eb; }
        .speaker-btn svg { width: 40px; height: 40px; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen font-sans flex flex-col">

    <header class="bg-blue-900 text-white p-4 shadow-lg text-center">
        <h1 class="text-xl font-bold">L5 Vocab: Trilingue 🔊</h1>
        <p class="text-xs opacity-80 uppercase tracking-widest">Movements • Vehicles • People</p>
    </header>

    <main class="flex-grow flex flex-col items-center p-6 max-w-2xl mx-auto w-full">
        <!-- Category Selector -->
        <div class="flex space-x-1 mb-6 bg-slate-200 p-1 rounded-xl w-full overflow-x-auto shadow-inner">
            <button id="mode-move" class="flex-1 whitespace-nowrap px-4 py-3 rounded-lg font-bold transition bg-white shadow text-blue-800" onclick="switchMode('move')">MOVEMENTS</button>
            <button id="mode-vehicle" class="flex-1 whitespace-nowrap px-4 py-3 rounded-lg font-bold transition text-slate-600" onclick="switchMode('vehicle')">VEHICLES</button>
            <button id="mode-people" class="flex-1 whitespace-nowrap px-4 py-3 rounded-lg font-bold transition text-slate-600" onclick="switchMode('people')">PEOPLE/OTHER</button>
        </div>

        <!-- Flashcard Area -->
        <div class="card-container w-full h-[500px] relative mb-8">
            <div id="practice-card" class="card w-full h-full relative">
                
                <!-- Front Side: Prompt (IT/EN) -->
                <div class="card-face card-front bg-white border-2 border-blue-50 text-center" onclick="flipCard()">
                    <div id="prompt-content" class="flex flex-col items-center space-y-6">
                        <!-- Content Injected by JS -->
                    </div>
                    <div class="mt-auto text-[10px] text-slate-300 font-bold uppercase tracking-widest">Tap to see Japanese / Tocca per il giapponese</div>
                </div>

                <!-- Back Side: Japanese Result -->
                <div class="card-face card-back bg-blue-50 border-4 border-blue-600 text-center">
                    <div id="type-label" class="text-[10px] text-blue-600 font-black uppercase tracking-[0.2em] mb-4">Risposta</div>
                    
                    <div id="answer-text" class="text-4xl font-black text-blue-950 mb-1 leading-tight"></div>
                    <div id="romaji-text" class="text-2xl font-bold text-blue-500 font-mono mb-8"></div>
                    
                    <!-- Audio Button -->
                    <button onclick="speakJapanese(event)" class="speaker-btn">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z" />
                        </svg>
                    </button>
                    
                    <div class="w-16 h-1 bg-blue-200 mb-6 mx-auto"></div>
                    
                    <div class="flex flex-col items-center space-y-1 px-4">
                        <div id="en-back" class="text-slate-500 italic text-sm"></div>
                        <div id="it-back" class="text-lg text-blue-800 font-bold"></div>
                    </div>

                    <div class="mt-auto text-[10px] text-blue-400 font-bold uppercase tracking-widest cursor-pointer" onclick="nextQuestion()">Next / Prossimo →</div>
                </div>
            </div>
        </div>

        <!-- Navigation -->
        <div class="flex justify-between w-full items-center px-4">
            <button onclick="prevQuestion()" class="w-12 h-12 flex items-center justify-center rounded-full border-2 border-slate-300 text-slate-400 bg-white">←</button>
            <div class="text-slate-400 font-black text-lg"><span id="current-index" class="text-blue-700">1</span> / <span id="total-count">0</span></div>
            <button onclick="nextQuestion()" class="w-12 h-12 flex items-center justify-center rounded-full bg-blue-700 text-white shadow-lg">→</button>
        </div>
    </main>

    <script>
        const moveList = [
            { icon: "🚶‍♂️👉", en: "go", it: "andare", answer: "いきます", romaji: "ikimasu" },
            { icon: "🚶‍♂️👈", en: "come", it: "venire", answer: "きます", romaji: "kimasu" },
            { icon: "🏠🔙", en: "go home, return", it: "tornare a casa", answer: "かえります", romaji: "kaerimasu" },
            { icon: "🏫", en: "school", it: "scuola", answer: "がっこう", romaji: "gakkō" },
            { icon: "🛒", en: "supermarket", it: "supermercato", answer: "スーパー", romaji: "sūpā" },
            { icon: "🚉", en: "station", it: "stazione", answer: "えき", romaji: "eki" }
        ];

        const vehicleList = [
            { icon: "✈️", en: "airplane", it: "aereo", answer: "ひこうき", romaji: "hikōki" },
            { icon: "🚢", en: "ship, boat", it: "nave / barca", answer: "ふね", romaji: "fune" },
            { icon: "🚃", en: "train", it: "treno", answer: "でんしゃ", romaji: "densha" },
            { icon: "🚇", en: "subway", it: "metropolitana", answer: "ちかてつ", romaji: "chikatetsu" },
            { icon: "🚄", en: "bullet train", it: "Shinkansen", answer: "しんかんせん", romaji: "shinkansen" },
            { icon: "🚌", en: "bus", it: "autobus", answer: "バス", romaji: "basu" },
            { icon: "🚕", en: "taxi", it: "taxi", answer: "タクシー", romaji: "takushī" },
            { icon: "🚲", en: "bicycle", it: "bicicletta", answer: "じてんしゃ", romaji: "jitensha" }
        ];

        const peopleList = [
            { icon: "🤝", en: "friend", it: "amico", answer: "ともだち", romaji: "tomodachi" },
            { icon: "👦", en: "he, boyfriend", it: "lui / fidanzato", answer: "かれ", romaji: "kare" },
            { icon: "👧", en: "she, girlfriend", it: "lei / fidanzata", answer: "かのじょ", romaji: "kanojo" },
            { icon: "👨‍👩‍👧‍👦", en: "family", it: "famiglia", answer: "かぞく", romaji: "kazoku" },
            { icon: "👤", en: "alone, by oneself", it: "da solo", answer: "ひとりで", romaji: "hitoride" },
            { icon: "🎂", en: "birthday", it: "compleanno", answer: "たんじょうび", romaji: "tanjōbi" },
            { icon: "🐌", en: "local train", it: "treno locale", answer: "ふつう", romaji: "futsū" },
            { icon: "⚡", en: "express train", it: "treno espresso / rapido", answer: "とっきゅう", romaji: "tokkyū" }
        ];

        let currentMode = 'move';
        let currentIndex = 0;
        let isFlipped = false;

        function switchMode(mode) {
            currentMode = mode; currentIndex = 0; isFlipped = false;
            document.getElementById('practice-card').classList.remove('is-flipped');
            updateView();
            const modes = ['move', 'vehicle', 'people'];
            modes.forEach(m => {
                const btn = document.getElementById(`mode-${m}`);
                if(m === mode) {
                    btn.className = "flex-1 whitespace-nowrap px-4 py-3 rounded-lg font-bold transition bg-white shadow text-blue-800";
                } else {
                    btn.className = "flex-1 whitespace-nowrap px-4 py-3 rounded-lg font-bold transition text-slate-600";
                }
            });
        }

        function updateView() {
            let list;
            let typeLabel;
            if(currentMode === 'move') { list = moveList; typeLabel = "Movements & Places"; }
            else if(currentMode === 'vehicle') { list = vehicleList; typeLabel = "Transportation"; }
            else { list = peopleList; typeLabel = "People & Others"; }
            
            const item = list[currentIndex];
            const promptContent = document.getElementById('prompt-content');
            promptContent.innerHTML = `
                <div class="action-icon mb-2">${item.icon}</div>
                <div class="space-y-4">
                    <div>
                        <div class="text-[10px] text-slate-400 font-bold uppercase mb-1 tracking-widest">English</div>
                        <div class="text-xl text-slate-800 font-medium">${item.en}</div>
                    </div>
                    <div class="flex justify-center"><div class="h-px w-12 bg-slate-100"></div></div>
                    <div>
                        <div class="text-[10px] text-blue-500 font-bold uppercase mb-1 tracking-widest">Italiano</div>
                        <div class="text-xl text-blue-700 font-bold">${item.it}</div>
                    </div>
                </div>
            `;
            document.getElementById('current-index').innerText = currentIndex + 1;
            document.getElementById('total-count').innerText = list.length;
            document.getElementById('answer-text').innerText = item.answer;
            document.getElementById('romaji-text').innerText = item.romaji;
            document.getElementById('en-back').innerText = item.en;
            document.getElementById('it-back').innerText = item.it;
            document.getElementById('type-label').innerText = typeLabel;
        }

        function flipCard() {
            if (isFlipped) return;
            document.getElementById('practice-card').classList.add('is-flipped');
            isFlipped = true;
        }

        function speakJapanese(event) {
            if (event) event.stopPropagation();
            let list = (currentMode === 'move') ? moveList : (currentMode === 'vehicle' ? vehicleList : peopleList);
            const word = list[currentIndex].answer;
            const ut = new SpeechSynthesisUtterance(word);
            ut.lang = 'ja-JP';
            ut.rate = 0.85;
            window.speechSynthesis.speak(ut);
        }

        function nextQuestion() {
            let list = (currentMode === 'move') ? moveList : (currentMode === 'vehicle' ? vehicleList : peopleList);
            isFlipped = false;
            document.getElementById('practice-card').classList.remove('is-flipped');
            setTimeout(() => {
                currentIndex = (currentIndex + 1) % list.length;
                updateView();
            }, 150);
        }

        function prevQuestion() {
            let list = (currentMode === 'move') ? moveList : (currentMode === 'vehicle' ? vehicleList : peopleList);
            isFlipped = false;
            document.getElementById('practice-card').classList.remove('is-flipped');
            setTimeout(() => {
                currentIndex = (currentIndex - 1 + list.length) % list.length;
                updateView();
            }, 150);
        }
        
        // Init
        updateView();
    </script>
</body>
</html>
