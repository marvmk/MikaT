<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Japanese Practice: Lesson 34 Master</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .card-container { perspective: 1000px; }
        .card { transition: transform 0.6s; transform-style: preserve-3d; cursor: pointer; }
        .card.is-flipped { transform: rotateY(180deg); }
        .card-face {
            backface-visibility: hidden; position: absolute;
            width: 100%; height: 100%; display: flex;
            flex-direction: column; align-items: center;
            justify-content: center; border-radius: 1.5rem;
            box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1);
            padding: 2rem;
        }
        .card-back { transform: rotateY(180deg); }
        .item-icon { font-size: 4.5rem; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen font-sans flex flex-col">

    <header class="bg-amber-500 text-white p-6 shadow-md text-center">
        <h1 class="text-2xl font-bold italic">L34: Procedures & Sequence</h1>
        <p class="text-sm opacity-90 font-medium font-black tracking-widest uppercase">Result Prep System</p>
    </header>

    <main class="flex-grow flex flex-col items-center p-6 max-w-2xl mx-auto w-full">
        <!-- Mode Selector (English Tabs) -->
        <div class="flex space-x-1 mb-8 bg-gray-200 p-1 rounded-xl w-full overflow-x-auto shadow-inner border border-gray-300">
            <button id="mode-toori" class="flex-1 whitespace-nowrap px-2 py-3 rounded-lg font-bold transition bg-white shadow-sm text-amber-600 text-xs" onclick="switchMode('toori')">
                According To
            </button>
            <button id="mode-ato" class="flex-1 whitespace-nowrap px-2 py-3 rounded-lg font-bold transition text-gray-600 text-xs" onclick="switchMode('ato')">
                After
            </button>
            <button id="mode-state" class="flex-1 whitespace-nowrap px-2 py-3 rounded-lg font-bold transition text-gray-600 text-xs" onclick="switchMode('state')">
                State / Without
            </button>
        </div>

        <!-- Question Area -->
        <div id="game-view" class="w-full flex flex-col items-center">
            <div id="instruction" class="text-gray-400 mb-6 text-center text-xs font-black uppercase tracking-[0.2em]">
                According to the instructions...
            </div>

            <!-- Card Container -->
            <div class="card-container w-full h-[480px] relative mb-10">
                <div id="practice-card" class="card w-full h-full relative" onclick="flipCard()">
                    <!-- Front -->
                    <div class="card-face card-front bg-white border-2 border-amber-100 text-center">
                        <div id="prompt-content" class="flex flex-col items-center space-y-6 w-full px-4">
                            <!-- Injected by JS -->
                        </div>
                        <div class="mt-auto text-[10px] text-gray-300 font-bold uppercase tracking-widest">Tap to reveal answer</div>
                    </div>
                    <!-- Back -->
                    <div class="card-face card-back bg-amber-50 border-4 border-amber-400 p-8 text-center">
                        <div id="answer-kanji" class="text-3xl font-black text-amber-900 leading-tight mb-4 px-2"></div>
                        <div id="answer-kana" class="text-xl font-bold text-amber-500 mb-8"></div>
                        <div class="h-px w-16 bg-amber-200 mx-auto mb-8"></div>
                        <div id="answer-it" class="text-base text-amber-700 italic font-medium px-4"></div>
                        <div class="mt-auto text-[10px] text-amber-300 font-bold uppercase">Tap for next question</div>
                    </div>
                </div>
            </div>

            <!-- Navigation -->
            <div class="flex justify-between w-full items-center px-2">
                <button onclick="prevQuestion()" class="w-14 h-14 flex items-center justify-center border-2 border-gray-200 rounded-full text-gray-400 bg-white hover:bg-gray-50 transition shadow-sm text-xl font-bold">←</button>
                <div class="flex flex-col items-center">
                    <div class="text-gray-400 font-black text-lg">
                        <span id="current-index" class="text-amber-600 font-black">1</span> 
                        <span class="text-gray-200">/</span> 
                        <span id="total-count">17</span>
                    </div>
                </div>
                <button onclick="nextQuestion()" class="px-10 py-4 bg-amber-500 rounded-full text-white font-black hover:bg-amber-600 transition shadow-lg tracking-widest uppercase text-sm">Next</button>
            </div>
        </div>

        <!-- Finished View -->
        <div id="finished-view" class="hidden w-full flex flex-col items-center justify-center p-12 bg-white rounded-[3rem] shadow-2xl border-4 border-amber-100 text-center">
            <div class="text-7xl mb-8">Finished‼️</div>
            <p class="text-gray-500 font-black uppercase tracking-[0.3em] mb-4 text-sm">Pratica completata!</p>
            <p class="text-lg text-amber-600 font-bold mb-10 italic text-center">Lesson 34 Complete Mastery.</p>
            <button onclick="location.reload()" class="w-full py-5 bg-amber-500 text-white rounded-2xl font-black shadow-xl active:scale-95 transition-all text-xl tracking-widest uppercase">
                Restart
            </button>
        </div>
    </main>

    <footer class="py-8 text-center text-gray-300 text-[10px] font-black tracking-widest uppercase">
        Result Prep System &bull; Mika Tomao
    </footer>

    <script>
        // Mode 1: ~Toori ni (According to)
        const tooriData = [
            { icon: "🎨", en: "Draw a picture as I do.", it: "Fai un disegno come faccio io.", kanji: "私がするとおりに、絵をかいてください。", kana: "わたしが するとおりに、えを かいてください。" },
            { icon: "📄", en: "Fold the paper as written here.", it: "Piega il foglio come c'è scritto qui.", kanji: "ここに書いてあるとおりに、紙を折ってください。", kana: "ここに かいてあるとおりに、かみを おってください。" },
            { icon: "🛠️", en: "Assemble it according to the manual.", it: "Montalo secondo il manuale.", kanji: "説明書のとおりに、組み立ててください。", kana: "せつめいしょのとおりに、くみたててください。" },
            { icon: "👨‍🍳", en: "Cook as the teacher told.", it: "Cucina come ha detto l'insegnante.", kanji: "先生が言ったとおりに、料理してください。", kana: "せんせいが いったとおりに、りょうりしてください。" },
            { icon: "💃", en: "Dance as I do.", it: "Balla come faccio io.", kanji: "私がするとおりに、踊ってください。", kana: "わたしが するとおりに、おどってください。" },
            { icon: "🗺️", en: "Go according to the map.", it: "Vai secondo la mappa.", kanji: "地図のとおりに、行ってください。", kana: "ちずのとおりに、いってください。" },
            { icon: "📏", en: "Cut according to the line.", it: "Taglia secondo la linea.", kanji: "線のとおりに、切ってください。", kana: "せんのとおりに、きってください。" },
            { icon: "🖨️", en: "Type as seen on the screen.", it: "Digita come vedi sullo schermo.", kanji: "画面に見たとおりに、打ってください。", kana: "がめんに みたとおりに、うってください。" },
            { icon: "🎶", en: "Sing as you heard.", it: "Canta come hai sentito.", kanji: "聞いたとおりに、歌ってください。", kana: "きいたとおりに、うたってください。" },
            { icon: "👟", en: "Walk as guided.", it: "Cammina come guidato.", kanji: "案内されたとおりに、歩いてください。", kana: "あんないされたとおりに、あるいてください。" },
            { icon: "🖋️", en: "Write as I said.", it: "Scrivi come ho detto.", kanji: "私が言ったとおりに、書いてください。", kana: "わたしが いったとおりに、かいてください。" },
            { icon: "🍱", en: "Make a bento like the sample.", it: "Fai un bento come il campione.", kanji: "見本のとおリに、お弁当を作ってください。", kana: "みほんのとおりに、おべんとうを つくってください。" },
            { icon: "🎾", en: "Swing like the pro.", it: "Fai lo swing come il professionista.", kanji: "プロがするとおりに、打ってください。", kana: "ぷろが するとおりに、うってください。" },
            { icon: "💬", en: "Answer as remembered.", it: "Rispondi come ricordi.", kanji: "覚えているとおりに、答えてください。", kana: "おぼえているとおりに、こたえてください。" },
            { icon: "🧩", en: "Do as shown in the picture.", it: "Fai come mostrato nella figura.", kanji: "図のとおりに、やってください。", kana: "ずのとおりに、やってください。" },
            { icon: "👔", en: "Tie the tie like the father.", it: "Lega la cravatta come il padre.", kanji: "父がするとおりに、ネクタイを締めます。", kana: "ちちが するとおりに、ねくたいを しめます。" },
            { icon: "🧱", en: "Stack according to the numbers.", it: "Impila secondo i numeri.", kanji: "番号のとおりに、並べてください。", kana: "ばんごうのとおりに、ならべてください。" }
        ];

        // Mode 2: ~Ato de (After)
        const atoData = [
            { icon: "🍱🦷", en: "After eating, brush your teeth.", it: "Dopo mangiato, lavati i denti.", kanji: "ご飯を食べたあとで、歯を磨きます。", kana: "ごはんを たべたあとで、はを みがきます。" },
            { icon: "💼🍺", en: "After work, go for a drink.", it: "Dopo il lavoro, vai a bere qualcosa.", kanji: "仕事のあとで、飲みに行きます。", kana: "しごとの あとで、のみに いきます。" },
            { icon: "🎬🍕", en: "After the movie, eat dinner.", it: "Dopo il film, cena.", kanji: "映画を見たあとで、晩ご飯を食べます。", kana: "えいがを みたあとで、ばんごはんを たべます。" },
            { icon: "🏫🎾", en: "After school, play tennis.", it: "Dopo la scuola, gioca a tennis.", kanji: "学校のあとで、テニスをします。", kana: "がっこうの あとで、てにすを します。" },
            { icon: "🚿🛌", en: "After taking a shower, sleep.", it: "Dopo la doccia, dormi.", kanji: "シャワーを浴びたあとで、寝ます。", kana: "しゃわーを あびたあとで、ねます。" },
            { icon: "🏃🚿", en: "After running, take a shower.", it: "Dopo la corsa, fai la doccia.", kanji: "走ったあとで、シャワーを浴びます。", kana: "はしったあとで、しゃわーを あびます。" },
            { icon: "🛒🏠", en: "After shopping, go home.", it: "Dopo la spesa, torna a casa.", kanji: "買い物をしたあとで、うちへ帰ります。", kana: "かいものを したあとで、うちへ かえります。" },
            { icon: "📖💡", en: "After studying, turn off lights.", it: "Dopo lo studio, spegni le luci.", kanji: "勉強したあとで、電気を消します。", kana: "べんきょうしたあとで、でんきを けします。" },
            { icon: "🤝🥪", en: "After the meeting, eat lunch.", it: "Dopo la riunione, pranza.", kanji: "会議のあとで、昼ご飯を食べます。", kana: "かいぎの あとで、ひるごはんを たべます。" },
            { icon: "🎹🎶", en: "After practice, listen to CD.", it: "Dopo la pratica, ascolta il CD.", kanji: "練習したあとで、CDを聞きます。", kana: "れんしゅうしたあとで、しーでぃーを ききます。" },
            { icon: "🧼🍱", en: "After washing hands, eat.", it: "Dopo essersi lavati le mani, mangia.", kanji: "手を洗ったあとで、食べます。", kana: "てを あらったあとで、たべます。" },
            { icon: "🧺🎬", en: "After laundry, watch TV.", it: "Dopo il bucato, guarda la TV.", kanji: "洗濯のあとで、テレビを見ます。", kana: "せんたくの あとで、てれびを みます。" },
            { icon: "📬📖", en: "After getting mail, read it.", it: "Dopo aver ricevuto la mail, leggila.", kanji: "メールが来たあとで、読みます。", kana: "めーるが きたあとで、よみます。" },
            { icon: "⚽🥤", en: "After soccer, drink water.", it: "Dopo il calcio, bevi acqua.", kanji: "サッカーのあとで、水を飲みます。", kana: "さっかーの あとで、みずを のみます。" },
            { icon: "🚶☕", en: "After a walk, drink coffee.", it: "Dopo la passeggiata, bevi caffè.", kanji: "散歩のあとで、コーヒーを飲みます。", kana: "さんぽの あとで、こーひーを のみます。" },
            { icon: "🚗⛽", en: "After driving, refuel.", it: "Dopo la guida, fai rifornimento.", kanji: "運転したあとで、ガソリンを入れます。", kana: "うんてんしたあとで、がそりんを いれます。" },
            { icon: "🧗🚿", en: "After climbing, go to Onsen.", it: "Dopo la scalata, vai all'Onsen.", kanji: "山に登ったあとで、温泉に行きます。", kana: "やまに のぼったあとで、おんせんを に いきます。" }
        ];

        // Mode 3: ~Te / ~Naide (State)
        const stateData = [
            { icon: "🧂🍱", en: "Eat with soy sauce.", it: "Mangia con la salsa di soia.", kanji: "しょうゆをつけて、食べます。", kana: "しょうゆを つけて、たべます。" },
            { icon: "🍬☕", en: "Drink without sugar.", it: "Bevi senza zucchero.", kanji: "砂糖を入れないで、飲みます。", kana: "さとうを いれないで、のみます。" },
            { icon: "🌂🚶", en: "Go out with an umbrella.", it: "Esci con l'ombrello.", kanji: "傘を持って、出かけます。", kana: "かさを もって、でかけます。" },
            { icon: "🧢🏃", en: "Run without a hat.", it: "Corri senza cappello.", kanji: "帽子をかぶらないで、走ります。", kana: "ぼうしを かぶらないで、はしります。" },
            { icon: "❄️🛌", en: "Sleep with the AC on.", it: "Dormi con l'aria condizionata accesa.", kanji: "エアコンをつけて、寝ます。", kana: "えあこんを つけて、ねます。" },
            { icon: "👓📖", en: "Read with glasses.", it: "Leggi con gli occhiali.", kanji: "眼鏡をかけて、読みます。", kana: "めがねを かけて、よみます。" },
            { icon: "🚪🛌", en: "Sleep without locking the door.", it: "Dormi senza chiudere la porta a chiave.", kanji: "鍵をかけないで、寝ます。", kana: "かぎを かけないで、ねます。" },
            { icon: "📱🚶", en: "Walk while looking at phone.", it: "Cammina guardando il telefono.", kanji: "スマホを見て、歩きます。", kana: "すまほを みて、あるきます。" },
            { icon: "🥛☕", en: "Drink without milk.", it: "Bevi senza latte.", kanji: "牛乳を入れないで、飲みます。", kana: "ぎゅうにゅうを いれないで、のみます。" },
            { icon: "🚗💨", en: "Drive without a license.", it: "Guida senza patente.", kanji: "免許を持たないで、運転します。", kana: "めんきょを もたないで、うんてんします。" },
            { icon: "🧥🚶", en: "Go out without a coat.", it: "Esci senza cappotto.", kanji: "コートを着ないで、出かけます。", kana: "こーとを きないで、でかけます。" },
            { icon: "💡🛌", en: "Sleep with the lights on.", it: "Dormi con le luci accese.", kanji: "電気をつけて、寝ます。", kana: "でんきを つけて、ねます。" },
            { icon: "🍴🍕", en: "Eat pizza with a fork.", it: "Mangia la pizza con la forchetta.", kanji: "フォークを使って、食べます。", kana: "ふぉーくを つかって、たべます。" },
            { icon: "🍳🧂", en: "Cook without salt.", it: "Cucina senza sale.", kanji: "塩を入れないで、作ります。", kana: "しおを いれないで、つくります。" },
            { icon: "🏢🧥", en: "Go to work with a tie.", it: "Vai al lavoro con la cravatta.", kanji: "ネクタイを締めて、行きます。", kana: "ねくたいを しめて、いきます。" },
            { icon: "🚶💨", en: "Go without eating anything.", it: "Vai senza mangiare nulla.", kanji: "何も食べないで、行きます。", kana: "なにも たべないで、いきます。" },
            { icon: "🎫🚶", en: "Enter with a ticket.", it: "Entra con il biglietto.", kanji: "チケットを持って、入ります。", kana: "ちけっとを もって、はいります。" }
        ];

        let currentMode = 'toori';
        let currentIndex = 0;
        let isFlipped = false;

        function switchMode(mode) {
            currentMode = mode;
            currentIndex = 0;
            isFlipped = false;
            document.getElementById('practice-card').classList.remove('is-flipped');
            document.getElementById('game-view').classList.remove('hidden');
            document.getElementById('finished-view').classList.add('hidden');
            
            const modes = ['toori', 'ato', 'state'];
            modes.forEach(m => {
                const btn = document.getElementById(`mode-${m}`);
                if(m === mode) {
                    btn.classList.add('bg-white', 'shadow-sm', 'text-amber-600');
                    btn.classList.remove('text-gray-600');
                } else {
                    btn.classList.remove('bg-white', 'shadow-sm', 'text-amber-600');
                    btn.classList.add('text-gray-600');
                }
            });

            const instr = document.getElementById('instruction');
            if(mode === 'toori') instr.innerText = "Do it according to the instructions...";
            else if(mode === 'ato') instr.innerText = "Sequence: What do you do after?";
            else instr.innerText = "State: Doing with or without...";
            
            updateView();
        }

        function updateView() {
            const data = { toori: tooriData, ato: atoData, state: stateData };
            const questions = data[currentMode];
            const q = questions[currentIndex];
            const promptContent = document.getElementById('prompt-content');
            
            document.getElementById('current-index').innerText = currentIndex + 1;
            document.getElementById('total-count').innerText = questions.length;
            
            document.getElementById('answer-kanji').innerText = q.kanji;
            document.getElementById('answer-kana').innerText = q.kana;
            document.getElementById('answer-it').innerText = q.it;

            promptContent.innerHTML = `
                <div class="item-icon mb-4">${q.icon}</div>
                <div class="text-center px-6">
                    <div class="text-gray-400 text-[10px] font-black uppercase tracking-[0.2em] mb-4">Target Scenario</div>
                    <div class="text-3xl font-black text-gray-800 leading-tight italic px-4">${q.en}</div>
                </div>
            `;
        }

        function flipCard() {
            const card = document.getElementById('practice-card');
            if (!isFlipped) {
                card.classList.add('is-flipped');
                isFlipped = true;
                speakJapanese();
            } else {
                nextQuestion();
            }
        }

        function speakJapanese() {
            const data = { toori: tooriData, ato: atoData, state: stateData };
            const text = data[currentMode][currentIndex].kana;
            const ut = new SpeechSynthesisUtterance(text);
            ut.lang = 'ja-JP';
            ut.rate = 0.95;
            window.speechSynthesis.speak(ut);
        }

        function nextQuestion() {
            const data = { toori: tooriData, ato: atoData, state: stateData };
            const questions = data[currentMode];
            
            if (isFlipped && currentIndex === questions.length - 1) {
                document.getElementById('game-view').classList.add('hidden');
                document.getElementById('finished-view').classList.remove('hidden');
                speakFinish();
                return;
            }

            isFlipped = false;
            document.getElementById('practice-card').classList.remove('is-flipped');
            setTimeout(() => {
                currentIndex = (currentIndex + 1) % questions.length;
                updateView();
            }, 150);
        }

        function prevQuestion() {
            const data = { toori: tooriData, ato: atoData, state: stateData };
            const questions = data[currentMode];
            isFlipped = false;
            document.getElementById('practice-card').classList.remove('is-flipped');
            setTimeout(() => {
                currentIndex = (currentIndex - 1 + questions.length) % questions.length;
                updateView();
            }, 150);
        }

        function speakFinish() {
            const ut = new SpeechSynthesisUtterance("お疲れ様でした。第34課の練習が終わりました。");
            ut.lang = 'ja-JP';
            window.speechSynthesis.speak(ut);
        }

        updateView();
    </script>
</body>
</html>
