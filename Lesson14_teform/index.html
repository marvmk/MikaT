<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>L14: Te-form & Mashouka Trainer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .card-container { perspective: 1000px; }
        .card { transition: transform 0.6s; transform-style: preserve-3d; cursor: pointer; }
        .card.is-flipped { transform: rotateY(180deg); }
        .card-face {
            backface-visibility: hidden; position: absolute;
            width: 100%; height: 100%; display: flex;
            flex-direction: column; align-items: center;
            justify-content: center; border-radius: 1.5rem;
            box-shadow: 0 10px 25px -5px rgb(0 0 0 / 0.1);
            padding: 2rem;
        }
        .card-back { transform: rotateY(180deg); }
        .emoji-icon { font-size: 5rem; margin-bottom: 1rem; }
        
        .speaker-btn {
            background: #f59e0b;
            color: white;
            width: 70px;
            height: 70px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 14px 0 rgba(245, 158, 11, 0.4);
            transition: all 0.2s ease;
            margin: 1.5rem 0;
        }
        .speaker-btn:active { transform: scale(0.9); background: #d97706; }
        .speaker-btn svg { width: 35px; height: 35px; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen font-sans flex flex-col text-slate-800">

    <header class="bg-amber-600 text-white p-4 shadow-lg text-center">
        <h1 class="text-xl font-bold">L14 Sentence Trainer 🔊</h1>
        <p class="text-xs opacity-80 uppercase tracking-widest">Te-form Requests & Progressive</p>
    </header>

    <main class="flex-grow flex flex-col items-center p-6 max-w-2xl mx-auto w-full">
        <!-- Mode Selector -->
        <div class="flex space-x-1 mb-6 bg-slate-200 p-1 rounded-xl w-full overflow-x-auto">
            <button id="mode-request" class="flex-1 whitespace-nowrap px-3 py-3 rounded-lg font-bold transition bg-white shadow text-amber-700 text-sm" onclick="switchMode('request')">
                Request
            </button>
            <button id="mode-offer" class="flex-1 whitespace-nowrap px-3 py-3 rounded-lg font-bold transition text-slate-600 text-sm" onclick="switchMode('offer')">
                Offer
            </button>
            <button id="mode-ongoing" class="flex-1 whitespace-nowrap px-3 py-3 rounded-lg font-bold transition text-slate-600 text-sm" onclick="switchMode('ongoing')">
                -ing
            </button>
            <button id="mode-shall" class="flex-1 whitespace-nowrap px-3 py-3 rounded-lg font-bold transition text-slate-600 text-sm" onclick="switchMode('shall')">
                Shall I?
            </button>
        </div>

        <!-- Question Area -->
        <div id="game-view" class="w-full flex flex-col items-center">
            <!-- Card Container -->
            <div class="card-container w-full h-[520px] relative mb-8">
                <div id="practice-card" class="card w-full h-full relative">
                    
                    <!-- Front Side -->
                    <div class="card-face card-front bg-white border-2 border-amber-50 text-center" onclick="flipCard()">
                        <div id="prompt-content" class="flex flex-col items-center w-full">
                            <!-- Injected by JS -->
                        </div>
                        <div class="mt-auto text-[10px] text-slate-300 font-bold uppercase tracking-widest">
                            Tap for Answer / Tocca per la risposta
                        </div>
                    </div>

                    <!-- Back Side -->
                    <div class="card-face card-back bg-amber-50 border-4 border-amber-500 text-center">
                        <div id="grammar-label" class="text-[10px] text-amber-600 font-black uppercase tracking-[0.2em] mb-4">Grammar Point</div>
                        
                        <div id="answer-text" class="text-3xl font-black text-amber-950 mb-2 leading-tight px-2"></div>
                        <div id="romaji-text" class="text-lg font-bold text-amber-600 font-mono mb-4"></div>
                        
                        <button onclick="speakJapanese(event)" class="speaker-btn">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z" />
                            </svg>
                        </button>
                        
                        <div class="w-16 h-px bg-amber-200 mb-6"></div>
                        
                        <div class="space-y-1">
                            <div id="it-back" class="text-amber-800 font-bold"></div>
                            <div id="en-back" class="text-slate-500 italic text-sm"></div>
                        </div>

                        <div class="mt-auto text-[10px] text-amber-400 font-bold uppercase cursor-pointer" onclick="nextQuestion()">
                            Next / Prossimo →
                        </div>
                    </div>
                </div>
            </div>

            <!-- Navigation Controls -->
            <div class="flex justify-between w-full items-center px-4">
                <button onclick="prevQuestion()" class="w-12 h-12 flex items-center justify-center rounded-full border-2 border-slate-300 text-slate-400 bg-white shadow-sm">←</button>
                <div class="text-slate-400 font-black text-lg">
                    <span id="current-index" class="text-amber-700">1</span> / <span id="total-count">0</span>
                </div>
                <button onclick="nextQuestion()" class="w-12 h-12 flex items-center justify-center rounded-full bg-amber-600 text-white shadow-lg">→</button>
            </div>
        </div>
    </main>

    <script>
        const requestQuestions = [
            { 
                icon: "✍️📄", 
                prompt: "Please write your name.", 
                answer: "なまえを かいて ください。", 
                romaji: "Namae o kaite kudasai.", 
                en: "Please write your name.", 
                it: "Per favore, scriva il suo nome." 
            },
            { 
                icon: "🪟❄️", 
                prompt: "Please open the window.", 
                answer: "まどを あけて ください。", 
                romaji: "Mado o akete kudasai.", 
                en: "Please open the window.", 
                it: "Per favore, apra la finestra." 
            },
            { 
                icon: "🛂👀", 
                prompt: "Please show me your passport.", 
                answer: "ぱすぽーとを みせて ください。", 
                romaji: "Pasupōto o misete kudasai.", 
                en: "Please show me your passport.", 
                it: "Per favore, mi mostri il passaporto." 
            },
            { 
                icon: "🚕🛑", 
                prompt: "Please stop here.", 
                answer: "ここで とめて ください。", 
                romaji: "Koko de tomete kudasai.", 
                en: "Please stop here.", 
                it: "Per favore, si fermi qui." 
            },
            { 
                icon: "📸🙏", 
                prompt: "Please take a photo.", 
                answer: "しゃしんを とって ください。", 
                romaji: "Shashin o totte kudasai.", 
                en: "Please take a photo.", 
                it: "Per favore, scatti una foto." 
            }
        ];

        const offerQuestions = [
            { 
                icon: "🪑✨", 
                prompt: "Please sit down (Offer).", 
                answer: "どうぞ すわって ください。", 
                romaji: "Dōzo suwatte kudasai.", 
                en: "Please, have a seat.", 
                it: "Prego, si sieda." 
            },
            { 
                icon: "🍰😋", 
                prompt: "Please eat (Offer).", 
                answer: "どうぞ たべて ください。", 
                romaji: "Dōzo tabete kudasai.", 
                en: "Please, eat / help yourself.", 
                it: "Prego, mangi." 
            },
            { 
                icon: "🚪🚶", 
                prompt: "Please come in (Offer).", 
                answer: "どうぞ はいって ください。", 
                romaji: "Dōzo haitte kudasai.", 
                en: "Please, come in.", 
                it: "Prego, entri." 
            },
            { 
                icon: "🍵✨", 
                prompt: "Please drink (Offer).", 
                answer: "どうぞ のんで ください。", 
                romaji: "Dōzo nonde kudasai.", 
                en: "Please, drink.", 
                it: "Prego, beva." 
            }
        ];

        const ongoingQuestions = [
            { 
                icon: "📖👨‍🏫", 
                prompt: "I am studying now.", 
                answer: "いま べんきょうして います。", 
                romaji: "Ima benkyō shite imasu.", 
                en: "I am studying now.", 
                it: "Sto studiando ora." 
            },
            { 
                icon: "🌧️🌂", 
                prompt: "It is raining.", 
                answer: "あめが ふって います。", 
                romaji: "Ame ga futte imasu.", 
                en: "It is raining.", 
                it: "Sta piovendo." 
            },
            { 
                icon: "🍱😋", 
                prompt: "He is eating lunch.", 
                answer: "おべんとうを たべて います。", 
                romaji: "Obentō o tabete imasu.", 
                en: "He is eating lunch.", 
                it: "Lui sta mangiando il pranzo." 
            },
            { 
                icon: "😴💤", 
                prompt: "The baby is sleeping.", 
                answer: "あかちゃんが ねて います。", 
                romaji: "Akachan ga nete imasu.", 
                en: "The baby is sleeping.", 
                it: "Il bambino sta dormendo." 
            }
        ];

        const shallQuestions = [
            { 
                icon: "🎒🤔", 
                prompt: "Shall I carry your bag?", 
                answer: "にもつを もちましょうか。", 
                romaji: "Nimotsu o mochimashōka.", 
                en: "Shall I carry your luggage?", 
                it: "Le porto i bagagli?" 
            },
            { 
                icon: "📸🤝", 
                prompt: "Shall I take a photo for you?", 
                answer: "しゃしんを とりましょうか。", 
                romaji: "Shashin o torimashōka.", 
                en: "Shall I take a photo?", 
                it: "Le scatto una foto?" 
            },
            { 
                icon: "🚕📞", 
                prompt: "Shall I call a taxi?", 
                answer: "たくしーを よびましょうか。", 
                romaji: "Takushī o yobimashōka.", 
                en: "Shall I call a taxi?", 
                it: "Le chiamo un taxi?" 
            },
            { 
                icon: "🚪❄️", 
                prompt: "Shall I open the door?", 
                answer: "どあを あけましょうか。", 
                romaji: "Doa o akemashōka.", 
                en: "Shall I open the door?", 
                it: "Le apro la porta?" 
            }
        ];

        let currentMode = 'request';
        let currentIndex = 0;
        let isFlipped = false;

        function switchMode(mode) {
            currentMode = mode;
            currentIndex = 0;
            isFlipped = false;
            document.getElementById('practice-card').classList.remove('is-flipped');
            
            ['request', 'offer', 'ongoing', 'shall'].forEach(m => {
                document.getElementById(`mode-${m}`).className = "flex-1 whitespace-nowrap px-3 py-3 rounded-lg font-bold transition text-slate-600 text-sm";
            });
            
            const activeBtn = document.getElementById(`mode-${mode}`);
            activeBtn.className = "flex-1 whitespace-nowrap px-3 py-3 rounded-lg font-bold transition bg-white shadow text-amber-700 text-sm";

            updateView();
        }

        function updateView() {
            let questions;
            let label;
            if (currentMode === 'request') { questions = requestQuestions; label = "〜てください (Request)"; }
            else if (currentMode === 'offer') { questions = offerQuestions; label = "どうぞ 〜てください (Offer)"; }
            else if (currentMode === 'ongoing') { questions = ongoingQuestions; label = "〜ています (Progressive)"; }
            else { questions = shallQuestions; label = "〜ましょうか (Shall I?)"; }

            const q = questions[currentIndex];
            const promptContent = document.getElementById('prompt-content');
            
            promptContent.innerHTML = `
                <div class="emoji-icon">${q.icon}</div>
                <div class="text-slate-400 text-[10px] uppercase tracking-widest mb-2 font-bold">Concept / Hint</div>
                <div class="text-2xl font-black text-slate-800 mb-6 leading-tight px-4">${q.prompt}</div>
                <div class="flex flex-col items-center space-y-2 border-t border-slate-100 pt-6 w-full px-4">
                    <div class="text-sm text-amber-600 font-bold uppercase tracking-wide">${q.it}</div>
                    <div class="text-sm text-slate-400 italic font-medium">${q.en}</div>
                </div>
            `;

            document.getElementById('current-index').innerText = currentIndex + 1;
            document.getElementById('total-count').innerText = questions.length;
            document.getElementById('answer-text').innerText = q.answer;
            document.getElementById('romaji-text').innerText = q.romaji;
            document.getElementById('it-back').innerText = q.it;
            document.getElementById('en-back').innerText = q.en;
            document.getElementById('grammar-label').innerText = label;
        }

        function flipCard() {
            if (isFlipped) return;
            document.getElementById('practice-card').classList.add('is-flipped');
            isFlipped = true;
        }

        function speakJapanese(event) {
            if (event) event.stopPropagation();
            let questions;
            if (currentMode === 'request') questions = requestQuestions;
            else if (currentMode === 'offer') questions = offerQuestions;
            else if (currentMode === 'ongoing') questions = ongoingQuestions;
            else questions = shallQuestions;

            const fullText = questions[currentIndex].answer;
            
            // Strip prefixes like "A：" or "B："
            const speechText = fullText.replace(/^[A-Z][：:]\s*/, '');
            
            const ut = new SpeechSynthesisUtterance(speechText);
            ut.lang = 'ja-JP';
            ut.rate = 0.85;
            
            const voices = window.speechSynthesis.getVoices();
            const jaVoice = voices.find(v => v.lang.startsWith('ja'));
            if (jaVoice) ut.voice = jaVoice;

            window.speechSynthesis.speak(ut);
        }

        function nextQuestion() {
            let questions;
            if (currentMode === 'request') questions = requestQuestions;
            else if (currentMode === 'offer') questions = offerQuestions;
            else if (currentMode === 'ongoing') questions = ongoingQuestions;
            else questions = shallQuestions;

            isFlipped = false;
            document.getElementById('practice-card').classList.remove('is-flipped');
            setTimeout(() => {
                currentIndex = (currentIndex + 1) % questions.length;
                updateView();
            }, 150);
        }

        function prevQuestion() {
            let questions;
            if (currentMode === 'request') questions = requestQuestions;
            else if (currentMode === 'offer') questions = offerQuestions;
            else if (currentMode === 'ongoing') questions = ongoingQuestions;
            else questions = shallQuestions;

            isFlipped = false;
            document.getElementById('practice-card').classList.remove('is-flipped');
            setTimeout(() => {
                currentIndex = (currentIndex - 1 + questions.length) % questions.length;
                updateView();
            }, 150);
        }

        window.speechSynthesis.getVoices();
        updateView();
    </script>
</body>
</html>
