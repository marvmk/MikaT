<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>L17 Vocabulary: Trilingual Training</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .card-container { perspective: 1000px; }
        .card { transition: transform 0.6s; transform-style: preserve-3d; cursor: pointer; }
        .card.is-flipped { transform: rotateY(180deg); }
        .card-face {
            backface-visibility: hidden; position: absolute;
            width: 100%; height: 100%; display: flex;
            flex-direction: column; align-items: center;
            justify-content: center; border-radius: 1.5rem;
            box-shadow: 0 10px 25px -5px rgb(0 0 0 / 0.1);
            padding: 1.5rem;
        }
        .card-back { transform: rotateY(180deg); }
        .action-icon { font-size: 5rem; }
        
        .speaker-btn {
            background: #10b981;
            color: white;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 6px 20px rgba(16, 185, 129, 0.4);
            transition: all 0.2s ease;
            margin-bottom: 1rem;
        }
        .speaker-btn:active { transform: scale(0.9); background: #059669; }
        .speaker-btn svg { width: 40px; height: 40px; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen font-sans flex flex-col">

    <header class="bg-emerald-900 text-white p-4 shadow-lg text-center">
        <h1 class="text-xl font-bold">L17 Vocab: Trilingue 🔊</h1>
        <p class="text-xs opacity-80 uppercase tracking-widest">Hiragana • Romaji • Audio • IT • EN</p>
    </header>

    <main class="flex-grow flex flex-col items-center p-6 max-w-2xl mx-auto w-full">
        <!-- Selector -->
        <div class="flex space-x-1 mb-6 bg-slate-200 p-1 rounded-xl w-full overflow-x-auto shadow-inner">
            <button id="mode-verb" class="flex-1 whitespace-nowrap px-4 py-3 rounded-lg font-bold transition bg-white shadow text-emerald-800" onclick="switchMode('verb')">VERBS</button>
            <button id="mode-adj" class="flex-1 whitespace-nowrap px-4 py-3 rounded-lg font-bold transition text-slate-600" onclick="switchMode('adj')">ADJECTIVES</button>
            <button id="mode-health" class="flex-1 whitespace-nowrap px-4 py-3 rounded-lg font-bold transition text-slate-600" onclick="switchMode('health')">HEALTH/NOUNS</button>
        </div>

        <!-- Card Area -->
        <div class="card-container w-full h-[500px] relative mb-8">
            <div id="practice-card" class="card w-full h-full relative">
                
                <!-- Front Side -->
                <div class="card-face card-front bg-white border-2 border-emerald-50 text-center" onclick="flipCard()">
                    <div id="prompt-content" class="flex flex-col items-center space-y-6"></div>
                    <div class="mt-auto text-[10px] text-slate-300 font-bold uppercase tracking-widest">Tap for Japanese / Tocca per il giapponese</div>
                </div>

                <!-- Back Side -->
                <div class="card-face card-back bg-emerald-50 border-4 border-emerald-600 text-center">
                    <div id="type-label" class="text-[10px] text-emerald-600 font-black uppercase tracking-[0.2em] mb-4">Risposta</div>
                    
                    <div id="answer-text" class="text-4xl font-black text-emerald-950 mb-1 leading-tight"></div>
                    <div id="romaji-text" class="text-2xl font-bold text-emerald-600 font-mono mb-8"></div>
                    
                    <!-- Manual Audio Trigger -->
                    <button id="audio-btn" onclick="speakJapanese(event)" class="speaker-btn">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z" />
                        </svg>
                    </button>
                    
                    <div class="w-16 h-1 bg-emerald-200 mb-6 mx-auto"></div>
                    
                    <div class="flex flex-col items-center space-y-1 px-4">
                        <div id="en-back" class="text-slate-500 italic"></div>
                        <div id="it-back" class="text-lg text-emerald-800 font-bold"></div>
                    </div>

                    <div class="mt-auto text-[10px] text-emerald-400 font-bold uppercase tracking-widest cursor-pointer" onclick="nextQuestion()">Next / Prossimo →</div>
                </div>
            </div>
        </div>

        <!-- Controls -->
        <div class="flex justify-between w-full items-center px-4">
            <button onclick="prevQuestion()" class="w-12 h-12 flex items-center justify-center rounded-full border-2 border-slate-300 text-slate-400 bg-white">←</button>
            <div class="text-slate-400 font-black text-lg"><span id="current-index" class="text-emerald-700">1</span> / <span id="total-count">0</span></div>
            <button onclick="nextQuestion()" class="w-12 h-12 flex items-center justify-center rounded-full bg-emerald-700 text-white shadow-lg">→</button>
        </div>
    </main>

    <script>
        const verbList = [
            { icon: "🧠📝", en: "memorize", it: "memorizzare", answer: "おぼえます", romaji: "oboemasu" },
            { icon: "❓🌫️", en: "forget", it: "dimenticare", answer: "わすれます", romaji: "wasuremasu" },
            { icon: "💸🚫", en: "lose", it: "perdere", answer: "なくします", romaji: "nakushimasu" },
            { icon: "📄📤", en: "hand in / submit", it: "consegnare", answer: "だします", romaji: "dashimasu" },
            { icon: "💰💳", en: "pay", it: "pagare", answer: "はらいます", romaji: "haraimasu" },
            { icon: "🔄🎁", en: "return (something)", it: "restituire", answer: "かえします", romaji: "kaeshimasu" },
            { icon: "🏠🚶", en: "go out", it: "uscire di casa", answer: "でかけます", romaji: "dekakemasu" },
            { icon: "👕⬇️", en: "take off (clothes)", it: "togliersi (vestiti)", answer: "ぬぎます", romaji: "nugimasu" },
            { icon: "👜🏃", en: "take (something with you)", it: "portare via (con sé)", answer: "もっていきます", romaji: "motteikimasu" },
            { icon: "👜🤝", en: "bring (something)", it: "portare qui", answer: "もってきます", romaji: "mottekimasu" },
            { icon: "😟", en: "worry", it: "preoccuparsi", answer: "しんぱいします", romaji: "shinpaishimasu" },
            { icon: "🌙👨‍💻", en: "work overtime", it: "fare gli straordinari", answer: "ざんぎょうします", romaji: "zangyōshimasu" },
            { icon: "✈️💼", en: "go on business trip", it: "andare in viaggio d'affari", answer: "しゅっちょうします", romaji: "shucchōshimasu" },
            { icon: "💊🥤", en: "take medicine", it: "prendere medicine", answer: "のみます [くすりを]", audio: "くすりをのみます", romaji: "kusuri o nomimasu" },
            { icon: "🛀🚿", en: "take a bath", it: "fare il bagno", answer: "はいります [おふろに]", audio: "おふろにはいります", romaji: "ofuro ni hairimasu" }
        ];

        const adjList = [
            { icon: "💎✨", en: "important / precious", it: "importante / prezioso", answer: "たいせつ[な]", audio: "たいせつ", romaji: "taisetsu" },
            { icon: "✅👍", en: "all right / okay", it: "va bene / tutto ok", answer: "だいじょうぶ[な]", audio: "だいじょうぶ", romaji: "daijōbu" },
            { icon: "⚠️🚫", en: "dangerous", it: "pericoloso", answer: "あぶない", romaji: "abunai" }
        ];

        const healthNounList = [
            { icon: "❓🤔", en: "problem / question", it: "problema / domanda", answer: "もんだい", romaji: "mondai" },
            { icon: "✅💬", en: "answer", it: "risposta", answer: "こたえ", romaji: "kotae" },
            { icon: "🚭", en: "no smoking", it: "vietato fumare", answer: "きんえん", romaji: "kin'en" },
            { icon: "🏥🪪", en: "health insurance card", it: "tessera sanitaria", answer: "ほけんしょう", romaji: "hokenshō" },
            { icon: "🤒", en: "fever", it: "febbre", answer: "ねつ", romaji: "netsu" },
            { icon: "🤧", en: "illness / sickness", it: "malattia", answer: "びょうき", romaji: "byōki" },
            { icon: "💊", en: "medicine", it: "medicina", answer: "くすり", romaji: "kusuri" },
            { icon: "🧥", en: "jacket / outerwear", it: "giacca / soprabito", answer: "うわぎ", romaji: "uwagi" },
            { icon: "👕", en: "underwear", it: "biancheria intima", answer: "したぎ", romaji: "shitagi" },
            { icon: "🤕❓", en: "What's the matter?", it: "Che cos'ha? / Cosa succede?", answer: "どうしましたか", romaji: "Dō shimashita ka" },
            { icon: "💥", en: "have a pain / hurt", it: "fa male / doloroso", answer: "いたいです", romaji: "itai desu" },
            { icon: "🙏✨", en: "Take care (to sick person)", it: "Riguardati / Si riguardi", answer: "おだいじに", romaji: "Odaiji ni" }
        ];

        let currentMode = 'verb';
        let currentIndex = 0;
        let isFlipped = false;

        function switchMode(mode) {
            currentMode = mode; currentIndex = 0; isFlipped = false;
            document.getElementById('practice-card').classList.remove('is-flipped');
            updateView();
            const modes = ['verb', 'adj', 'health'];
            modes.forEach(m => {
                const btn = document.getElementById(`mode-${m}`);
                if(m === mode) {
                    btn.className = "flex-1 whitespace-nowrap px-4 py-3 rounded-lg font-bold transition bg-white shadow text-emerald-800";
                } else {
                    btn.className = "flex-1 whitespace-nowrap px-4 py-3 rounded-lg font-bold transition text-slate-600";
                }
            });
        }

        function updateView() {
            let list;
            let typeLabel;
            if(currentMode === 'verb') { list = verbList; typeLabel = "Verbs"; }
            else if(currentMode === 'adj') { list = adjList; typeLabel = "Adjectives"; }
            else { list = healthNounList; typeLabel = "Health & Nouns"; }
            
            const item = list[currentIndex];
            const promptContent = document.getElementById('prompt-content');
            promptContent.innerHTML = `
                <div class="action-icon mb-2">${item.icon}</div>
                <div class="space-y-4">
                    <div>
                        <div class="text-[10px] text-slate-400 font-bold uppercase mb-1 tracking-widest">English</div>
                        <div class="text-xl text-slate-800 font-medium">${item.en}</div>
                    </div>
                    <div class="flex justify-center"><div class="h-px w-12 bg-slate-100"></div></div>
                    <div>
                        <div class="text-[10px] text-emerald-500 font-bold uppercase mb-1 tracking-widest">Italiano</div>
                        <div class="text-xl text-emerald-700 font-bold">${item.it}</div>
                    </div>
                </div>
            `;
            document.getElementById('current-index').innerText = currentIndex + 1;
            document.getElementById('total-count').innerText = list.length;
            document.getElementById('answer-text').innerText = item.answer;
            document.getElementById('romaji-text').innerText = item.romaji;
            document.getElementById('en-back').innerText = item.en;
            document.getElementById('it-back').innerText = item.it;
            document.getElementById('type-label').innerText = typeLabel;
        }

        function flipCard() {
            if (isFlipped) return;
            document.getElementById('practice-card').classList.add('is-flipped');
            isFlipped = true;
        }

        function speakJapanese(event) {
            if (event) event.stopPropagation();
            let list = (currentMode === 'verb') ? verbList : (currentMode === 'adj' ? adjList : healthNounList);
            const word = list[currentIndex].audio || list[currentIndex].answer;
            const ut = new SpeechSynthesisUtterance(word);
            ut.lang = 'ja-JP';
            ut.rate = 0.85;
            window.speechSynthesis.speak(ut);
        }

        function nextQuestion() {
            const list = (currentMode === 'verb') ? verbList : (currentMode === 'adj' ? adjList : healthNounList);
            isFlipped = false;
            document.getElementById('practice-card').classList.remove('is-flipped');
            setTimeout(() => {
                currentIndex = (currentIndex + 1) % list.length;
                updateView();
            }, 150);
        }

        function prevQuestion() {
            const list = (currentMode === 'verb') ? verbList : (currentMode === 'adj' ? adjList : healthNounList);
            isFlipped = false;
            document.getElementById('practice-card').classList.remove('is-flipped');
            setTimeout(() => {
                currentIndex = (currentIndex - 1 + list.length) % list.length;
                updateView();
            }, 150);
        }
        
        window.speechSynthesis.getVoices();
        updateView();
    </script>
</body>
</html>
