<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Japanese Practice: Lesson 48 Master</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .card-container { perspective: 1000px; }
        .card { transition: transform 0.6s; transform-style: preserve-3d; cursor: pointer; }
        .card.is-flipped { transform: rotateY(180deg); }
        .card-face {
            backface-visibility: hidden; position: absolute;
            width: 100%; height: 100%; display: flex;
            flex-direction: column; align-items: center;
            justify-content: center; border-radius: 1.5rem;
            box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1);
            padding: 2rem;
        }
        .card-back { transform: rotateY(180deg); }
        .item-icon { font-size: 4.5rem; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen font-sans flex flex-col">

    <header class="bg-amber-500 text-white p-6 shadow-md text-center">
        <h1 class="text-2xl font-bold italic">L48: Causative Forms</h1>
        <p class="text-sm opacity-90 font-black tracking-widest uppercase">Result Prep System</p>
    </header>

    <main class="flex-grow flex flex-col items-center p-6 max-w-2xl mx-auto w-full">
        <!-- Mode Selector (English Tabs) -->
        <div class="flex space-x-1 mb-8 bg-gray-200 p-1 rounded-xl w-full overflow-x-auto shadow-inner border border-gray-300">
            <button id="mode-intrans" class="flex-1 whitespace-nowrap px-2 py-3 rounded-lg font-bold transition bg-white shadow-sm text-amber-600 text-xs" onclick="switchMode('intrans')">
                Intransitive (o)
            </button>
            <button id="mode-trans" class="flex-1 whitespace-nowrap px-2 py-3 rounded-lg font-bold transition text-gray-600 text-xs" onclick="switchMode('trans')">
                Transitive (ni)
            </button>
            <button id="mode-permit" class="flex-1 whitespace-nowrap px-2 py-3 rounded-lg font-bold transition text-gray-600 text-xs" onclick="switchMode('permit')">
                Permission
            </button>
        </div>

        <!-- Question Area -->
        <div id="game-view" class="w-full flex flex-col items-center">
            <div id="instruction" class="text-gray-400 mb-6 text-center text-xs font-black uppercase tracking-[0.2em]">
                Make someone do an action...
            </div>

            <!-- Card Container -->
            <div class="card-container w-full h-[480px] relative mb-10">
                <div id="practice-card" class="card w-full h-full relative" onclick="flipCard()">
                    <!-- Front -->
                    <div class="card-face card-front bg-white border-2 border-amber-100 text-center">
                        <div id="prompt-content" class="flex flex-col items-center space-y-6 w-full px-4">
                            <!-- Injected by JS -->
                        </div>
                        <div class="mt-auto text-[10px] text-gray-300 font-bold uppercase tracking-widest">Tap to reveal Japanese</div>
                    </div>
                    <!-- Back -->
                    <div class="card-face card-back bg-amber-50 border-4 border-amber-400 p-8 text-center">
                        <div id="answer-kanji" class="text-3xl font-black text-amber-900 leading-tight mb-4 px-2"></div>
                        <div id="answer-kana" class="text-xl font-bold text-amber-500 mb-8"></div>
                        
                        <!-- Manual Audio Button -->
                        <button onclick="event.stopPropagation(); speakJapanese();" class="w-16 h-16 bg-white border-2 border-amber-200 rounded-full flex items-center justify-center shadow-md active:scale-90 transition-transform mb-6 group">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-amber-500 group-hover:text-amber-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z" />
                            </svg>
                        </button>

                        <div id="answer-it" class="text-base text-amber-700 italic font-medium px-4"></div>
                        <div class="mt-auto text-[10px] text-amber-300 font-bold uppercase">Tap for next question</div>
                    </div>
                </div>
            </div>

            <!-- Navigation -->
            <div class="flex justify-between w-full items-center px-2">
                <button onclick="prevQuestion()" class="w-14 h-14 flex items-center justify-center border-2 border-gray-200 rounded-full text-gray-400 bg-white hover:bg-gray-50 transition shadow-sm text-xl font-bold">←</button>
                <div class="flex flex-col items-center">
                    <div class="text-gray-400 font-black text-lg">
                        <span id="current-index" class="text-amber-600 font-black">1</span> 
                        <span class="text-gray-200">/</span> 
                        <span id="total-count">17</span>
                    </div>
                </div>
                <button onclick="buttonNext()" class="px-10 py-4 bg-amber-500 rounded-full text-white font-black hover:bg-amber-600 transition shadow-lg tracking-widest uppercase text-sm">Next</button>
            </div>
        </div>

        <!-- Finished View -->
        <div id="finished-view" class="hidden w-full flex flex-col items-center justify-center p-12 bg-white rounded-[3rem] shadow-2xl border-4 border-amber-100 text-center">
            <div class="text-7xl mb-8">Finished‼️</div>
            <p class="text-gray-500 font-black uppercase tracking-[0.3em] mb-4 text-sm">Pratica completata!</p>
            <p class="text-lg text-amber-600 font-bold mb-10 italic text-center">Lesson 48 Causative Mastery Complete.</p>
            <button onclick="location.reload()" class="w-full py-5 bg-amber-500 text-white rounded-2xl font-black shadow-xl active:scale-95 transition-all text-xl tracking-widest uppercase">
                Restart
            </button>
        </div>
    </main>

    <footer class="py-8 text-center text-gray-300 text-[10px] font-black tracking-widest uppercase">
        Result Prep System &bull; Mika Tomao
    </footer>

    <script>
        // Mode 1: Intransitive Causative (Person o V-causative)
        const intransData = [
            { icon: "🧒🏃", en: "I made the child run.", it: "Ho fatto correre il bambino.", kanji: "子供を走らせました。", kana: "こどもを はしらせました。" },
            { icon: "🤝🏠", en: "I let my friend come to my house.", it: "Ho lasciato che il mio amico venisse a casa mia.", kanji: "友達をうちへ来させました。", kana: "ともだちを うちへ こさせました。" },
            { icon: "🧒🌳", en: "I let the child play in the park.", it: "Ho lasciato giocare il bambino al parco.", kanji: "子供を公園で遊ばせました。", kana: "こどもを こうえんで あそばせました。" },
            { icon: "👨‍🏫🎓", en: "The teacher made the students attend the meeting.", it: "L'insegnante ha fatto partecipare gli studenti alla riunione.", kanji: "先生は学生を出席させました。", kana: "せんせいは がくせいを しゅっせき させました。" },
            { icon: "🤝🏃‍♂️", en: "I let him go first.", it: "L'ho fatto andare per primo.", kanji: "彼を先に行かせました。", kana: "かれを さきに いかせました。" },
            { icon: "🧒🏫", en: "The mother made the child go to school.", it: "La madre ha fatto andare il bambino a scuola.", kanji: "母は子供を学校へ行かせました。", kana: "ははは こどもを がっこうへ いかせました。" },
            { icon: "🧒🛀", en: "I made the child take a bath.", it: "Ho fatto fare il bagno al bambino.", kanji: "子供をお風呂に入らせました。", kana: "こどもを おふろに はいらせました。" },
            { icon: "🤝🚪", en: "I made the friend wait outside.", it: "Ho fatto aspettare l'amico fuori.", kanji: "友達を外で待たせました。", kana: "ともだちを そとで またせました。" },
            { icon: "🧒💤", en: "I let the child sleep until late.", it: "Ho lasciato dormire il bambino fino a tardi.", kanji: "子供を遅くまで寝させました。", kana: "こどもを おそくまで ねさせました。" },
            { icon: "🏃‍♂️💨", en: "I made him hurry.", it: "L'ho fatto affrettare.", kanji: "彼を急がせました。", kana: "かれを いそがせました。" },
            { icon: "🧒🛒", en: "I let the child go shopping.", it: "Ho lasciato che il bambino andasse a fare la spesa.", kanji: "子供を買い物に行かせました。", kana: "こどもを かいものに いかせました。" },
            { icon: "👨‍💼🏢", en: "I made the subordinate go to the branch office.", it: "Ho fatto andare il subordinato alla filiale.", kanji: "部下を支店へ行かせました。", kana: "ぶかを してんへ いかせました。" },
            { icon: "🤝🥂", en: "I let my friend drink alcohol.", it: "Ho lasciato bere alcol al mio amico.", kanji: "友達をお酒を飲ませました。(自動詞的用法)", kana: "ともだちを おさけを のませました。" },
            { icon: "🧒🥣", en: "I made the child sit down.", it: "Ho fatto sedere il bambino.", kanji: "子供を座らせました。", kana: "こどもを すわらせました。" },
            { icon: "🤝🛤️", en: "I let him choose the way.", it: "L'ho lasciato scegliere la strada.", kanji: "彼を歩かせました。(道を)", kana: "かれを あるかせました。" },
            { icon: "🧒🎒", en: "I let the child walk to the station.", it: "Ho lasciato camminare il bambino fino in stazione.", kanji: "子供を駅まで歩かせました。", kana: "こどもを えきまで あるかせました。" },
            { icon: "🤝📞", en: "I made him answer the phone.", it: "L'ho fatto rispondere al telefono.", kanji: "彼を電話に出させました。", kana: "かれを でんわに ださせました。" }
        ];

        // Mode 2: Transitive Causative (Person ni Obj o V-causative)
        const transData = [
            { icon: "🧒📖", en: "I let the child read a book.", it: "Ho lasciato leggere un libro al bambino.", kanji: "子供に本を読ませました。", kana: "こどもに ほんを よませました。" },
            { icon: "🧒🥦", en: "I made the child eat vegetables.", it: "Ho fatto mangiare le verdure al bambino.", kanji: "子供に野菜を食べさせました。", kana: "こどもに やさいを たべさせました。" },
            { icon: "👨‍🏫✍️", en: "The teacher made the students write an essay.", it: "L'insegnante ha fatto scrivere un tema agli studenti.", kanji: "先生は学生に作文を書かせました。", kana: "せんせいは がくせいに さくぶんを かかせました。" },
            { icon: "🧒🧼", en: "I made the child wash the car.", it: "Ho fatto lavare l'auto al bambino.", kanji: "子供に車を洗わせました。", kana: "こどもに くるまを あらわせました。" },
            { icon: "👨‍💼📁", en: "I made the subordinate copy the documents.", it: "Ho fatto fotocopiare i documenti al subordinato.", kanji: "部下に書類をコピーさせました。", kana: "ぶかに しょるいを こぴー させました。" },
            { icon: "🤝🧺", en: "I let my friend carry the luggage.", it: "Ho lasciato portare i bagagli al mio amico.", kanji: "友達に荷物を持たせました。", kana: "ともだちに にもつを もたせました。" },
            { icon: "🧒🧥", en: "I made the child wear a coat.", it: "Ho fatto indossare il cappotto al bambino.", kanji: "子供にコートを着せました。", kana: "こどもに こーとを きせました。" },
            { icon: "🤝📸", en: "I let my friend take a photo.", it: "Ho lasciato scattare una foto al mio amico.", kanji: "友達に写真を撮らせました。", kana: "ともだちに しゃしんを とらせました。" },
            { icon: "👨‍🏫❓", en: "The teacher let the student ask a question.", it: "L'insegnante ha lasciato che lo studente facesse una domanda.", kanji: "先生は学生に質問させました。", kana: "せんせいは がくせいに しつもん させました。" },
            { icon: "🧒🦷", en: "I made the child brush their teeth.", it: "Ho fatto lavare i denti al bambino.", kanji: "子供に歯を磨かせました。", kana: "こどもに はを みがかぜました。" },
            { icon: "👨‍💼👔", en: "I made the subordinate wear a tie.", it: "Ho fatto mettere la cravatta al subordinato.", kanji: "部下にネクタイを締めさせました。", kana: "ぶかに ねくたいを しめさせました。" },
            { icon: "🤝🚲", en: "I let my friend use the bicycle.", it: "Ho lasciato usare la bicicletta al mio amico.", kanji: "友達に自転車を使わせました。", kana: "ともだちに じてんしゃを つかわせました。" },
            { icon: "🧒🍳", en: "I let the child help with cooking.", it: "Ho lasciato che il bambino aiutasse a cucinare.", kanji: "子供に料理を手伝わせました。", kana: "こどもに りょうりを てつだわせました。" },
            { icon: "🤝💬", en: "I let him say his opinion.", it: "L'ho lasciato dire la sua opinione.", kanji: "彼に意見を言わせました。", kana: "かれに いけんを いわせました。" },
            { icon: "👨‍💼📞", en: "I made the subordinate make a phone call.", it: "Ho fatto fare una telefonata al subordinato.", kanji: "部下に電話をかけさせました。", kana: "ぶかに でんわを かけさせました。" },
            { icon: "🧒🎨", en: "I let the child draw a picture.", it: "Ho lasciato disegnare un quadro al bambino.", kanji: "子供に絵を描かせました。", kana: "こどもに えを かかせました。" },
            { icon: "🤝🎹", en: "I let my friend play the piano.", it: "Ho lasciato suonare il pianoforte al mio amico.", kanji: "友達にピアノを弾かせました。", kana: "ともだちに ぴあのを ひかせました。" }
        ];

        // Mode 3: Permission (~sasete itadakimasen ka)
        const permitData = [
            { icon: "🏠🏃‍♂️", en: "Could you let me leave early today?", it: "Potrebbe lasciarmi andare a casa presto oggi?", kanji: "今日は早く帰らせていただけませんか。", kana: "きょうは はやく かえらせて いただけませんか。" },
            { icon: "📱✨", en: "Could you let me use the phone?", it: "Potrebbe lasciarmi usare il telefono?", kanji: "電話を使わせていただけませんか。", kana: "でんわを つかわせて いただけませんか。" },
            { icon: "📸🌳", en: "Could you let me take a photo here?", it: "Potrebbe lasciarmi scattare una foto qui?", kanji: "ここで写真を撮らせていただけませんか。", kana: "ここで しゃしんを とらせて いただけませんか。" },
            { icon: "🤔💬", en: "Could you let me think about it for a while?", it: "Potrebbe lasciarmi pensare per un po'?", kanji: "少し考えさせていただけませんか。", kana: "すこし かんがえさせて いただけませんか。" },
            { icon: "🤝💼", en: "Could you let me help with that work?", it: "Potrebbe lasciarmi aiutare con quel lavoro?", kanji: "その仕事を手伝わせていただけませんか。", kana: "その しごとを てつだわせて いただけませんか。" },
            { icon: "🚉🚶", en: "Could you let me go to the station?", it: "Potrebbe lasciarmi andare in stazione?", kanji: "駅へ行かせていただけませんか。", kana: "えきへ いかせて いただけませんか。" },
            { icon: "📅❌", en: "Could you let me take a holiday tomorrow?", it: "Potrebbe lasciarmi prendere un giorno di ferie domani?", kanji: "明日休ませていただけませんか。", kana: "あした やすませて いただけませんか。" },
            { icon: "📖💡", en: "Could you let me read that book?", it: "Potrebbe lasciarmi leggere quel libro?", kanji: "その本を読ませていただけませんか。", kana: "その ほんを よませて いただけませんか。" },
            { icon: "📞🤝", en: "Could you let me call my family?", it: "Potrebbe lasciarmi chiamare la mia famiglia?", kanji: "家族に電話させさせていただけませんか。", kana: "かぞくに でんわ させさせて いただけませんか。" },
            { icon: "🤝✍️", en: "Could you let me write my name here?", it: "Potrebbe lasciarmi scrivere il mio nome qui?", kanji: "ここに名前を書かせていただけませんか。", kana: "ここに なまえを かかせて いただけませんか。" },
            { icon: "👥💬", en: "Could you let me explain the reason?", it: "Potrebbe lasciarmi spiegare il motivo?", kanji: "理由を説明させていただけませんか。", kana: "りゆうを せつめい させて いただけませんか。" },
            { icon: "🤝🏠", en: "Could you let me enter the room?", it: "Potrebbe lasciarmi entrare nella stanza?", kanji: "部屋に入らせていただけませんか。", kana: "へやに はいらせて いただけませんか。" },
            { icon: "💻✨", en: "Could you let me use this computer?", it: "Potrebbe lasciarmi usare questo computer?", kanji: "このパソコンを使わせていただけませんか。", kana: "この ぱそこんを つかわせて いただけませんか。" },
            { icon: "🥩😋", en: "Could you let me eat this?", it: "Potrebbe lasciarmi mangiare questo?", kanji: "これを食べさせていただけませんか。", kana: "これを たべさせて いただけませんか。" },
            { icon: "👔✨", en: "Could you let me see that tie?", it: "Potrebbe lasciarmi vedere quella cravatta?", kanji: "そのネクタイを見させていただけませんか。", kana: "その ねくたいを みさせて いただけませんか。" },
            { icon: "🚶💨", en: "Could you let me go out for a moment?", it: "Potrebbe lasciarmi uscire un momento?", kanji: "ちょっと出かけさせていただけませんか。", kana: "ちょっと でかけさせて いただけませんか。" },
            { icon: "🗣️💡", en: "Could you let me hear your story?", it: "Potrebbe lasciarmi sentire la sua storia?", kanji: "お話を聞かせていただけませんか。", kana: "おはなしを きかせて いただけませんか。" }
        ];

        let currentMode = 'intrans';
        let currentIndex = 0;
        let isFlipped = false;

        function switchMode(mode) {
            currentMode = mode;
            currentIndex = 0;
            isFlipped = false;
            document.getElementById('practice-card').classList.remove('is-flipped');
            document.getElementById('game-view').classList.remove('hidden');
            document.getElementById('finished-view').classList.add('hidden');
            
            const modes = ['intrans', 'trans', 'permit'];
            modes.forEach(m => {
                const btn = document.getElementById(`mode-${m}`);
                if(m === mode) {
                    btn.classList.add('bg-white', 'shadow-sm', 'text-amber-600');
                    btn.classList.remove('text-gray-600');
                } else {
                    btn.classList.remove('bg-white', 'shadow-sm', 'text-amber-600');
                    btn.classList.add('text-gray-600');
                }
            });

            const instr = document.getElementById('instruction');
            if(mode === 'intrans') instr.innerText = "Intransitive (o): Person o V-causative";
            else if(mode === 'trans') instr.innerText = "Transitive (ni): Person ni Obj o V-causative";
            else instr.innerText = "Permission: V-causative-te itadakimasen ka";
            
            updateView();
        }

        function updateView() {
            const data = { intrans: intransData, trans: transData, permit: permitData };
            const questions = data[currentMode];
            const q = questions[currentIndex];
            const promptContent = document.getElementById('prompt-content');
            
            document.getElementById('current-index').innerText = currentIndex + 1;
            document.getElementById('total-count').innerText = questions.length;
            
            document.getElementById('answer-kanji').innerText = q.kanji;
            document.getElementById('answer-kana').innerText = q.kana;
            document.getElementById('answer-it').innerText = q.it;

            promptContent.innerHTML = `
                <div class="item-icon mb-4">${q.icon}</div>
                <div class="text-center px-6">
                    <div class="text-gray-400 text-[10px] font-black uppercase tracking-[0.2em] mb-4">Target Meaning / Context</div>
                    <div class="text-3xl font-black text-gray-800 leading-tight italic px-4">${q.en}</div>
                </div>
            `;
        }

        function flipCard() {
            const card = document.getElementById('practice-card');
            if (!isFlipped) {
                card.classList.add('is-flipped');
                isFlipped = true;
            } else {
                nextQuestion();
            }
        }

        function speakJapanese() {
            const data = { intrans: intransData, trans: transData, permit: permitData };
            const text = data[currentMode][currentIndex].kana;
            const ut = new SpeechSynthesisUtterance(text);
            ut.lang = 'ja-JP';
            ut.rate = 0.95;
            window.speechSynthesis.speak(ut);
        }

        function nextQuestion() {
            const data = { intrans: intransData, trans: transData, permit: permitData };
            const questions = data[currentMode];
            
            if (isFlipped && currentIndex === questions.length - 1) {
                document.getElementById('game-view').classList.add('hidden');
                document.getElementById('finished-view').classList.remove('hidden');
                return;
            }

            isFlipped = false;
            document.getElementById('practice-card').classList.remove('is-flipped');
            setTimeout(() => {
                currentIndex = (currentIndex + 1) % questions.length;
                updateView();
            }, 150);
        }

        function prevQuestion() {
            const data = { intrans: intransData, trans: transData, permit: permitData };
            const questions = data[currentMode];
            isFlipped = false;
            document.getElementById('practice-card').classList.remove('is-flipped');
            setTimeout(() => {
                currentIndex = (currentIndex - 1 + questions.length) % questions.length;
                updateView();
            }, 150);
        }

        function buttonNext() {
            if (!isFlipped) {
                flipCard();
            } else {
                nextQuestion();
            }
        }

        updateView();
    </script>
</body>
</html>
