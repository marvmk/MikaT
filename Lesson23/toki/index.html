<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>L23: Toki & To Trainer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .card-container { perspective: 1000px; }
        .card { transition: transform 0.6s; transform-style: preserve-3d; cursor: pointer; }
        .card.is-flipped { transform: rotateY(180deg); }
        .card-face {
            backface-visibility: hidden; position: absolute;
            width: 100%; height: 100%; display: flex;
            flex-direction: column; align-items: center;
            justify-content: center; border-radius: 1.5rem;
            box-shadow: 0 10px 25px -5px rgb(0 0 0 / 0.1);
            padding: 2rem;
        }
        .card-back { transform: rotateY(180deg); }
        .emoji-icon { font-size: 5rem; margin-bottom: 1rem; }
        
        .speaker-btn {
            background: #ef4444;
            color: white;
            width: 70px;
            height: 70px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 14px 0 rgba(239, 68, 68, 0.4);
            transition: all 0.2s ease;
            margin: 1.5rem 0;
        }
        .speaker-btn:active { transform: scale(0.9); background: #dc2626; }
        .speaker-btn svg { width: 35px; height: 35px; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen font-sans flex flex-col text-slate-800">

    <header class="bg-red-800 text-white p-4 shadow-lg text-center">
        <h1 class="text-xl font-bold">L23 Sentence Trainer 🔊</h1>
        <p class="text-xs opacity-80 uppercase tracking-widest">When (Toki) • If/When (To)</p>
    </header>

    <main class="flex-grow flex flex-col items-center p-6 max-w-2xl mx-auto w-full">
        <!-- Mode Selector -->
        <div class="flex space-x-1 mb-6 bg-slate-200 p-1 rounded-xl w-full overflow-x-auto shadow-inner">
            <button id="mode-toki" class="flex-1 whitespace-nowrap px-3 py-3 rounded-lg font-bold transition bg-white shadow text-red-800 text-[10px]" onclick="switchMode('toki')">
                TOKI (V/ADJ)
            </button>
            <button id="mode-tense" class="flex-1 whitespace-nowrap px-3 py-3 rounded-lg font-bold transition text-slate-600 text-[10px]" onclick="switchMode('tense')">
                TOKI (TENSE)
            </button>
            <button id="mode-to" class="flex-1 whitespace-nowrap px-3 py-3 rounded-lg font-bold transition text-slate-600 text-[10px]" onclick="switchMode('to')">
                TO (IF/WHEN)
            </button>
        </div>

        <!-- Practice Area -->
        <div id="game-view" class="w-full flex flex-col items-center">
            <div class="card-container w-full h-[540px] relative mb-8">
                <div id="practice-card" class="card w-full h-full relative">
                    
                    <!-- Front Side -->
                    <div class="card-face card-front bg-white border-2 border-red-50 text-center" onclick="flipCard()">
                        <div id="prompt-content" class="flex flex-col items-center w-full">
                            <!-- Injected by JS -->
                        </div>
                        <div class="mt-auto text-[10px] text-slate-300 font-bold uppercase tracking-widest">
                            Tap for Answer / Tocca per la risposta
                        </div>
                    </div>

                    <!-- Back Side -->
                    <div class="card-face card-back bg-red-50 border-4 border-red-600 text-center">
                        <div id="grammar-label" class="text-[10px] text-red-600 font-black uppercase tracking-[0.2em] mb-4">Grammar Point</div>
                        
                        <div id="answer-text" class="text-2xl font-black text-red-950 mb-2 leading-tight px-2"></div>
                        <div id="romaji-text" class="text-sm font-bold text-red-400 font-mono mb-4 italic"></div>
                        
                        <button onclick="speakJapanese(event)" class="speaker-btn">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z" />
                            </svg>
                        </button>
                        
                        <div class="w-16 h-px bg-red-200 mb-6 mx-auto"></div>
                        
                        <div class="space-y-1 px-4">
                            <div id="it-back" class="text-red-800 font-bold text-sm"></div>
                            <div id="en-back" class="text-slate-500 italic text-xs"></div>
                        </div>

                        <div class="mt-auto text-[10px] text-red-400 font-bold uppercase cursor-pointer" onclick="nextQuestion()">
                            Next / Prossimo →
                        </div>
                    </div>
                </div>
            </div>

            <!-- Controls -->
            <div class="flex justify-between w-full items-center px-4">
                <button onclick="prevQuestion()" class="w-12 h-12 flex items-center justify-center rounded-full border-2 border-slate-300 text-slate-400 bg-white">←</button>
                <div class="text-slate-400 font-black text-lg">
                    <span id="current-index" class="text-red-700">1</span> / <span id="total-count">0</span>
                </div>
                <button onclick="nextQuestion()" class="w-12 h-12 flex items-center justify-center rounded-full bg-red-700 text-white shadow-lg">→</button>
            </div>
        </div>
    </main>

    <script>
        const tokiQuestions = [
            { 
                icon: "📚🚶", 
                prompt: "When I go to the library, I borrow a book.", 
                answer: "としょかんへ いく とき、ほんを かします。", 
                romaji: "Toshokan e iku toki, hon o kashimasu.", 
                en: "When I go to the library, I borrow books.", 
                it: "Quando vado in biblioteca, prendo in prestito dei libri." 
            },
            { 
                icon: "👦⚽", 
                prompt: "When I was a child, I played soccer.", 
                answer: "こどもの とき、サッカーを しました。", 
                romaji: "Kodomo no toki, sakkā o shimashita.", 
                en: "When I was a child, I played soccer.", 
                it: "Quando ero bambino, giocavo a calcio." 
            },
            { 
                icon: "🌙🌫️", 
                prompt: "When it's dark, please turn on the light.", 
                answer: "くらい とき、でんきを つけて ください。", 
                romaji: "Kurai toki, denki o tsukete kudasai.", 
                en: "When it is dark, please turn on the light.", 
                it: "Quando è buio, per favore accendi la luce." 
            },
            { 
                icon: "🚶❓", 
                prompt: "When you don't know the way, please ask me.", 
                answer: "みちが わからない とき、わたしに きいて ください。", 
                romaji: "Michi ga wakaranai toki, watashi ni kiite kudasai.", 
                en: "When you don't know the way, please ask me.", 
                it: "Quando non conosci la strada, per favore chiedimi." 
            }
        ];

        const tenseQuestions = [
            { 
                icon: "✈️🇯🇵 (Going)", 
                prompt: "When going to Japan (on the plane), I bought a souvenir.", 
                answer: "にほんへ いく とき、おみやげを かいました。", 
                romaji: "Nihon e iku toki, omiyage o kaimashita.", 
                en: "When (on the way) to Japan, I bought a souvenir.", 
                it: "Mentre andavo in Giappone, ho comprato un souvenir." 
            },
            { 
                icon: "🛬🇯🇵 (Arrived)", 
                prompt: "When I went to Japan (after arriving), I bought a souvenir.", 
                answer: "にほんへ いった とき、おみやげを かいました。", 
                romaji: "Nihon e itta toki, omiyage o kaimashita.", 
                en: "When I went to (arrived in) Japan, I bought a souvenir.", 
                it: "Quando sono andato (arrivato) in Giappone, ho comprato un souvenir." 
            },
            { 
                icon: "🛌💤 (Going)", 
                prompt: "When I go to bed, I say 'Oyasumi'.", 
                answer: "ねる とき、「おやすみなさい」を いいます。", 
                romaji: "Neru toki, 'Oyasuminasai' o iimasu.", 
                en: "When I go to bed, I say 'Good night'.", 
                it: "Quando vado a dormire, dico 'Buonanotte'." 
            },
            { 
                icon: "🌅🛌 (Woke)", 
                prompt: "When I woke up, I drank water.", 
                answer: "おきた とき、みずを のみました。", 
                romaji: "Okita toki, mizu o nomimashita.", 
                en: "When I woke up, I drank water.", 
                it: "Quando mi sono svegliato, ho bevuto dell'acqua." 
            }
        ];

        const toQuestions = [
            { 
                icon: "🔘👈💴", 
                prompt: "If you press this button, change comes out.", 
                answer: "このボタンを おすと、おつりが でます。", 
                romaji: "Kono botan o osu to, otsuri ga demasu.", 
                en: "If you press this button, the change comes out.", 
                it: "Se premi questo pulsante, esce il resto." 
            },
            { 
                icon: "🔄🔊✨", 
                prompt: "If you turn this, the sound gets louder.", 
                answer: "これを まわすと、おとが おおきく なります。", 
                romaji: "Kore o mawasu to, oto ga ōkiku narimasu.", 
                en: "If you turn this, the sound gets louder.", 
                it: "Se giri questo, il suono diventa più forte." 
            },
            { 
                icon: "🛤️👉🌲", 
                prompt: "If you go straight, there is a park.", 
                answer: "まっすぐ いくと、こうえんが あります。", 
                romaji: "Massugu iku to, kōen ga arimasu.", 
                en: "If you go straight, there is a park.", 
                it: "Se vai dritto, c'è un parco." 
            },
            { 
                icon: "🌉👈🏙️", 
                prompt: "Cross the bridge and it is on the left.", 
                answer: "はしを わたると、ひだりに あります。", 
                romaji: "Hashi o wataru to, hidari ni arimasu.", 
                en: "If you cross the bridge, it's on the left.", 
                it: "Se attraversi il ponte, si trova sulla sinistra." 
            }
        ];

        let currentMode = 'toki';
        let currentIndex = 0;
        let isFlipped = false;

        function switchMode(mode) {
            currentMode = mode;
            currentIndex = 0;
            isFlipped = false;
            document.getElementById('practice-card').classList.remove('is-flipped');
            
            ['toki', 'tense', 'to'].forEach(m => {
                document.getElementById(`mode-${m}`).className = "flex-1 whitespace-nowrap px-3 py-3 rounded-lg font-bold transition text-slate-600 text-[10px]";
            });
            
            const activeBtn = document.getElementById(`mode-${mode}`);
            activeBtn.className = "flex-1 whitespace-nowrap px-3 py-3 rounded-lg font-bold transition bg-white shadow text-red-800 text-[10px]";

            updateView();
        }

        function updateView() {
            let questions;
            let label;
            if (currentMode === 'toki') { questions = tokiQuestions; label = "〜とき (V/Adj/N)"; }
            else if (currentMode === 'tense') { questions = tenseQuestions; label = "辞書形 vs た形 + とき"; }
            else { questions = toQuestions; label = "〜と (Condition/Directions)"; }

            const q = questions[currentIndex];
            const promptContent = document.getElementById('prompt-content');
            
            promptContent.innerHTML = `
                <div class="emoji-icon">${q.icon}</div>
                <div class="text-slate-400 text-[10px] uppercase tracking-widest mb-2 font-bold">Concept / Hint</div>
                <div class="text-2xl font-black text-slate-800 mb-6 leading-tight px-4">${q.prompt}</div>
                <div class="flex flex-col items-center space-y-2 border-t border-slate-100 pt-6 w-full px-4">
                    <div class="text-sm text-red-600 font-bold uppercase tracking-wide">${q.it}</div>
                    <div class="text-sm text-slate-400 italic font-medium">${q.en}</div>
                </div>
            `;

            document.getElementById('current-index').innerText = currentIndex + 1;
            document.getElementById('total-count').innerText = questions.length;
            document.getElementById('answer-text').innerText = q.answer;
            document.getElementById('romaji-text').innerText = q.romaji;
            document.getElementById('it-back').innerText = q.it;
            document.getElementById('en-back').innerText = q.en;
            document.getElementById('grammar-label').innerText = label;
        }

        function flipCard() {
            if (isFlipped) return;
            document.getElementById('practice-card').classList.add('is-flipped');
            isFlipped = true;
        }

        function speakJapanese(event) {
            if (event) event.stopPropagation();
            let questions = currentMode === 'toki' ? tokiQuestions : (currentMode === 'tense' ? tenseQuestions : toQuestions);
            const fullText = questions[currentIndex].answer;
            const speechText = fullText.replace(/^[A-Z][：:]\s*/g, '').replace(/[A-Z][：:]\s*/g, ' ');
            
            const ut = new SpeechSynthesisUtterance(speechText);
            ut.lang = 'ja-JP';
            ut.rate = 0.85;
            window.speechSynthesis.speak(ut);
        }

        function nextQuestion() {
            let questions = currentMode === 'toki' ? tokiQuestions : (currentMode === 'tense' ? tenseQuestions : toQuestions);
            isFlipped = false;
            document.getElementById('practice-card').classList.remove('is-flipped');
            setTimeout(() => {
                currentIndex = (currentIndex + 1) % questions.length;
                updateView();
            }, 150);
        }

        function prevQuestion() {
            let questions = currentMode === 'toki' ? tokiQuestions : (currentMode === 'tense' ? tenseQuestions : toQuestions);
            isFlipped = false;
            document.getElementById('practice-card').classList.remove('is-flipped');
            setTimeout(() => {
                currentIndex = (currentIndex - 1 + questions.length) % questions.length;
                updateView();
            }, 150);
        }

        updateView();
    </script>
</body>
</html>
