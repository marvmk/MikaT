<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>L8: Adjectives Sentence Trainer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .card-container { perspective: 1000px; }
        .card { transition: transform 0.6s; transform-style: preserve-3d; cursor: pointer; }
        .card.is-flipped { transform: rotateY(180deg); }
        .card-face {
            backface-visibility: hidden; position: absolute;
            width: 100%; height: 100%; display: flex;
            flex-direction: column; align-items: center;
            justify-content: center; border-radius: 1.5rem;
            box-shadow: 0 10px 25px -5px rgb(0 0 0 / 0.1);
            padding: 2rem;
        }
        .card-back { transform: rotateY(180deg); }
        .emoji-icon { font-size: 5rem; margin-bottom: 1rem; }
        
        .speaker-btn {
            background: #0ea5e9;
            color: white;
            width: 70px;
            height: 70px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 14px 0 rgba(14, 165, 233, 0.4);
            transition: all 0.2s ease;
            margin: 1.5rem 0;
        }
        .speaker-btn:active { transform: scale(0.9); background: #0284c7; }
        .speaker-btn svg { width: 35px; height: 35px; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen font-sans flex flex-col text-slate-800">

    <header class="bg-sky-800 text-white p-4 shadow-lg text-center">
        <h1 class="text-xl font-bold">L8 Sentence Trainer 🔊</h1>
        <p class="text-xs opacity-80 uppercase tracking-widest">i-Adjectives & na-Adjectives Practice</p>
    </header>

    <main class="flex-grow flex flex-col items-center p-6 max-w-2xl mx-auto w-full">
        <!-- Mode Selector -->
        <div class="flex space-x-1 mb-6 bg-slate-200 p-1 rounded-xl w-full overflow-x-auto">
            <button id="mode-aff" class="flex-1 whitespace-nowrap px-3 py-3 rounded-lg font-bold transition bg-white shadow text-sky-800 text-xs" onclick="switchMode('aff')">
                Affirmative
            </button>
            <button id="mode-neg" class="flex-1 whitespace-nowrap px-3 py-3 rounded-lg font-bold transition text-slate-600 text-xs" onclick="switchMode('neg')">
                Negative
            </button>
            <button id="mode-mod" class="flex-1 whitespace-nowrap px-3 py-3 rounded-lg font-bold transition text-slate-600 text-xs" onclick="switchMode('mod')">
                Adj + Noun
            </button>
            <button id="mode-ques" class="flex-1 whitespace-nowrap px-3 py-3 rounded-lg font-bold transition text-slate-600 text-xs" onclick="switchMode('ques')">
                Q & Connect
            </button>
        </div>

        <!-- Question Area -->
        <div id="game-view" class="w-full flex flex-col items-center">
            <!-- Card Container -->
            <div class="card-container w-full h-[540px] relative mb-8">
                <div id="practice-card" class="card w-full h-full relative">
                    
                    <!-- Front Side -->
                    <div class="card-face card-front bg-white border-2 border-sky-50 text-center" onclick="flipCard()">
                        <div id="prompt-content" class="flex flex-col items-center w-full">
                            <!-- Injected by JS -->
                        </div>
                        <div class="mt-auto text-[10px] text-slate-300 font-bold uppercase tracking-widest">
                            Tap for Answer / Tocca per la risposta
                        </div>
                    </div>

                    <!-- Back Side -->
                    <div class="card-face card-back bg-sky-50 border-4 border-sky-600 text-center">
                        <div id="grammar-label" class="text-[10px] text-sky-600 font-black uppercase tracking-[0.2em] mb-4">Grammar Point</div>
                        
                        <div id="answer-text" class="text-3xl font-black text-sky-950 mb-2 leading-tight px-2"></div>
                        <div id="romaji-text" class="text-lg font-bold text-sky-600 font-mono mb-4"></div>
                        
                        <button onclick="speakJapanese(event)" class="speaker-btn">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z" />
                            </svg>
                        </button>
                        
                        <div class="w-16 h-px bg-sky-200 mb-6 mx-auto"></div>
                        
                        <div class="space-y-1 px-4">
                            <div id="it-back" class="text-sky-800 font-bold"></div>
                            <div id="en-back" class="text-slate-500 italic text-sm"></div>
                        </div>

                        <div class="mt-auto text-[10px] text-sky-400 font-bold uppercase cursor-pointer" onclick="nextQuestion()">
                            Next / Prossimo →
                        </div>
                    </div>
                </div>
            </div>

            <!-- Navigation Controls -->
            <div class="flex justify-between w-full items-center px-4">
                <button onclick="prevQuestion()" class="w-12 h-12 flex items-center justify-center rounded-full border-2 border-slate-300 text-slate-400 bg-white shadow-sm">←</button>
                <div class="text-slate-400 font-black text-lg">
                    <span id="current-index" class="text-sky-700">1</span> / <span id="total-count">0</span>
                </div>
                <button onclick="nextQuestion()" class="w-12 h-12 flex items-center justify-center rounded-full bg-sky-800 text-white shadow-lg">→</button>
            </div>
        </div>
    </main>

    <script>
        const affQuestions = [
            { 
                icon: "⛰️✨", 
                prompt: "Mt. Fuji is high.", 
                answer: "ふじさんは たかいです。", 
                romaji: "Fujisan wa takai desu.", 
                en: "Mt. Fuji is high.", 
                it: "Il Monte Fuji è alto." 
            },
            { 
                icon: "🏨✨", 
                prompt: "This hotel is famous.", 
                answer: "このほてるは ゆうめいです。", 
                romaji: "Kono hoteru wa yuumei desu.", 
                en: "This hotel is famous.", 
                it: "Questo hotel è famoso." 
            },
            { 
                icon: "🍰😋", 
                prompt: "Japanese food is delicious.", 
                answer: "にほんりょうりは おいしいです。", 
                romaji: "Nihon ryouri wa oishii desu.", 
                en: "Japanese food is delicious.", 
                it: "La cucina giapponese è deliziosa." 
            },
            { 
                icon: "🏢🧤", 
                prompt: "This room is clean/beautiful.", 
                answer: "このへやは きれいです。", 
                romaji: "Kono heya wa kirei desu.", 
                en: "This room is clean/beautiful.", 
                it: "Questa stanza è pulita/bella." 
            },
            { 
                icon: "🌸✨", 
                prompt: "Sakura is beautiful.", 
                answer: "さくらは きれいです。", 
                romaji: "Sakura wa kirei desu.", 
                en: "Sakura is beautiful.", 
                it: "I ciliegi sono belli." 
            }
        ];

        const negQuestions = [
            { 
                icon: "☕️❄️", 
                prompt: "This coffee is not hot.", 
                answer: "このこーひーは あつくないです。", 
                romaji: "Kono koohii wa atsukunai desu.", 
                en: "This coffee is not hot.", 
                it: "Questo caffè non è caldo." 
            },
            { 
                icon: "🧪🤯", 
                prompt: "I am not free.", 
                answer: "わたしは ひまじゃありません。", 
                romaji: "Watashi wa hima ja arimasen.", 
                en: "I am not free.", 
                it: "Non sono libero." 
            },
            { 
                icon: "📔👎", 
                prompt: "That book is not interesting.", 
                answer: "そのほんは おもしろくないです。", 
                romaji: "Sono hon wa omoshirokunai desu.", 
                en: "That book is not interesting.", 
                it: "Quel libro non è interessante." 
            },
            { 
                icon: "🏫🔇", 
                prompt: "This place is not quiet.", 
                answer: "ここは しずかじゃありません。", 
                romaji: "Koko wa shizuka ja arimasen.", 
                en: "This place is not quiet.", 
                it: "Questo posto non è tranquillo." 
            }
        ];

        const modQuestions = [
            { 
                icon: "🏛️✨", 
                prompt: "This is a famous temple.", 
                answer: "これは ゆうめいな おてらです。", 
                romaji: "Kore wa yuumei na otera desu.", 
                en: "This is a famous temple.", 
                it: "Questo è un tempio famoso." 
            },
            { 
                icon: "⛰️❄️", 
                prompt: "Mt. Fuji is a cold mountain.", 
                answer: "ふじさんは さむい やまです。", 
                romaji: "Fujisan wa samui yama desu.", 
                en: "Mt. Fuji is a cold mountain.", 
                it: "Il Monte Fuji è una montagna fredda." 
            },
            { 
                icon: "🤝👤", 
                prompt: "Mr. Miller is a kind person.", 
                answer: "みらーさんは しんせつな ひとです。", 
                romaji: "Miraa-san wa shisetsu na hito desu.", 
                en: "Mr. Miller is a kind person.", 
                it: "Il signor Miller è una persona gentile." 
            },
            { 
                icon: "🍱🍱", 
                prompt: "It is very delicious food.", 
                answer: "とても おいしい たべものです。", 
                romaji: "Totemo oishii tabemono desu.", 
                en: "It is very delicious food.", 
                it: "È un cibo molto delizioso." 
            }
        ];

        const quesQuestions = [
            { 
                icon: "🇯🇵❓", 
                prompt: "How is Japan?", 
                answer: "A: にほんは どうですか。 B: さむいですが、きれいです。", 
                romaji: "A: Nihon wa dou desu ka. B: Samui desu ga, kirei desu.", 
                en: "A: How is Japan? B: It's cold but beautiful.", 
                it: "A: Com'è il Giappone? B: Fa freddo ma è bello." 
            },
            { 
                icon: "🏢❓", 
                prompt: "How is the dormitory?", 
                answer: "A: りょうは どうですか。 B: ふるいです。それに ちいさいです。", 
                romaji: "A: Ryou wa dou desu ka. B: Furui desu. Sore ni chiisai desu.", 
                en: "A: How is the dormitory? B: It's old. Moreover, it's small.", 
                it: "A: Com'è il dormitorio? B: È vecchio. Inoltre, è piccolo." 
            },
            { 
                icon: "🏢🤝", 
                prompt: "How is the company?", 
                answer: "しごとは いそがしいですが、おもしろいです。", 
                romaji: "Shigoto wa isogashii desu ga, omoshiroi desu.", 
                en: "Work is busy but interesting.", 
                it: "Il lavoro è impegnativo ma interessante." 
            }
        ];

        let currentMode = 'aff';
        let currentIndex = 0;
        let isFlipped = false;

        function switchMode(mode) {
            currentMode = mode;
            currentIndex = 0;
            isFlipped = false;
            document.getElementById('practice-card').classList.remove('is-flipped');
            
            ['aff', 'neg', 'mod', 'ques'].forEach(m => {
                document.getElementById(`mode-${m}`).className = "flex-1 whitespace-nowrap px-3 py-3 rounded-lg font-bold transition text-slate-600 text-xs";
            });
            
            const activeBtn = document.getElementById(`mode-${mode}`);
            activeBtn.className = "flex-1 whitespace-nowrap px-3 py-3 rounded-lg font-bold transition bg-white shadow text-sky-800 text-xs";

            updateView();
        }

        function updateView() {
            let questions;
            let label;
            if (currentMode === 'aff') { questions = affQuestions; label = "Adj Affirmative (肯定)"; }
            else if (currentMode === 'neg') { questions = negQuestions; label = "Adj Negative (否定)"; }
            else if (currentMode === 'mod') { questions = modQuestions; label = "Adj + Noun (名詞修飾)"; }
            else { questions = quesQuestions; label = "Connectors (~が / ~それに)"; }

            const q = questions[currentIndex];
            const promptContent = document.getElementById('prompt-content');
            
            promptContent.innerHTML = `
                <div class="emoji-icon">${q.icon}</div>
                <div class="text-slate-400 text-[10px] uppercase tracking-widest mb-2 font-bold">Concept / Hint</div>
                <div class="text-2xl font-black text-slate-800 mb-6 leading-tight px-4">${q.prompt}</div>
                <div class="flex flex-col items-center space-y-2 border-t border-slate-100 pt-6 w-full px-4">
                    <div class="text-sm text-sky-600 font-bold uppercase tracking-wide">${q.it}</div>
                    <div class="text-sm text-slate-400 italic font-medium">${q.en}</div>
                </div>
            `;

            document.getElementById('current-index').innerText = currentIndex + 1;
            document.getElementById('total-count').innerText = questions.length;
            document.getElementById('answer-text').innerText = q.answer;
            document.getElementById('romaji-text').innerText = q.romaji;
            document.getElementById('it-back').innerText = q.it;
            document.getElementById('en-back').innerText = q.en;
            document.getElementById('grammar-label').innerText = label;
        }

        function flipCard() {
            if (isFlipped) return;
            document.getElementById('practice-card').classList.add('is-flipped');
            isFlipped = true;
        }

        function speakJapanese(event) {
            if (event) event.stopPropagation();
            let questions;
            if (currentMode === 'aff') questions = affQuestions;
            else if (currentMode === 'neg') questions = negQuestions;
            else if (currentMode === 'mod') questions = modQuestions;
            else questions = quesQuestions;

            const fullText = questions[currentIndex].answer;
            
            // Clean prefix A: or B: before speaking
            const speechText = fullText.replace(/^[A-Z][：:]\s*/g, '').replace(/[A-Z][：:]\s*/g, ' ');
            
            const ut = new SpeechSynthesisUtterance(speechText);
            ut.lang = 'ja-JP';
            ut.rate = 0.85;
            
            const voices = window.speechSynthesis.getVoices();
            const jaVoice = voices.find(v => v.lang.startsWith('ja'));
            if (jaVoice) ut.voice = jaVoice;

            window.speechSynthesis.speak(ut);
        }

        function nextQuestion() {
            let questions;
            if (currentMode === 'aff') questions = affQuestions;
            else if (currentMode === 'neg') questions = negQuestions;
            else if (currentMode === 'mod') questions = modQuestions;
            else questions = quesQuestions;

            isFlipped = false;
            document.getElementById('practice-card').classList.remove('is-flipped');
            setTimeout(() => {
                currentIndex = (currentIndex + 1) % questions.length;
                updateView();
            }, 150);
        }

        function prevQuestion() {
            let questions;
            if (currentMode === 'aff') questions = affQuestions;
            else if (currentMode === 'neg') questions = negQuestions;
            else if (currentMode === 'mod') questions = modQuestions;
            else questions = quesQuestions;

            isFlipped = false;
            document.getElementById('practice-card').classList.remove('is-flipped');
            setTimeout(() => {
                currentIndex = (currentIndex - 1 + questions.length) % questions.length;
                updateView();
            }, 150);
        }

        window.speechSynthesis.getVoices();
        updateView();
    </script>
</body>
</html>
