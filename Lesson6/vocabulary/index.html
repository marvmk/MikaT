<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>L6 Vocabulary: Trilingual Master</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .card-container { perspective: 1000px; }
        .card { transition: transform 0.6s; transform-style: preserve-3d; cursor: pointer; }
        .card.is-flipped { transform: rotateY(180deg); }
        .card-face {
            backface-visibility: hidden; position: absolute;
            width: 100%; height: 100%; display: flex;
            flex-direction: column; align-items: center;
            justify-content: center; border-radius: 1.5rem;
            box-shadow: 0 10px 25px -5px rgb(0 0 0 / 0.1);
            padding: 1.5rem;
        }
        .card-back { transform: rotateY(180deg); }
        .action-icon { font-size: 5rem; }
        
        .speaker-btn {
            background: #10b981;
            color: white;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 6px 20px rgba(16, 185, 129, 0.4);
            transition: all 0.2s ease;
            margin-bottom: 1rem;
        }
        .speaker-btn:active { transform: scale(0.9); background: #059669; }
        .speaker-btn svg { width: 40px; height: 40px; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen font-sans flex flex-col">

    <header class="bg-emerald-900 text-white p-4 shadow-lg text-center">
        <h1 class="text-xl font-bold">L6 Vocab: Trilingue 🔊</h1>
        <p class="text-xs opacity-80 uppercase tracking-widest">Verbs • Food • Drinks • Everyday</p>
    </header>

    <main class="flex-grow flex flex-col items-center p-6 max-w-2xl mx-auto w-full">
        <!-- Category Selector -->
        <div class="flex space-x-1 mb-6 bg-slate-200 p-1 rounded-xl w-full overflow-x-auto shadow-inner">
            <button id="mode-verb" class="flex-1 whitespace-nowrap px-4 py-3 rounded-lg font-bold transition bg-white shadow text-emerald-800" onclick="switchMode('verb')">VERBS</button>
            <button id="mode-food" class="flex-1 whitespace-nowrap px-4 py-3 rounded-lg font-bold transition text-slate-600" onclick="switchMode('food')">FOOD & MEALS</button>
            <button id="mode-drink" class="flex-1 whitespace-nowrap px-4 py-3 rounded-lg font-bold transition text-slate-600" onclick="switchMode('drink')">DRINKS & MORE</button>
        </div>

        <!-- Flashcard Area -->
        <div class="card-container w-full h-[500px] relative mb-8">
            <div id="practice-card" class="card w-full h-full relative">
                
                <!-- Front Side -->
                <div class="card-face card-front bg-white border-2 border-emerald-50 text-center" onclick="flipCard()">
                    <div id="prompt-content" class="flex flex-col items-center space-y-6">
                        <!-- Injected by JS -->
                    </div>
                    <div class="mt-auto text-[10px] text-slate-300 font-bold uppercase tracking-widest">Tap to see Japanese / Tocca per il giapponese</div>
                </div>

                <!-- Back Side -->
                <div class="card-face card-back bg-emerald-50 border-4 border-emerald-600 text-center">
                    <div id="type-label" class="text-[10px] text-emerald-600 font-black uppercase tracking-[0.2em] mb-4">Risposta</div>
                    
                    <div id="answer-text" class="text-4xl font-black text-emerald-950 mb-1 leading-tight"></div>
                    <div id="romaji-text" class="text-2xl font-bold text-emerald-500 font-mono mb-8"></div>
                    
                    <!-- Audio Button -->
                    <button onclick="speakJapanese(event)" class="speaker-btn">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z" />
                        </svg>
                    </button>
                    
                    <div class="w-16 h-1 bg-emerald-200 mb-6 mx-auto"></div>
                    
                    <div class="flex flex-col items-center space-y-1 px-4">
                        <div id="en-back" class="text-slate-500 italic text-sm"></div>
                        <div id="it-back" class="text-lg text-emerald-800 font-bold"></div>
                    </div>

                    <div class="mt-auto text-[10px] text-emerald-400 font-bold uppercase tracking-widest cursor-pointer" onclick="nextQuestion()">Next / Prossimo →</div>
                </div>
            </div>
        </div>

        <!-- Navigation -->
        <div class="flex justify-between w-full items-center px-4">
            <button onclick="prevQuestion()" class="w-12 h-12 flex items-center justify-center rounded-full border-2 border-slate-300 text-slate-400 bg-white shadow-sm">←</button>
            <div class="text-slate-400 font-black text-lg"><span id="current-index" class="text-emerald-700">1</span> / <span id="total-count">0</span></div>
            <button onclick="nextQuestion()" class="w-12 h-12 flex items-center justify-center rounded-full bg-emerald-700 text-white shadow-lg">→</button>
        </div>
    </main>

    <script>
        const verbList = [
            { icon: "😋🍎", en: "eat", it: "mangiare", answer: "たべます", romaji: "tabemasu" },
            { icon: "🥛😋", en: "drink", it: "bere", answer: "のみます", romaji: "nomimasu" },
            { icon: "🚬💨", en: "smoke (a cigarette)", it: "fumare (sigarette)", answer: "すいます", romaji: "suimasu" },
            { icon: "👀📺", en: "see, look at, watch", it: "vedere / guardare", answer: "みます", romaji: "mimasu" },
            { icon: "👂🎶", en: "hear, listen to", it: "sentire / ascoltare", answer: "ききます", romaji: "kikimasu" },
            { icon: "📖👀", en: "read", it: "leggere", answer: "よみます", romaji: "yomimasu" },
            { icon: "✍️📝", en: "write, draw, paint", it: "scrivere / disegnare", answer: "かきます", romaji: "kakimasu" },
            { icon: "🛒💳", en: "buy", it: "comprare", answer: "かいます", romaji: "kaimasu" },
            { icon: "📸✨", en: "take (a photo)", it: "fare (una foto)", answer: "とります", romaji: "torimasu" },
            { icon: "🤝👨‍💼", en: "meet, see (a friend)", it: "incontrare (un amico)", answer: "あいます", romaji: "aimasu" }
        ];

        const foodList = [
            { icon: "🍱", en: "a meal, cooked rice", it: "pasto / riso cotto", answer: "ごはん", romaji: "gohan" },
            { icon: "🌅🍱", en: "breakfast", it: "colazione", answer: "あさごはん", romaji: "asagohan" },
            { icon: "☀️🍱", en: "lunch", it: "pranzo", answer: "ひるごはん", romaji: "hirugohan" },
            { icon: "🌃🍱", en: "dinner", it: "cena", answer: "ばんごはん", romaji: "bangohan" },
            { icon: "🍞", en: "bread", it: "pane", answer: "パン", romaji: "pan" },
            { icon: "🥚", en: "egg", it: "uovo", answer: "たまご", romaji: "tamago" },
            { icon: "🥩", en: "meat", it: "carne", answer: "にく", romaji: "niku" },
            { icon: "🐟", en: "fish", it: "pesce", answer: "さかな", romaji: "sakana" },
            { icon: "🥦", en: "vegetable", it: "verdura", answer: "やさい", romaji: "yasai" },
            { icon: "🍎", en: "fruit", it: "frutta", answer: "くだもの", romaji: "kudamono" }
        ];

        const drinkList = [
            { icon: "💧", en: "water", it: "acqua", answer: "みず", romaji: "mizu" },
            { icon: "🍵", en: "tea, green tea", it: "tè / tè verde", answer: "おちゃ", romaji: "ocha" },
            { icon: "☕", en: "black tea", it: "tè nero", answer: "こうちゃ", romaji: "kōcha" },
            { icon: "🥛", en: "milk", it: "latte", answer: "ぎゅうにゅう", romaji: "gyūnyū" },
            { icon: "🍹", en: "juice", it: "succo", answer: "ジュース", romaji: "jūsu" },
            { icon: "🍺", en: "beer", it: "birra", answer: "ビール", romaji: "ビール" },
            { icon: "🍶", en: "alcohol, sake", it: "alcol / sake", answer: "おさけ", romaji: "osake" },
            { icon: "🎥", en: "movie", it: "film", answer: "えいが", romaji: "eiga" },
            { icon: "📷", en: "photo", it: "foto", answer: "しゃしん", romaji: "shashin" }
        ];

        let currentMode = 'verb';
        let currentIndex = 0;
        let isFlipped = false;

        function switchMode(mode) {
            currentMode = mode; currentIndex = 0; isFlipped = false;
            document.getElementById('practice-card').classList.remove('is-flipped');
            updateView();
            const modes = ['verb', 'food', 'drink'];
            modes.forEach(m => {
                const btn = document.getElementById(`mode-${m}`);
                if(m === mode) {
                    btn.className = "flex-1 whitespace-nowrap px-4 py-3 rounded-lg font-bold transition bg-white shadow text-emerald-800";
                } else {
                    btn.className = "flex-1 whitespace-nowrap px-4 py-3 rounded-lg font-bold transition text-slate-600";
                }
            });
        }

        function updateView() {
            let list;
            let typeLabel;
            if(currentMode === 'verb') { list = verbList; typeLabel = "Verbi (Azioni)"; }
            else if(currentMode === 'food') { list = foodList; typeLabel = "Cibo e Pasti"; }
            else { list = drinkList; typeLabel = "Bevande e Altro"; }
            
            const item = list[currentIndex];
            const promptContent = document.getElementById('prompt-content');
            promptContent.innerHTML = `
                <div class="action-icon mb-2">${item.icon}</div>
                <div class="space-y-4">
                    <div>
                        <div class="text-[10px] text-slate-400 font-bold uppercase mb-1 tracking-widest">English</div>
                        <div class="text-xl text-slate-800 font-medium">${item.en}</div>
                    </div>
                    <div class="flex justify-center"><div class="h-px w-12 bg-slate-100"></div></div>
                    <div>
                        <div class="text-[10px] text-emerald-500 font-bold uppercase mb-1 tracking-widest">Italiano</div>
                        <div class="text-xl text-emerald-700 font-bold">${item.it}</div>
                    </div>
                </div>
            `;
            document.getElementById('current-index').innerText = currentIndex + 1;
            document.getElementById('total-count').innerText = list.length;
            document.getElementById('answer-text').innerText = item.answer;
            document.getElementById('romaji-text').innerText = item.romaji;
            document.getElementById('en-back').innerText = item.en;
            document.getElementById('it-back').innerText = item.it;
            document.getElementById('type-label').innerText = typeLabel;
        }

        function flipCard() {
            if (isFlipped) return;
            document.getElementById('practice-card').classList.add('is-flipped');
            isFlipped = true;
        }

        function speakJapanese(event) {
            if (event) event.stopPropagation();
            let list = (currentMode === 'verb') ? verbList : (currentMode === 'food' ? foodList : drinkList);
            const word = list[currentIndex].answer;
            const ut = new SpeechSynthesisUtterance(word);
            ut.lang = 'ja-JP';
            ut.rate = 0.85;
            window.speechSynthesis.speak(ut);
        }

        function nextQuestion() {
            let list = (currentMode === 'verb') ? verbList : (currentMode === 'food' ? foodList : drinkList);
            isFlipped = false;
            document.getElementById('practice-card').classList.remove('is-flipped');
            setTimeout(() => {
                currentIndex = (currentIndex + 1) % list.length;
                updateView();
            }, 150);
        }

        function prevQuestion() {
            let list = (currentMode === 'verb') ? verbList : (currentMode === 'food' ? foodList : drinkList);
            isFlipped = false;
            document.getElementById('practice-card').classList.remove('is-flipped');
            setTimeout(() => {
                currentIndex = (currentIndex - 1 + list.length) % list.length;
                updateView();
            }, 150);
        }
        
        updateView();
    </script>
</body>
</html>
