<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Japanese Practice: Lesson 46 Master</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .card-container { perspective: 1000px; }
        .card { transition: transform 0.6s; transform-style: preserve-3d; cursor: pointer; }
        .card.is-flipped { transform: rotateY(180deg); }
        .card-face {
            backface-visibility: hidden; position: absolute;
            width: 100%; height: 100%; display: flex;
            flex-direction: column; align-items: center;
            justify-content: center; border-radius: 1.5rem;
            box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1);
            padding: 2rem;
        }
        .card-back { transform: rotateY(180deg); }
        .item-icon { font-size: 4.5rem; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen font-sans flex flex-col">

    <header class="bg-amber-500 text-white p-6 shadow-md text-center">
        <h1 class="text-2xl font-bold italic">L46: Specific Moments & Expectations</h1>
        <p class="text-sm opacity-90 font-black tracking-widest uppercase">Result Prep System</p>
    </header>

    <main class="flex-grow flex flex-col items-center p-6 max-w-2xl mx-auto w-full">
        <!-- Mode Selector (English Tabs) -->
        <div class="flex space-x-1 mb-8 bg-gray-200 p-1 rounded-xl w-full overflow-x-auto shadow-inner border border-gray-300">
            <button id="mode-tokoro" class="flex-1 whitespace-nowrap px-2 py-3 rounded-lg font-bold transition bg-white shadow-sm text-amber-600 text-xs" onclick="switchMode('tokoro')">
                Time Points (~tokoro)
            </button>
            <button id="mode-bakari" class="flex-1 whitespace-nowrap px-2 py-3 rounded-lg font-bold transition text-gray-600 text-xs" onclick="switchMode('bakari')">
                Just Finished (~bakari)
            </button>
            <button id="mode-hazu" class="flex-1 whitespace-nowrap px-2 py-3 rounded-lg font-bold transition text-gray-600 text-xs" onclick="switchMode('hazu')">
                Expectation (~hazu)
            </button>
        </div>

        <!-- Question Area -->
        <div id="game-view" class="w-full flex flex-col items-center">
            <div id="instruction" class="text-gray-400 mb-6 text-center text-xs font-black uppercase tracking-[0.2em]">
                Complete the specific moment...
            </div>

            <!-- Card Container -->
            <div class="card-container w-full h-[480px] relative mb-10">
                <div id="practice-card" class="card w-full h-full relative" onclick="flipCard()">
                    <!-- Front -->
                    <div class="card-face card-front bg-white border-2 border-amber-100 text-center">
                        <div id="prompt-content" class="flex flex-col items-center space-y-6 w-full px-4">
                            <!-- Injected by JS -->
                        </div>
                        <div class="mt-auto text-[10px] text-gray-300 font-bold uppercase tracking-widest">Tap to reveal Japanese</div>
                    </div>
                    <!-- Back -->
                    <div class="card-face card-back bg-amber-50 border-4 border-amber-400 p-8 text-center">
                        <div id="answer-kanji" class="text-3xl font-black text-amber-900 leading-tight mb-4 px-2"></div>
                        <div id="answer-kana" class="text-xl font-bold text-amber-500 mb-8"></div>
                        
                        <!-- Manual Audio Button -->
                        <button onclick="event.stopPropagation(); speakJapanese();" class="w-16 h-16 bg-white border-2 border-amber-200 rounded-full flex items-center justify-center shadow-md active:scale-90 transition-transform mb-6 group">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-amber-500 group-hover:text-amber-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z" />
                            </svg>
                        </button>

                        <div id="answer-it" class="text-base text-amber-700 italic font-medium px-4"></div>
                        <div class="mt-auto text-[10px] text-amber-300 font-bold uppercase">Tap for next question</div>
                    </div>
                </div>
            </div>

            <!-- Navigation -->
            <div class="flex justify-between w-full items-center px-2">
                <button onclick="prevQuestion()" class="w-14 h-14 flex items-center justify-center border-2 border-gray-200 rounded-full text-gray-400 bg-white hover:bg-gray-50 transition shadow-sm text-xl font-bold">←</button>
                <div class="flex flex-col items-center">
                    <div class="text-gray-400 font-black text-lg">
                        <span id="current-index" class="text-amber-600 font-black">1</span> 
                        <span class="text-gray-200">/</span> 
                        <span id="total-count">17</span>
                    </div>
                </div>
                <button onclick="buttonNext()" class="px-10 py-4 bg-amber-500 rounded-full text-white font-black hover:bg-amber-600 transition shadow-lg tracking-widest uppercase text-sm">Next</button>
            </div>
        </div>

        <!-- Finished View -->
        <div id="finished-view" class="hidden w-full flex flex-col items-center justify-center p-12 bg-white rounded-[3rem] shadow-2xl border-4 border-amber-100 text-center">
            <div class="text-7xl mb-8">Finished‼️</div>
            <p class="text-gray-500 font-black uppercase tracking-[0.3em] mb-4 text-sm">Pratica completata!</p>
            <p class="text-lg text-amber-600 font-bold mb-10 italic text-center">Lesson 46 Mastery Complete.</p>
            <button onclick="location.reload()" class="w-full py-5 bg-amber-500 text-white rounded-2xl font-black shadow-xl active:scale-95 transition-all text-xl tracking-widest uppercase">
                Restart
            </button>
        </div>
    </main>

    <footer class="py-8 text-center text-gray-300 text-[10px] font-black tracking-widest uppercase">
        Result Prep System &bull; Mika Tomao
    </footer>

    <script>
        // Mode 1: Specific Moments (~tokoro)
        const tokoroData = [
            { icon: "🍱🚶", en: "I'm just about to eat lunch now.", it: "Sto proprio per pranzare ora.", kanji: "これから昼ご飯を食べるところです。", kana: "これから ひるごはんを たべる ところです。" },
            { icon: "🍱😋", en: "I am eating lunch right now.", it: "Sto pranzando proprio adesso.", kanji: "今昼ご飯を食べているところです。", kana: "いま ひるごはんを たべて いる ところです。" },
            { icon: "🍱🍵", en: "I have just finished eating lunch.", it: "Ho appena finito di pranzare.", kanji: "たった今昼ご飯を食べたところです。", kana: "たったいま ひるごはんを たべた ところです。" },
            { icon: "🛫🚶", en: "The plane is just about to depart.", it: "L'aereo sta proprio per partire.", kanji: "飛行機は今から出発するところです。", kana: "ひこうきは いまから しゅっぱつする ところです。" },
            { icon: "🚉🏃", en: "I'm at the station, just about to get on the train.", it: "Sono in stazione, sto proprio per salire sul treno.", kanji: "今から電車に乗るところです。", kana: "いまから でんしゃに のる ところです。" },
            { icon: "🧖🚿", en: "I am taking a shower right now.", it: "Sto facendo la doccia proprio ora.", kanji: "今シャワーを浴びているところです。", kana: "いま しゃわーを あびて いる ところです。" },
            { icon: "📞✍️", en: "I have just finished the phone call.", it: "Ho appena finito la telefonata.", kanji: "たった今電話をかけたところです。", kana: "たったいま でんわを かけた ところです。" },
            { icon: "📁💻", en: "I am making the report right now.", it: "Sto scrivendo il rapporto proprio adesso.", kanji: "今レポートを作っているところです。", kana: "いま れぽーとを つくって いる ところです。" },
            { icon: "🚗💨", en: "I'm just about to leave the house.", it: "Sto proprio per uscire di casa.", kanji: "今から出かけるところです。", kana: "いまから でかける ところです。" },
            { icon: "🛒🥚", en: "I am shopping right now.", it: "Sto facendo la spesa proprio ora.", kanji: "今買い物をしているところです。", kana: "いま かいものを して いる ところです。" },
            { icon: "🧹✨", en: "I have just finished cleaning.", it: "Ho appena finito di pulire.", kanji: "たった今掃除が終わったところです。", kana: "たったいま そうじが おわった ところです。" },
            { icon: "🤝💬", en: "We are meeting right now.", it: "Ci stiamo incontrando proprio adesso.", kanji: "今会っているところです。", kana: "いま あって いる ところです。" },
            { icon: "😴🛌", en: "I was just about to sleep.", it: "Stavo proprio per dormire.", kanji: "これから寝るところでした。", kana: "これから ねる ところでした。" },
            { icon: "🎥🍿", en: "The movie is starting right now.", it: "Il film sta iniziando proprio ora.", kanji: "今映画が始まるところです。", kana: "いま えいがが はじまる ところです。" },
            { icon: "🍵🍰", en: "I have just finished making tea.", it: "Ho appena finito di preparare il tè.", kanji: "たった今お茶をいれたところです。", kana: "たったいま おちゃを いれた ところです。" },
            { icon: "👔🕺", en: "I am getting dressed right now.", it: "Mi sto vestendo proprio adesso.", kanji: "今服を着ているところです。", kana: "いま ふくを きて いる ところです。" },
            { icon: "🏫👋", en: "I have just arrived at school.", it: "Sono appena arrivato a scuola.", kanji: "たった今学校に着いたところです。", kana: "たったいま がっこうに ついた ところです。" }
        ];

        // Mode 2: Just Finished (~bakari)
        const bakariData = [
            { icon: "👨‍👩‍👧‍👦🏠", en: "I have just arrived in Japan (recently).", it: "Sono appena arrivato in Giappone (da poco).", kanji: "日本に来たばかりです。", kana: "にほんに きた ばかりです。" },
            { icon: "💍✨", en: "They have just got married.", it: "Si sono appena sposati.", kanji: "結婚したばかりです。", kana: "けっこんした ばかりです。" },
            { icon: "💻🛒", en: "I have just bought this PC.", it: "Ho appena comprato questo PC.", kanji: "このパソコンを買ったばかりです。", kana: "この ぱそこんを かった ばかりです。" },
            { icon: "🏢🤝", en: "He has just entered the company.", it: "Lui è appena entrato in azienda.", kanji: "彼は会社に入ったばかりです。", kana: "かれは かいしゃに はいった ばかりです。" },
            { icon: "📖🧠", en: "I have just learned this word.", it: "Ho appena imparato questa parola.", kanji: "この言葉を習ったばかりです。", kana: "この ことばを ならった ばかりです。" },
            { icon: "👶🍼", en: "The baby was just born.", it: "Il bambino è appena nato.", kanji: "赤ちゃんが生まれたばかりです。", kana: "あかちゃんが うまれた ばかりです。" },
            { icon: "🏠🧹", en: "I have just cleaned the room.", it: "Ho appena pulito la stanza.", kanji: "部屋を掃除したばかりです。", kana: "へやを そうじした ばかりです。" },
            { icon: "🍛🔥", en: "I have just made this curry.", it: "Ho appena preparato questo curry.", kanji: "カレーを作ったばかりです。", kana: "かれーを つくった ばかりです。" },
            { icon: "👗✨", en: "I have just washed this dress.", it: "Ho appena lavato questo vestito.", kanji: "この服を洗ったばかりです。", kana: "この ふくを あらった ばかりです。" },
            { icon: "🚗🔧", en: "The car was just repaired.", it: "L'auto è stata appena riparata.", kanji: "車を直したばかりです。", kana: "くるまを なおした ばかりです。" },
            { icon: "🏫🎓", en: "I have just graduated from university.", it: "Mi sono appena laureato all'università.", kanji: "大学を卒業したばかりです。", kana: "だいがくを そつぎょうした ばかりです。" },
            { icon: "🥤🧊", en: "I have just opened the bottle.", it: "Ho appena aperto la bottiglia.", kanji: "瓶を開けたばかりです。", kana: "びんを あけた ばかりです。" },
            { icon: "📩✍️", en: "I have just sent the email.", it: "Ho appena inviato la mail.", kanji: "メールを送ったばかりです。", kana: "めーるを おくった ばかりです。" },
            { icon: "💇✨", en: "I have just had a haircut.", it: "Ho appena tagliato i capelli.", kanji: "髪を切ったばかりです。", kana: "かみを きった ばかりです。" },
            { icon: "🧱🏗️", en: "This house was just built.", it: "Questa casa è stata appena costruita.", kanji: "この家は建ったばかりです。", kana: "この いえは たった ばかりです。" },
            { icon: "🧥🧼", en: "This coat was just cleaned.", it: "Questo cappotto è stato appena pulito.", kanji: "このコートはクリーニングに出したばかりです。", kana: "この こーとは くりーにんぐに だした ばかりです。" },
            { icon: "🚶‍♂️💦", en: "I have just started walking.", it: "Ho appena iniziato a camminare.", kanji: "歩き始めたばかりです。", kana: "あるきはじめた ばかりです。" }
        ];

        // Mode 3: Expectation (~hazu)
        const hazuData = [
            { icon: "👨‍💼📅", en: "Tanaka-san should come today.", it: "Il signor Tanaka dovrebbe venire oggi.", kanji: "田中さんは今日来るはずです。", kana: "たなかさんは きょう くる はずです。" },
            { icon: "📦🚚", en: "The package should arrive tomorrow.", it: "Il pacco dovrebbe arrivare domani.", kanji: "荷物は明日届くはずです。", kana: "にもつは あした とどく はずです。" },
            { icon: "🕙🛑", en: "The meeting should end at 10:00.", it: "La riunione dovrebbe finire alle 10:00.", kanji: "会議は１０時に終わるはずです。", kana: "かいぎは じゅうじに おわる はずです。" },
            { icon: "💰🆗", en: "The salary should be paid today.", it: "Lo stipendio dovrebbe essere pagato oggi.", kanji: "今日給料が入るはずです。", kana: "きょう きゅうりょうが はいる はずです。" },
            { icon: "🏢🔓", en: "The bank should be open.", it: "La banca dovrebbe essere aperta.", kanji: "銀行は開いているはずです。", kana: "ぎんこうは あいている はずです。" },
            { icon: "🍱😋", en: "This food should be delicious.", it: "Questo cibo dovrebbe essere delizioso.", kanji: "この料理はおいしいはずです。", kana: "この りょうりは おいしい はずです。" },
            { icon: "🧩🧠", en: "He should know the answer.", it: "Lui dovrebbe conoscere la risposta.", kanji: "彼は答えを知っているはずです。", kana: "かれは こたえを しっている はずです。" },
            { icon: "🧥❄️", en: "It should be cold in Hokkaido.", it: "Dovrebbe fare freddo a Hokkaido.", kanji: "北海道は寒いはずです。", kana: "ほっかいどうは さむい はずです。" },
            { icon: "👔✨", en: "The boss should be busy today.", it: "Il capo dovrebbe essere occupato oggi.", kanji: "部長は今日忙しいはずです。", kana: "ぶちょうは きょう いそがしい はずです。" },
            { icon: "❌🏃", en: "He shouldn't be at home.", it: "Lui non dovrebbe essere a casa.", kanji: "彼はうちにいないはずです。", kana: "かれは うちに いない はずです。" },
            { icon: "🚉🛤️", en: "The train should arrive soon.", it: "Il treno dovrebbe arrivare tra poco.", kanji: "電車はもうすぐ来るはずです。", kana: "でんしゃは もうすぐ くる はずです。" },
            { icon: "👤🤝", en: "He should be a kind person.", it: "Lui dovrebbe essere una persona gentile.", kanji: "彼は親切な人のはずです。", kana: "かれは しんせつな ひとの はずです。" },
            { icon: "📖✅", en: "This answer should be correct.", it: "Questa risposta dovrebbe essere corretta.", kanji: "この答えは正しいはずです。", kana: "この こたえは ただしい はずです。" },
            { icon: "🏢🏗️", en: "The new building should be sturdy.", it: "Il nuovo edificio dovrebbe essere robusto.", kanji: "新しいビルは丈夫なはずです。", kana: "あたらしい びるは じょうぶな はずです。" },
            { icon: "🔑💼", en: "The keys should be in the bag.", it: "Le chiavi dovrebbero essere nella borsa.", kanji: "鍵はバッグの中にあるはずです。", kana: "かぎは ばっぐの なかに ある はずです。" },
            { icon: "📅❌", en: "Tomorrow should not be a holiday.", it: "Domani non dovrebbe essere festa.", kanji: "明日は休みじゃないはずです。", kana: "あしたは やすみじゃない はずです。" },
            { icon: "🗣️💡", en: "The explanation should be easy.", it: "La spiegazione dovrebbe essere facile.", kanji: "説明は簡単なはずです。", kana: "せつめいは かんたんな はずです。" }
        ];

        let currentMode = 'tokoro';
        let currentIndex = 0;
        let isFlipped = false;

        function switchMode(mode) {
            currentMode = mode;
            currentIndex = 0;
            isFlipped = false;
            document.getElementById('practice-card').classList.remove('is-flipped');
            document.getElementById('game-view').classList.remove('hidden');
            document.getElementById('finished-view').classList.add('hidden');
            
            const modes = ['tokoro', 'bakari', 'hazu'];
            modes.forEach(m => {
                const btn = document.getElementById(`mode-${m}`);
                if(m === mode) {
                    btn.classList.add('bg-white', 'shadow-sm', 'text-amber-600');
                    btn.classList.remove('text-gray-600');
                } else {
                    btn.classList.remove('bg-white', 'shadow-sm', 'text-amber-600');
                    btn.classList.add('text-gray-600');
                }
            });

            const instr = document.getElementById('instruction');
            if(mode === 'tokoro') instr.innerText = "Time Points (~tokoro): Specific moments (Before/During/After)";
            else if(mode === 'bakari') instr.innerText = "Just Finished (~bakari): Actions done very recently";
            else instr.innerText = "Expectation (~hazu): Strong logical probability";
            
            updateView();
        }

        function updateView() {
            const data = { tokoro: tokoroData, bakari: bakariData, hazu: hazuData };
            const questions = data[currentMode];
            const q = questions[currentIndex];
            const promptContent = document.getElementById('prompt-content');
            
            document.getElementById('current-index').innerText = currentIndex + 1;
            document.getElementById('total-count').innerText = questions.length;
            
            document.getElementById('answer-kanji').innerText = q.kanji;
            document.getElementById('answer-kana').innerText = q.kana;
            document.getElementById('answer-it').innerText = q.it;

            promptContent.innerHTML = `
                <div class="item-icon mb-4">${q.icon}</div>
                <div class="text-center px-6">
                    <div class="text-gray-400 text-[10px] font-black uppercase tracking-[0.2em] mb-4">Target Meaning / Scenario</div>
                    <div class="text-3xl font-black text-gray-800 leading-tight italic px-4">${q.en}</div>
                </div>
            `;
        }

        function flipCard() {
            const card = document.getElementById('practice-card');
            if (!isFlipped) {
                card.classList.add('is-flipped');
                isFlipped = true;
            } else {
                nextQuestion();
            }
        }

        function speakJapanese() {
            const data = { tokoro: tokoroData, bakari: bakariData, hazu: hazuData };
            const text = data[currentMode][currentIndex].kana;
            const ut = new SpeechSynthesisUtterance(text);
            ut.lang = 'ja-JP';
            ut.rate = 0.95;
            window.speechSynthesis.speak(ut);
        }

        function nextQuestion() {
            const data = { tokoro: tokoroData, bakari: bakariData, hazu: hazuData };
            const questions = data[currentMode];
            
            if (isFlipped && currentIndex === questions.length - 1) {
                document.getElementById('game-view').classList.add('hidden');
                document.getElementById('finished-view').classList.remove('hidden');
                return;
            }

            isFlipped = false;
            document.getElementById('practice-card').classList.remove('is-flipped');
            setTimeout(() => {
                currentIndex = (currentIndex + 1) % questions.length;
                updateView();
            }, 150);
        }

        function prevQuestion() {
            const data = { tokoro: tokoroData, bakari: bakariData, hazu: hazuData };
            const questions = data[currentMode];
            isFlipped = false;
            document.getElementById('practice-card').classList.remove('is-flipped');
            setTimeout(() => {
                currentIndex = (currentIndex - 1 + questions.length) % questions.length;
                updateView();
            }, 150);
        }

        function buttonNext() {
            if (!isFlipped) {
                flipCard();
            } else {
                nextQuestion();
            }
        }

        updateView();
    </script>
</body>
</html>
