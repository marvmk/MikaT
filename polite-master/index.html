<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Japanese Conjugation Master (Polite Form)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@500;700;900&family=Poppins:wght@500;700;900&display=swap');
        body { font-family: 'Poppins', 'Noto Sans JP', sans-serif; }
        
        .perspective { perspective: 1200px; }
        .card-inner {
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
            cursor: pointer;
            position: relative;
            width: 100%;
            height: 100%;
        }
        .card-flipped .card-inner { transform: rotateY(180deg); }
        .card-front, .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 1.5rem;
            padding: 1.25rem;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
        }
        .card-back { transform: rotateY(180deg); }
    </style>
</head>
<body class="bg-slate-50 min-h-screen pb-12 text-slate-800">

    <!-- Home & Language Control -->
    <div class="fixed top-4 left-4 z-50">
        <a href="../" class="bg-white/90 backdrop-blur px-4 py-2 rounded-full shadow-md border border-slate-200 text-emerald-700 font-bold text-sm flex items-center gap-2 hover:bg-emerald-50 transition-all">
            🏠 <span class="hidden md:inline">Home</span>
        </a>
    </div>

    <div class="fixed top-4 right-4 z-50 flex gap-1 bg-white p-1 rounded-full shadow-md border border-slate-200">
        <button onclick="changeUILang('ja')" class="lang-btn px-4 py-1.5 rounded-full text-xs font-bold transition-all" id="btn-ja">JP</button>
        <button onclick="changeUILang('en')" class="lang-btn px-4 py-1.5 rounded-full text-xs font-bold transition-all" id="btn-en">EN</button>
        <button onclick="changeUILang('it')" class="lang-btn px-4 py-1.5 rounded-full text-xs font-bold transition-all" id="btn-it">IT</button>
    </div>

    <!-- Header -->
    <header class="bg-emerald-700 text-white pt-10 pb-16 rounded-b-[3rem] shadow-xl mb-8">
        <div class="container mx-auto px-4 text-center">
            <h1 id="ui-title" class="text-2xl md:text-4xl font-black">日本語活用マスター (丁寧体)</h1>
            <p id="ui-subtitle" class="mt-2 opacity-50 text-[10px] tracking-widest uppercase">Comprehensive Drill L1 - L25 (Polite)</p>
        </div>
    </header>

    <main class="container mx-auto px-4 max-w-4xl -mt-12">
        <!-- Range Selector -->
        <div class="bg-white p-3 rounded-3xl shadow-lg mb-6 flex flex-wrap justify-center gap-2">
            <button onclick="setRange('part1')" class="range-btn px-5 py-2 rounded-xl text-[11px] font-bold transition-all bg-slate-50 text-slate-400" data-range="part1">L1 - L10</button>
            <button onclick="setRange('part2')" class="range-btn px-5 py-2 rounded-xl text-[11px] font-bold transition-all bg-slate-50 text-slate-400" data-range="part2">L11 - L18</button>
            <button onclick="setRange('part3')" class="range-btn px-5 py-2 rounded-xl text-[11px] font-bold transition-all bg-slate-50 text-slate-400" data-range="part3">L19 - L25</button>
        </div>

        <!-- Category Selector -->
        <div id="cat-container" class="hidden flex flex-wrap justify-center gap-2 mb-8">
            <button onclick="setCategory('v1')" class="cat-btn px-6 py-2 rounded-full border border-slate-200 bg-white text-slate-500 shadow-sm font-bold text-xs" data-cat="v1">動詞 G1</button>
            <button onclick="setCategory('v2')" class="cat-btn px-6 py-2 rounded-full border border-slate-200 bg-white text-slate-500 shadow-sm font-bold text-xs" data-cat="v2">動詞 G2</button>
            <button onclick="setCategory('adj-i')" class="cat-btn px-6 py-2 rounded-full border border-slate-200 bg-white text-slate-500 shadow-sm font-bold text-xs" data-cat="adj-i">い形容詞</button>
            <button onclick="setCategory('adj-na')" class="cat-btn px-6 py-2 rounded-full border border-slate-200 bg-white text-slate-500 shadow-sm font-bold text-xs" data-cat="adj-na">な形容詞</button>
        </div>

        <!-- Word Area -->
        <div id="flashcard-area" class="hidden">
            <div class="relative bg-white rounded-[2.5rem] p-8 md:p-12 shadow-xl border border-slate-100 flex flex-col items-center">
                
                <div class="w-full flex justify-between items-center mb-6">
                    <div class="w-12 md:w-20"></div>

                    <!-- Main Word Center -->
                    <div class="text-center flex-1">
                        <h2 id="target-word" class="text-6xl md:text-8xl font-black text-slate-800 leading-tight"></h2>
                        <p id="target-reading" class="text-emerald-600 font-bold text-xl md:text-2xl mt-1"></p>
                        <p id="target-meaning" class="text-slate-400 italic text-lg mt-1 font-medium"></p>
                    </div>

                    <!-- Syllable Hint -->
                    <div id="v1-hint-box" class="w-12 md:w-20 flex flex-col items-center transition-opacity duration-500 opacity-0">
                        <span id="ui-hint-label" class="bg-emerald-500 text-white text-[8px] font-black px-2 py-1 rounded-t-lg uppercase">Hint</span>
                        <div class="bg-emerald-50 border border-emerald-100 rounded-b-xl py-3 flex flex-col items-center gap-3 shadow-inner w-full">
                            <div id="hint-syllables" class="flex flex-col items-center w-full font-black">
                                <!-- JS Inject -->
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 4 Forms Grid -->
                <div id="cards-grid" class="grid grid-cols-1 md:grid-cols-2 gap-4 md:gap-6 w-full">
                    <!-- Cards Inject -->
                </div>
            </div>

            <!-- Controls -->
            <div class="flex justify-center items-center gap-6 mt-8">
                <button onclick="prevWord()" class="bg-white text-emerald-600 w-16 h-16 rounded-full shadow-lg flex items-center justify-center hover:bg-emerald-50 active:scale-90 transition-all border border-slate-100">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M15 19l-7-7 7-7" /></svg>
                </button>
                <div class="bg-white px-6 py-2 rounded-2xl shadow-md flex flex-col items-center">
                    <span class="text-slate-800 font-black text-2xl" id="current-idx">1</span>
                    <span class="text-slate-300 font-bold text-[9px] uppercase tracking-widest leading-none mt-1">/ <span id="total-idx">0</span> words</span>
                </div>
                <button onclick="nextWord()" class="bg-emerald-600 text-white w-16 h-16 rounded-full shadow-lg flex items-center justify-center hover:bg-emerald-700 active:scale-90 transition-all">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M9 5l7 7-7 7" /></svg>
                </button>
            </div>
        </div>

        <!-- Welcome Message -->
        <div id="welcome-msg" class="text-center py-32 bg-white rounded-[3rem] border-2 border-dashed border-slate-200">
            <p id="ui-welcome" class="text-slate-300 font-bold text-lg px-8">レッスンの範囲を選んでスタート！</p>
        </div>
    </main>

    <script>
        const syllableData = {
            'く': { ja: ['か','き','く','け','こ'], en: ['ka','ki','ku','ke','ko'] },
            'ぐ': { ja: ['が','ぎ','ぐ','げ','ご'], en: ['ga','gi','gu','ge','go'] },
            'す': { ja: ['さ','し','す','せ','そ'], en: ['sa','shi','su','se','so'] },
            'つ': { ja: ['た','ち','つ','て','と'], en: ['ta','chi','tsu','te','to'] },
            'ぬ': { ja: ['な','に','ぬ','ね','の'], en: ['na','ni','nu','ne','no'] },
            'ふ': { ja: ['は','ひ','ふ','へ','ほ'], en: ['ha','hi','fu','he','ho'] },
            'ぶ': { ja: ['ば','び','ぶ','べ','ぼ'], en: ['ba','bi','bu','be','bo'] },
            'む': { ja: ['ま','み','む','め','も'], en: ['ma','mi','mu','me','mo'] },
            'る': { ja: ['ら','り','る','れ','ろ'], en: ['ra','ri','ru','re','ro'] },
            'う': { ja: ['わ','い','う','え','お'], en: ['wa','i','u','e','o'] }
        };

        const vocab = {
            part1: { 
                v1: [
                    { word: "行く", reading: "いく", row: 'く', meaning: { ja: "行く", en: "to go", it: "andare" }, answers: ["行きます", "行きません", "行きました", "行きませんでした"], romaji: ["ikimasu", "ikimasen", "ikimashita", "ikimasen deshita"] },
                    { word: "書く", reading: "かく", row: 'く', meaning: { ja: "書く", en: "to write", it: "scrivere" }, answers: ["書きます", "書きません", "書きました", "書きませんでした"], romaji: ["kakimasu", "kakimasen", "kakimashita", "kakimasen deshita"] },
                    { word: "飲む", reading: "のむ", row: 'む', meaning: { ja: "飲む", en: "to drink", it: "bere" }, answers: ["飲みます", "飲みません", "飲みました", "飲みませんでした"], romaji: ["nomimasu", "nomimasen", "nomimashita", "nomimasen deshita"] },
                    { word: "買う", reading: "かう", row: 'う', meaning: { ja: "買う", en: "to buy", it: "comprare" }, answers: ["買います", "買いません", "買いました", "買いませんでした"], romaji: ["kaimasu", "kaimasen", "kaimashita", "kaimasen deshita"] },
                    { word: "貸す", reading: "かす", row: 'す', meaning: { ja: "貸す", en: "to lend", it: "prestare" }, answers: ["貸します", "貸しません", "貸しました", "貸しませんでした"], romaji: ["kashimasu", "kashimasen", "kashimashita", "kashimasen deshita"] }
                ],
                v2: [
                    { word: "食べる", reading: "たべる", meaning: { ja: "食べる", en: "to eat", it: "mangiare" }, answers: ["食べます", "食べません", "食べました", "食べませんでした"], romaji: ["tabemasu", "tabemasen", "tabemashita", "tabemasen deshita"] },
                    { word: "見る", reading: "みる", meaning: { ja: "見る", en: "to see", it: "vedere" }, answers: ["見ます", "見ません", "見ました", "見ませんでした"], romaji: ["mimasu", "mimasen", "mimashita", "mimasen deshita"] }
                ],
                'adj-i': [
                    { word: "暑い", reading: "あつい", meaning: { ja: "暑い", en: "hot", it: "caldo" }, answers: ["暑いです", "暑くないです", "暑かったです", "暑くなかったです"], romaji: ["atsui desu", "atsuku nai desu", "atsukatta desu", "atsuku nakatta desu"] },
                    { word: "高い", reading: "たかい", meaning: { ja: "高い", en: "high/pricey", it: "alto/caro" }, answers: ["高いです", "高くないです", "高かったです", "高くなかったです"], romaji: ["takai desu", "takaku nai desu", "takakatta desu", "takuku nakatta desu"] }
                ],
                'adj-na': [
                    { word: "静か", reading: "しずか", meaning: { ja: "静か", en: "quiet", it: "silenzioso" }, answers: ["静かです", "静かじゃありません", "静かでした", "静かじゃありませんでした"], romaji: ["shizuka desu", "shizuka ja arimasen", "shizuka deshita", "shizuka ja arimasen deshita"] }
                ]
            },
            part2: { 
                v1: [
                    { word: "遊ぶ", reading: "あそぶ", row: 'ぶ', meaning: { ja: "遊ぶ", en: "to play", it: "giocare" }, answers: ["遊びます", "遊びません", "遊びました", "遊びませんでした"], romaji: ["asobimasu", "asobimasen", "asobimashita", "asobimasen deshita"] },
                    { word: "待つ", reading: "まつ", row: 'つ', meaning: { ja: "待つ", en: "to wait", it: "aspettare" }, answers: ["待ちます", "待ちません", "待ちました", "待ちませんでした"], romaji: ["machimasu", "machimasen", "machimashita", "machimasen deshita"] }
                ],
                v2: [ { word: "開ける", reading: "あける", meaning: { ja: "開ける", en: "to open", it: "aprire" }, answers: ["開けます", "開けません", "開けました", "開けませんでした"], romaji: ["akemasu", "akemasen", "akemashita", "akemasen deshita"] } ],
                'adj-i': [ { word: "速い", reading: "はやい", meaning: { ja: "速い", en: "fast", it: "veloce" }, answers: ["速いです", "速くないです", "速かったです", "速くなかったです"], romaji: ["hayai desu", "hayaku nai desu", "hayakatta desu", "hayaku nakatta desu"] } ],
                'adj-na': [ { word: "簡単", reading: "かんたん", meaning: { ja: "簡単", en: "easy", it: "facile" }, answers: ["簡単です", "簡単じゃありません", "簡単でした", "簡単じゃありませんでした"], romaji: ["kantan desu", "kantan ja arimasen", "kantan deshita", "kantan ja arimasen deshita"] } ]
            },
            part3: { 
                v1: [ { word: "登る", reading: "のぼる", row: 'る', meaning: { ja: "登る", en: "to climb", it: "salire" }, answers: ["登ります", "登りません", "登りました", "登りませんでした"], romaji: ["noborimasu", "noborimasen", "noborimashita", "noborimasen deshita"] } ],
                v2: [ { word: "覚える", reading: "おぼえる", meaning: { ja: "覚える", en: "to remember", it: "ricordare" }, answers: ["覚えます", "覚えません", "覚えました", "覚えませんでした"], romaji: ["oboemasu", "oboemasen", "oboemashita", "oboemasen deshita"] } ],
                'adj-i': [ { word: "眠い", reading: "ねむい", meaning: { ja: "眠い", en: "sleepy", it: "assonnato" }, answers: ["眠いです", "眠くないです", "眠かったです", "眠くなかったです"], romaji: ["nemui desu", "nemuku nai desu", "nemukatta desu", "nemuku nakatta desu"] } ],
                'adj-na': [ { word: "無理", reading: "むり", meaning: { ja: "無理", en: "impossible", it: "impossibile" }, answers: ["無理です", "無理じゃありません", "無理でした", "無理じゃありませんでした"], romaji: ["muri desu", "muri ja arimasen", "muri deshita", "muri ja arimasen deshita"] } ]
            }
        };

        const translations = {
            ja: { title: "日本語活用マスター (丁寧体)", hint: "ヒント", labels: ["現在・肯定", "現在・否定", "過去・肯定", "過去・否定"], cats: {v1: "動詞 G1", v2: "動詞 G2", 'adj-i': "い形容詞", 'adj-na': "な形容詞"} },
            en: { title: "Polite Form Master", hint: "Hint", labels: ["Pres (+)", "Pres (-)", "Past (+)", "Past (-)"], cats: {v1: "Verb G1", v2: "Verb G2", 'adj-i': "i-Adj", 'adj-na': "na-Adj"} },
            it: { title: "Forma Cortese Master", hint: "Sugg.", labels: ["Pres (+)", "Pres (-)", "Pass (+)", "Pass (-)"], cats: {v1: "Verbo G1", v2: "Verbo G2", 'adj-i': "i-Agg", 'adj-na': "na-Agg"} }
        };

        let currentLang = 'ja';
        let currentRange = '';
        let currentCategory = '';
        let wordIndex = 0;

        function changeUILang(lang) {
            currentLang = lang;
            const t = translations[lang];
            document.getElementById('ui-title').innerText = t.title;
            document.getElementById('ui-hint-label').innerText = t.hint;
            document.querySelectorAll('.cat-btn').forEach(btn => btn.innerText = t.cats[btn.dataset.cat]);
            document.querySelectorAll('.lang-btn').forEach(btn => {
                const isActive = btn.id === `btn-${lang}`;
                btn.classList.toggle('bg-emerald-600', isActive);
                btn.classList.toggle('text-white', isActive);
            });
            if (currentCategory) updateDisplay();
        }

        function setRange(range) {
            currentRange = range;
            document.querySelectorAll('.range-btn').forEach(btn => {
                const isActive = btn.dataset.range === range;
                btn.classList.toggle('bg-emerald-600', isActive);
                btn.classList.toggle('text-white', isActive);
            });
            document.getElementById('cat-container').classList.remove('hidden');
            document.getElementById('welcome-msg').innerText = "カテゴリーを選んでください";
            if(currentCategory) setCategory(currentCategory);
        }

        function setCategory(cat) {
            currentCategory = cat;
            wordIndex = 0;
            document.querySelectorAll('.cat-btn').forEach(btn => {
                const isActive = btn.dataset.cat === cat;
                btn.classList.toggle('bg-emerald-600', isActive);
                btn.classList.toggle('text-white', isActive);
            });
            document.getElementById('welcome-msg').classList.add('hidden');
            document.getElementById('flashcard-area').classList.remove('hidden');
            updateDisplay();
        }

        function updateDisplay() {
            const words = vocab[currentRange][currentCategory];
            const currentWord = words[wordIndex];
            const t = translations[currentLang];

            // Hint Logic for Polite Form (highlight i-column)
            const hintBox = document.getElementById('v1-hint-box');
            if (currentCategory === 'v1' && currentWord.row) {
                hintBox.style.opacity = '1';
                const isJa = currentLang === 'ja';
                const syllables = syllableData[currentWord.row][isJa ? 'ja' : 'en'];
                
                const html = syllables.map((s, idx) => {
                    let color = 'text-slate-200';
                    let scale = 'scale-90';
                    // Highlight i-column (idx 1) for Polite Base and u-column (idx 2) for Root
                    if (idx === 1) { color = 'text-emerald-600'; scale = 'scale-110 font-black'; }
                    if (idx === 2) { color = 'text-slate-400'; scale = 'scale-100'; }
                    return `<div class="hint-syllable h-6 md:h-8 ${color} ${scale} ${isJa ? 'text-lg' : 'text-xs'} transition-all flex items-center justify-center relative">
                        ${s}
                        ${idx === 1 ? '<span class="absolute -left-6 text-[5px] text-emerald-400 font-bold">POLITE</span>' : ''}
                        ${idx === 2 ? '<span class="absolute -left-6 text-[5px] text-slate-300 font-bold">ROOT</span>' : ''}
                    </div>`;
                }).join('');
                document.getElementById('hint-syllables').innerHTML = html;
            } else {
                hintBox.style.opacity = '0';
            }

            document.getElementById('target-word').innerText = currentWord.word;
            document.getElementById('target-reading').innerText = currentWord.reading;
            document.getElementById('target-meaning').innerText = currentWord.meaning[currentLang];
            document.getElementById('current-idx').innerText = wordIndex + 1;
            document.getElementById('total-idx').innerText = words.length;

            const grid = document.getElementById('cards-grid');
            grid.innerHTML = '';
            const colors = ['bg-emerald-600', 'bg-rose-500', 'bg-amber-500', 'bg-slate-700'];

            currentWord.answers.forEach((ans, i) => {
                const card = document.createElement('div');
                card.className = "h-40 md:h-52 perspective group";
                card.innerHTML = `
                    <div class="card-inner shadow-lg rounded-[1.5rem]" onclick="this.parentElement.classList.toggle('card-flipped')">
                        <div class="card-front bg-slate-50 border border-slate-100 group-hover:bg-white transition-colors">
                            <span class="text-lg md:text-2xl font-bold text-slate-400 uppercase tracking-wider">${t.labels[i]}</span>
                            <div class="mt-2 w-8 h-1 bg-emerald-50 rounded-full"></div>
                        </div>
                        <div class="card-back ${colors[i]} text-white p-4">
                            <span class="text-2xl md:text-4xl font-black mb-3 text-center">${ans}</span>
                            <div class="bg-black/10 px-4 py-1.5 rounded-xl border border-white/10 shadow-inner">
                                <span class="text-xs md:text-xl font-mono font-bold tracking-widest">${currentWord.romaji[i]}</span>
                            </div>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function nextWord() {
            const words = vocab[currentRange][currentCategory];
            wordIndex = (wordIndex + 1) % words.length;
            updateDisplay();
        }

        function prevWord() {
            const words = vocab[currentRange][currentCategory];
            wordIndex = (wordIndex - 1 + words.length) % words.length;
            updateDisplay();
        }

        changeUILang('ja');
    </script>
</body>
</html>
