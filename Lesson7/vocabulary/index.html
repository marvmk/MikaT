<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>L7 Vocabulary: Trilingual Trainer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* カードの回転アニメーション設定 */
        .card-container { perspective: 1000px; }
        .card { transition: transform 0.6s; transform-style: preserve-3d; cursor: pointer; }
        .card.is-flipped { transform: rotateY(180deg); }
        .card-face {
            backface-visibility: hidden; position: absolute;
            width: 100%; height: 100%; display: flex;
            flex-direction: column; align-items: center;
            justify-content: center; border-radius: 1.5rem;
            box-shadow: 0 10px 25px -5px rgb(0 0 0 / 0.1);
            padding: 1.5rem;
        }
        .card-back { transform: rotateY(180deg); }
        .action-icon { font-size: 5rem; }
        
        /* 音声再生ボタンのスタイル */
        .speaker-btn {
            background: #0d9488;
            color: white;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 6px 20px rgba(13, 148, 136, 0.4);
            transition: all 0.2s ease;
            margin-bottom: 1rem;
        }
        .speaker-btn:active { transform: scale(0.9); background: #0f766e; }
        .speaker-btn svg { width: 40px; height: 40px; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen font-sans flex flex-col">

    <header class="bg-teal-900 text-white p-4 shadow-lg text-center">
        <h1 class="text-xl font-bold">L7 Vocab: Trilingue 🔊</h1>
        <p class="text-xs opacity-80 uppercase tracking-widest">Verbs • Tools • Items</p>
    </header>

    <main class="flex-grow flex flex-col items-center p-6 max-w-2xl mx-auto w-full">
        <!-- カテゴリーセレクター -->
        <div class="flex space-x-1 mb-6 bg-slate-200 p-1 rounded-xl w-full overflow-x-auto shadow-inner">
            <button id="mode-verb" class="flex-1 whitespace-nowrap px-4 py-3 rounded-lg font-bold transition bg-white shadow text-teal-800" onclick="switchMode('verb')">VERBS</button>
            <button id="mode-tool" class="flex-1 whitespace-nowrap px-4 py-3 rounded-lg font-bold transition text-slate-600" onclick="switchMode('tool')">TOOLS</button>
            <button id="mode-item" class="flex-1 whitespace-nowrap px-4 py-3 rounded-lg font-bold transition text-slate-600" onclick="switchMode('item')">ITEMS</button>
        </div>

        <!-- フラッシュカードエリア -->
        <div class="card-container w-full h-[500px] relative mb-8">
            <div id="practice-card" class="card w-full h-full relative">
                
                <!-- 表面: ヒント (英/伊) -->
                <div class="card-face card-front bg-white border-2 border-teal-50 p-8 text-center" onclick="flipCard()">
                    <div id="prompt-content" class="flex flex-col items-center space-y-6">
                        <!-- JSでコンテンツを注入 -->
                    </div>
                    <div class="mt-auto text-[10px] text-slate-300 font-bold uppercase tracking-widest">Tap for Japanese / Tocca per il giapponese</div>
                </div>

                <!-- 裏面: 解答 (日/音声) -->
                <div class="card-face card-back bg-teal-50 border-4 border-teal-600 p-8 text-center">
                    <div id="type-label" class="text-[10px] text-teal-600 font-black uppercase tracking-[0.2em] mb-4">Risposta</div>
                    
                    <div id="answer-text" class="text-4xl font-black text-teal-950 mb-1 leading-tight"></div>
                    <div id="romaji-text" class="text-2xl font-bold text-teal-500 font-mono mb-8"></div>
                    
                    <!-- 音声再生ボタン -->
                    <button onclick="speakJapanese(event)" class="speaker-btn">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z" />
                        </svg>
                    </button>
                    
                    <div class="w-16 h-1 bg-teal-200 mb-6 mx-auto"></div>
                    
                    <div class="flex flex-col items-center space-y-1 px-4">
                        <div id="en-back" class="text-slate-500 italic"></div>
                        <div id="it-back" class="text-lg text-teal-800 font-bold"></div>
                    </div>

                    <div class="mt-auto text-[10px] text-teal-400 font-bold uppercase tracking-widest cursor-pointer" onclick="nextQuestion()">Next / Prossimo →</div>
                </div>
            </div>
        </div>

        <!-- ナビゲーションコントロール -->
        <div class="flex justify-between w-full items-center px-4">
            <button onclick="prevQuestion()" class="w-12 h-12 flex items-center justify-center rounded-full border-2 border-slate-300 text-slate-400 bg-white">←</button>
            <div class="text-slate-400 font-black text-lg"><span id="current-index" class="text-teal-700">1</span> / <span id="total-count">0</span></div>
            <button onclick="nextQuestion()" class="w-12 h-12 flex items-center justify-center rounded-full bg-teal-700 text-white shadow-lg">→</button>
        </div>
    </main>

    <script>
        // 動詞リスト
        const verbList = [
            { icon: "✂️", en: "cut, slice", it: "tagliare", answer: "きります", romaji: "kirimasu" },
            { icon: "📧", en: "send", it: "spedire / mandare", answer: "おくります", romaji: "okurimasu" },
            { icon: "🎁", en: "give", it: "dare / regalare", answer: "あげます", romaji: "agemasu" },
            { icon: "🤲", en: "receive", it: "ricevere", answer: "もらいます", romaji: "moraimasu" },
            { icon: "🤝➡️", en: "lend", it: "prestare", answer: "かします", romaji: "kashimasu" },
            { icon: "🤝⬅️", en: "borrow", it: "prendere in prestito", answer: "かります", romaji: "karimasu" },
            { icon: "👨‍🏫", en: "teach", it: "insegnare", answer: "おしえます", romaji: "oshiemasu" },
            { icon: "📝", en: "learn", it: "imparare / studiare da qcn", answer: "ならいます", romaji: "naraimasu" },
            { icon: "📞", en: "make a phone call", it: "fare una telefonata", answer: "かけます", romaji: "kakemasu" }
        ];

        // 道具リスト
        const toolList = [
            { icon: "👋", en: "hand, arm", it: "mano / braccio", answer: "て", romaji: "te" },
            { icon: "🥢", en: "chopsticks", it: "bacchette", answer: "はし", romaji: "hashi" },
            { icon: "🥄", en: "spoon", it: "cucchiaio", answer: "スプーン", romaji: "supūn" },
            { icon: "🔪", en: "knife", it: "coltello", answer: "ナイフ", romaji: "naihu" },
            { icon: "🍴", en: "fork", it: "forchetta", answer: "フォーク", romaji: "fōku" },
            { icon: "✂️", en: "scissors", it: "forbici", answer: "はさみ", romaji: "hasami" },
            { icon: "💻", en: "PC / laptop", it: "PC / computer", answer: "パソコン", romaji: "pasokon" },
            { icon: "🕳️", en: "punch", it: "perforatrice", answer: "パンチ", romaji: "panchi" },
            { icon: "📎", en: "stapler", it: "pinzatrice", answer: "ホッチキス", romaji: "hocchikisu" },
            { icon: "➰", en: "scotch tape", it: "nastro adesivo", answer: "セロテープ", romaji: "serotēpu" },
            { icon: "🧽", en: "eraser", it: "gomma", answer: "けしゴム", romaji: "keshigomu" }
        ];

        // 物品・その他リスト
        const itemList = [
            { icon: "📄", en: "paper", it: "carta", answer: "かみ", romaji: "kami" },
            { icon: "🌸", en: "flower", it: "fiore", answer: "hana", romaji: "hana" },
            { icon: "👔", en: "shirt", it: "camicia", answer: "シャツ", romaji: "shatsu" },
            { icon: "🎁✨", en: "present, gift", it: "regalo", answer: "プレゼント", romaji: "purezento" },
            { icon: "📦", en: "baggage, parcel", it: "bagaglio / pacco", answer: "にもつ", romaji: "nimotsu" },
            { icon: "💰", en: "money", it: "soldi / danaro", answer: "おかね", romaji: "okane" },
            { icon: "🎟️", en: "ticket", it: "biglietto", answer: "きっぷ", romaji: "kippu" },
            { icon: "👨", en: "father", it: "padre", answer: "おとうさん", romaji: "otosan" },
            { icon: "👩", en: "mother", it: "madre", answer: "おかあさん", romaji: "okāsan" },
            { icon: "🗾", en: "souvenir", it: "souvenir / regalo locale", answer: "おみやげ", romaji: "omiyage" },
            { icon: "✈️🌍", en: "travel, trip", it: "viaggio", answer: "りょこう", romaji: "ryokō" }
        ];

        let currentMode = 'verb';
        let currentIndex = 0;
        let isFlipped = false;

        // モード切り替え関数
        function switchMode(mode) {
            currentMode = mode; currentIndex = 0; isFlipped = false;
            document.getElementById('practice-card').classList.remove('is-flipped');
            updateView();
            const modes = ['verb', 'tool', 'item'];
            modes.forEach(m => {
                const btn = document.getElementById(`mode-${m}`);
                if(m === mode) {
                    btn.className = "flex-1 whitespace-nowrap px-4 py-3 rounded-lg font-bold transition bg-white shadow text-teal-800";
                } else {
                    btn.className = "flex-1 whitespace-nowrap px-4 py-3 rounded-lg font-bold transition text-slate-600";
                }
            });
        }

        // 表示更新関数
        function updateView() {
            let list;
            let typeLabel;
            if(currentMode === 'verb') { list = verbList; typeLabel = "Verbi (Azioni)"; }
            else if(currentMode === 'tool') { list = toolList; typeLabel = "Strumenti (Oggetti)"; }
            else { list = itemList; typeLabel = "Articoli e Altro"; }
            
            const item = list[currentIndex];
            const promptContent = document.getElementById('prompt-content');
            promptContent.innerHTML = `
                <div class="action-icon mb-2">${item.icon}</div>
                <div class="space-y-4">
                    <div>
                        <div class="text-[10px] text-slate-400 font-bold uppercase mb-1 tracking-widest">English</div>
                        <div class="text-xl text-slate-800 font-medium">${item.en}</div>
                    </div>
                    <div class="flex justify-center"><div class="h-px w-12 bg-slate-100"></div></div>
                    <div>
                        <div class="text-[10px] text-teal-500 font-bold uppercase mb-1 tracking-widest">Italiano</div>
                        <div class="text-xl text-teal-700 font-bold">${item.it}</div>
                    </div>
                </div>
            `;
            document.getElementById('current-index').innerText = currentIndex + 1;
            document.getElementById('total-count').innerText = list.length;
            document.getElementById('answer-text').innerText = item.answer;
            document.getElementById('romaji-text').innerText = item.romaji;
            document.getElementById('en-back').innerText = item.en;
            document.getElementById('it-back').innerText = item.it;
            document.getElementById('type-label').innerText = typeLabel;
        }

        // カードをめくる
        function flipCard() {
            if (isFlipped) return;
            document.getElementById('practice-card').classList.add('is-flipped');
            isFlipped = true;
        }

        // 日本語を読み上げる
        function speakJapanese(event) {
            if (event) event.stopPropagation();
            let list = (currentMode === 'verb') ? verbList : (currentMode === 'tool' ? toolList : itemList);
            const word = list[currentIndex].answer;
            const ut = new SpeechSynthesisUtterance(word);
            ut.lang = 'ja-JP';
            ut.rate = 0.85;
            window.speechSynthesis.speak(ut);
        }

        // 次の単語へ
        function nextQuestion() {
            let list = (currentMode === 'verb') ? verbList : (currentMode === 'tool' ? toolList : itemList);
            isFlipped = false;
            document.getElementById('practice-card').classList.remove('is-flipped');
            setTimeout(() => {
                currentIndex = (currentIndex + 1) % list.length;
                updateView();
            }, 150);
        }

        // 前の単語へ
        function prevQuestion() {
            let list = (currentMode === 'verb') ? verbList : (currentMode === 'tool' ? toolList : itemList);
            isFlipped = false;
            document.getElementById('practice-card').classList.remove('is-flipped');
            setTimeout(() => {
                currentIndex = (currentIndex - 1 + list.length) % list.length;
                updateView();
            }, 150);
        }
        
        // 初期化実行
        updateView();
    </script>
</body>
</html>
