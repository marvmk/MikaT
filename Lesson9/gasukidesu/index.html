<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>L9: Sentence Trainer (~ga, ~kara)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .card-container { perspective: 1000px; }
        .card { transition: transform 0.6s; transform-style: preserve-3d; cursor: pointer; }
        .card.is-flipped { transform: rotateY(180deg); }
        .card-face {
            backface-visibility: hidden; position: absolute;
            width: 100%; height: 100%; display: flex;
            flex-direction: column; align-items: center;
            justify-content: center; border-radius: 1.5rem;
            box-shadow: 0 10px 25px -5px rgb(0 0 0 / 0.1);
            padding: 2rem;
        }
        .card-back { transform: rotateY(180deg); }
        .emoji-icon { font-size: 5rem; margin-bottom: 1rem; }
        
        .speaker-btn {
            background: #ec4899;
            color: white;
            width: 70px;
            height: 70px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 14px 0 rgba(236, 72, 153, 0.4);
            transition: all 0.2s ease;
            margin: 1.5rem 0;
        }
        .speaker-btn:active { transform: scale(0.9); background: #be185d; }
        .speaker-btn svg { width: 35px; height: 35px; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen font-sans flex flex-col text-slate-800">

    <header class="bg-pink-800 text-white p-4 shadow-lg text-center">
        <h1 class="text-xl font-bold">L9 Sentence Trainer 🔊</h1>
        <p class="text-xs opacity-80 uppercase tracking-widest">Preferences, Skills & Reasons</p>
    </header>

    <main class="flex-grow flex flex-col items-center p-6 max-w-2xl mx-auto w-full">
        <!-- Mode Selector -->
        <div class="flex space-x-1 mb-6 bg-slate-200 p-1 rounded-xl w-full overflow-x-auto">
            <button id="mode-likes" class="flex-1 whitespace-nowrap px-3 py-3 rounded-lg font-bold transition bg-white shadow text-pink-800 text-xs" onclick="switchMode('likes')">
                Likes & Skills
            </button>
            <button id="mode-poss" class="flex-1 whitespace-nowrap px-3 py-3 rounded-lg font-bold transition text-slate-600 text-xs" onclick="switchMode('poss')">
                Possession
            </button>
            <button id="mode-reason" class="flex-1 whitespace-nowrap px-3 py-3 rounded-lg font-bold transition text-slate-600 text-xs" onclick="switchMode('reason')">
                Reasons
            </button>
        </div>

        <!-- Question Area -->
        <div id="game-view" class="w-full flex flex-col items-center">
            <!-- Card Container -->
            <div class="card-container w-full h-[540px] relative mb-8">
                <div id="practice-card" class="card w-full h-full relative">
                    
                    <!-- Front Side -->
                    <div class="card-face card-front bg-white border-2 border-pink-50 text-center" onclick="flipCard()">
                        <div id="prompt-content" class="flex flex-col items-center w-full">
                            <!-- Injected by JS -->
                        </div>
                        <div class="mt-auto text-[10px] text-slate-300 font-bold uppercase tracking-widest">
                            Tap for Answer / Tocca per la risposta
                        </div>
                    </div>

                    <!-- Back Side -->
                    <div class="card-face card-back bg-pink-50 border-4 border-pink-600 text-center">
                        <div id="grammar-label" class="text-[10px] text-pink-600 font-black uppercase tracking-[0.2em] mb-4">Grammar Point</div>
                        
                        <div id="answer-text" class="text-3xl font-black text-pink-950 mb-2 leading-tight px-2"></div>
                        <div id="romaji-text" class="text-lg font-bold text-pink-600 font-mono mb-4"></div>
                        
                        <button onclick="speakJapanese(event)" class="speaker-btn">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z" />
                            </svg>
                        </button>
                        
                        <div class="w-16 h-px bg-pink-200 mb-6 mx-auto"></div>
                        
                        <div class="space-y-1 px-4">
                            <div id="it-back" class="text-pink-800 font-bold"></div>
                            <div id="en-back" class="text-slate-500 italic text-sm"></div>
                        </div>

                        <div class="mt-auto text-[10px] text-pink-400 font-bold uppercase cursor-pointer" onclick="nextQuestion()">
                            Next / Prossimo →
                        </div>
                    </div>
                </div>
            </div>

            <!-- Navigation Controls -->
            <div class="flex justify-between w-full items-center px-4">
                <button onclick="prevQuestion()" class="w-12 h-12 flex items-center justify-center rounded-full border-2 border-slate-300 text-slate-400 bg-white shadow-sm">←</button>
                <div class="text-slate-400 font-black text-lg">
                    <span id="current-index" class="text-pink-700">1</span> / <span id="total-count">0</span>
                </div>
                <button onclick="nextQuestion()" class="w-12 h-12 flex items-center justify-center rounded-full bg-pink-700 text-white shadow-lg">→</button>
            </div>
        </div>
    </main>

    <script>
        const likesQuestions = [
            { 
                icon: "🎾🤩", 
                prompt: "I like sports.", 
                answer: "スポーツが すきです。", 
                romaji: "Supōtsu ga suki desu.", 
                en: "I like sports.", 
                it: "Mi piacciono gli sport." 
            },
            { 
                icon: "🎬✨", 
                prompt: "I really like movies.", 
                answer: "えいがが だいすきです。", 
                romaji: "Eiga ga daisuki desu.", 
                en: "I love movies.", 
                it: "Amo molto i film." 
            },
            { 
                icon: "🥘🍳", 
                prompt: "I am good at cooking.", 
                answer: "りょうりが じょうずです。", 
                romaji: "Ryōri ga jōzu desu.", 
                en: "I am good at cooking.", 
                it: "Sono bravo a cucinare." 
            },
            { 
                icon: "🐟🤮", 
                prompt: "I dislike fish.", 
                answer: "さかなが きらいです。", 
                romaji: "Sakana ga kirai desu.", 
                en: "I dislike fish.", 
                it: "Non mi piace il pesce." 
            },
            { 
                icon: "🎾👎", 
                prompt: "I am not good at tennis.", 
                answer: "テニスが へたです。", 
                romaji: "Tenisu ga heta desu.", 
                en: "I am bad at tennis.", 
                it: "Non sono bravo a tennis." 
            },
            { 
                icon: "🎤❓", 
                prompt: "A: What kind of songs do you like? B: I like Jazz.", 
                answer: "A：どんな うたが すきですか。 B：ジャズが すきです。", 
                romaji: "A: Donna uta ga suki desu ka. B: Jazu ga suki desu.", 
                en: "A: What kind of songs do you like? B: I like Jazz.", 
                it: "A: Che tipo di canzoni ti piacciono? B: Mi piace il Jazz." 
            }
        ];

        const possQuestions = [
            { 
                icon: "🇯🇵🗣️✅", 
                prompt: "I understand Japanese well.", 
                answer: "にほんごが よく わかります。", 
                romaji: "Nihongo ga yoku wakarimasu.", 
                en: "I understand Japanese well.", 
                it: "Capisco bene il giapponese." 
            },
            { 
                icon: "🚗✨", 
                prompt: "I have a car.", 
                answer: "くるまが あります。", 
                romaji: "Kuruma ga arimasu.", 
                en: "I have a car.", 
                it: "Ho una macchina." 
            },
            { 
                icon: "💴❌", 
                prompt: "I don't have money at all.", 
                answer: "おかねが ぜんぜん ありません。", 
                romaji: "Okane ga zenzen arimasen.", 
                en: "I don't have any money at all.", 
                it: "Non ho affatto soldi." 
            },
            { 
                icon: "⏳🤏", 
                prompt: "I have a little time.", 
                answer: "じかんが すこし あります。", 
                romaji: "Jikan ga sukoshi arimasu.", 
                en: "I have a little time.", 
                it: "Ho un po' di tempo." 
            },
            { 
                icon: "🖊️❓", 
                prompt: "Do you have a pen?", 
                answer: "ボールペンが ありますか。", 
                romaji: "Bōrupen ga arimasu ka.", 
                en: "Do you have a ballpoint pen?", 
                it: "Hai una penna a sfera?" 
            }
        ];

        const reasonQuestions = [
            { 
                icon: "🎂🎁", 
                prompt: "Because it's my birthday, I'll buy a cake.", 
                answer: "たんじょうびですから、ケーキを かいます。", 
                romaji: "Tanjōbi desu kara, kēki o kaimasu.", 
                en: "Because it's my birthday, I'll buy a cake.", 
                it: "Siccome è il mio compleanno, comprerò una torta." 
            },
            { 
                icon: "🏢🏃❌", 
                prompt: "Because I have no time, I won't go.", 
                answer: "じかんが ありませんから、いきません。", 
                romaji: "Jikan ga arimasen kara, ikimasen.", 
                en: "Because I have no time, I won't go.", 
                it: "Siccome non ho tempo, non vado." 
            },
            { 
                icon: "🍣😋", 
                prompt: "Because I like sushi, I eat it often.", 
                answer: "すしが すきですから、よく たべます。", 
                romaji: "Sushi ga suki desu kara, yoku tabemasu.", 
                en: "Because I like sushi, I eat it often.", 
                it: "Siccome mi piace il sushi, lo mangio spesso." 
            },
            { 
                icon: "❓🤔", 
                prompt: "A: Why? B: Because I am busy.", 
                answer: "A：どうしてですか。 B：いそがしいですから。", 
                romaji: "A: Dōshite desu ka. B: Isogashii desu kara.", 
                en: "A: Why? B: Because I'm busy.", 
                it: "A: Perché? B: Perché sono occupato." 
            },
            { 
                icon: "🏠🚪🏃", 
                prompt: "Because I have an errand, I'll go home early.", 
                answer: "ようじが ありますから、はやく かえります。", 
                romaji: "Yōji ga arimasu kara, hayaku kaerimasu.", 
                en: "Because I have an errand, I'll go home early.", 
                it: "Siccome ho un impegno, torno a casa presto." 
            }
        ];

        let currentMode = 'likes';
        let currentIndex = 0;
        let isFlipped = false;

        function switchMode(mode) {
            currentMode = mode;
            currentIndex = 0;
            isFlipped = false;
            document.getElementById('practice-card').classList.remove('is-flipped');
            
            ['likes', 'poss', 'reason'].forEach(m => {
                document.getElementById(`mode-${m}`).className = "flex-1 whitespace-nowrap px-3 py-3 rounded-lg font-bold transition text-slate-600 text-xs";
            });
            
            const activeBtn = document.getElementById(`mode-${mode}`);
            activeBtn.className = "flex-1 whitespace-nowrap px-3 py-3 rounded-lg font-bold transition bg-white shadow text-pink-800 text-xs";

            updateView();
        }

        function updateView() {
            let questions;
            let label;
            if (currentMode === 'likes') { questions = likesQuestions; label = "~が好き / ~が上手"; }
            else if (currentMode === 'poss') { questions = possQuestions; label = "~がある / ~がわかる"; }
            else { questions = reasonQuestions; label = "~から (Reason)"; }

            const q = questions[currentIndex];
            const promptContent = document.getElementById('prompt-content');
            
            promptContent.innerHTML = `
                <div class="emoji-icon">${q.icon}</div>
                <div class="text-slate-400 text-[10px] uppercase tracking-widest mb-2 font-bold">Concept / Hint</div>
                <div class="text-2xl font-black text-slate-800 mb-6 leading-tight px-4">${q.prompt}</div>
                <div class="flex flex-col items-center space-y-2 border-t border-slate-100 pt-6 w-full px-4">
                    <div class="text-sm text-pink-600 font-bold uppercase tracking-wide">${q.it}</div>
                    <div class="text-sm text-slate-400 italic font-medium">${q.en}</div>
                </div>
            `;

            document.getElementById('current-index').innerText = currentIndex + 1;
            document.getElementById('total-count').innerText = questions.length;
            document.getElementById('answer-text').innerText = q.answer;
            document.getElementById('romaji-text').innerText = q.romaji;
            document.getElementById('it-back').innerText = q.it;
            document.getElementById('en-back').innerText = q.en;
            document.getElementById('grammar-label').innerText = label;
        }

        function flipCard() {
            if (isFlipped) return;
            document.getElementById('practice-card').classList.add('is-flipped');
            isFlipped = true;
        }

        function speakJapanese(event) {
            if (event) event.stopPropagation();
            let questions;
            if (currentMode === 'likes') questions = likesQuestions;
            else if (currentMode === 'poss') questions = possQuestions;
            else questions = reasonQuestions;

            const fullText = questions[currentIndex].answer;
            
            // A: or B: の接頭辞を削除して再生
            const speechText = fullText.replace(/^[A-Z][：:]\s*/g, '').replace(/[A-Z][：:]\s*/g, ' ');
            
            const ut = new SpeechSynthesisUtterance(speechText);
            ut.lang = 'ja-JP';
            ut.rate = 0.85;
            
            const voices = window.speechSynthesis.getVoices();
            const jaVoice = voices.find(v => v.lang.startsWith('ja'));
            if (jaVoice) ut.voice = jaVoice;

            window.speechSynthesis.speak(ut);
        }

        function nextQuestion() {
            const questions = currentMode === 'likes' ? likesQuestions : (currentMode === 'poss' ? possQuestions : reasonQuestions);
            isFlipped = false;
            document.getElementById('practice-card').classList.remove('is-flipped');
            setTimeout(() => {
                currentIndex = (currentIndex + 1) % questions.length;
                updateView();
            }, 150);
        }

        function prevQuestion() {
            const questions = currentMode === 'likes' ? likesQuestions : (currentMode === 'poss' ? possQuestions : reasonQuestions);
            isFlipped = false;
            document.getElementById('practice-card').classList.remove('is-flipped');
            setTimeout(() => {
                currentIndex = (currentIndex - 1 + questions.length) % questions.length;
                updateView();
            }, 150);
        }

        window.speechSynthesis.getVoices();
        updateView();
    </script>
</body>
</html>
