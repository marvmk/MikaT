<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>L11: Counters & Duration Trainer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .card-container { perspective: 1000px; }
        .card { transition: transform 0.6s; transform-style: preserve-3d; cursor: pointer; }
        .card.is-flipped { transform: rotateY(180deg); }
        .card-face {
            backface-visibility: hidden; position: absolute;
            width: 100%; height: 100%; display: flex;
            flex-direction: column; align-items: center;
            justify-content: center; border-radius: 1.5rem;
            box-shadow: 0 10px 25px -5px rgb(0 0 0 / 0.1);
            padding: 2rem;
        }
        .card-back { transform: rotateY(180deg); }
        .emoji-icon { font-size: 5rem; margin-bottom: 1rem; }
        
        .speaker-btn {
            background: #10b981;
            color: white;
            width: 70px;
            height: 70px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 14px 0 rgba(16, 185, 129, 0.4);
            transition: all 0.2s ease;
            margin: 1.5rem 0;
        }
        .speaker-btn:active { transform: scale(0.9); background: #059669; }
        .speaker-btn svg { width: 35px; height: 35px; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen font-sans flex flex-col text-slate-800">

    <header class="bg-emerald-700 text-white p-4 shadow-lg text-center">
        <h1 class="text-xl font-bold">L11 Sentence Trainer 🔊</h1>
        <p class="text-xs opacity-80 uppercase tracking-widest">Counting Items, People & Time</p>
    </header>

    <main class="flex-grow flex flex-col items-center p-6 max-w-2xl mx-auto w-full">
        <!-- Mode Selector -->
        <div class="flex space-x-1 mb-6 bg-slate-200 p-1 rounded-xl w-full overflow-x-auto">
            <button id="mode-count" class="flex-1 whitespace-nowrap px-3 py-3 rounded-lg font-bold transition bg-white shadow text-emerald-800 text-xs" onclick="switchMode('count')">
                Counters
            </button>
            <button id="mode-dur" class="flex-1 whitespace-nowrap px-3 py-3 rounded-lg font-bold transition text-slate-600 text-xs" onclick="switchMode('dur')">
                Duration
            </button>
            <button id="mode-freq" class="flex-1 whitespace-nowrap px-3 py-3 rounded-lg font-bold transition text-slate-600 text-xs" onclick="switchMode('freq')">
                Frequency
            </button>
        </div>

        <!-- Question Area -->
        <div id="game-view" class="w-full flex flex-col items-center">
            <!-- Card Container -->
            <div class="card-container w-full h-[540px] relative mb-8">
                <div id="practice-card" class="card w-full h-full relative">
                    
                    <!-- Front Side -->
                    <div class="card-face card-front bg-white border-2 border-emerald-50 text-center" onclick="flipCard()">
                        <div id="prompt-content" class="flex flex-col items-center w-full">
                            <!-- Injected by JS -->
                        </div>
                        <div class="mt-auto text-[10px] text-slate-300 font-bold uppercase tracking-widest">
                            Tap for Answer / Tocca per la risposta
                        </div>
                    </div>

                    <!-- Back Side -->
                    <div class="card-face card-back bg-emerald-50 border-4 border-emerald-600 text-center">
                        <div id="grammar-label" class="text-[10px] text-emerald-600 font-black uppercase tracking-[0.2em] mb-4">Grammar Point</div>
                        
                        <div id="answer-text" class="text-3xl font-black text-emerald-950 mb-2 leading-tight px-2"></div>
                        <div id="romaji-text" class="text-lg font-bold text-emerald-600 font-mono mb-4"></div>
                        
                        <button onclick="speakJapanese(event)" class="speaker-btn">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z" />
                            </svg>
                        </button>
                        
                        <div class="w-16 h-px bg-emerald-200 mb-6 mx-auto"></div>
                        
                        <div class="space-y-1 px-4">
                            <div id="it-back" class="text-emerald-800 font-bold"></div>
                            <div id="en-back" class="text-slate-500 italic text-sm"></div>
                        </div>

                        <div class="mt-auto text-[10px] text-emerald-400 font-bold uppercase cursor-pointer" onclick="nextQuestion()">
                            Next / Prossimo →
                        </div>
                    </div>
                </div>
            </div>

            <!-- Navigation Controls -->
            <div class="flex justify-between w-full items-center px-4">
                <button onclick="prevQuestion()" class="w-12 h-12 flex items-center justify-center rounded-full border-2 border-slate-300 text-slate-400 bg-white shadow-sm">←</button>
                <div class="text-slate-400 font-black text-lg">
                    <span id="current-index" class="text-emerald-700">1</span> / <span id="total-count">0</span>
                </div>
                <button onclick="nextQuestion()" class="w-12 h-12 flex items-center justify-center rounded-full bg-emerald-700 text-white shadow-lg">→</button>
            </div>
        </div>
    </main>

    <script>
        const countQuestions = [
            { 
                icon: "🍎🍎🍎", 
                prompt: "I bought three apples.", 
                answer: "りんごを みっつ かいました。", 
                romaji: "Ringo o mittsu kaimashita.", 
                en: "I bought three apples.", 
                it: "Ho comprato tre mele." 
            },
            { 
                icon: "👨‍🎓👨‍🎓👨‍🎓👨‍🎓", 
                prompt: "There are four students in the classroom.", 
                answer: "きょうしつに がくせいが よにん います。", 
                romaji: "Kyōshitsu ni gakusei ga yonin imasu.", 
                en: "There are four students in the classroom.", 
                it: "Ci sono quattro studenti in aula." 
            },
            { 
                icon: "🚗🚗", 
                prompt: "I have two cars.", 
                answer: "くるまが にだい あります。", 
                romaji: "Kuruma ga nidai arimasu.", 
                en: "I have two cars.", 
                it: "Ho due macchine." 
            },
            { 
                icon: "📄📄📄📄📄", 
                prompt: "Please give me five 80-yen stamps.", 
                answer: "80えんの きってを ごまい ください。", 
                romaji: "Hachijū-en no kitte o gomai kudasai.", 
                en: "Five 80-yen stamps, please.", 
                it: "Per favore, mi dia cinque francobolli da 80 yen." 
            },
            { 
                icon: "🥪❓", 
                prompt: "A: How many sandwiches did you eat? B: I ate two.", 
                answer: "A：サンドイッチを いくつ たべましたか。 B：ふたつ たべました。", 
                romaji: "A: Sandoicchi o ikutsu tabemashita ka. B: Futatsu tabemashita.", 
                en: "A: How many sandwiches did you eat? B: I ate two.", 
                it: "A: Quanti panini hai mangiato? B: Ne ho mangiati due." 
            }
        ];

        const durQuestions = [
            { 
                icon: "📖⌚2h", 
                prompt: "I studied for two hours.", 
                answer: "にじかん べんきょうしました。", 
                romaji: "Nijikan benkyōshimashita.", 
                en: "I studied for two hours.", 
                it: "Ho studiato per due ore." 
            },
            { 
                icon: "🏠🗓️1w", 
                prompt: "I took a week off work.", 
                answer: "しごとを いっしゅうかん やすみました。", 
                romaji: "Shigoto o isshūkan yasumimashita.", 
                en: "I took a week off from work.", 
                it: "Mi sono preso una settimana di riposo dal lavoro." 
            },
            { 
                icon: "🇯🇵✈️3y", 
                prompt: "I have been in Japan for three years.", 
                answer: "さんにん にほんに います。", 
                romaji: "Sannen nihon ni imasu.", 
                en: "I've been in Japan for three years.", 
                it: "Sono in Giappone da tre anni." 
            },
            { 
                icon: "❓🇯🇵🗣️", 
                prompt: "A: How long did you study Japanese? B: Six months.", 
                answer: "A：どのくらい にほんごを べんきょうしましたか。 B：ろっかげつ べんきょうしました。", 
                romaji: "A: Donokurai nihongo o benkyōshimashita ka. B: Rokkagesu benkyōshimashita.", 
                en: "A: How long did you study Japanese? B: Six months.", 
                it: "A: Per quanto tempo hai studiato giapponese? B: Sei mesi." 
            }
        ];

        const freqQuestions = [
            { 
                icon: "🎬🗓️1m / 2x", 
                prompt: "I watch movies twice a month.", 
                answer: "いっかげつに にかい えいがを みます。", 
                romaji: "Ikkagetsu ni nikai eiga o mimasu.", 
                en: "I watch movies twice a month.", 
                it: "Guardo film due volte al mese." 
            },
            { 
                icon: "🏊🗓️1w / 3x", 
                prompt: "I go swimming three times a week.", 
                answer: "いっしゅうかんに さんかい およぎます。", 
                romaji: "Isshūkan ni sankai oyogimasu.", 
                en: "I go swimming three times a week.", 
                it: "Vado a nuotare tre volte a settimana." 
            },
            { 
                icon: "🥗🗓️1d / 1x", 
                prompt: "I eat salad once a day.", 
                answer: "いちにちに いっかい さらだを たべます。", 
                romaji: "Ichinichi ni ikkai sarada o tabemasu.", 
                en: "I eat salad once a day.", 
                it: "Mangio l'insalata una volta al giorno." 
            }
        ];

        let currentMode = 'count';
        let currentIndex = 0;
        let isFlipped = false;

        function switchMode(mode) {
            currentMode = mode;
            currentIndex = 0;
            isFlipped = false;
            document.getElementById('practice-card').classList.remove('is-flipped');
            
            ['count', 'dur', 'freq'].forEach(m => {
                document.getElementById(`mode-${m}`).className = "flex-1 whitespace-nowrap px-3 py-3 rounded-lg font-bold transition text-slate-600 text-xs";
            });
            
            const activeBtn = document.getElementById(`mode-${mode}`);
            activeBtn.className = "flex-1 whitespace-nowrap px-3 py-3 rounded-lg font-bold transition bg-white shadow text-emerald-800 text-xs";

            updateView();
        }

        function updateView() {
            let questions;
            let label;
            if (currentMode === 'count') { questions = countQuestions; label = "助数詞 (Counters)"; }
            else if (currentMode === 'dur') { questions = durQuestions; label = "期間 (Duration)"; }
            else { questions = freqQuestions; label = "頻度 (Frequency)"; }

            const q = questions[currentIndex];
            const promptContent = document.getElementById('prompt-content');
            
            promptContent.innerHTML = `
                <div class="emoji-icon">${q.icon}</div>
                <div class="text-slate-400 text-[10px] uppercase tracking-widest mb-2 font-bold">Concept / Hint</div>
                <div class="text-2xl font-black text-slate-800 mb-6 leading-tight px-4">${q.prompt}</div>
                <div class="flex flex-col items-center space-y-2 border-t border-slate-100 pt-6 w-full px-4">
                    <div class="text-sm text-emerald-600 font-bold uppercase tracking-wide">${q.it}</div>
                    <div class="text-sm text-slate-400 italic font-medium">${q.en}</div>
                </div>
            `;

            document.getElementById('current-index').innerText = currentIndex + 1;
            document.getElementById('total-count').innerText = questions.length;
            document.getElementById('answer-text').innerText = q.answer;
            document.getElementById('romaji-text').innerText = q.romaji;
            document.getElementById('it-back').innerText = q.it;
            document.getElementById('en-back').innerText = q.en;
            document.getElementById('grammar-label').innerText = label;
        }

        function flipCard() {
            if (isFlipped) return;
            document.getElementById('practice-card').classList.add('is-flipped');
            isFlipped = true;
        }

        function speakJapanese(event) {
            if (event) event.stopPropagation();
            let questions;
            if (currentMode === 'count') questions = countQuestions;
            else if (currentMode === 'dur') questions = durQuestions;
            else questions = freqQuestions;

            const fullText = questions[currentIndex].answer;
            
            // Clean A: or B: prefixes
            const speechText = fullText.replace(/^[A-Z][：:]\s*/g, '').replace(/[A-Z][：:]\s*/g, ' ');
            
            const ut = new SpeechSynthesisUtterance(speechText);
            ut.lang = 'ja-JP';
            ut.rate = 0.85;
            
            const voices = window.speechSynthesis.getVoices();
            const jaVoice = voices.find(v => v.lang.startsWith('ja'));
            if (jaVoice) ut.voice = jaVoice;

            window.speechSynthesis.speak(ut);
        }

        function nextQuestion() {
            const questions = currentMode === 'count' ? countQuestions : (currentMode === 'dur' ? durQuestions : freqQuestions);
            isFlipped = false;
            document.getElementById('practice-card').classList.remove('is-flipped');
            setTimeout(() => {
                currentIndex = (currentIndex + 1) % questions.length;
                updateView();
            }, 150);
        }

        function prevQuestion() {
            const questions = currentMode === 'count' ? countQuestions : (currentMode === 'dur' ? durQuestions : freqQuestions);
            isFlipped = false;
            document.getElementById('practice-card').classList.remove('is-flipped');
            setTimeout(() => {
                currentIndex = (currentIndex - 1 + questions.length) % questions.length;
                updateView();
            }, 150);
        }

        window.speechSynthesis.getVoices();
        updateView();
    </script>
</body>
</html>
